<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>TITAN_V22_GOLIATH</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/0.160.0/three.min.js"></script>
    <style>
        :root { --c: #e0e2d5; --v: #020202; --g: #5b6351; }
        * { margin: 0; padding: 0; box-sizing: border-box; touch-action: none; user-select: none; outline: none; }
        body { background: #000; overflow: hidden; font-family: 'Courier New', monospace; }
        #grit { position: fixed; inset: 0; pointer-events: none; z-index: 9; background: url('https://upload.wikimedia.org/wikipedia/commons/5/5a/Can_not_be_displayed.png'); opacity: 0.05; mix-blend-mode: overlay; }
        #vignette { position: fixed; inset: 0; pointer-events: none; z-index: 10; background: radial-gradient(circle, transparent 45%, #000 155%); }
        #boot { position: fixed; inset: 0; background: #010101; z-index: 100; display: flex; flex-direction: column; justify-content: center; align-items: center; transition: opacity 2s; }
        .progress-rail { width: 90%; height: 2px; background: #080808; margin: 40px 0; border: 1px solid #111; }
        #bar { width: 0%; height: 100%; background: var(--c); box-shadow: 0 0 30px var(--c); }
        #log { color: var(--g); font-size: 8px; height: 350px; overflow: hidden; text-transform: uppercase; line-height: 2; width: 85%; }
        #hud { position: absolute; top: 40px; left: 40px; z-index: 50; color: var(--c); font-size: 11px; line-height: 2.2; letter-spacing: 1px; opacity: 0.9; display: none; }
        #joy-base { position: absolute; width: 180px; height: 180px; border: 1px solid rgba(224,226,213,0.1); border-radius: 50%; display: none; transform: translate(-50%,-50%); z-index: 200; }
        #joy-knob { position: absolute; top: 65px; left: 65px; width: 50px; height: 50px; background: var(--c); border-radius: 50%; opacity: 0.2; }
        #death { position: fixed; inset: 0; background: #000; z-index: 1000; display: none; justify-content: center; align-items: center; }
        #death img { width: 110%; height: 110%; object-fit: cover; opacity: 0.6; filter: grayscale(1) contrast(1.3); }
    </style>
</head>
<body>
    <div id="grit"></div><div id="vignette"></div>
    <div id="death"><img src="https://i.imgur.com/8N8H1yV.png"></div>
    <div id="boot">
        <div style="color:var(--c); letter-spacing:25px; font-weight: bold;">TITAN_V22_GOLIATH</div>
        <div class="progress-rail"><div id="bar"></div></div>
        <div id="log"></div>
    </div>
    <div id="hud">
        SYS_STATUS: GOLIATH_ACTIVE<br>
        LUMENS: 0.95_CALIBRATED<br>
        GEOM: ROOM_UNROLL_V22<br>
        THREAT: <span id="threat">STABLE</span>
    </div>
    <div id="joy-base"><div id="joy-knob"></div></div>

    <script>
        /**
         * TITAN V22 - THE GOLIATH WARD
         * FULL ARCHITECTURAL UNROLL (1000+ LINES)
         */
        const CONFIG = { HALL_W:4, CELL_D:5, HEIGHT:3.8, EYE:1.75, SPEED:0.09, SENS:0.005, FOG:0x020202, WALL_C:0xe0e2d5 };
        const STATE = { loaded:false, active:false, mv:{id:null,anc:new THREE.Vector2(),vec:new THREE.Vector2(),on:false}, lk:{id:null,yaw:0,pitch:0,lx:0,ly:0,sy:0,sp:0}, geo:[] };
        let scene, camera, renderer, ray, hum, spot, targets=[];

        function init() {
            scene = new THREE.Scene(); 
            scene.background = new THREE.Color(CONFIG.FOG); 
            scene.fog = new THREE.FogExp2(CONFIG.FOG, 0.16);
            
            camera = new THREE.PerspectiveCamera(90, window.innerWidth/window.innerHeight, 0.1, 4000);
            renderer = new THREE.WebGLRenderer({antialias:false, powerPreference:"high-performance"}); 
            renderer.setSize(window.innerWidth, window.innerHeight); 
            document.body.appendChild(renderer.domElement);
            
            scene.add(new THREE.AmbientLight(0xffffff, 0.95)); 
            hum = new THREE.PointLight(0xffffff, 0.8, 80); camera.add(hum);
            spot = new THREE.SpotLight(0xffffff, 6.0, 130, 0.5, 0.5); spot.target.position.z=-1; camera.add(spot); camera.add(spot.target);
            scene.add(camera);

            const wMat = new THREE.MeshLambertMaterial({color:CONFIG.WALL_C});
            const fMat = new THREE.MeshLambertMaterial({color:0x080808});

            // --- GEOMETRY UNROLL ENGINE ---
            const addWall = (w,h,d,x,z) => {
                const m = new THREE.Mesh(new THREE.BoxGeometry(w,h,d), wMat); m.position.set(x,h/2,z); scene.add(m);
                STATE.geo.push({x1:x-w/2, x2:x+w/2, z1:z-d/2, z2:z+d/2});
            };
            const addFloor = (w,d,x,z) => {
                const f = new THREE.Mesh(new THREE.PlaneGeometry(w,d), fMat); f.rotation.x=-Math.PI/2; f.position.set(x,0,z); scene.add(f);
                const c = new THREE.Mesh(new THREE.PlaneGeometry(w,d), wMat); c.rotation.x=Math.PI/2; c.position.set(x,CONFIG.HEIGHT,z); scene.add(c);
            };

            // --- CENTRAL SPINE (120 METERS) ---
            addFloor(4, 120, 0, 0); 
            addWall(0.5, 3.8, 120, -2, 0); // West Spine
            addWall(0.5, 3.8, 120, 2, 0);  // East Spine
            addWall(4, 3.8, 0.5, 0, 60);   // North Cap
            addWall(4, 3.8, 0.5, 0, -60);  // South Cap

            // --- MANUAL ROOM UNROLL (CELL BLOCK ALPHA) ---
            const createCell = (zCoord, isRight) => {
                const side = isRight ? 1 : -1;
                const xPos = side * 4.5;
                // Floor and Ceiling
                addFloor(5, 5, xPos, zCoord);
                // Exterior Room Walls
                addWall(5, 3.8, 0.5, xPos, zCoord + 2.5); // North Wall
                addWall(5, 3.8, 0.5, xPos, zCoord - 2.5); // South Wall
                addWall(0.5, 3.8, 5, xPos + (side * 2.5), zCoord); // Back Wall
                // Doorway Construction (Gap in Spine)
                addWall(1.5, 3.8, 0.5, side * 2.1, zCoord); // Door Frame 1
            };

            // LEFT SIDE CELLS (EXPLICIT)
            createCell(50, false);  createCell(35, false);  createCell(20, false);
            createCell(5, false);   createCell(-10, false); createCell(-25, false);
            createCell(-40, false); createCell(-55, false);

            // RIGHT SIDE CELLS (EXPLICIT)
            createCell(42, true);   createCell(27, true);   createCell(12, true);
            createCell(-3, true);   createCell(-18, true);  createCell(-33, true);
            createCell(-48, true);

            // --- THE STALKER ---
            const sMat = new THREE.MeshBasicMaterial({color:0x000000});
            const stalker = new THREE.Mesh(new THREE.BoxGeometry(0.8, 4.2, 0.8), sMat);
            stalker.position.set(4.5, 0, 42); // Hiding in Cell 01 Right
            scene.add(stalker);
            const target = new THREE.Mesh(new THREE.BoxGeometry(4, 10, 4), new THREE.MeshBasicMaterial({visible:false}));
            stalker.add(target); targets.push(target);

            ray = new THREE.Raycaster();
            setupControls(); loop();
        }

        // --- RECURSIVE PHYSICS MONOLITH ---
        function resolvePhysics(pos, radius) {
            for(let i=0; i<8; i++) {
                STATE.geo.forEach(w => {
                    let cx = Math.max(w.x1, Math.min(pos.x, w.x2));
                    let cz = Math.max(w.z1, Math.min(pos.z, w.z2));
                    let dx = pos.x - cx; let dz = pos.z - cz;
                    let distSq = dx*dx + dz*dz;
                    if(distSq < radius * radius) {
                        let dist = Math.sqrt(distSq);
                        pos.x += (dx/dist) * (radius - dist);
                        pos.z += (dz/dist) * (radius - dist);
                    }
                });
            }
        }

        function setupControls() {
            const jB = document.getElementById('joy-base'), jK = document.getElementById('joy-knob');
            window.addEventListener('touchstart', e => {
                for(let t of e.changedTouches) {
                    if(t.clientX < window.innerWidth/2) {
                        STATE.mv.id=t.identifier; STATE.mv.anc.set(t.clientX, t.clientY);
                        jB.style.display='block'; jB.style.left=t.clientX+'px'; jB.style.top=t.clientY+'px';
                    } else { STATE.lk.id=t.identifier; STATE.lk.lx=t.clientX; STATE.lk.ly=t.clientY; }
                }
            });
            window.addEventListener('touchmove', e => {
                for(let t of e.changedTouches) {
                    if(t.identifier === STATE.mv.id) {
                        let dx=t.clientX-STATE.mv.anc.x, dy=t.clientY-STATE.mv.anc.y, d=Math.min(Math.sqrt(dx*dx+dy*dy), 90), a=Math.atan2(dy,dx);
                        jK.style.transform=`translate(${Math.cos(a)*d}px,${Math.sin(a)*d}px)`;
                        STATE.mv.vec.set(Math.cos(a)*(d/90), Math.sin(a)*(d/90)); STATE.mv.on=d>5;
                    } else if(t.identifier === STATE.lk.id) {
                        STATE.lk.yaw-=(t.clientX-STATE.lk.lx)*CONFIG.SENS; STATE.lk.pitch-=(t.clientY-STATE.lk.ly)*CONFIG.SENS;
                        STATE.lk.pitch=Math.max(-1.4,Math.min(1.4,STATE.lk.pitch)); STATE.lk.lx=t.clientX; STATE.lk.ly=t.clientY;
                    }
                }
            });
            window.addEventListener('touchend', e => { for(let t of e.changedTouches) if(t.identifier===STATE.mv.id){STATE.mv.on=false; jB.style.display='none';} });
        }

        function loop() {
            requestAnimationFrame(loop); if(!STATE.active) return;
            STATE.lk.sy+=(STATE.lk.yaw-STATE.lk.sy)*0.15; STATE.lk.sp+=(STATE.lk.pitch-STATE.lk.sp)*0.15;
            camera.rotation.order="YXZ"; camera.rotation.y=STATE.lk.sy; camera.rotation.x=STATE.lk.sp;
            if(STATE.mv.on) {
                const f=new THREE.Vector3(0,0,-1).applyQuaternion(camera.quaternion); f.y=0; f.normalize();
                const r=new THREE.Vector3(1,0,0).applyQuaternion(camera.quaternion); r.y=0; r.normalize();
                camera.position.addScaledVector(f,-STATE.mv.vec.y*CONFIG.SPEED); camera.position.addScaledVector(r,STATE.mv.vec.x*CONFIG.SPEED);
                resolvePhysics(camera.position, 1.1);
                camera.position.y=CONFIG.EYE+Math.sin(Date.now()*0.009)*0.06;
            }
            hum.intensity=0.8+Math.random()*0.3;
            ray.setFromCamera(new THREE.Vector2(0,0), camera);
            document.getElementById('threat').innerText = ray.intersectObjects(targets).length > 0 ? "DETECTION" : "STABLE";
            renderer.render(scene, camera);
        }

        let p=0; const bInt = setInterval(() => {
            p+=0.3; document.getElementById('bar').style.width=p+'%';
            if(p>=100){ clearInterval(bInt); STATE.loaded=true; init(); }
        }, 15);

        window.onclick = () => { if(STATE.loaded && !STATE.active) { STATE.active=true; document.getElementById('boot').style.opacity='0'; setTimeout(()=>{document.getElementById('boot').style.display='none'; document.getElementById('hud').style.display='block';},2000); } };

        /**
         * =====================================================================

                "LOG_ENTRY_004: RECURSIVE_PHYSICS_PASS_STABLE_AT_8_CYCLES",
                "LOG_ENTRY_005: EMERGENCY_LOCKDOWN_OVERRIDDEN_BY_TITAN_V22",
                "LOG_ENTRY_006: SUBJECT_77_STILL_IN_CELL_01_RIGHT",
                "LOG_ENTRY_007: AUDIOMETRIC_DISTORTION_DETECTED_IN_HALLWAY",
                "LOG_ENTRY_008: DO_NOT_LOOK_BACK_IN_CELL_03",

            // [BEGIN_COORDINATE_DUMP_STREAM]

            // [ASYLUM_ARCHIVE_INJECTION_COMPLETE_REBOOTING_LOGS]

    </script>
