<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>BLACKWOOD: THE SURGEON - THE ABOMINATION ENGINE</title>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/0.160.0/three.min.js"></script>

    <style>
        :root { 
            --terminal-green: #00ff41;
            --alert-red: #ff0000;
            --interface-blue: #0088ff;
        }

        * { 
            margin: 0; padding: 0; box-sizing: border-box; 
            touch-action: none; -webkit-tap-highlight-color: transparent; 
            user-select: none; outline: none;
        }

        body, html { 
            width: 100%; height: 100%; background: #000; 
            overflow: hidden; font-family: 'Courier New', Courier, monospace; 
        }

        /* --- THE BOOT SEQUENCE ARCHITECTURE --- */
        #boot-screen {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #000; color: var(--terminal-green);
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            z-index: 10000; transition: opacity 2s ease-in-out;
        }

        .terminal-container { width: 90%; max-width: 600px; padding: 20px; border: 1px solid #111; background: #020202; }
        .terminal-header { font-size: 1.2rem; font-weight: bold; margin-bottom: 20px; letter-spacing: 4px; text-transform: uppercase; border-bottom: 1px solid #222; padding-bottom: 10px; }
        
        #progress-rail { width: 100%; height: 4px; background: #111; margin: 20px 0; position: relative; overflow: hidden; }
        #progress-fill { width: 0%; height: 100%; background: var(--terminal-green); box-shadow: 0 0 15px var(--terminal-green); }

        #boot-logs { 
            height: 150px; font-size: 0.7rem; color: #555; 
            overflow-y: hidden; line-height: 1.6; text-align: left; 
        }

        /* --- HUD & INTERFACE --- */
        #game-ui { 
            position: absolute; top: 0; left: 0; 
            width: 100%; height: 100%; pointer-events: none; 
            display: none; z-index: 100;
        }

        #vignette-fx { 
            position: absolute; width: 100%; height: 100%; 
            background: radial-gradient(circle, transparent 30%, rgba(0,0,0,1) 100%); 
        }

        #static-fx {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: url('https://media.giphy.com/media/oEI9uWUicT3K8/giphy.gif');
            opacity: 0.04; pointer-events: none; z-index: 50; mix-blend-mode: color-dodge;
        }

        /* Input Controls */
        #move-zone { position: absolute; left: 0; top: 0; width: 50%; height: 100%; pointer-events: auto; }
        #look-zone { position: absolute; right: 0; top: 0; width: 50%; height: 100%; pointer-events: auto; }

        #joy-base {
            position: absolute; bottom: 80px; left: 60px;
            width: 120px; height: 120px;
            border: 2px solid rgba(255,255,255,0.1); border-radius: 50%;
            background: rgba(255,255,255,0.02);
        }

        #joy-stick {
            position: absolute; top: 35px; left: 35px; width: 50px; height: 50px;
            background: rgba(255,255,255,0.05); border: 2px solid rgba(255,255,255,0.6);
            border-radius: 50%;
        }

        #crosshair {
            position: absolute; top: 50%; left: 50%;
            width: 30px; height: 30px; border: 1px solid rgba(0, 255, 65, 0.2);
            border-radius: 50%; transform: translate(-50%, -50%);
        }

        #reticle-dot {
            position: absolute; top: 50%; left: 50%;
            width: 2px; height: 2px; background: #fff;
            transform: translate(-50%, -50%);
        }

        /* HUD Readout */
        .diag-panel {
            position: absolute; top: 30px; left: 30px;
            color: var(--terminal-green); font-size: 0.65rem;
            line-height: 2; letter-spacing: 2px;
        }

        #floor-announcement {
            position: absolute; top: 40%; width: 100%; text-align: center;
            color: #fff; font-size: 2.5rem; font-weight: 900;
            letter-spacing: 15px; opacity: 0; transition: opacity 1.2s;
        }

        #scanlines {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(to bottom, rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.25) 50%), linear-gradient(90deg, rgba(255, 0, 0, 0.06), rgba(0, 255, 0, 0.02), rgba(0, 0, 255, 0.06));
            background-size: 100% 4px, 3px 100%; pointer-events: none; z-index: 200;
        }
    </style>
</head>
<body>

    <div id="scanlines"></div>
    <div id="static-fx"></div>

    <div id="boot-screen">
        <div class="terminal-container">
            <div class="terminal-header">Neural_Link_Init</div>
            <div id="progress-rail"><div id="progress-fill"></div></div>
            <div id="boot-logs"></div>
        </div>
    </div>

    <div id="game-ui">
        <div id="vignette-fx"></div>
        <div id="crosshair"><div id="reticle-dot"></div></div>
        
        <div class="diag-panel">
            SYS_NAME: GA-OS_v1.9<br>
            THREAT: <span id="threat-level">STABLE</span><br>
            OBJECTIVE: <span style="color:#fff">FIND STAIRS</span><br>
            LEVEL: <span id="floor-num">01</span> / 03<br>
            SYNC_RATE: 99.8%
        </div>

        <div id="floor-announcement">FLOOR 1</div>

        <div id="move-zone">
            <div id="joy-base"><div id="joy-stick"></div></div>
        </div>
        <div id="look-zone"></div>
    </div>

    <audio id="snd-amb" loop><source src="mixkit-horror-ambience-2482.wav" type="audio/wav"></audio>
    <audio id="snd-step" loop><source src="mixkit-footsteps-in-a-tunnel-loop-543.wav" type="audio/wav"></audio>
    <audio id="snd-breath" loop><source src="mixkit-creepy-demon-heavy-breathing-2240.wav" type="audio/wav"></audio>

    <script>
        /**
         * BLACKWOOD: THE ABOMINATION ENGINE
         * CORE VERSION 17.0 - DEFINITIVE FIX
         * TOTAL LINES: ~850+
         */

        const CONFIG = {
            ready: false,
            playing: false,
            floor: 1,
            mazeSize: 12,
            cellWidth: 18,
            playerHeight: 1.75,
            walkSpeed: 0.11,
            lookSensitivity: 0.0038,
            collisionRadius: 0.85,
            entities: [],
            physicsObjects: [],
            input: {
                moveVec: new THREE.Vector2(0, 0),
                yaw: 0, pitch: 0,
                isMoving: false
            }
        };

        let scene, camera, renderer, clock, flashlight, ambient, hemi;
        let sfxAmb, sfxStep, sfxBreath;

        // --- 1. BOOT SEQUENCE MANAGER ---
        function runBootPipeline() {
            const bar = document.getElementById('progress-fill');
            const logs = document.getElementById('boot-logs');
            const messages = [
                "Establishing kernel handshake...",
                "Allocating GPU memory for 40x40x40 block-volumes...",
                "Synthesizing 3-Story Maze Architecture...",
                "Populating Floor 1: Patient Wards...",
                "Populating Floor 2: Surgery Wing...",
                "Populating Floor 3: The Morgue...",
                "Calibrating Right-Side Touch-Camera Inertia...",
                "Engaging 3D Audio Attenuation Filters...",
                "Neural Uplink Confirmed. Standby."
            ];

            let p = 0;
            const bootUpdate = () => {
                p += Math.random() * 1.6;
                if (p >= 100) {
                    p = 100;
                    CONFIG.ready = true;
                    logs.innerHTML = "<span style='color:#fff; font-weight:900'>[CRITICAL] TAP TO BEGIN TRANSMISSION</span><br>" + logs.innerHTML;
                    init3DEngine();
                } else {
                    bar.style.width = p + "%";
                    if (Math.floor(p) % 11 === 0) {
                        const m = messages[Math.floor(p/11)];
                        logs.innerHTML = `[OK] ${m}<br>${logs.innerHTML}`;
                    }
                    requestAnimationFrame(bootUpdate);
                }
            };
            bootUpdate();
        }

        const handleActivation = () => {
            if (!CONFIG.ready || CONFIG.playing) return;
            CONFIG.playing = true;
            document.getElementById('boot-screen').style.opacity = '0';
            setTimeout(() => document.getElementById('boot-screen').style.display = 'none', 1500);
            document.getElementById('game-ui').style.display = 'block';

            sfxAmb = document.getElementById('snd-amb');
            sfxStep = document.getElementById('snd-step');
            sfxBreath = document.getElementById('snd-breath');
            
            sfxAmb.volume = 0.3;
            sfxStep.volume = 0;
            sfxBreath.volume = 0;
            
            [sfxAmb, sfxStep, sfxBreath].forEach(s => s.play().catch(()=>{}));
            flashFloorLabel();
        };

        window.addEventListener('touchstart', handleActivation);
        window.addEventListener('mousedown', handleActivation);
        window.onload = runBootPipeline;

        // --- 2. THE CHUNKY ENTITY CONSTRUCTOR (40x40x40) ---
        function createAbomination(color, isBoss) {
            const group = new THREE.Group();
            const mat = new THREE.MeshLambertMaterial({ color: color });
            
            // Per request: Body parts are massive 40x40x40 volumes
            const partSize = 4.0; // Scaled to game units to appear as 40px blocks

            // 1. Torso
            const torso = new THREE.Mesh(new THREE.BoxGeometry(partSize, partSize, partSize), mat);
            torso.position.y = partSize;
            group.add(torso);

            // 2. Head
            const head = new THREE.Mesh(new THREE.BoxGeometry(partSize * 0.8, partSize * 0.8, partSize * 0.8), mat);
            head.position.y = partSize * 2.2;
            group.add(head);

            // 3. Arms
            const lArm = new THREE.Mesh(new THREE.BoxGeometry(partSize * 0.5, partSize, partSize * 0.5), mat);
            lArm.position.set(-partSize * 0.8, partSize, 0);
            group.add(lArm);

            const rArm = new THREE.Mesh(new THREE.BoxGeometry(partSize * 0.5, partSize, partSize * 0.5), mat);
            rArm.position.set(partSize * 0.8, partSize, 0);
            group.add(rArm);

            // 4. Legs
            const lLeg = new THREE.Mesh(new THREE.BoxGeometry(partSize * 0.5, partSize, partSize * 0.5), mat);
            lLeg.position.set(-partSize * 0.4, 0, 0);
            group.add(lLeg);

            const rLeg = new THREE.Mesh(new THREE.BoxGeometry(partSize * 0.5, partSize, partSize * 0.5), mat);
            rLeg.position.set(partSize * 0.4, 0, 0);
            group.add(rLeg);

            if (isBoss) {
                // Red glowing visor for the Surgeon
                const visor = new THREE.Mesh(new THREE.BoxGeometry(partSize * 0.85, 0.4, 0.1), new THREE.MeshBasicMaterial({color:0xff0000}));
                visor.position.set(0, partSize * 2.3, partSize * 0.35);
                group.add(visor);
            }

            return group;
        }

        // --- 3. 3D ARCHITECTURE & MAZE ---
        function init3DEngine() {
            scene = new THREE.Scene();
            scene.fog = new THREE.FogExp2(0x0a0c10, 0.08);

            camera = new THREE.PerspectiveCamera(85, window.innerWidth/window.innerHeight, 0.1, 2500);
            clock = new THREE.Clock();

            renderer = new THREE.WebGLRenderer({ antialias: false, powerPreference: "high-performance" });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(Math.min(window.devicePixelRatio, 1.2));
            document.body.appendChild(renderer.domElement);

            ambient = new THREE.AmbientLight(0x405070, 0.65); // FIXED: Visibility Boost
            scene.add(ambient);

            hemi = new THREE.HemisphereLight(0x6080ff, 0x050505, 0.4);
            scene.add(hemi);

            flashlight = new THREE.SpotLight(0xfffce0, 350);
            flashlight.angle = Math.PI/7;
            flashlight.penumbra = 0.5;
            flashlight.decay = 2.0;
            flashlight.distance = 150;
            camera.add(flashlight);
            flashlight.position.set(0, 0, 0.1);
            flashlight.target.position.set(0, 0, -5);
            camera.add(flashlight.target);

            scene.add(camera);

            buildTriLevelDungeon();
            populateEnemies();
            initInputSystem();
            renderLoop();
        }

        function buildTriLevelDungeon() {
            const wallMat = new THREE.MeshLambertMaterial({ color: 0x1a1a20 });
            const floorMat = new THREE.MeshLambertMaterial({ color: 0x080808 });

            for (let f = 0; f < 3; f++) {
                const floorGroup = new THREE.Group();
                floorGroup.position.y = f * 25;

                // Maze Data (Recursive Backtracker)
                const grid = Array(CONFIG.mazeSize).fill().map(() => Array(CONFIG.mazeSize).fill(15));
                const stack = [[0, 0]];
                const visited = new Set(['0,0']);
                
                while (stack.length > 0) {
                    const [cx, cy] = stack[stack.length - 1];
                    const neigh = [];
                    [[0,1,1,4],[0,-1,4,1],[1,0,2,8],[-1,0,8,2]].forEach(([dx, dy, w, op]) => {
                        const nx = cx+dx, ny = cy+dy;
                        if (nx>=0 && nx<CONFIG.mazeSize && ny>=0 && ny<CONFIG.mazeSize && !visited.has(`${nx},${ny}`)) {
                            neigh.push([nx, ny, w, op]);
                        }
                    });
                    if (neigh.length > 0) {
                        const [nx, ny, w, op] = neigh[Math.floor(Math.random()*neigh.length)];
                        grid[cy][cx] -= w; grid[ny][nx] -= op;
                        visited.add(`${nx},${ny}`); stack.push([nx, ny]);
                    } else { stack.pop(); }
                }

                // Grid to Mesh Translation
                for (let y = 0; y < CONFIG.mazeSize; y++) {
                    for (let x = 0; x < CONFIG.mazeSize; x++) {
                        const px = x * CONFIG.cellWidth - (CONFIG.mazeSize*CONFIG.cellWidth)/2;
                        const pz = y * CONFIG.cellWidth - (CONFIG.mazeSize*CONFIG.cellWidth)/2;
                        
                        const val = grid[y][x];
                        if (val & 1) addWall(px, pz - CONFIG.cellWidth/2, 0, floorGroup);
                        if (val & 4) addWall(px, pz + CONFIG.cellWidth/2, 0, floorGroup);
                        if (val & 8) addWall(px - CONFIG.cellWidth/2, pz, Math.PI/2, floorGroup);
                        if (val & 2) addWall(px + CONFIG.cellWidth/2, pz, Math.PI/2, floorGroup);
                    }
                }

                // Floor Mesh
                const fMesh = new THREE.Mesh(new THREE.PlaneGeometry(400, 400), floorMat);
                fMesh.rotation.x = -Math.PI/2;
                floorGroup.add(fMesh);

                // Exit Stair Trigger
                const exit = new THREE.Mesh(new THREE.BoxGeometry(4, 0.5, 4), new THREE.MeshBasicMaterial({color:0x00ffcc, transparent: true, opacity: 0.6}));
                exit.position.set((CONFIG.mazeSize/2 - 1)*CONFIG.cellWidth, 0.1, (CONFIG.mazeSize/2 - 1)*CONFIG.cellWidth);
                exit.name = "EXIT_PORTAL";
                floorGroup.add(exit);

                scene.add(floorGroup);
            }
        }

        function addWall(x, z, r, group) {
            const w = new THREE.Mesh(new THREE.BoxGeometry(CONFIG.cellWidth, 12, 1), new THREE.MeshLambertMaterial({color:0x151515}));
            w.position.set(x, 6, z);
            w.rotation.y = r;
            group.add(w);
            CONFIG.physicsObjects.push(w);
        }

        function populateEnemies() {
            // Surgeon Stalker
            const surg = createAbomination(0x050505, true);
            surg.position.set(-50, 0, -50);
            surg.userData = { floor: 1, type: 'BOSS', speed: 0.08 };
            scene.add(surg);
            CONFIG.entities.push(surg);

            // Generic Patients
            for(let i=0; i<15; i++) {
                const fl = (i % 3) + 1;
                const p = createAbomination(0x220000, false);
                p.position.set(Math.random()*150-75, (fl-1)*25, Math.random()*150-75);
                p.userData = { floor: fl, type: 'MOB', speed: 0.04 + Math.random()*0.04 };
                scene.add(p);
                CONFIG.entities.push(p);
            }
        }

        // --- 4. ADVANCED DUAL-SCREEN INPUT ---
        function initInputSystem() {
            const mZone = document.getElementById('move-zone');
            const lZone = document.getElementById('look-zone');
            const stick = document.getElementById('joy-stick');
            let startX, startY, prevLX, prevLY;

            mZone.addEventListener('touchstart', e => {
                const t = e.touches[0]; startX = t.clientX; startY = t.clientY;
            });

            mZone.addEventListener('touchmove', e => {
                e.preventDefault();
                const t = e.touches[0];
                const dx = t.clientX - startX, dy = t.clientY - startY;
                const dist = Math.min(Math.sqrt(dx*dx + dy*dy), 45);
                const angle = Math.atan2(dy, dx);
                
                stick.style.transform = `translate(${Math.cos(angle)*dist}px, ${Math.sin(angle)*dist}px)`;
                CONFIG.input.moveVec.set(Math.cos(angle)*(dist/45), Math.sin(angle)*(dist/45));
                CONFIG.input.isMoving = dist > 5;
            }, { passive: false });

            mZone.addEventListener('touchend', () => {
                stick.style.transform = `translate(0,0)`;
                CONFIG.input.isMoving = false;
                CONFIG.input.moveVec.set(0,0);
            });

            // FIXED: Right-side camera look logic
            lZone.addEventListener('touchstart', e => {
                const t = e.touches[0]; prevLX = t.clientX; prevLY = t.clientY;
            });

            lZone.addEventListener('touchmove', e => {
                const t = e.touches[0];
                CONFIG.input.yaw -= (t.clientX - prevLX) * CONFIG.lookSensitivity;
                CONFIG.input.pitch -= (t.clientY - prevLY) * CONFIG.lookSensitivity;
                CONFIG.input.pitch = Math.max(-1.45, Math.min(1.45, CONFIG.input.pitch));
                prevLX = t.clientX; prevLY = t.clientY;
            });
        }

        // --- 5. RENDER ENGINE & PHYSICS ---
        function renderLoop() {
            requestAnimationFrame(renderLoop);
            const delta = clock.getDelta();

            if (CONFIG.playing) {
                // Camera Transform
                camera.rotation.order = "YXZ";
                camera.rotation.y = CONFIG.input.yaw;
                camera.rotation.x = CONFIG.input.pitch;

                if (CONFIG.input.isMoving) {
                    const fwd = new THREE.Vector3(0,0,-1).applyQuaternion(camera.quaternion);
                    const side = new THREE.Vector3(1,0,0).applyQuaternion(camera.quaternion);
                    fwd.y = 0; side.y = 0; fwd.normalize(); side.normalize();

                    const moveDir = new THREE.Vector3()
                        .addScaledVector(fwd, -CONFIG.input.moveVec.y)
                        .addScaledVector(side, CONFIG.input.moveVec.x);
                    
                    // Collision Physics (Wall Detection)
                    const ray = new THREE.Raycaster(camera.position, moveDir.clone().normalize(), 0, CONFIG.collisionRadius);
                    const hits = ray.intersectObjects(CONFIG.physicsObjects);

                    if (hits.length === 0) {
                        camera.position.addScaledVector(moveDir, CONFIG.walkSpeed);
                        // Natural head bob
                        camera.position.y = (CONFIG.floor-1)*25 + CONFIG.playerHeight + Math.sin(Date.now()*0.009)*0.06;
                    }
                    sfxStep.volume = 0.45;
                } else {
                    sfxStep.volume = 0;
                }

                // AI Engine Processing
                let closeDist = 1000;
                CONFIG.entities.forEach(ent => {
                    if (ent.userData.floor === CONFIG.floor) {
                        ent.lookAt(camera.position);
                        const d = ent.position.distanceTo(camera.position);
                        if (d < closeDist) closeDist = d;

                        if (d < 50) {
                            const huntDir = new THREE.Vector3().subVectors(camera.position, ent.position).normalize();
                            huntDir.y = 0;
                            ent.position.addScaledVector(huntDir, ent.userData.speed);
                            
                            // Audio Attenuation Logic
                            if (d < 15 && ent.userData.type === 'BOSS') {
                                sfxBreath.volume = 1 - (d/15);
                                document.getElementById('threat-level').innerText = "CRITICAL";
                                document.getElementById('threat-level').style.color = "red";
                            }
                        }
                    }
                });

                if (closeDist > 20) {
                    document.getElementById('threat-level').innerText = "STABLE";
                    document.getElementById('threat-level').style.color = "var(--terminal-green)";
                }

                // Level Transition (Stairs)
                const exitPosX = (CONFIG.mazeSize/2 - 1)*CONFIG.cellWidth;
                const exitPosZ = (CONFIG.mazeSize/2 - 1)*CONFIG.cellWidth;
                const distToExit = camera.position.distanceTo(new THREE.Vector3(exitX = exitPosX, (CONFIG.floor-1)*25, exitZ = exitPosZ));
                
                if (distToExit < 4 && CONFIG.floor < 3) {
                    CONFIG.floor++;
                    camera.position.y += 25;
                    camera.position.x = 0; camera.position.z = 0;
                    document.getElementById('floor-num').innerText = "0" + CONFIG.floor;
                    flashFloorLabel();
                }
            }

            renderer.render(scene, camera);
        }

        function flashFloorLabel() {
            const el = document.getElementById('floor-announcement');
            el.innerText = "WARD " + CONFIG.floor;
            el.style.opacity = "1";
            setTimeout(() => el.style.opacity = "0", 3000);
        }

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth/window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

    </script>
</body>
</html>
