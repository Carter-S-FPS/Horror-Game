<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ASYLUM_COLLISION_V47</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/0.160.0/three.min.js"></script>
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background: #000; }
        #boot { 
            position: fixed; inset: 0; z-index: 100; background: #0a0a0a; 
            display: flex; flex-direction: column; justify-content: center; align-items: center; 
            color: #dbd2ae; font-family: serif;
        }
        .btn { border: 1px solid #dbd2ae; padding: 12px 35px; cursor: pointer; display: none; color: #dbd2ae; margin-top: 20px; }
    </style>
</head>
<body>
    <div id="boot">
        <div id="status">Locking Doors...</div>
        <div id="btn" class="btn">WAKE UP</div>
    </div>

    <script>
        let scene, camera, renderer, active = false, flashlight;
        let mv = { f: 0, s: 0, active: false, id: null };
        let rot = { x: 0, y: 0, lx: 0, ly: 0, id: null };
        
        const walls = []; // Collision array
        const PLAYER_RADIUS = 0.6;

        function init() {
            scene = new THREE.Scene();
            scene.fog = new THREE.Fog(0x000000, 0.5, 12);

            camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 100);
            
            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(window.devicePixelRatio);
            document.body.appendChild(renderer.domElement);

            // 3D LIGHT EFFECT (The actual flashlight)
            flashlight = new THREE.SpotLight(0xfff5d4, 40, 20, Math.PI/6, 0.5, 2);
            scene.add(flashlight);
            scene.add(flashlight.target);

            // Textures
            const wallTex = createWallTex();
            const ceilTex = createOfficeCeiling();

            const wallMat = new THREE.MeshStandardMaterial({ map: wallTex, roughness: 1 });
            const floorMat = new THREE.MeshStandardMaterial({ color: 0x1a1c1a, roughness: 0.1, metalness: 0.3 }); 
            const ceilMat = new THREE.MeshStandardMaterial({ map: ceilTex, color: 0x777777 });

            const h = 3.0; 
            const size = 40; 
            const hw = 4.0; // Hallway width

            const addWall = (w, d, x, z) => {
                const box = new THREE.BoxGeometry(w, h, d);
                const m = new THREE.Mesh(box, wallMat);
                m.position.set(x, h/2, z);
                scene.add(m);
                // Create a bounding box for collision
                walls.push(new THREE.Box3().setFromObject(m));
            };

            // Floor & Ceiling
            const planeGeo = new THREE.PlaneGeometry(size + 10, size + 10);
            const floor = new THREE.Mesh(planeGeo, floorMat);
            floor.rotation.x = -Math.PI/2;
            scene.add(floor);

            const ceiling = new THREE.Mesh(planeGeo, ceilMat);
            ceiling.rotation.x = Math.PI/2;
            ceiling.position.y = h;
            scene.add(ceiling);

            // ASYLUM GEOMETRY
            // Outer boundaries
            addWall(size, 1, 0, size/2);  
            addWall(size, 1, 0, -size/2); 
            addWall(1, size, size/2, 0);  
            addWall(1, size, -size/2, 0); 

            // Inner square for the perimeter hallway
            const inner = size/2 - hw;
            addWall(inner, 1, (inner/2) + hw/2, inner); 
            addWall(inner, 1, -(inner/2) - hw/2, inner);
            addWall(inner, 1, (inner/2) + hw/2, -inner);
            addWall(inner, 1, -(inner/2) - hw/2, -inner);
            addWall(1, inner, inner, (inner/2) + hw/2);
            addWall(1, inner, inner, -(inner/2) - hw/2);
            addWall(1, inner, -inner, (inner/2) + hw/2);
            addWall(1, inner, -inner, -(inner/2) - hw/2);

            // Inner Cross
            addWall(0.5, inner*2, 2, 0);
            addWall(0.5, inner*2, -2, 0);
            addWall(inner*2, 0.5, 0, 2);
            addWall(inner*2, 0.5, 0, -2);

            // Start player in the hallway
            camera.position.set(inner + 2, 1.6, inner + 2);

            // Touch logic
            window.addEventListener('touchstart', (e) => {
                for(let t of e.changedTouches) {
                    if(t.clientX < window.innerWidth/2) {
                        mv.active = true; mv.id = t.identifier;
                        mv.ox = t.clientX; mv.oy = t.clientY;
                    } else {
                        rot.id = t.identifier;
                        rot.lx = t.clientX; rot.ly = t.clientY;
                    }
                }
            });

            window.addEventListener('touchmove', (e) => {
                e.preventDefault();
                for(let t of e.changedTouches) {
                    if(t.identifier === mv.id) {
                        mv.s = (t.clientX - mv.ox) / 60;
                        mv.f = (t.clientY - mv.oy) / 60;
                    } else if(t.identifier === rot.id) {
                        rot.x -= (t.clientX - rot.lx) * 0.006;
                        rot.y -= (t.clientY - rot.ly) * 0.006;
                        rot.y = Math.max(-1.1, Math.min(1.1, rot.y));
                        rot.lx = t.clientX; rot.ly = t.clientY;
                    }
                }
            }, {passive: false});

            window.addEventListener('touchend', (e) => {
                for(let t of e.changedTouches) {
                    if(t.identifier === mv.id) { mv.active = false; mv.f = 0; mv.s = 0; }
                    if(t.identifier === rot.id) rot.id = null;
                }
            });

            loop();
        }

        function checkCollision(newPos) {
            const playerBox = new THREE.Box3().setFromCenterAndSize(
                newPos, 
                new THREE.Vector3(PLAYER_RADIUS, 2, PLAYER_RADIUS)
            );
            for(let wall of walls) {
                if(playerBox.intersectsBox(wall)) return true;
            }
            return false;
        }

        function createWallTex() {
            const canv = document.createElement('canvas');
            canv.width = 512; canv.height = 512;
            const ctx = canv.getContext('2d');
            ctx.fillStyle = '#dbd2ae'; ctx.fillRect(0,0,512,512);
            for(let i=0; i<400; i++) {
                ctx.fillStyle = `rgba(60,50,30,${Math.random()*0.15})`;
                ctx.fillRect(Math.random()*512, Math.random()*512, 2, 40);
            }
            const t = new THREE.CanvasTexture(canv);
            t.wrapS = t.wrapT = THREE.RepeatWrapping;
            t.repeat.set(2, 1);
            return t;
        }

        function createOfficeCeiling() {
            const canv = document.createElement('canvas');
            canv.width = 256; canv.height = 256;
            const ctx = canv.getContext('2d');
            ctx.fillStyle = '#ccc'; ctx.fillRect(0,0,256,256);
            ctx.strokeStyle = '#999'; ctx.lineWidth = 2;
            ctx.strokeRect(0,0,256,256);
            const t = new THREE.CanvasTexture(canv);
            t.wrapS = t.wrapT = THREE.RepeatWrapping;
            t.repeat.set(10, 10);
            return t;
        }

        function loop() {
            requestAnimationFrame(loop);
            if(!active) return;

            camera.rotation.set(rot.y, rot.x, 0, 'YXZ');
            
            // Flashlight logic - pinned to camera but with a slight delay/smoothness
            flashlight.position.copy(camera.position);
            const targetPos = new THREE.Vector3(0, 0, -1).applyQuaternion(camera.quaternion).add(camera.position);
            flashlight.target.position.lerp(targetPos, 0.2);

            if(mv.active) {
                const dir = new THREE.Vector3(0,0,-1).applyQuaternion(camera.quaternion);
                dir.y = 0; dir.normalize();
                const side = new THREE.Vector3(1,0,0).applyQuaternion(camera.quaternion);
                side.y = 0; side.normalize();

                const nextPos = camera.position.clone();
                nextPos.addScaledVector(dir, -mv.f * 0.1);
                nextPos.addScaledVector(side, mv.s * 0.1);

                if(!checkCollision(nextPos)) {
                    camera.position.copy(nextPos);
                }
            }
            renderer.render(scene, camera);
        }

        setTimeout(() => {
            document.getElementById('btn').style.display = "block";
            init();
        }, 800);

        document.getElementById('btn').onclick = () => {
            active = true;
            document.getElementById('boot').style.display = 'none';
        };
    </script>
</body>
</html>
