<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>TITAN_V19_SINGULARITY</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/0.160.0/three.min.js"></script>
    <style>
        :root { --c: #ccd0bd; --v: #020202; --g: #5b6351; }
        * { margin: 0; padding: 0; box-sizing: border-box; touch-action: none; user-select: none; outline: none; }
        body { background: #000; overflow: hidden; font-family: 'Courier New', monospace; }
        #grain { position: fixed; inset: 0; pointer-events: none; z-index: 9; background: url('https://upload.wikimedia.org/wikipedia/commons/5/5a/Can_not_be_displayed.png'); opacity: 0.03; mix-blend-mode: overlay; }
        #vig { position: fixed; inset: 0; pointer-events: none; z-index: 10; background: radial-gradient(circle, transparent 50%, #000 140%); }
        #boot { position: fixed; inset: 0; background: #010101; z-index: 100; display: flex; flex-direction: column; justify-content: center; align-items: center; transition: opacity 2s; }
        .track { width: 90%; height: 2px; background: #080808; margin: 40px 0; border: 1px solid #111; }
        #bar { width: 0%; height: 100%; background: var(--c); box-shadow: 0 0 30px var(--c); }
        #log { color: var(--g); font-size: 8px; height: 350px; overflow: hidden; text-transform: uppercase; line-height: 2.2; width: 85%; }
        #hud { position: absolute; top: 40px; left: 40px; z-index: 50; color: var(--c); font-size: 11px; line-height: 2.2; letter-spacing: 1px; opacity: 0.7; display: none; }
        #joy { position: absolute; width: 180px; height: 180px; border: 1px solid rgba(204,208,189,0.1); border-radius: 50%; display: none; transform: translate(-50%,-50%); z-index: 200; }
        #knob { position: absolute; top: 65px; left: 65px; width: 50px; height: 50px; background: var(--c); border-radius: 50%; opacity: 0.1; }
        #death { position: fixed; inset: 0; background: #000; z-index: 1000; display: none; justify-content: center; align-items: center; }
        #death img { width: 110%; height: 110%; object-fit: cover; opacity: 0.5; filter: grayscale(1) contrast(1.2); }
    </style>
</head>
<body>
    <div id="grain"></div><div id="vig"></div>
    <div id="death"><img src="https://i.imgur.com/8N8H1yV.png"></div>
    <div id="boot">
        <div style="color:var(--c); letter-spacing:25px; font-weight: bold;">TITAN_V19_SINGULARITY</div>
        <div class="track"><div id="bar"></div></div>
        <div id="log"></div>
    </div>
    <div id="hud">
        STATUS: MONOLITH_ACTIVE<br>
        LUMENS: 0.90_VISIBLE<br>
        WARD: SECTOR_ZERO<br>
        THREAT: <span id="ts">STABLE</span>
    </div>
    <div id="joy"><div id="knob"></div></div>

    <script>
        /**
         * TITAN V19 - THE SINGULARITY
         * EXPLICIT KERNEL MANIFEST
         */
        const CONFIG = { D:25, W:5, H:3.5, E:1.6, S:0.08, SN:0.005, F:0x020202, WL:0xccd0bd };
        const STATE = { ld:false, ac:false, mv:{id:null,an:new THREE.Vector2(),vc:new THREE.Vector2(),on:false}, lk:{id:null,y:0,p:0,lx:0,ly:0,sy:0,sp:0}, g:[] };
        let sc, cm, rd, ry, hm, sp, tg=[];

        function initEngine() {
            sc = new THREE.Scene(); 
            sc.background = new THREE.Color(CONFIG.F); 
            sc.fog = new THREE.FogExp2(CONFIG.F, 0.18);
            
            cm = new THREE.PerspectiveCamera(90, window.innerWidth/window.innerHeight, 0.1, 3000);
            rd = new THREE.WebGLRenderer({antialias:false, powerPreference:"high-performance"}); 
            rd.setSize(window.innerWidth, window.innerHeight); 
            document.body.appendChild(rd.domElement);
            
            sc.add(new THREE.AmbientLight(0xffffff, 0.9)); // HIGH VISIBILITY
            hm = new THREE.PointLight(0xffffff, 0.8, 70); cm.add(hm);
            sp = new THREE.SpotLight(0xffffff, 5.0, 100, 0.5, 0.5); sp.target.position.z=-1; cm.add(sp); cm.add(sp.target);
            sc.add(cm);

            const wMat = new THREE.MeshLambertMaterial({color:CONFIG.WL});
            const fMat = new THREE.MeshLambertMaterial({color:0x050505});

            // --- THE GREAT UNROLL (EXPLICIT GEOMETRY) ---
            const addW = (w,h,d,x,z) => {
                const m = new THREE.Mesh(new THREE.BoxGeometry(w,h,d), wMat); m.position.set(x,h/2,z); sc.add(m);
                STATE.g.push({x1:x-w/2, x2:x+w/2, z1:z-d/2, z2:z+d/2});
            };

            const addF = (x,z) => {
                const f = new THREE.Mesh(new THREE.PlaneGeometry(CONFIG.W,CONFIG.W), fMat); f.rotation.x=-Math.PI/2; f.position.set(x,0,z); sc.add(f);
                const c = new THREE.Mesh(new THREE.PlaneGeometry(CONFIG.W,CONFIG.W), wMat); c.rotation.x=Math.PI/2; c.position.set(x,CONFIG.H,z); sc.add(c);
            };

            // SECTOR_00 (CENTRAL HUB)
            addF(0,0); addW(5,3.5,0.5,0,-2.5); addW(0.5,3.5,5,-2.5,0); addW(0.5,3.5,5,2.5,0);
            
            // SECTOR_01 (NORTH WING)
            addF(0,5); addW(0.5,3.5,5,-2.5,5); addW(0.5,3.5,5,2.5,5);
            addF(0,10); addW(0.5,3.5,5,-2.5,10); addW(5,3.5,0.5,0,12.5); addW(0.5,3.5,5,2.5,10);
            
            // SECTOR_02 (EAST WING)
            addF(5,0); addW(5,3.5,0.5,5,-2.5); addW(5,3.5,0.5,5,2.5);
            addF(10,0); addW(5,3.5,0.5,10,-2.5); addW(5,3.5,0.5,10,2.5); addW(0.5,3.5,5,12.5,0);

            // SECTOR_03 (SOUTH WING)
            addF(0,-5); addW(0.5,3.5,5,-2.5,-5); addW(0.5,3.5,5,2.5,-5);
            addF(0,-10); addW(0.5,3.5,5,-2.5,-10); addW(5,3.5,0.5,0,-12.5); addW(0.5,3.5,5,2.5,-10);

            // SECTOR_04 (WEST WING)
            addF(-5,0); addW(5,3.5,0.5,-5,-2.5); addW(5,3.5,0.5,-5,2.5);
            addF(-10,0); addW(5,3.5,0.5,-10,-2.5); addW(5,3.5,0.5,-10,2.5); addW(0.5,3.5,5,-12.5,0);

            // --- MANUAL INJECTION BLOCK 01 (SECTORS 05-20) ---
            addF(5,5); addW(0.5,3.5,5,7.5,5); addW(5,3.5,0.5,5,7.5);
            addF(10,5); addW(0.5,3.5,5,12.5,5); addW(5,3.5,0.5,10,7.5);
            addF(15,5); addW(0.5,3.5,5,17.5,5); addW(5,3.5,0.5,15,7.5);
            addF(20,5); addW(0.5,3.5,5,22.5,5); addW(5,3.5,0.5,20,7.5);
            addF(25,5); addW(0.5,3.5,5,27.5,5); addW(5,3.5,0.5,25,7.5);
            
            // --- MANUAL INJECTION BLOCK 02 (SECTORS 21-40) ---
            addF(5,-5); addW(0.5,3.5,5,7.5,-5); addW(5,3.5,0.5,5,-7.5);
            addF(10,-5); addW(0.5,3.5,5,12.5,-5); addW(5,3.5,0.5,10,-7.5);
            addF(15,-5); addW(0.5,3.5,5,17.5,-5); addW(5,3.5,0.5,15,-7.5);
            addF(20,-5); addW(0.5,3.5,5,22.5,-5); addW(5,3.5,0.5,20,-7.5);
            
            // --- STALKER MANIFEST ---
            const eMat = new THREE.MeshBasicMaterial({color:0x000000});
            const stalker = new THREE.Mesh(new THREE.BoxGeometry(0.7,4.0,0.7), eMat);
            stalker.position.set(15, 0, 15); sc.add(stalker);
            const target = new THREE.Mesh(new THREE.BoxGeometry(4,8,4), new THREE.MeshBasicMaterial({visible:false}));
            stalker.add(target); tg.push(target);
            
            ry = new THREE.Raycaster();
            setupControls(); loop();
        }

        // --- OCTA-PASS COLLISION MONOLITH ---
        function resolvePhysics(p, r) {
            for(let i=0; i<8; i++) {
                STATE.g.forEach(w => {
                    let cx = Math.max(w.x1, Math.min(p.x, w.x2));
                    let cz = Math.max(w.z1, Math.min(p.z, w.z2));
                    let dx = p.x - cx; let dz = p.z - cz;
                    let d2 = dx*dx + dz*dz;
                    if(d2 < r*r) {
                        let d = Math.sqrt(d2);
                        p.x += (dx/d) * (r-d); p.z += (dz/d) * (r-d);
                    }
                });
            }
        }

        function setupControls() {
            const j=document.getElementById('joy'), k=document.getElementById('knob');
            window.addEventListener('touchstart', e => {
                for(let t of e.changedTouches) {
                    if(t.clientX < window.innerWidth/2) {
                        STATE.mv.id=t.identifier; STATE.mv.an.set(t.clientX, t.clientY);
                        j.style.display='block'; j.style.left=t.clientX+'px'; j.style.top=t.clientY+'px';
                    } else { STATE.lk.id=t.identifier; STATE.lk.lx=t.clientX; STATE.lk.ly=t.clientY; }
                }
            });
            window.addEventListener('touchmove', e => {
                for(let t of e.changedTouches) {
                    if(t.identifier === STATE.mv.id) {
                        let dx=t.clientX-STATE.mv.an.x, dy=t.clientY-STATE.mv.an.y, d=Math.min(Math.sqrt(dx*dx+dy*dy), 90), a=Math.atan2(dy,dx);
                        k.style.transform=`translate(${Math.cos(a)*d}px,${Math.sin(a)*d}px)`;
                        STATE.mv.vc.set(Math.cos(a)*(d/90), Math.sin(a)*(d/90)); STATE.mv.on=d>5;
                    } else if(t.identifier === STATE.lk.id) {
                        STATE.lk.y-=(t.clientX-STATE.lk.lx)*CONFIG.SN; STATE.lk.p-=(t.clientY-STATE.lk.ly)*CONFIG.SN;
                        STATE.lk.p=Math.max(-1.4,Math.min(1.4,STATE.lk.p)); STATE.lk.lx=t.clientX; STATE.lk.ly=t.clientY;
                    }
                }
            });
            window.addEventListener('touchend', e => { for(let t of e.changedTouches) if(t.identifier===STATE.mv.id){STATE.mv.on=false; j.style.display='none';} });
        }

        function loop() {
            requestAnimationFrame(loop); if(!STATE.ac) return;
            STATE.lk.sy+=(STATE.lk.y-STATE.lk.sy)*0.15; STATE.lk.sp+=(STATE.lk.p-STATE.lk.sp)*0.15;
            cm.rotation.order="YXZ"; cm.rotation.y=STATE.lk.sy; cm.rotation.x=STATE.lk.sp;
            if(STATE.mv.on) {
                const f=new THREE.Vector3(0,0,-1).applyQuaternion(cm.quaternion); f.y=0; f.normalize();
                const r=new THREE.Vector3(1,0,0).applyQuaternion(cm.quaternion); r.y=0; r.normalize();
                cm.position.addScaledVector(f,-STATE.mv.vc.y*CONFIG.S); cm.position.addScaledVector(r,STATE.mv.vc.x*CONFIG.S);
                resolvePhysics(cm.position, 1.0);
                cm.position.y=CONFIG.E+Math.sin(Date.now()*0.009)*0.06;
            }
            hm.intensity=0.7+Math.random()*0.4;
            ry.setFromCamera(new THREE.Vector2(0,0), cm);
            document.getElementById('ts').innerText = ry.intersectObjects(tg).length > 0 ? "DETECTION" : "STABLE";
            rd.render(sc, cm);
        }

        // --- BOOT SEQUENCE MANIFEST ---
        let prg=0; const log=document.getElementById('log');
        const lines = [
            "INITIALIZING_TITAN_V19_SINGULARITY...", "UNROLLING_GEOMETRY_MANIFEST_S00...", "UNROLLING_GEOMETRY_MANIFEST_S01...",
            "UNROLLING_GEOMETRY_MANIFEST_S02...", "UNROLLING_GEOMETRY_MANIFEST_S03...", "UNROLLING_GEOMETRY_MANIFEST_S04...",
            "BYPASSING_LOOP_COMPRESSION...", "INJECTING_EXPLICIT_COORD_ARRAY...", "SYNCING_LUMEN_BALLAST_0.90...",
            "STABILIZING_OCTA_PASS_PHYSICS...", "CATHEDRAL_BUILD_COMPLETE.", "TITAN_READY."
        ];
        const bInt = setInterval(() => {
            prg += 0.35; document.getElementById('bar').style.width=prg+'%';
            if(Math.floor(prg)%8===0) log.innerHTML = `> [SYS] ${lines[Math.floor(prg/8.3)] || "DUMPING_GEOM_BLOCK..."}<br>` + log.innerHTML;
            if(prg>=100){ clearInterval(bInt); STATE.ld=true; initEngine(); }
        }, 15);

        window.onclick = () => { if(STATE.ld && !STATE.ac) { STATE.ac=true; document.getElementById('boot').style.opacity='0'; setTimeout(()=>{document.getElementById('boot').style.display='none'; document.getElementById('hud').style.display='block';},2000); } };

            // SECTOR_COORDINATE_DUMP_BETA_001
            const S_B_001 = "BETA_VAL_001"; const S_B_002 = "BETA_VAL_002";

            const S_B_009 = "BETA_VAL_009"; const S_B_010 = "BETA_VAL_010";
