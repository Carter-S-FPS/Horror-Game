<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SANITY_S_FRACTURE_TITAN_V1000</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/0.160.0/three.min.js"></script>
    <style>
        :root {
            --neon-cyan: #00f2ff;
            --corridor-black: #020204;
            --warning-red: #ff0044;
            --font-mono: 'Courier New', Courier, monospace;
        }

        * { 
            margin: 0; padding: 0; box-sizing: border-box; 
            touch-action: none; user-select: none; 
            outline: none; -webkit-tap-highlight-color: transparent;
        }

        body, html { 
            width: 100%; height: 100%; background: #000; 
            overflow: hidden; font-family: var(--font-mono);
        }

        /* --- POST-PROCESSING --- */
        #static-noise {
            position: fixed; inset: 0; pointer-events: none; z-index: 9000;
            background: url('https://upload.wikimedia.org/wikipedia/commons/5/5a/Can_not_be_displayed.png');
            opacity: 0.03; mix-blend-mode: overlay;
        }

        #vignette {
            position: fixed; inset: 0; pointer-events: none; z-index: 9001;
            background: radial-gradient(circle, transparent 5%, #000 180%);
        }

        /* --- INTERFACE --- */
        #boot-sequence {
            position: fixed; inset: 0; background: #000; z-index: 20000;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            transition: opacity 3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .terminal-shell {
            width: 85%; max-width: 1200px; height: 80vh;
            border: 1px solid #111; background: #010102;
            padding: 60px; display: flex; flex-direction: column;
            box-shadow: 0 0 100px rgba(0,0,0,1);
        }

        .shell-title {
            color: var(--neon-cyan); font-size: 1.1rem; letter-spacing: 15px;
            margin-bottom: 40px; text-transform: uppercase;
        }

        #progress-rail {
            width: 100%; height: 2px; background: #08080a; margin-bottom: 30px;
        }

        #progress-bar {
            width: 0%; height: 100%; background: var(--neon-cyan);
            box-shadow: 0 0 30px var(--neon-cyan);
        }

        #shell-log {
            flex-grow: 1; overflow: hidden; font-size: 0.75rem;
            color: #3a3a3c; line-height: 2.8; white-space: pre-wrap;
            display: flex; flex-direction: column-reverse;
        }

        /* --- HUD --- */
        #game-ui {
            position: absolute; inset: 0; pointer-events: none;
            display: none; z-index: 1000;
        }

        .readout {
            position: absolute; top: 50px; left: 50px;
            font-size: 0.7rem; color: var(--neon-cyan);
            line-height: 3.2; letter-spacing: 6px;
        }

        #reticle {
            position: absolute; top: 50%; left: 50%; width: 4px; height: 4px;
            background: #fff; border-radius: 50%; opacity: 0.5;
            transform: translate(-50%, -50%);
        }

        /* --- INPUT --- */
        #zone-move { position: absolute; left: 0; bottom: 0; width: 50%; height: 100%; pointer-events: auto; }
        #zone-look { position: absolute; right: 0; bottom: 0; width: 50%; height: 100%; pointer-events: auto; }
        
        #joy-base {
            position: absolute; width: 160px; height: 160px; border-radius: 50%;
            background: rgba(0, 242, 255, 0.02); border: 1px solid rgba(0, 242, 255, 0.1);
            display: none; transform: translate(-50%, -50%);
        }

        #joy-nub {
            position: absolute; top: 55px; left: 55px; width: 50px; height: 50px;
            background: var(--neon-cyan); border-radius: 50%; opacity: 0.35;
        }

        #death-screen {
            position: fixed; inset: 0; z-index: 100000; background: #000;
            display: none; justify-content: center; align-items: center;
        }

        #death-img { width: 150%; height: 150%; object-fit: cover; filter: grayscale(1) invert(1) contrast(10); }
    </style>
</head>
<body>

    <div id="static-noise"></div>
    <div id="vignette"></div>

    <div id="death-screen"><img id="death-img" src="https://i.imgur.com/8N8H1yV.png"></div>

    <div id="boot-sequence">
        <div class="terminal-shell">
            <div class="shell-title">SANITY_S_FRACTURE // TITAN_V1000</div>
            <div id="progress-rail"><div id="progress-bar"></div></div>
            <div id="shell-log"></div>
        </div>
    </div>

    <div id="game-ui">
        <div class="readout">
            GEO_MATRIX: 1000_LINES_ACTIVE<br>
            REFLECT_DEPTH: HIGH_GLOSS_EPOXY<br>
            SIGHT_LOGIC: RAYCAST_CENTER_LOCK<br>
            STATUS: <span id="threat-level">STABLE</span>
        </div>
        <div id="reticle"></div>
        <div id="zone-move"><div id="joy-base"><div id="joy-nub"></div></div></div>
        <div id="zone-look"></div>
    </div>

    <script>
        /**
         * SANITY'S FRACTURE: TITAN V1000 ENGINE
         * ---------------------------------------------------------------------
         * This script is intentionally verbose to ensure granular control over 
         * lighting, raycasting, and human-scale voxel manifestations.
         */

        const PARAMS = {
            VERSION: "1.0.0. Titan",
            MAP_SPAN: 4000,
            UNIT_W: 18,
            UNIT_H: 15,
            PLAYER_H: 1.75,
            VOXEL_SIZE: 0.038, // Human Proportions
            MOVE_SPEED: 0.39,
            LOOK_SENS: 0.0075,
            SURGEON_OFFSET: 800,
            SCOUT_OFFSET: 600
        };

        const WORLD = {
            booted: false, active: false,
            input: { v: new THREE.Vector2(), moving: false, yaw: 0, pitch: 0, anchor: new THREE.Vector2() },
            registry: { walls: [], entities: [], hitboxNodes: [] }
        };

        let scene, camera, renderer, raycaster, lightCore, lightPenumbra, lightHousing;

        // --- MODULE 1: EXPLICIT BOOT LOADER (VERBOSE) ---
        function initiateBoot() {
            const bar = document.getElementById('progress-bar');
            const log = document.getElementById('shell-log');
            const sequences = [
                "ALLOCATING_1000_LINE_BUFFER...",
                "INJECTING_EPOXY_PHYSICAL_SHADER...",
                "EXPANDING_PENUMBRA_VOLUMETRICS...",
                "MOUNTING_FLASHLIGHT_LEAK_MESH...",
                "CALIBRATING_800_STUD_STALKER...",
                "CALIBRATING_600_STUD_SCOUTS...",
                "GENERATING_VOXEL_ANATOMY_MAPPINGS...",
                "OPTIMIZING_RAYCAST_SIGHT_GATING...",
                "STABILIZING_NEURAL_INTERFACE...",
                "TITAN_KERNEL_LOADED."
            ];

            let p = 0;
            const bootLoop = () => {
                p += 0.8;
                bar.style.width = p + "%";
                if(Math.floor(p) % 10 === 0) {
                    const t = sequences[Math.floor(p/10)];
                    if(t) log.innerHTML = `> ${t}<br>${log.innerHTML}`;
                }
                if(p >= 100) {
                    WORLD.booted = true;
                    log.innerHTML = "<span style='color:#fff'>[SYNC_READY] INTERACT TO ENTER</span><br>" + log.innerHTML;
                    constructUniverse();
                } else requestAnimationFrame(bootLoop);
            };
            bootLoop();
        }

        // --- MODULE 2: HUMAN PROPORTION ANATOMY ---
        class FractureEntity {
            constructor(type, spawnDist) {
                this.node = new THREE.Group();
                this.type = type;
                this.spawnDist = spawnDist;
                this.isActive = false;
                this.generateVoxelBody();
                this.place();
            }

            // EXPLICIT VOXEL CONSTRUCTION
            generateVoxelBody() {
                const colors = this.type === 'surgeon' ? [0x440000, 0x1a0000] : [0x080808, 0x010101];
                
                const buildSegment = (w, h, d, x, y, z) => {
                    const segment = new THREE.Group();
                    for(let i=0; i<35; i++) {
                        const v = new THREE.Mesh(
                            new THREE.BoxGeometry(w, h, d),
                            new THREE.MeshLambertMaterial({ color: colors[Math.floor(Math.random()*colors.length)] })
                        );
                        v.position.set((Math.random()-0.5)*w, (Math.random()-0.5)*h, (Math.random()-0.5)*d);
                        segment.add(v);
                    }
                    segment.position.set(x, y, z);
                    this.node.add(segment);
                };

                // Defined Proportions (Explicit)
                buildSegment(18, 28, 12, 0, 45, 0);   // Torso
                buildSegment(12, 12, 12, 0, 70, 0);   // Head
                buildSegment(6, 48, 6, -12, 35, 0);   // L-Arm
                buildSegment(6, 48, 6, 12, 35, 0);    // R-Arm
                buildSegment(8, 50, 8, -6, -5, 0);    // L-Leg
                buildSegment(8, 50, 8, 6, -5, 0);     // R-Leg

                this.node.scale.set(PARAMS.VOXEL_SIZE, PARAMS.VOXEL_SIZE, PARAMS.VOXEL_SIZE);

                // Invisible Hitbox for Center-Scent Raycasting
                this.hitbox = new THREE.Mesh(
                    new THREE.BoxGeometry(25, 100, 25),
                    new THREE.MeshBasicMaterial({ visible: false })
                );
                this.hitbox.position.y = 35;
                this.node.add(this.hitbox);
                WORLD.registry.hitboxNodes.push(this.hitbox);
            }

            place() {
                const angle = Math.random() * Math.PI * 2;
                this.node.position.set(Math.cos(angle)*this.spawnDist, 0.1, Math.sin(angle)*this.spawnDist);
            }

            process(pPos, rayHits) {
                const d = this.node.position.distanceTo(pPos);
                
                // Direct Sight Check
                this.isActive = false;
                if(rayHits.length > 0) {
                    rayHits.forEach(h => {
                        if(this.node.getObjectById(h.object.id)) this.isActive = true;
                    });
                }

                if(d < 250) {
                    this.node.lookAt(pPos.x, 0, pPos.z);
                    const vec = new THREE.Vector3().subVectors(pPos, this.node.position).normalize();
                    const spd = this.type === 'surgeon' ? 0.28 : (this.isActive ? 1.4 : 0.04);
                    this.node.position.addScaledVector(vec, spd);
                }
                return d;
            }
        }

        // --- MODULE 3: THE LABYRINTH GEOMETRY (VERBOSE) ---
        function constructUniverse() {
            scene = new THREE.Scene();
            scene.fog = new THREE.FogExp2(0x010103, 0.12);
            
            camera = new THREE.PerspectiveCamera(80, window.innerWidth/window.innerHeight, 0.1, 3000);
            raycaster = new THREE.Raycaster();

            renderer = new THREE.WebGLRenderer({ antialias: false, powerPreference: "high-performance" });
            renderer.setSize(window.innerWidth, window.innerHeight);
            document.body.appendChild(renderer.domElement);

            // VOLUMETRIC LIGHTING SETUP
            scene.add(new THREE.AmbientLight(0x0a0a0c, 1.4));
            
            lightCore = new THREE.SpotLight(0xfffce0, 1600, 220, 0.42, 0.5);
            lightCore.target.position.z = -10;
            camera.add(lightCore);
            camera.add(lightCore.target);

            // THE SIDE-LEAK / LENS HOUSING
            const leakGeo = new THREE.CylinderGeometry(0.12, 0.12, 0.05, 16);
            const leakMat = new THREE.MeshStandardMaterial({ 
                color: 0xfffce0, 
                emissive: 0xfffce0, 
                emissiveIntensity: 5,
                transparent: true,
                opacity: 0.8
            });
            lightHousing = new THREE.Mesh(leakGeo, leakMat);
            lightHousing.rotation.x = Math.PI/2;
            lightHousing.position.z = -0.15;
            camera.add(lightHousing);

            scene.add(camera);

            // EPOXY FLOOR DEFINITION
            const epoxy = new THREE.MeshPhysicalMaterial({
                color: 0x070708,
                roughness: 0.04,
                metalness: 0.6,
                clearcoat: 1.0,
                clearcoatRoughness: 0.03
            });

            // OFFICE CEILING DEFINITION
            const ceiling = new THREE.MeshLambertMaterial({ color: 0x1b1b1d });

            // EXPLICIT WORLD CONSTRUCTION (1,000 LINE DENSITY SIMULATION)
            for(let i=0; i<60; i++) {
                const hall = new THREE.Group();
                
                // Floor Plate
                const f = new THREE.Mesh(new THREE.PlaneGeometry(1200, PARAMS.UNIT_W), epoxy);
                f.rotation.x = -Math.PI/2;
                
                // Ceiling Plate
                const c = new THREE.Mesh(new THREE.PlaneGeometry(1200, PARAMS.UNIT_W), ceiling);
                c.rotation.x = Math.PI/2; c.position.y = PARAMS.UNIT_H;
                
                // Ceiling Grid
                const g = new THREE.GridHelper(1200, 40, 0x000000, 0x111111);
                g.position.y = PARAMS.UNIT_H - 0.01;

                // Walls (Left/Right)
                const w1 = new THREE.Mesh(new THREE.BoxGeometry(1200, PARAMS.UNIT_H, 1), new THREE.MeshLambertMaterial({color:0x040405}));
                w1.position.set(0, PARAMS.UNIT_H/2, -PARAMS.UNIT_W/2);
                const w2 = new THREE.Mesh(new THREE.BoxGeometry(1200, PARAMS.UNIT_H, 1), new THREE.MeshLambertMaterial({color:0x040405}));
                w2.position.set(0, PARAMS.UNIT_H/2, PARAMS.UNIT_W/2);

                hall.add(f, c, g, w1, w2);
                hall.rotation.y = (i % 2 === 0) ? 0 : Math.PI/2;
                hall.position.set((i%2===0?0:i*20-600), 0, (i%2===0?i*20-600:0));
                
                scene.add(hall);
            }

            // SPAWN HOSTILES
            const surgeon = new FractureEntity('surgeon', PARAMS.SURGEON_OFFSET);
            scene.add(surgeon.node); WORLD.registry.entities.push(surgeon);

            for(let i=0; i<3; i++) {
                const scout = new FractureEntity('scout', PARAMS.SCOUT_OFFSET + (i*40));
                scene.add(scout.node); WORLD.registry.entities.push(scout);
            }

            initializeControls();
            mainLoop();
        }

        // --- MODULE 4: CORE ENGINE LOOP ---
        function mainLoop() {
            requestAnimationFrame(mainLoop);
            if(!WORLD.active) return;

            // Update Look Rotation
            camera.rotation.order = "YXZ";
            camera.rotation.y = WORLD.input.yaw;
            camera.rotation.x = WORLD.input.pitch;

            // Flashlight Pulse (Side Leak)
            lightHousing.material.emissiveIntensity = 4 + Math.sin(Date.now()*0.01)*0.5;

            // Locomotion
            if(WORLD.input.moving) {
                const f = new THREE.Vector3(0,0,-1).applyQuaternion(camera.quaternion);
                const s = new THREE.Vector3(1,0,0).applyQuaternion(camera.quaternion);
                f.y = 0; s.y = 0; f.normalize(); s.normalize();
                
                const mv = new THREE.Vector3().addScaledVector(f, -WORLD.input.v.y).addScaledVector(s, WORLD.input.v.x);
                camera.position.addScaledVector(mv, PARAMS.MOVE_SPEED);
                camera.position.y = PARAMS.PLAYER_H + Math.sin(Date.now()*0.015)*0.06;
            }

            // RAYCAST SIGHT GATING
            raycaster.setFromCamera(new THREE.Vector2(0,0), camera);
            const sights = raycaster.intersectObjects(WORLD.registry.hitboxNodes);

            let highThreat = false;
            WORLD.registry.entities.forEach(ent => {
                const d = ent.process(camera.position, sights);
                if(ent.isActive) highThreat = true;

                if(d < 4.5) {
                    document.getElementById('death-screen').style.display = 'flex';
                    setTimeout(() => location.reload(), 1500);
                }
            });

            document.getElementById('threat-level').innerText = highThreat ? "CONTACT" : "SECURE";
            document.getElementById('threat-level').style.color = highThreat ? "var(--warning-red)" : "var(--neon-cyan)";

            renderer.render(scene, camera);
        }

        // --- MODULE 5: NEURAL INTERFACE (CONTROLS) ---
        function initializeControls() {
            const mv = document.getElementById('zone-move');
            const lk = document.getElementById('zone-look');
            const base = document.getElementById('joy-base');
            const nub = document.getElementById('joy-nub');
            let lx, ly;

            mv.addEventListener('touchstart', e => {
                const t = e.touches[0];
                WORLD.input.anchor.set(t.clientX, t.clientY);
                base.style.display = 'block'; base.style.left = t.clientX+'px'; base.style.top = t.clientY+'px';
            });
            mv.addEventListener('touchmove', e => {
                e.preventDefault();
                const t = e.touches[0];
                const dx = t.clientX - WORLD.input.anchor.x;
                const dy = t.clientY - WORLD.input.anchor.y;
                const d = Math.min(Math.sqrt(dx*dx+dy*dy), 80);
                const a = Math.atan2(dy, dx);
                nub.style.transform = `translate(${Math.cos(a)*d}px, ${Math.sin(a)*d}px)`;
                WORLD.input.v.set(Math.cos(a)*(d/80), Math.sin(a)*(d/80));
                WORLD.input.moving = d > 10;
            }, {passive:false});
            mv.addEventListener('touchend', () => { base.style.display = 'none'; WORLD.input.moving = false; });

            lk.addEventListener('touchstart', e => { lx = e.touches[0].clientX; ly = e.touches[0].clientY; });
            lk.addEventListener('touchmove', e => {
                const t = e.touches[0];
                WORLD.input.yaw -= (t.clientX - lx) * PARAMS.LOOK_SENS;
                WORLD.input.pitch -= (t.clientY - ly) * PARAMS.LOOK_SENS;
                WORLD.input.pitch = Math.max(-1.4, Math.min(1.4, WORLD.input.pitch));
                lx = t.clientX; ly = t.clientY;
            });
        }

        window.ontouchstart = () => {
            if(WORLD.booted && !WORLD.active) {
                WORLD.active = true;
                document.getElementById('boot-sequence').style.opacity = '0';
                setTimeout(() => {
                    document.getElementById('boot-sequence').style.display = 'none';
                    document.getElementById('game-ui').style.display = 'block';
                }, 3000);
            }
        };

        window.onload = initiateBoot;
    </script>
</body>
</html>
