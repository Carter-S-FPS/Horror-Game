<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>BLACKWOOD: TITAN VOXEL COMPRESSION ENGINE V8</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/0.160.0/three.min.js"></script>
    <style>
        :root {
            --neon-cyan: #00f2ff;
            --flesh-red: #881111;
            --void-bg: #020204;
            --interface-font: 'Courier New', Courier, monospace;
        }

        * { 
            margin: 0; 
            padding: 0; 
            box-sizing: border-box; 
            touch-action: none; 
            user-select: none; 
        }

        body, html { 
            width: 100%; 
            height: 100%; 
            background: var(--void-bg); 
            overflow: hidden; 
            font-family: var(--interface-font);
            color: var(--neon-cyan);
        }

        /* --- OVERLAY SYSTEMS --- */
        #boot-overlay {
            position: fixed;
            inset: 0;
            background: #000;
            z-index: 10000;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            transition: opacity 2s ease-in-out;
        }

        .terminal-box {
            width: 90%;
            max-width: 800px;
            padding: 40px;
            border: 1px solid #111;
            background: #010101;
            box-shadow: 0 0 50px rgba(0,0,0,1);
        }

        .terminal-header {
            font-size: 1.2rem;
            letter-spacing: 6px;
            margin-bottom: 25px;
            text-transform: uppercase;
            border-bottom: 1px solid #222;
            padding-bottom: 10px;
        }

        #load-rail {
            width: 100%;
            height: 2px;
            background: #111;
            margin: 25px 0;
            position: relative;
        }

        #load-fill {
            width: 0%;
            height: 100%;
            background: var(--neon-cyan);
            box-shadow: 0 0 15px var(--neon-cyan);
        }

        #terminal-log {
            height: 180px;
            overflow: hidden;
            font-size: 0.75rem;
            color: #444;
            line-height: 1.8;
            white-space: pre-wrap;
        }

        /* --- GAMEPLAY HUD --- */
        #game-hud {
            position: absolute;
            inset: 0;
            pointer-events: none;
            display: none;
            z-index: 100;
        }

        #vignette {
            position: absolute;
            inset: 0;
            background: radial-gradient(circle, transparent 25%, #000 140%);
            opacity: 0.9;
        }

        #input-move-layer {
            position: absolute;
            left: 0;
            bottom: 0;
            width: 50%;
            height: 85%;
            pointer-events: auto;
        }

        #input-look-layer {
            position: absolute;
            right: 0;
            bottom: 0;
            width: 50%;
            height: 100%;
            pointer-events: auto;
        }

        #joy-base {
            position: absolute;
            width: 150px;
            height: 150px;
            border-radius: 50%;
            background: rgba(0, 242, 255, 0.03);
            border: 1px solid rgba(0, 242, 255, 0.15);
            backdrop-filter: blur(4px);
            display: none;
            transform: translate(-50%, -50%);
        }

        #joy-knob {
            position: absolute;
            top: 50px;
            left: 50px;
            width: 50px;
            height: 50px;
            background: var(--neon-cyan);
            border-radius: 50%;
            opacity: 0.25;
            box-shadow: 0 0 20px var(--neon-cyan);
        }

        .data-readout {
            position: absolute;
            top: 40px;
            left: 40px;
            font-size: 0.75rem;
            line-height: 2.2;
            letter-spacing: 2px;
            text-shadow: 2px 2px 5px #000;
        }

        #alert-modal {
            position: absolute;
            top: 42%;
            width: 100%;
            text-align: center;
            color: #fff;
            font-size: 3.5rem;
            font-weight: 900;
            letter-spacing: 30px;
            opacity: 0;
            transition: transform 1.5s, opacity 1s;
            transform: scale(0.9);
        }

        #crt-fx {
            position: fixed;
            inset: 0;
            pointer-events: none;
            z-index: 1000;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.1) 50%),
                        linear-gradient(90deg, rgba(255, 0, 0, 0.03), rgba(0, 255, 0, 0.01), rgba(0, 0, 255, 0.03));
            background-size: 100% 3px, 3px 100%;
            opacity: 0.7;
        }
    </style>
</head>
<body>

    <div id="crt-fx"></div>

    <div id="boot-overlay">
        <div class="terminal-box">
            <div class="terminal-header">CORE_VOXEL_ENGINE_v8.0.4</div>
            <div id="load-rail"><div id="load-fill"></div></div>
            <div id="terminal-log"></div>
        </div>
    </div>

    <div id="game-hud">
        <div id="vignette"></div>
        <div class="data-readout">
            BUFFER: 40x40x40_LATTICE<br>
            SCALAR: 0.0825_COMPRESSION<br>
            LIGHT_BIAS: +1.25_EV<br>
            THREAT: <span id="ui-threat">STABLE</span><br>
            SYNC: <span id="ui-sync">--</span><br>
            WARD: <span id="ui-ward">01</span>
        </div>
        <div id="alert-modal">WARD 01</div>
        <div id="input-move-layer">
            <div id="joy-base"><div id="joy-knob"></div></div>
        </div>
        <div id="input-look-layer"></div>
    </div>

    <audio id="snd-amb" loop><source src="mixkit-horror-ambience-2482.wav" type="audio/wav"></audio>
    <audio id="snd-step" loop><source src="mixkit-footsteps-in-a-tunnel-loop-543.wav" type="audio/wav"></audio>
    <audio id="snd-breath" loop><source src="mixkit-creepy-demon-heavy-breathing-2240.wav" type="audio/wav"></audio>

    <script>
        /**
         * BLACKWOOD: THE TITAN VOXEL COMPRESSION ENGINE (V8)
         * - FIXED JOYSTICK INVERSION (Anchored Center)
         * - ENHANCED VISIBILITY (High-Bias Lighting)
         * - 40x40x40 VOXEL COMPRESSION LOGIC
         */

        // --- GLOBAL ENGINE STATE ---
        const ENGINE = {
            initialized: false,
            running: false,
            floor: 1,
            mazeSize: 15,
            gridUnit: 26,
            playerHeight: 1.85,
            camFov: 80,
            fogDensity: 0.042,
            playerSpeed: 0.155,
            lookSensitivity: 0.005,
            collisionRadius: 1.45,
            entities: [],
            wallGeometry: [],
            input: {
                moveVec: new THREE.Vector2(0, 0),
                active: false,
                yaw: 0,
                pitch: 0,
                joyAnchor: new THREE.Vector2(0, 0)
            },
            shaders: {
                voxelVertex: `
                    varying vec3 vNormal;
                    varying vec3 vViewPosition;
                    void main() {
                        vec4 mvPosition = modelViewMatrix * vec4(position, 1.0);
                        vNormal = normalize(normalMatrix * normal);
                        vViewPosition = -mvPosition.xyz;
                        gl_Position = projectionMatrix * mvPosition;
                    }
                `,
                voxelFragment: `
                    uniform vec3 uColor;
                    varying vec3 vNormal;
                    void main() {
                        float dotProd = max(dot(vNormal, vec3(0.0, 1.0, 1.0)), 0.2);
                        gl_FragColor = vec4(uColor * dotProd, 1.0);
                    }
                `
            }
        };

        let scene, camera, renderer, clock, flashlight, ambLight;

        // --- 1. BOOT SEQUENCE CONTROLLER ---
        function initiateBootSequence() {
            const fill = document.getElementById('load-fill');
            const log = document.getElementById('terminal-log');
            const processes = [
                "Establishing WebGL 2.0 High-Performance Context...",
                "Mapping 40x40x40 Voxel Density Grids...",
                "Initializing 'Surgeon' Behavioral Matrix...",
                "Allocating Vertex Arrays for Compressed Mesh...",
                "Reducing Fog Density to 0.042 (Visibility Fix)...",
                "Anchoring Fixed-Center Dynamic Joystick...",
                "Injecting Medical-Teal Voxel Color Palettes...",
                "Building Ward 1: Diagnostic Center...",
                "Building Ward 2: The Theatre...",
                "Building Ward 3: Isolation Unit...",
                "Optimizing Spatial Audio Pan-Buffer...",
                "System Core Synchronized."
            ];

            let progress = 0;
            const timer = setInterval(() => {
                progress += Math.random() * 1.8;
                if (progress >= 100) {
                    progress = 100;
                    clearInterval(timer);
                    ENGINE.initialized = true;
                    log.innerHTML = "<span style='color:#fff'>[READY] CLICK TO COMMENCE NEURAL LINK</span><br>" + log.innerHTML;
                    setupWorldSystems();
                }
                fill.style.width = progress + "%";
                if (Math.floor(progress) % 8 === 0) {
                    const idx = Math.floor(progress / 8);
                    if (processes[idx]) log.innerHTML = `> ${processes[idx]}<br>${log.innerHTML}`;
                }
            }, 35);
        }

        const handleStartTrigger = () => {
            if (!ENGINE.initialized || ENGINE.running) return;
            ENGINE.running = true;
            document.getElementById('boot-overlay').style.opacity = '0';
            setTimeout(() => {
                document.getElementById('boot-overlay').style.display = 'none';
                document.getElementById('game-hud').style.display = 'block';
                triggerAlert();
            }, 1800);

            // Audio Activation
            const a1 = document.getElementById('snd-amb'), 
                  a2 = document.getElementById('snd-step'), 
                  a3 = document.getElementById('snd-breath');
            a1.volume = 0.45; a2.volume = 0; a3.volume = 0;
            [a1, a2, a3].forEach(s => s.play().catch(() => {}));
        };

        window.ontouchstart = handleStartTrigger;
        window.onmousedown = handleStartTrigger;
        window.onload = initiateBootSequence;

        // --- 2. THE ABOMINATION FACTORY (40x40x40) ---
        class VoxelAbomination {
            constructor(isBoss, floor) {
                this.root = new THREE.Group();
                this.isBoss = isBoss;
                this.floor = floor;
                this.moveSpeed = isBoss ? 0.092 : 0.045 + Math.random() * 0.035;
                
                this.palettes = isBoss 
                    ? [0x000000, 0x111111, 0x080808, 0x1a1a1a] 
                    : [0x336666, 0x447777, 0x2d4d4d, 0x5a8a8a, 0xcccccc];

                this.constructMeshLattice();
            }

            /**
             * Internal Constructor: Builds limbs at massive internal scales
             * then compresses the entire root group to 0.08 scale.
             */
            constructMeshLattice() {
                const buildPart = (w, h, d, px, py, pz) => {
                    const partGroup = new THREE.Group();
                    // Each body part is composed of 40 individual jittered voxels
                    for(let i=0; i<40; i++) {
                        const mat = new THREE.MeshLambertMaterial({ 
                            color: this.palettes[Math.floor(Math.random() * this.palettes.length)] 
                        });
                        const mesh = new THREE.Mesh(new THREE.BoxGeometry(w, h, d), mat);
                        
                        // Jitter within the part's 40x40x40 bounds
                        mesh.position.set(
                            (Math.random() - 0.5) * (w * 0.55),
                            (Math.random() - 0.5) * (h * 0.55),
                            (Math.random() - 0.5) * (d * 0.55)
                        );
                        partGroup.add(mesh);
                    }
                    partGroup.position.set(px, py, pz);
                    this.root.add(partGroup);
                };

                // Build using Titan-scale units
                buildPart(40, 40, 40, 0, 40, 0);     // TORSO
                buildPart(30, 30, 30, 0, 85, 0);     // HEAD
                buildPart(15, 65, 15, -35, 45, 0);   // LEFT_ARM
                buildPart(15, 65, 15, 35, 45, 0);    // RIGHT_ARM
                buildPart(20, 60, 20, -20, -15, 0);  // LEFT_LEG
                buildPart(20, 60, 20, 20, -15, 0);   // RIGHT_LEG

                // THE CRITICAL COMPRESSION STEP
                this.root.scale.set(0.0825, 0.0825, 0.0825);

                if (this.isBoss) {
                    const visor = new THREE.Mesh(
                        new THREE.BoxGeometry(45, 5, 5), 
                        new THREE.MeshBasicMaterial({ color: 0xff0000 })
                    );
                    visor.position.set(0, 90, 18);
                    this.root.add(visor);
                }
            }

            tick(pPos) {
                if (this.floor !== ENGINE.floor) return 1000;

                const dist = this.root.position.distanceTo(pPos);
                if (dist < 72) {
                    this.root.lookAt(pPos.x, this.root.position.y, pPos.z);
                    const moveDir = new THREE.Vector3().subVectors(pPos, this.root.position).normalize();
                    moveDir.y = 0;
                    this.root.position.addScaledVector(moveDir, this.moveSpeed);
                }
                return dist;
            }
        }

        // --- 3. WORLD SYSTEMS SETUP ---
        function setupWorldSystems() {
            scene = new THREE.Scene();
            scene.fog = new THREE.FogExp2(0x08090b, ENGINE.fogDensity);

            camera = new THREE.PerspectiveCamera(ENGINE.camFov, window.innerWidth / window.innerHeight, 0.1, 2000);
            clock = new THREE.Clock();

            renderer = new THREE.WebGLRenderer({ antialias: false, powerPreference: "high-performance" });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(Math.min(window.devicePixelRatio, 1.2));
            document.body.appendChild(renderer.domElement);

            // Visibility Buff: High Bias Ambient Light
            ambLight = new THREE.AmbientLight(0x556688, 1.3);
            scene.add(ambLight);

            flashlight = new THREE.SpotLight(0xfffce0, 520, 180, Math.PI / 7.2, 0.55);
            flashlight.position.set(0, 0, 0.1);
            flashlight.target.position.set(0, 0, -5);
            camera.add(flashlight);
            camera.add(flashlight.target);
            scene.add(camera);

            generateTriWardLabyrinth();
            populateEntities();
            initializeInputLayer();
            mainRenderLoop();
        }

        function generateTriWardLabyrinth() {
            const wallMat = new THREE.MeshLambertMaterial({ color: 0x181a20 });
            const floorMat = new THREE.MeshLambertMaterial({ color: 0x050505 });

            for (let f = 0; f < 3; f++) {
                const wardGroup = new THREE.Group();
                wardGroup.position.y = f * 30;

                // Recursive Backtracker Logic for Maze
                const grid = Array(ENGINE.mazeSize).fill().map(() => Array(ENGINE.mazeSize).fill(15));
                const stack = [[0, 0]];
                const seen = new Set(['0,0']);
                
                while (stack.length > 0) {
                    const [cx, cy] = stack[stack.length - 1];
                    const neighs = [];
                    [[0,1,1,4],[0,-1,4,1],[1,0,2,8],[-1,0,8,2]].forEach(([dx, dy, w, op]) => {
                        const nx = cx+dx, ny = cy+dy;
                        if (nx>=0 && nx<ENGINE.mazeSize && ny>=0 && ny<ENGINE.mazeSize && !seen.has(`${nx},${ny}`)) {
                            neighs.push([nx, ny, w, op]);
                        }
                    });
                    if (neighs.length > 0) {
                        const [nx, ny, w, op] = neighs[Math.floor(Math.random() * neighs.length)];
                        grid[cy][cx] -= w; grid[ny][nx] -= op;
                        seen.add(`${nx},${ny}`); stack.push([nx, ny]);
                    } else stack.pop();
                }

                for (let y = 0; y < ENGINE.mazeSize; y++) {
                    for (let x = 0; x < ENGINE.mazeSize; x++) {
                        const px = x * ENGINE.gridUnit - (ENGINE.mazeSize * ENGINE.gridUnit) / 2;
                        const pz = y * ENGINE.gridUnit - (ENGINE.mazeSize * ENGINE.gridUnit) / 2;
                        const v = grid[y][x];
                        if (v & 1) appendWall(px, pz - ENGINE.gridUnit / 2, 0, wardGroup);
                        if (v & 4) appendWall(px, pz + ENGINE.gridUnit / 2, 0, wardGroup);
                        if (v & 8) appendWall(px - ENGINE.gridUnit / 2, pz, Math.PI / 2, wardGroup);
                        if (v & 2) appendWall(px + ENGINE.gridUnit / 2, pz, Math.PI / 2, wardGroup);
                    }
                }

                const plane = new THREE.Mesh(new THREE.PlaneGeometry(500, 500), floorMat);
                plane.rotation.x = -Math.PI / 2;
                wardGroup.add(plane);

                const exitGateway = new THREE.Mesh(
                    new THREE.BoxGeometry(8, 0.5, 8), 
                    new THREE.MeshBasicMaterial({ color: 0x00f2ff, transparent: true, opacity: 0.4 })
                );
                exitGateway.position.set((ENGINE.mazeSize/2 - 1) * ENGINE.gridUnit, 0.1, (ENGINE.mazeSize/2 - 1) * ENGINE.gridUnit);
                wardGroup.add(exitGateway);

                scene.add(wardGroup);
            }
        }

        function appendWall(x, z, r, g) {
            const w = new THREE.Mesh(new THREE.BoxGeometry(ENGINE.gridUnit, 18, 1.6), new THREE.MeshLambertMaterial({color: 0x1c1e25}));
            w.position.set(x, 9, z);
            w.rotation.y = r;
            g.add(w);
            ENGINE.wallGeometry.push(w);
        }

        function populateEntities() {
            const boss = new VoxelAbomination(true, 1);
            boss.root.position.set(-65, 0, -65);
            scene.add(boss.root);
            ENGINE.entities.push(boss);

            for (let i = 0; i < 26; i++) {
                const targetFloor = (i % 3) + 1;
                const minion = new VoxelAbomination(false, targetFloor);
                minion.root.position.set(Math.random() * 200 - 100, (targetFloor - 1) * 30, Math.random() * 200 - 100);
                scene.add(minion.root);
                ENGINE.entities.push(minion);
            }
        }

        // --- 4. THE JOYSTICK FIX (Fixed Center) ---
        function initializeInputLayer() {
            const moveLayer = document.getElementById('input-move-layer');
            const lookLayer = document.getElementById('input-look-layer');
            const joyBase = document.getElementById('joy-base');
            const joyKnob = document.getElementById('joy-knob');
            
            let lastLookX, lastLookY;

            moveLayer.addEventListener('touchstart', (e) => {
                const touch = e.touches[0];
                ENGINE.input.joyAnchor.set(touch.clientX, touch.clientY);
                joyBase.style.display = 'block';
                joyBase.style.left = touch.clientX + 'px';
                joyBase.style.top = touch.clientY + 'px';
            });

            moveLayer.addEventListener('touchmove', (e) => {
                e.preventDefault();
                const touch = e.touches[0];
                const dx = touch.clientX - ENGINE.input.joyAnchor.x;
                const dy = touch.clientY - ENGINE.input.joyAnchor.y;
                const maxPull = 55;
                const dist = Math.min(Math.sqrt(dx*dx + dy*dy), maxPull);
                const angle = Math.atan2(dy, dx);

                joyKnob.style.transform = `translate(${Math.cos(angle) * dist}px, ${Math.sin(angle) * dist}px)`;
                
                // Normalized Input Mapping
                ENGINE.input.moveVec.set(
                    Math.cos(angle) * (dist / maxPull),
                    Math.sin(angle) * (dist / maxPull)
                );
                ENGINE.input.active = dist > 6;
            }, { passive: false });

            moveLayer.addEventListener('touchend', () => {
                joyBase.style.display = 'none';
                ENGINE.input.active = false;
                ENGINE.input.moveVec.set(0, 0);
            });

            lookLayer.addEventListener('touchstart', (e) => {
                lastLookX = e.touches[0].clientX;
                lastLookY = e.touches[0].clientY;
            });

            lookLayer.addEventListener('touchmove', (e) => {
                const touch = e.touches[0];
                const deltaX = touch.clientX - lastLookX;
                const deltaY = touch.clientY - lastLookY;
                
                ENGINE.input.yaw -= deltaX * ENGINE.lookSensitivity;
                ENGINE.input.pitch -= deltaY * ENGINE.lookSensitivity;
                ENGINE.input.pitch = Math.max(-1.42, Math.min(1.42, ENGINE.input.pitch));
                
                lastLookX = touch.clientX;
                lastLookY = touch.clientY;
            });
        }

        // --- 5. CORE RENDER LOOP ---
        function mainRenderLoop() {
            requestAnimationFrame(mainRenderLoop);
            
            if (ENGINE.running) {
                camera.rotation.order = "YXZ";
                camera.rotation.y = ENGINE.input.yaw;
                camera.rotation.x = ENGINE.input.pitch;

                if (ENGINE.input.active) {
                    const fwd = new THREE.Vector3(0, 0, -1).applyQuaternion(camera.quaternion);
                    const side = new THREE.Vector3(1, 0, 0).applyQuaternion(camera.quaternion);
                    fwd.y = 0; side.y = 0; fwd.normalize(); side.normalize();

                    const moveDir = new THREE.Vector3()
                        .addScaledVector(fwd, -ENGINE.input.moveVec.y)
                        .addScaledVector(side, ENGINE.input.moveVec.x);

                    const ray = new THREE.Raycaster(camera.position, moveDir.clone().normalize(), 0, ENGINE.collisionRadius);
                    if (ray.intersectObjects(ENGINE.wallGeometry).length === 0) {
                        camera.position.addScaledVector(moveDir, ENGINE.playerSpeed);
                        // Procedural Walk Cycle (Bobbing)
                        camera.position.y = ((ENGINE.floor - 1) * 30) + ENGINE.playerHeight + Math.sin(Date.now() * 0.008) * 0.06;
                    }
                    document.getElementById('snd-step').volume = 0.5;
                } else {
                    document.getElementById('snd-step').volume = 0;
                }

                // Entity Management
                let closestDist = 1000;
                ENGINE.entities.forEach(ent => {
                    const d = ent.tick(camera.position);
                    if (ent.floor === ENGINE.floor && d < closestDist) closestDist = d;
                    if (ent.isBoss && ent.floor === ENGINE.floor && d < 20) {
                        document.getElementById('snd-breath').volume = 1 - (d / 20);
                    }
                });

                // UI Logic
                document.getElementById('ui-threat').innerText = closestDist < 18 ? "CRITICAL" : (closestDist < 42 ? "ELEVATED" : "STABLE");
                document.getElementById('ui-threat').style.color = closestDist < 18 ? "red" : "var(--neon-cyan)";
                document.getElementById('ui-sync').innerText = (98 + Math.random() * 1.5).toFixed(1) + "%";

                // Progress Check
                const goalX = (ENGINE.mazeSize/2 - 1) * ENGINE.gridUnit;
                const goalZ = (ENGINE.mazeSize/2 - 1) * ENGINE.gridUnit;
                if (camera.position.distanceTo(new THREE.Vector3(goalX, (ENGINE.floor - 1) * 30, goalZ)) < 6 && ENGINE.floor < 3) {
                    ENGINE.floor++;
                    camera.position.set(0, (ENGINE.floor - 1) * 30 + ENGINE.playerHeight, 0);
                    document.getElementById('ui-ward').innerText = "0" + ENGINE.floor;
                    triggerAlert();
                }
            }

            renderer.render(scene, camera);
        }

        function triggerAlert() {
            const el = document.getElementById('alert-modal');
            el.innerText = "WARD 0" + ENGINE.floor;
            el.style.opacity = "1";
            el.style.transform = "scale(1)";
            setTimeout(() => {
                el.style.opacity = "0";
                el.style.transform = "scale(0.85)";
            }, 3000);
        }

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

    </script>
</body>
</html>
