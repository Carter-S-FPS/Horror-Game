<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ABANDONED_WARD_V46</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/0.160.0/three.min.js"></script>
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background: #000; }
        #overlay { 
            position: fixed; inset: 0; z-index: 10; 
            background: radial-gradient(circle, transparent 20%, rgba(0,0,0,0.95) 90%);
            pointer-events: none; 
        }
        #boot { 
            position: fixed; inset: 0; z-index: 100; background: #0a0a0a; 
            display: flex; flex-direction: column; justify-content: center; align-items: center; 
            color: #555; font-family: serif;
        }
        .btn { border: 1px solid #333; padding: 12px 35px; cursor: pointer; display: none; color: #888; margin-top: 20px; }
    </style>
</head>
<body>
    <div id="overlay"></div>
    <div id="boot">
        <div id="status">Entering Abandoned Block...</div>
        <div id="btn" class="btn">PROCEED</div>
    </div>

    <script>
        let scene, camera, renderer, active = false, flashlight;
        let mv = { f: 0, s: 0, active: false, id: null };
        let rot = { x: 0, y: 0, lx: 0, ly: 0, id: null };

        function init() {
            scene = new THREE.Scene();
            scene.fog = new THREE.Fog(0x000000, 1, 14); // Tight fog for isolation

            camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 100);
            
            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            document.body.appendChild(renderer.domElement);

            // Flashlight - Narrower and dimmer for "abandoned" feel
            flashlight = new THREE.SpotLight(0xfff5d4, 1.2, 18, Math.PI/7, 0.3, 1);
            scene.add(flashlight);
            scene.add(flashlight.target);

            // Textures
            const wallTex = createWallTex();
            const tileTex = createOfficeCeiling();

            const wallMat = new THREE.MeshStandardMaterial({ map: wallTex, roughness: 1 });
            const floorMat = new THREE.MeshStandardMaterial({ color: 0x222522, roughness: 0.1, metalness: 0.2 }); // Epoxy look
            const ceilMat = new THREE.MeshStandardMaterial({ map: tileTex, color: 0x888888 }); // Dead ceiling

            const h = 3.0; 
            const size = 44; 
            const hw = 4.0; // Hallway width

            const addWall = (w, d, x, z) => {
                const m = new THREE.Mesh(new THREE.BoxGeometry(w, h, d), wallMat);
                m.position.set(x, h/2, z);
                scene.add(m);
            };

            // Floor (Epoxy)
            const fGeo = new THREE.PlaneGeometry(size + 10, size + 10);
            const floor = new THREE.Mesh(fGeo, floorMat);
            floor.rotation.x = -Math.PI/2;
            scene.add(floor);

            // Office Ceiling
            const cGeo = new THREE.PlaneGeometry(size + 6, size + 6);
            const ceiling = new THREE.Mesh(cGeo, ceilMat);
            ceiling.rotation.x = Math.PI/2;
            ceiling.position.y = h;
            scene.add(ceiling);

            // GEOMETRY: Square Perimeter Hall + Inner Cross
            // 1. OUTER WALLS
            addWall(size+2, 0.5, 0, size/2);  
            addWall(size+2, 0.5, 0, -size/2); 
            addWall(0.5, size+2, size/2, 0);  
            addWall(0.5, size+2, -size/2, 0); 

            // 2. INNER SQUARE WALLS (The hallway loop)
            const inner = size/2 - hw;
            addWall(inner, 0.5, (inner/2) + hw/2, inner); 
            addWall(inner, 0.5, -(inner/2) - hw/2, inner);
            addWall(inner, 0.5, (inner/2) + hw/2, -inner);
            addWall(inner, 0.5, -(inner/2) - hw/2, -inner);
            addWall(0.5, inner, inner, (inner/2) + hw/2);
            addWall(0.5, inner, inner, -(inner/2) - hw/2);
            addWall(0.5, inner, -inner, (inner/2) + hw/2);
            addWall(0.5, inner, -inner, -(inner/2) - hw/2);

            // 3. INNER CROSS
            addWall(0.2, inner*2, hw/2, 0);
            addWall(0.2, inner*2, -hw/2, 0);
            addWall(inner*2, 0.2, 0, hw/2);
            addWall(inner*2, 0.2, 0, -hw/2);

            camera.position.set(0, 1.6, 0);

            // Controls
            window.addEventListener('touchstart', (e) => {
                for(let t of e.changedTouches) {
                    if(t.clientX < window.innerWidth/2) {
                        mv.active = true; mv.id = t.identifier;
                        mv.ox = t.clientX; mv.oy = t.clientY;
                    } else {
                        rot.id = t.identifier;
                        rot.lx = t.clientX; rot.ly = t.clientY;
                    }
                }
            });

            window.addEventListener('touchmove', (e) => {
                e.preventDefault();
                for(let t of e.changedTouches) {
                    if(t.identifier === mv.id) {
                        mv.s = (t.clientX - mv.ox) / 50;
                        mv.f = (t.clientY - mv.oy) / 50;
                    } else if(t.identifier === rot.id) {
                        rot.x -= (t.clientX - rot.lx) * 0.005;
                        rot.y -= (t.clientY - rot.ly) * 0.005;
                        rot.y = Math.max(-1.1, Math.min(1.1, rot.y));
                        rot.lx = t.clientX; rot.ly = t.clientY;
                    }
                }
            }, {passive: false});

            window.addEventListener('touchend', (e) => {
                for(let t of e.changedTouches) {
                    if(t.identifier === mv.id) { mv.active = false; mv.f = 0; mv.s = 0; }
                    if(t.identifier === rot.id) rot.id = null;
                }
            });

            loop();
        }

        function createWallTex() {
            const canv = document.createElement('canvas');
            canv.width = 256; canv.height = 256;
            const ctx = canv.getContext('2d');
            ctx.fillStyle = '#dbd2ae'; // Cream
            ctx.fillRect(0,0,256,256);
            // Dirt/Grime
            for(let i=0; i<300; i++) {
                ctx.fillStyle = `rgba(50,40,20,${Math.random()*0.2})`;
                ctx.fillRect(Math.random()*256, Math.random()*256, 5, 20);
            }
            return new THREE.CanvasTexture(canv);
        }

        function createOfficeCeiling() {
            const canv = document.createElement('canvas');
            canv.width = 128; canv.height = 128;
            const ctx = canv.getContext('2d');
            ctx.fillStyle = '#d1d1d1'; ctx.fillRect(0,0,128,128);
            ctx.strokeStyle = '#999'; ctx.strokeRect(0,0,128,128);
            const t = new THREE.CanvasTexture(canv);
            t.wrapS = t.wrapT = THREE.RepeatWrapping;
            t.repeat.set(12, 12);
            return t;
        }

        function loop() {
            requestAnimationFrame(loop);
            if(!active) return;

            camera.rotation.set(rot.y, rot.x, 0, 'YXZ');
            flashlight.position.copy(camera.position);
            const targetPos = new THREE.Vector3(0, 0, -1).applyQuaternion(camera.quaternion).add(camera.position);
            flashlight.target.position.copy(targetPos);

            if(mv.active) {
                const dir = new THREE.Vector3(0,0,-1).applyQuaternion(camera.quaternion);
                dir.y = 0; dir.normalize();
                const side = new THREE.Vector3(1,0,0).applyQuaternion(camera.quaternion);
                side.y = 0; side.normalize();
                camera.position.addScaledVector(dir, -mv.f * 0.12);
                camera.position.addScaledVector(side, mv.s * 0.12);
            }
            renderer.render(scene, camera);
        }

        setTimeout(() => {
            document.getElementById('btn').style.display = "block";
            init();
        }, 500);

        document.getElementById('btn').onclick = () => {
            active = true;
            document.getElementById('boot').style.display = 'none';
        };
    </script>
</body>
</html>
