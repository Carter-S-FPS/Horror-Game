<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>BLACKWOOD_V14_TITAN_COMPRESSION_ENGINE</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/0.160.0/three.min.js"></script>
    <style>
        :root {
            --neon-teal: #00f2ff;
            --alert-red: #ff0033;
            --void: #010103;
            --interface-bg: #050508;
            --font-main: 'Courier New', Courier, monospace;
        }

        * { 
            margin: 0; padding: 0; box-sizing: border-box; 
            touch-action: none; user-select: none; 
            -webkit-tap-highlight-color: transparent;
        }

        body, html { 
            width: 100%; height: 100%; background: #000; 
            overflow: hidden; font-family: var(--font-main);
        }

        /* --- BOOT SYSTEM INTERFACE --- */
        #os-layer {
            position: fixed; inset: 0; background: #000; z-index: 10000;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            transition: opacity 2.5s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .terminal-box {
            width: 80%; max-width: 1000px; padding: 60px;
            border: 1px solid #111; background: var(--interface-bg);
            position: relative; overflow: hidden;
        }

        .terminal-box::before {
            content: ''; position: absolute; top: 0; left: 0; width: 100%; height: 2px;
            background: linear-gradient(90deg, transparent, var(--neon-teal), transparent);
            animation: sweep 3s infinite;
        }

        @keyframes sweep { 0% { transform: translateX(-100%); } 100% { transform: translateX(100%); } }

        .terminal-header {
            color: var(--neon-teal); font-size: 1.4rem; letter-spacing: 12px;
            margin-bottom: 40px; text-transform: uppercase; border-bottom: 1px solid #222;
        }

        #boot-rail {
            width: 100%; height: 4px; background: #0a0a0a; margin: 40px 0;
            position: relative; border-radius: 2px;
        }

        #boot-fill {
            width: 0%; height: 100%; background: var(--neon-teal);
            box-shadow: 0 0 25px var(--neon-teal); transition: width 0.15s ease-out;
        }

        #boot-log {
            height: 300px; overflow-y: hidden; font-size: 0.85rem;
            color: #555; line-height: 2.2; white-space: pre-wrap;
        }

        /* --- CORE GAME HUD --- */
        #hud-container {
            position: absolute; inset: 0; pointer-events: none;
            display: none; z-index: 100; opacity: 0;
            transition: opacity 3s ease;
        }

        #vignette-layer {
            position: absolute; inset: 0;
            background: radial-gradient(circle, transparent 5%, #000 180%);
            opacity: 0.98;
        }

        /* INPUT REGIONS */
        #region-movement {
            position: absolute; left: 0; bottom: 0; width: 50%; height: 85%;
            pointer-events: auto;
        }

        #region-vision {
            position: absolute; right: 0; bottom: 0; width: 50%; height: 100%;
            pointer-events: auto;
        }

        /* ANALOG ANCHOR */
        #joy-ring {
            position: absolute; width: 180px; height: 180px; border-radius: 50%;
            background: rgba(0, 242, 255, 0.02); border: 2px solid rgba(0, 242, 255, 0.08);
            display: none; transform: translate(-50%, -50%); backdrop-filter: blur(10px);
        }

        #joy-nub {
            position: absolute; top: 60px; left: 60px; width: 60px; height: 60px;
            background: var(--neon-teal); border-radius: 50%; opacity: 0.4;
            box-shadow: 0 0 30px var(--neon-teal);
        }

        /* TELEMETRY DATA */
        .telemetry {
            position: absolute; top: 60px; left: 60px;
            font-size: 0.8rem; line-height: 2.8; letter-spacing: 4px;
            color: var(--neon-teal); text-shadow: 0 0 10px rgba(0, 242, 255, 0.5);
        }

        #ward-indicator {
            position: absolute; top: 40%; width: 100%; text-align: center;
            color: #fff; font-size: 4rem; font-weight: 900; letter-spacing: 45px;
            opacity: 0; transition: transform 2s, opacity 2s;
            transform: scale(0.7); text-transform: uppercase;
        }

        /* POST-PROCESS OVERLAYS */
        #crt-filter {
            position: fixed; inset: 0; pointer-events: none; z-index: 500;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.2) 50%);
            background-size: 100% 4px; opacity: 0.6;
        }
        
        #static-noise {
            position: fixed; inset: 0; pointer-events: none; z-index: 501;
            background: url('https://upload.wikimedia.org/wikipedia/commons/5/5a/Can_not_be_displayed.png');
            opacity: 0.03; mix-blend-mode: overlay;
        }
    </style>
</head>
<body>

    <div id="crt-filter"></div>
    <div id="static-noise"></div>

    <div id="os-layer">
        <div class="terminal-box">
            <div class="terminal-header">BLACKWOOD_NEURAL_INTERFACE_v14.0.2</div>
            <div id="boot-rail"><div id="boot-fill"></div></div>
            <div id="boot-log"></div>
        </div>
    </div>

    <div id="hud-container">
        <div id="vignette-layer"></div>
        
        <div class="telemetry">
            SECTOR_SIZE: 2000_SQ_UNITS<br>
            MATRIX_COMPRESSION: 0.052_SCALAR<br>
            ENTITY_DENSITY: HIGH_CAPACITY<br>
            THREAT_LEVEL: <span id="threat-status" style="transition:0.5s;">STABLE</span><br>
            WARD_IDENT: <span id="ward-val">01</span>
        </div>

        <div id="ward-indicator">WARD 01</div>

        <div id="region-movement">
            <div id="joy-ring"><div id="joy-nub"></div></div>
        </div>
        <div id="region-vision"></div>
    </div>

    <audio id="audio-ambience" loop><source src="mixkit-horror-ambience-2482.wav" type="audio/wav"></audio>
    <audio id="audio-footsteps" loop><source src="mixkit-footsteps-in-a-tunnel-loop-543.wav" type="audio/wav"></audio>
    <audio id="audio-breathing" loop><source src="mixkit-creepy-demon-heavy-breathing-2240.wav" type="audio/wav"></audio>

    <script>
        /**
         * BLACKWOOD ENGINE CORE
         * ---------------------------------------------------------------------
         * This script is the primary engine controller. It utilizes a modular 
         * pattern to handle massive world-scales (2000 units) and anatomically 
         * accurate voxel entities via a Titan-to-Shrink compression matrix.
         */

        // --- GLOBAL ENGINE CONFIGURATION ---
        const ENGINE_PROPS = {
            VERSION: "14.0.2",
            FLOOR_DIM: 2000,
            UNIT_SPACING: 120,
            CAMERA_EYE_LEVEL: 1.8,
            MATRIX_SCALAR: 0.052,
            ANATOMY_MINION: 36, // Scaled 1.8m
            ANATOMY_SURGEON: 42, // Scaled 2.1m (One head taller)
            RENDER_DISTANCE: 500,
            FOV: 88,
            MOVE_VELOCITY: 0.35,
            ROTATION_SENSITIVITY: 0.0055,
            FOG_CONSTANT: 0.048,
            GRID_COMPLEXITY: 40 // Voxel density per limb
        };

        const SESSION = {
            isReady: false,
            isActive: false,
            ward: 1,
            input: {
                vector: new THREE.Vector2(0, 0),
                isEngaged: false,
                yaw: 0, pitch: 0,
                anchor: new THREE.Vector2(0, 0)
            },
            registry: {
                walls: [],
                entities: [],
                sectors: []
            }
        };

        let scene, camera, renderer, clock, lantern, globalLight;

        // --- MODULE 1: BOOT CONTROLLER ---
        // This simulates a high-level system initialization with logging.
        function initializeBootSequence() {
            const fill = document.getElementById('boot-fill');
            const log = document.getElementById('boot-log');
            
            const initializationTasks = [
                "ALLOCATING VIRTUAL MEMORY: 2.4GB...",
                "CALIBRATING VOXEL LATTICE ARRAYS (40x40x40)...",
                "BUILDING ANATOMY MATRIX: PLAYER_EYE_LEVEL=1.8m...",
                "BUILDING ANATOMY MATRIX: SURGEON_BIAS=+0.3m...",
                "GENERATING SPATIAL SECTORS: 2000 UNIT RADIUS...",
                "INJECTING MATRIX COMPRESSION SCALAR (0.052)...",
                "SYNCING NEURAL JOYSTICK ANCHORS...",
                "FETCHING WARD 01 ASSETS...",
                "FETCHING WARD 02 ASSETS...",
                "FETCHING WARD 03 ASSETS...",
                "ESTABLISHING PROCEDURAL COLLISION MESH...",
                "INITIALIZING SPATIAL AUDIO BUFFERS...",
                "READY_FOR_NEURAL_LINK."
            ];

            let progress = 0;
            const bootStep = () => {
                progress += Math.random() * 1.8;
                if (progress >= 100) {
                    progress = 100;
                    SESSION.isReady = true;
                    log.innerHTML = "<span style='color:#fff; font-weight:bold;'>[INITIALIZED] TAP SCREEN TO SYNC</span><br>" + log.innerHTML;
                    setupCoreUniverse();
                } else {
                    fill.style.width = progress + "%";
                    if (Math.floor(progress) % 8 === 0) {
                        const taskIndex = Math.floor(progress / 8);
                        if (initializationTasks[taskIndex]) {
                            log.innerHTML = `> ${initializationTasks[taskIndex]}<br>${log.innerHTML}`;
                        }
                    }
                    requestAnimationFrame(bootStep);
                }
            };
            bootStep();
        }

        // --- MODULE 2: ANATOMY ENGINE ---
        // Handles the creation of Titan-Scale voxels compressed into 1.8m/2.1m entities.
        class AnatomyFabricator {
            constructor(isSurgeon, floorIdentity) {
                this.container = new THREE.Group();
                this.isSurgeon = isSurgeon;
                this.floor = floorIdentity;
                this.baseSpeed = isSurgeon ? 0.22 : 0.09 + Math.random() * 0.12;
                
                // Color palette for medical horror
                this.materials = isSurgeon 
                    ? [0x000000, 0x0a0a0a, 0x111111] 
                    : [0x2a3d3d, 0x3a4f4f, 0x121212, 0xc0c0c0];

                this.constructTitanLattice();
            }

            constructTitanLattice() {
                const buildSegment = (width, height, depth, x, y, z) => {
                    const segmentGroup = new THREE.Group();
                    // Dense Voxel Loop
                    for (let i = 0; i < ENGINE_PROPS.GRID_COMPLEXITY; i++) {
                        const boxMat = new THREE.MeshLambertMaterial({ 
                            color: this.materials[Math.floor(Math.random() * this.materials.length)] 
                        });
                        const voxel = new THREE.Mesh(new THREE.BoxGeometry(width, height, depth), boxMat);
                        
                        // Jitter within titan volume
                        voxel.position.set(
                            (Math.random() - 0.5) * (width * 0.7),
                            (Math.random() - 0.5) * (height * 0.7),
                            (Math.random() - 0.5) * (depth * 0.7)
                        );
                        segmentGroup.add(voxel);
                    }
                    segmentGroup.position.set(x, y, z);
                    this.container.add(segmentGroup);
                };

                const hScalar = this.isSurgeon ? 1.25 : 1.0; 
                
                // Build the anatomy skeleton in Titan Units
                buildSegment(38, 42, 34, 0, 40, 0);         // Torso
                buildSegment(26, 26, 26, 0, 85 * hScalar, 0); // Head
                buildSegment(14, 75, 14, -38, 45, 0);      // Left Arm
                buildSegment(14, 75, 14, 38, 45, 0);       // Right Arm
                buildSegment(20, 68, 20, -22, -18, 0);     // Left Leg
                buildSegment(20, 68, 20, 22, -18, 0);      // Right Leg

                // COMPRESSION MATRIX APPLICATION
                this.container.scale.set(
                    ENGINE_PROPS.MATRIX_SCALAR, 
                    ENGINE_PROPS.MATRIX_SCALAR, 
                    ENGINE_PROPS.MATRIX_SCALAR
                );

                if (this.isSurgeon) {
                    const ocularLense = new THREE.Mesh(
                        new THREE.BoxGeometry(45, 6, 8), 
                        new THREE.MeshBasicMaterial({ color: 0xff0000, transparent: true, opacity: 0.8 })
                    );
                    ocularLense.position.set(0, 88, 16);
                    this.container.add(ocularLense);
                }
            }

            update(targetPosition) {
                if (this.floor !== SESSION.ward) {
                    this.container.visible = false;
                    return 9999;
                }

                const distance = this.container.position.distanceTo(targetPosition);
                
                // Frustum / Distance Culling
                this.container.visible = distance < ENGINE_PROPS.RENDER_DISTANCE;

                if (distance < 150) {
                    this.container.lookAt(targetPosition.x, this.container.position.y, targetPosition.z);
                    const direction = new THREE.Vector3().subVectors(targetPosition, this.container.position).normalize();
                    direction.y = 0;
                    this.container.position.addScaledVector(direction, this.baseSpeed);
                }
                return distance;
            }
        }

        // --- MODULE 3: UNIVERSE SETUP ---
        function setupCoreUniverse() {
            scene = new THREE.Scene();
            scene.fog = new THREE.FogExp2(0x08090b, ENGINE_PROPS.FOG_CONSTANT);

            camera = new THREE.PerspectiveCamera(ENGINE_PROPS.FOV, window.innerWidth / window.innerHeight, 0.1, 5000);
            clock = new THREE.Clock();

            renderer = new THREE.WebGLRenderer({ antialias: false, powerPreference: "high-performance" });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(Math.min(window.devicePixelRatio, 1.2));
            document.body.appendChild(renderer.domElement);

            // Light Rig
            globalLight = new THREE.AmbientLight(0x557788, 1.5);
            scene.add(globalLight);

            lantern = new THREE.SpotLight(0xfffde0, 700, 250, 0.45, 0.5);
            lantern.position.set(0, 0, 0.1);
            lantern.target.position.set(0, 0, -5);
            camera.add(lantern);
            camera.add(lantern.target);
            scene.add(camera);

            generateWorldInfrastructure();
            populateEntities();
            mountInputDrivers();
            mainEngineLoop();
        }

        // --- MODULE 4: INFRASTRUCTURE (2000 UNIT MAP) ---
        function generateWorldInfrastructure() {
            const wallMaterial = new THREE.MeshLambertMaterial({ color: 0x14181d });
            const floorMaterial = new THREE.MeshLambertMaterial({ color: 0x040406 });

            for (let w = 1; w <= 3; w++) {
                const wardRoot = new THREE.Group();
                wardRoot.position.y = (w - 1) * 45;

                // Floor Plane (Massive Scale)
                const floorGeom = new THREE.PlaneGeometry(ENGINE_PROPS.FLOOR_DIM, ENGINE_PROPS.FLOOR_DIM);
                const floorMesh = new THREE.Mesh(floorGeom, floorMaterial);
                floorMesh.rotation.x = -Math.PI / 2;
                wardRoot.add(floorMesh);

                // Procedural Labyrinth - High Density
                // We generate 400 wall segments across the 2000x2000 plane
                for (let i = 0; i < 400; i++) {
                    const wallHeight = 25;
                    const wallLength = ENGINE_PROPS.UNIT_SPACING;
                    const mesh = new THREE.Mesh(new THREE.BoxGeometry(wallLength, wallHeight, 4), wallMaterial);
                    
                    const randX = (Math.random() * ENGINE_PROPS.FLOOR_DIM) - (ENGINE_PROPS.FLOOR_DIM / 2);
                    const randZ = (Math.random() * ENGINE_PROPS.FLOOR_DIM) - (ENGINE_PROPS.FLOOR_DIM / 2);
                    
                    mesh.position.set(randX, wallHeight/2, randZ);
                    mesh.rotation.y = Math.random() > 0.5 ? 0 : Math.PI / 2;
                    
                    wardRoot.add(mesh);
                    SESSION.registry.walls.push(mesh);
                }

                // The Ward Exit (Portal Pad)
                const exitPad = new THREE.Mesh(
                    new THREE.BoxGeometry(20, 0.6, 20),
                    new THREE.MeshBasicMaterial({ color: 0x00f2ff, transparent: true, opacity: 0.4 })
                );
                exitPad.position.set(900, 0.1, 900);
                wardRoot.add(exitPad);

                scene.add(wardRoot);
            }
        }

        // --- MODULE 5: POPULATION ---
        function populateEntities() {
            // THE SURGEON (The Apex Stalker)
            const surgeon = new AnatomyFabricator(true, 1);
            surgeon.container.position.set(-150, 0.5, -150);
            scene.add(surgeon.container);
            SESSION.registry.entities.push(surgeon);

            // THE MINIONS (Ambient Horrors)
            // 75 Minions distributed across the three floors
            for (let i = 0; i < 75; i++) {
                const targetWard = (i % 3) + 1;
                const minion = new AnatomyFabricator(false, targetWard);
                
                const spawnX = (Math.random() * 1800) - 900;
                const spawnZ = (Math.random() * 1800) - 900;
                const spawnY = (targetWard - 1) * 45 + 0.5;

                minion.container.position.set(spawnX, spawnY, spawnZ);
                scene.add(minion.container);
                SESSION.registry.entities.push(minion);
            }
        }

        // --- MODULE 6: INPUT DRIVERS (FIXED ANCHOR) ---
        function mountInputDrivers() {
            const moveZone = document.getElementById('region-movement');
            const lookZone = document.getElementById('region-vision');
            const ring = document.getElementById('joy-ring');
            const nub = document.getElementById('joy-nub');

            let lastTouchX, lastTouchY;

            // Movement Logic
            moveZone.addEventListener('touchstart', (e) => {
                const touch = e.touches[0];
                SESSION.input.anchor.set(touch.clientX, touch.clientY);
                ring.style.display = 'block';
                ring.style.left = touch.clientX + 'px';
                ring.style.top = touch.clientY + 'px';
            });

            moveZone.addEventListener('touchmove', (e) => {
                e.preventDefault();
                const touch = e.touches[0];
                const deltaX = touch.clientX - SESSION.input.anchor.x;
                const deltaY = touch.clientY - SESSION.input.anchor.y;
                
                const maxLen = 70;
                const distance = Math.min(Math.sqrt(deltaX**2 + deltaY**2), maxLen);
                const angle = Math.atan2(deltaY, deltaX);

                nub.style.transform = `translate(${Math.cos(angle) * distance}px, ${Math.sin(angle) * distance}px)`;
                
                SESSION.input.vector.set(
                    Math.cos(angle) * (distance / maxLen),
                    Math.sin(angle) * (distance / maxLen)
                );
                SESSION.input.isEngaged = distance > 10;
            }, { passive: false });

            moveZone.addEventListener('touchend', () => {
                ring.style.display = 'none';
                SESSION.input.isEngaged = false;
                SESSION.input.vector.set(0, 0);
            });

            // Vision Logic
            lookZone.addEventListener('touchstart', (e) => {
                lastTouchX = e.touches[0].clientX;
                lastTouchY = e.touches[0].clientY;
            });

            lookZone.addEventListener('touchmove', (e) => {
                const touch = e.touches[0];
                const dX = touch.clientX - lastTouchX;
                const dY = touch.clientY - lastTouchY;
                
                SESSION.input.yaw -= dX * ENGINE_PROPS.ROTATION_SENSITIVITY;
                SESSION.input.pitch -= dY * ENGINE_PROPS.ROTATION_SENSITIVITY;
                
                // Limit vertical look to prevent flipping
                SESSION.input.pitch = Math.max(-1.4, Math.min(1.4, SESSION.input.pitch));
                
                lastTouchX = touch.clientX;
                lastTouchY = touch.clientY;
            });
        }

        // --- MODULE 7: THE CORE ENGINE LOOP ---
        function mainEngineLoop() {
            requestAnimationFrame(mainEngineLoop);
            
            if (SESSION.isActive) {
                // Apply Rotations
                camera.rotation.order = "YXZ";
                camera.rotation.y = SESSION.input.yaw;
                camera.rotation.x = SESSION.input.pitch;

                // Handle Locomotion
                if (SESSION.input.isEngaged) {
                    const forwardVec = new THREE.Vector3(0, 0, -1).applyQuaternion(camera.quaternion);
                    const rightVec = new THREE.Vector3(1, 0, 0).applyQuaternion(camera.quaternion);
                    
                    forwardVec.y = 0; rightVec.y = 0;
                    forwardVec.normalize(); rightVec.normalize();

                    const moveDir = new THREE.Vector3()
                        .addScaledVector(forwardVec, -SESSION.input.vector.y)
                        .addScaledVector(rightVec, SESSION.input.vector.x);

                    // Procedural Collision Check
                    const raycaster = new THREE.Raycaster(camera.position, moveDir.clone().normalize(), 0, 3.5);
                    const collisions = raycaster.intersectObjects(SESSION.registry.walls);

                    if (collisions.length === 0) {
                        camera.position.addScaledVector(moveDir, ENGINE_PROPS.MOVE_VELOCITY);
                        
                        // Head-Bob Simulation
                        const bobAmount = 0.08;
                        const bobSpeed = 0.01;
                        camera.position.y = ((SESSION.ward - 1) * 45) + ENGINE_PROPS.CAMERA_EYE_LEVEL + Math.sin(Date.now() * bobSpeed) * bobAmount;
                    }
                    document.getElementById('audio-footsteps').volume = 0.45;
                } else {
                    document.getElementById('audio-footsteps').volume = 0;
                }

                // Stalker Processing
                let closestThreat = 5000;
                SESSION.registry.entities.forEach(entity => {
                    const d = entity.update(camera.position);
                    if (entity.floor === SESSION.ward && d < closestThreat) {
                        closestThreat = d;
                    }
                    
                    // Surgeon Specific Audio Attenuation
                    if (entity.isSurgeon && entity.floor === SESSION.ward && d < 60) {
                        document.getElementById('audio-breathing').volume = 1.0 - (d / 60);
                    }
                });

                // Update Telemetry UI
                const threatLabel = document.getElementById('threat-status');
                if (closestThreat < 25) {
                    threatLabel.innerText = "CRITICAL";
                    threatLabel.style.color = "var(--alert-red)";
                } else if (closestThreat < 70) {
                    threatLabel.innerText = "ELEVATED";
                    threatLabel.style.color = "orange";
                } else {
                    threatLabel.innerText = "STABLE";
                    threatLabel.style.color = "var(--neon-teal)";
                }

                // Ward Transition Detection (Elevator logic)
                const exitCoord = new THREE.Vector3(900, (SESSION.ward - 1) * 45, 900);
                if (camera.position.distanceTo(exitCoord) < 15 && SESSION.ward < 3) {
                    SESSION.ward++;
                    camera.position.set(0, (SESSION.ward - 1) * 45 + ENGINE_PROPS.CAMERA_EYE_LEVEL, 0);
                    document.getElementById('ward-val').innerText = "0" + SESSION.ward;
                    showWardAnnouncement();
                }
            }

            renderer.render(scene, camera);
        }

        // --- MODULE 8: UTILITIES ---
        function showWardAnnouncement() {
            const announcer = document.getElementById('ward-indicator');
            announcer.innerText = "WARD 0" + SESSION.ward;
            announcer.style.opacity = "1";
            announcer.style.transform = "scale(1)";
            
            setTimeout(() => {
                announcer.style.opacity = "0";
                announcer.style.transform = "scale(0.7)";
            }, 4000);
        }

        const handleGlobalTrigger = () => {
            if (SESSION.isReady && !SESSION.isActive) {
                SESSION.isActive = true;
                document.getElementById('os-layer').style.opacity = '0';
                
                setTimeout(() => {
                    document.getElementById('os-layer').style.display = 'none';
                    const hud = document.getElementById('hud-container');
                    hud.style.display = 'block';
                    setTimeout(() => { hud.style.opacity = '1'; }, 100);
                    showWardAnnouncement();
                }, 2000);

                // Audio Context Start
                const amb = document.getElementById('audio-ambience');
                const stp = document.getElementById('audio-footsteps');
                const brt = document.getElementById('audio-breathing');
                
                amb.volume = 0.5; stp.volume = 0; brt.volume = 0;
                [amb, stp, brt].forEach(track => {
                    track.play().catch(e => console.log("Audio Blocked"));
                });
            }
        };

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        // INITIATE ENGINE
        window.ontouchstart = handleGlobalTrigger;
        window.onmousedown = handleGlobalTrigger;
        window.onload = initializeBootSequence;

    </script>
</body>
</html>
