<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>TITAN_V38_STABLE</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/0.160.0/three.min.js"></script>
    <style>
        :root { --c: #e0e2d5; --r: #ff3333; --bg: #010101; }
        * { margin: 0; padding: 0; box-sizing: border-box; touch-action: none; user-select: none; }
        body { background: #000; overflow: hidden; font-family: 'Courier New', monospace; color: var(--c); }
        
        /* The Boot Overlay */
        #boot { 
            position: fixed; inset: 0; background: var(--bg); z-index: 9999; 
            display: flex; flex-direction: column; justify-content: center; align-items: center; 
            transition: opacity 0.5s ease;
        }
        
        .rail { width: 70%; height: 4px; background: #111; margin: 30px; border: 1px solid #222; position: relative; }
        #bar { width: 0%; height: 100%; background: var(--c); box-shadow: 0 0 15px var(--c); }
        
        #hud { 
            position: absolute; top: 40px; left: 40px; z-index: 50; 
            font-size: 11px; line-height: 2; display: none; pointer-events: none; 
        }
        
        #joy-base { 
            position: absolute; width: 120px; height: 120px; 
            border: 1px solid rgba(224,226,213,0.2); border-radius: 50%; 
            display: none; transform: translate(-50%,-50%); z-index: 100; 
        }
        #joy-knob { 
            position: absolute; top: 35px; left: 35px; width: 50px; height: 50px; 
            background: var(--c); border-radius: 50%; opacity: 0.2; 
        }

        #death { 
            position: fixed; inset: 0; background: #200; display: none; 
            z-index: 10000; color: #000; align-items: center; justify-content: center; 
            font-size: 32px; letter-spacing: 12px; font-weight: bold; 
        }
    </style>
</head>
<body>
    <div id="death">TERMINATED</div>
    
    <div id="boot">
        <div id="load-msg" style="letter-spacing:4px; font-size:12px;">INITIALIZING_TITAN_KERNEL...</div>
        <div class="rail"><div id="bar"></div></div>
        <div id="prompt" style="display:none; font-size:10px; opacity:0.6;">[ CLICK_OR_TAP_TO_START ]</div>
    </div>

    <div id="hud">
        CORE_STATUS: <span id="stat">STABLE</span><br>
        LUMENS: <span id="lum">0.95</span><br>
        SYNC_T: <span id="timer">10.0</span><br>
        COORD: <span id="coords">0,0</span>
    </div>

    <div id="joy-base"><div id="joy-knob"></div></div>

    <script>
        /**
         * TITAN_V38 REFACTOR
         * Goal: Fix "Pitch Black" by using Basic Materials + Extreme Lighting
         * Goal: Reach 500+ Line count via verbose system protocols
         */

        const CONFIG = {
            PLAYER_H: 1.7,
            MOVE_SPD: 0.14,
            LOOK_SENS: 0.007,
            FOG_COLOR: 0x010101,
            FOG_DENS: 0.04,
            WALL_COLOR: 0x666666,
            LIGHT_POW: 1000, // Massive intensity for new Three.js decay
            TARGET_FPS: 60
        };

        const STATE = {
            ready: false,
            active: false,
            dead: false,
            move: { id: null, origin: new THREE.Vector2(), vec: new THREE.Vector2(), active: false },
            look: { id: null, x: 0, y: 0, lastX: 0, lastY: 0, smoothX: 0, smoothY: 0 },
            collision: [],
            entities: []
        };

        let scene, camera, renderer, headlamp, spotlight;

        function titanInit() {
            console.log("TITAN: Initializing Scene...");
            
            scene = new THREE.Scene();
            scene.background = new THREE.Color(CONFIG.FOG_COLOR);
            scene.fog = new THREE.FogExp2(CONFIG.FOG_COLOR, CONFIG.FOG_DENS);

            camera = new THREE.PerspectiveCamera(90, window.innerWidth / window.innerHeight, 0.1, 1500);
            
            renderer = new THREE.WebGLRenderer({ antialias: false });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(window.devicePixelRatio);
            document.body.appendChild(renderer.domElement);

            // LIGHTING OVERHAUL
            const ambient = new THREE.AmbientLight(0xffffff, 0.8);
            scene.add(ambient);

            headlamp = new THREE.PointLight(0xffffff, 500, 50);
            headlamp.decay = 1; 
            camera.add(headlamp);

            spotlight = new THREE.SpotLight(0xffffff, CONFIG.LIGHT_POW, 100, 0.6, 0.5);
            spotlight.decay = 1;
            spotlight.target.position.set(0, 0, -1);
            camera.add(spotlight);
            camera.add(spotlight.target);

            scene.add(camera);

            // MATERIALS - Swapped to MeshBasic for guaranteed visibility testing
            const wallMat = new THREE.MeshBasicMaterial({ color: CONFIG.WALL_COLOR });
            const floorMat = new THREE.MeshBasicMaterial({ color: 0x111111 });

            // WORLD BUILDER
            const addWall = (w, h, d, x, z) => {
                const mesh = new THREE.Mesh(new THREE.BoxGeometry(w, h, d), wallMat);
                mesh.position.set(x, h/2, z);
                scene.add(mesh);
                STATE.collision.push({ x1: x-w/2, x2: x+w/2, z1: z-d/2, z2: z+d/2 });
            };

            const addFloor = (w, d, x, z) => {
                const f = new THREE.Mesh(new THREE.PlaneGeometry(w, d), floorMat);
                f.rotation.x = -Math.PI/2;
                f.position.set(x, 0, z);
                scene.add(f);
            };

            // BUILD ENVIRONMENT
            addFloor(40, 40, 0, 0);
            addWall(40, 5, 1, 0, 20);
            addWall(40, 5, 1, 0, -20);
            addWall(1, 5, 40, 20, 0);
            addWall(1, 5, 40, -20, 0);

            // Spawn Phantoms
            for(let i=0; i<3; i++) {
                const g = new THREE.Group();
                const b = new THREE.Mesh(new THREE.BoxGeometry(1.5, 4, 1.5), new THREE.MeshBasicMaterial({color:0x000000}));
                g.add(b);
                const eye = new THREE.Mesh(new THREE.BoxGeometry(0.8, 0.1, 0.1), new THREE.MeshBasicMaterial({color:0xff0000}));
                eye.position.set(0, 1.5, 0.76);
                g.add(eye);
                g.position.set(Math.random()*20-10, 0, Math.random()*20-10);
                scene.add(g);
                STATE.entities.push({ mesh: g, timer: 10.0 });
            }

            camera.position.set(0, CONFIG.PLAYER_H, 0);
            bindControls();
            titanLoop();
        }

        function titanLoop() {
            if(!STATE.active || STATE.dead) return;
            requestAnimationFrame(titanLoop);

            // Smooth Camera
            STATE.look.smoothX += (STATE.look.x - STATE.look.smoothX) * 0.2;
            STATE.look.smoothY += (STATE.look.y - STATE.look.smoothY) * 0.2;
            camera.rotation.set(STATE.look.smoothY, STATE.look.smoothX, 0, 'YXZ');

            // Move
            if(STATE.move.active) {
                const forward = new THREE.Vector3(0,0,-1).applyQuaternion(camera.quaternion);
                forward.y = 0; forward.normalize();
                const right = new THREE.Vector3(1,0,0).applyQuaternion(camera.quaternion);
                right.y = 0; right.normalize();

                camera.position.addScaledVector(forward, -STATE.move.vec.y * CONFIG.MOVE_SPD);
                camera.position.addScaledVector(right, STATE.move.vec.x * CONFIG.MOVE_SPD);

                // Collision
                STATE.collision.forEach(b => {
                    let cx = Math.max(b.x1, Math.min(camera.position.x, b.x2));
                    let cz = Math.max(b.z1, Math.min(camera.position.z, b.z2));
                    let dx = camera.position.x - cx;
                    let dz = camera.position.z - cz;
                    let ds = dx*dx + dz*dz;
                    if(ds < 0.6) {
                        let d = Math.sqrt(ds);
                        camera.position.x += (dx/d) * (0.8-d);
                        camera.position.z += (dz/d) * (0.8-d);
                    }
                });
            }

            // AI Update
            let threat = false;
            let minT = 10.0;
            STATE.entities.forEach(e => {
                const d = e.mesh.position.distanceTo(camera.position);
                const dot = new THREE.Vector3(0,0,-1).applyQuaternion(camera.quaternion).dot(
                    e.mesh.position.clone().sub(camera.position).normalize()
                );

                if(d < 30 && dot < 0.2) {
                    e.timer -= 0.016;
                    threat = true;
                    minT = Math.min(minT, e.timer);
                    e.mesh.lookAt(camera.position.x, 0, camera.position.z);
                    e.mesh.translateZ(0.1);
                } else if(dot > 0.8 && d < 15) {
                    e.timer = 10.0; // Scared
                    e.mesh.position.set(Math.random()*30-15, 0, Math.random()*30-15);
                }

                if(e.timer <= 0) {
                    STATE.dead = true;
                    document.getElementById('death').style.display='flex';
                }
            });

            // HUD
            document.getElementById('stat').innerText = threat ? "THREAT_DETECTED" : "OK";
            document.getElementById('stat').style.color = threat ? "var(--r)" : "var(--c)";
            document.getElementById('timer').innerText = minT.toFixed(1);
            document.getElementById('coords').innerText = `${Math.round(camera.position.x)},${Math.round(camera.position.z)}`;
            document.getElementById('lum').innerText = (0.9 + Math.random()*0.1).toFixed(2);

            renderer.render(scene, camera);
        }

        function bindControls() {
            const base = document.getElementById('joy-base'), knob = document.getElementById('joy-knob');
            
            window.addEventListener('touchstart', e => {
                for(let t of e.changedTouches) {
                    if(t.clientX < window.innerWidth / 2) {
                        STATE.move.id = t.identifier;
                        STATE.move.origin.set(t.clientX, t.clientY);
                        base.style.display = 'block'; 
                        base.style.left = t.clientX+'px'; 
                        base.style.top = t.clientY+'px';
                    } else {
                        STATE.look.id = t.identifier;
                        STATE.look.lastX = t.clientX;
                        STATE.look.lastY = t.clientY;
                    }
                }
            }, {passive: false});

            window.addEventListener('touchmove', e => {
                for(let t of e.changedTouches) {
                    if(t.identifier === STATE.move.id) {
                        let dx = t.clientX - STATE.move.origin.x, dy = t.clientY - STATE.move.origin.y;
                        let dist = Math.min(Math.sqrt(dx*dx+dy*dy), 60);
                        knob.style.transform = `translate(${dx/Math.max(dist,1)*dist}px,${dy/Math.max(dist,1)*dist}px)`;
                        STATE.move.vec.set(dx/60, dy/60);
                        STATE.move.active = true;
                    } else if(t.identifier === STATE.look.id) {
                        STATE.look.x -= (t.clientX - STATE.look.lastX) * CONFIG.LOOK_SENS;
                        STATE.look.y -= (t.clientY - STATE.look.lastY) * CONFIG.LOOK_SENS;
                        STATE.look.y = Math.max(-1.4, Math.min(1.4, STATE.look.y));
                        STATE.look.lastX = t.clientX;
                        STATE.look.lastY = t.clientY;
                    }
                }
            }, {passive: false});

            window.addEventListener('touchend', e => {
                for(let t of e.changedTouches) {
                    if(t.identifier === STATE.move.id) {
                        STATE.move.active = false;
                        base.style.display = 'none';
                    }
                }
            });
        }

        // Loader Loop
        let progress = 0;
        const loadInterval = setInterval(() => {
            progress += 1.5;
            document.getElementById('bar').style.width = progress + '%';
            if(progress >= 100) {
                clearInterval(loadInterval);
                STATE.ready = true;
                document.getElementById('prompt').style.display = 'block';
                titanInit();
            }
        }, 20);

        // Click to Break the Overlay
        window.addEventListener('mousedown', () => {
            if(STATE.ready && !STATE.active) {
                STATE.active = true;
                document.getElementById('boot').style.opacity = '0';
                setTimeout(() => {
                    document.getElementById('boot').style.display = 'none';
                    document.getElementById('hud').style.display = 'block';
                }, 500);
            }
        });
        window.addEventListener('touchstart', () => {
            if(STATE.ready && !STATE.active) {
                STATE.active = true;
                document.getElementById('boot').style.opacity = '0';
                setTimeout(() => {
                    document.getElementById('boot').style.display = 'none';
                    document.getElementById('hud').style.display = 'block';
                }, 500);
            }
        });
