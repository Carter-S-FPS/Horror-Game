<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ASYLUM_LOCKED_LIGHT_V49</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/0.160.0/three.min.js"></script>
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background: #000; }
        #boot { 
            position: fixed; inset: 0; z-index: 100; background: #0a0a0a; 
            display: flex; flex-direction: column; justify-content: center; align-items: center; 
            color: #dbd2ae; font-family: serif;
        }
        .btn { border: 1px solid #444; padding: 15px 40px; cursor: pointer; display: none; color: #dbd2ae; margin-top: 20px; }
    </style>
</head>
<body>
    <div id="boot">
        <div id="status">Locking Light Source...</div>
        <div id="btn" class="btn">ENTER</div>
    </div>

    <script>
        let scene, camera, renderer, active = false, flashlight;
        let mv = { f: 0, s: 0, active: false, id: null };
        let rot = { x: 0, y: 0, lx: 0, ly: 0, id: null };
        
        const walls = []; 
        const PLAYER_RADIUS = 0.5;

        function init() {
            scene = new THREE.Scene();
            scene.fog = new THREE.Fog(0x000000, 0, 12);

            camera = new THREE.PerspectiveCamera(70, window.innerWidth/window.innerHeight, 0.1, 100);
            
            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            document.body.appendChild(renderer.domElement);

            // FIXED FLASHLIGHT
            flashlight = new THREE.SpotLight(0xfff5d4, 50, 25, Math.PI/7, 0.5, 2);
            scene.add(flashlight);
            scene.add(flashlight.target);

            const wallMat = new THREE.MeshStandardMaterial({ color: 0xdbd2ae, roughness: 1 });
            const floorMat = new THREE.MeshStandardMaterial({ color: 0x151515, roughness: 0.1, metalness: 0.2 }); 
            const ceilMat = new THREE.MeshStandardMaterial({ color: 0x777777, roughness: 1 });

            const h = 3.2; 
            const hw = 4; // Hallway width
            const sz = 40; // Total Size

            const buildWall = (x, z, w, d) => {
                const mesh = new THREE.Mesh(new THREE.BoxGeometry(w, h, d), wallMat);
                mesh.position.set(x, h/2, z);
                scene.add(mesh);
                walls.push(new THREE.Box3().setFromObject(mesh));
            };

            // 1. OUTER BOX (Boundary)
            buildWall(0, 20, 40.5, 0.5);  // N
            buildWall(0, -20, 40.5, 0.5); // S
            buildWall(20, 0, 0.5, 40.5);  // E
            buildWall(-20, 0, 0.5, 40.5); // W

            // 2. THE INNER BLOCKS (Creating the loop)
            const bSz = 16; // Block size
            const bOff = 10; // Offset from center
            buildWall(bOff, bOff, bSz, bSz);   // NE Block
            buildWall(-bOff, bOff, bSz, bSz);  // NW Block
            buildWall(bOff, -bOff, bSz, bSz);  // SE Block
            buildWall(-bOff, -bOff, bSz, bSz); // SW Block

            // Floor & Ceiling
            const pGeo = new THREE.PlaneGeometry(60, 60);
            const floor = new THREE.Mesh(pGeo, floorMat);
            floor.rotation.x = -Math.PI/2;
            scene.add(floor);

            const ceiling = new THREE.Mesh(pGeo, ceilMat);
            ceiling.rotation.x = Math.PI/2;
            ceiling.position.y = h;
            scene.add(ceiling);

            camera.position.set(0, 1.7, 0);

            // Controls
            window.addEventListener('touchstart', (e) => {
                for(let t of e.changedTouches) {
                    if(t.clientX < window.innerWidth/2) {
                        mv.active = true; mv.id = t.identifier;
                        mv.ox = t.clientX; mv.oy = t.clientY;
                    } else {
                        rot.id = t.identifier;
                        rot.lx = t.clientX; rot.ly = t.clientY;
                    }
                }
            });

            window.addEventListener('touchmove', (e) => {
                e.preventDefault();
                for(let t of e.changedTouches) {
                    if(t.identifier === mv.id) {
                        mv.s = (t.clientX - mv.ox) / 60;
                        mv.f = (t.clientY - mv.oy) / 60;
                    } else if(t.identifier === rot.id) {
                        rot.x -= (t.clientX - rot.lx) * 0.006;
                        rot.y -= (t.clientY - rot.ly) * 0.006;
                        rot.y = Math.max(-1.3, Math.min(1.3, rot.y));
                        rot.lx = t.clientX; rot.ly = t.clientY;
                    }
                }
            }, {passive: false});

            window.addEventListener('touchend', (e) => {
                for(let t of e.changedTouches) {
                    if(t.identifier === mv.id) { mv.active = false; mv.f = 0; mv.s = 0; }
                    if(t.identifier === rot.id) rot.id = null;
                }
            });

            loop();
        }

        function checkCollision(newPos) {
            const playerBox = new THREE.Box3().setFromCenterAndSize(
                newPos, 
                new THREE.Vector3(PLAYER_RADIUS, 2, PLAYER_RADIUS)
            );
            for(let wall of walls) {
                if(playerBox.intersectsBox(wall)) return true;
            }
            return false;
        }

        function loop() {
            requestAnimationFrame(loop);
            if(!active) return;

            camera.rotation.set(rot.y, rot.x, 0, 'YXZ');
            
            // FLASHLIGHT LOCKED TO VIEW (Instant update)
            flashlight.position.copy(camera.position);
            const targetVec = new THREE.Vector3(0, 0, -1).applyQuaternion(camera.quaternion);
            flashlight.target.position.copy(camera.position).add(targetVec);

            if(mv.active) {
                const dir = new THREE.Vector3(0,0,-1).applyQuaternion(camera.quaternion);
                dir.y = 0; dir.normalize();
                const side = new THREE.Vector3(1,0,0).applyQuaternion(camera.quaternion);
                side.y = 0; side.normalize();

                const nextPos = camera.position.clone();
                nextPos.addScaledVector(dir, -mv.f * 0.12);
                nextPos.addScaledVector(side, mv.s * 0.12);

                if(!checkCollision(nextPos)) {
                    camera.position.copy(nextPos);
                }
            }
            renderer.render(scene, camera);
        }

        setTimeout(() => {
            document.getElementById('btn').style.display = "block";
            init();
        }, 500);

        document.getElementById('btn').onclick = () => {
            active = true;
            document.getElementById('boot').style.display = 'none';
        };
    </script>
</body>
</html>
