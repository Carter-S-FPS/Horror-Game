<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ASYLUM_STALKER_V53</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/0.160.0/three.min.js"></script>
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background: #000; }
        #blink { position: fixed; inset: 0; background: #000; z-index: 50; opacity: 0; pointer-events: none; }
        #boot { 
            position: fixed; inset: 0; z-index: 100; background: #0a0a0a; 
            display: flex; flex-direction: column; justify-content: center; align-items: center; 
            color: #dbd2ae; font-family: serif;
        }
        .btn { border: 1px solid #444; padding: 15px 40px; cursor: pointer; display: none; color: #dbd2ae; margin-top: 20px; }
        #msg { position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); color: red; font-family: serif; font-size: 30px; display: none; z-index: 200; }
    </style>
</head>
<body>
    <div id="blink"></div>
    <div id="msg">YOU DIDN'T LOOK</div>
    <div id="boot">
        <div id="status">UNLEASHING_ENTITY...</div>
        <div id="btn" class="btn">PROCEED</div>
    </div>

    <script>
        let scene, camera, renderer, active = false, flashlight;
        let mv = { f: 0, s: 0, active: false, id: null };
        let rot = { x: 0, y: 0, lx: 0, ly: 0, id: null };
        let walkCycle = 0, isDead = false;
        
        // Stalker Variables
        let stalker, stalkerState = 'WANDER', huntTimer = 0, stalkerTarget = new THREE.Vector3();
        const HUNT_DURATION = 10; 

        const walls = []; 
        const PLAYER_RADIUS = 0.5;
        const EYE_LEVEL = 1.6;

        function init() {
            scene = new THREE.Scene();
            scene.fog = new THREE.Fog(0x000000, 0, 12);
            camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 100);
            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            document.body.appendChild(renderer.domElement);

            flashlight = new THREE.SpotLight(0xfff5d4, 60, 25, Math.PI/7, 0.5, 2);
            scene.add(flashlight);
            scene.add(flashlight.target);

            const wallMat = new THREE.MeshStandardMaterial({ color: 0xdbd2ae });
            const floorMat = new THREE.MeshStandardMaterial({ color: 0x111111, roughness: 0.2 });
            
            // Build Map
            const buildWall = (x, z, w, d) => {
                const m = new THREE.Mesh(new THREE.BoxGeometry(w, 3.2, d), wallMat);
                m.position.set(x, 1.6, z);
                scene.add(m);
                walls.push(new THREE.Box3().setFromObject(m));
            };
            buildWall(0, 22, 44.5, 0.5); buildWall(0, -22, 44.5, 0.5);
            buildWall(22, 0, 0.5, 44.5); buildWall(-22, 0, 0.5, 44.5);
            const offset = 10; const bSz = 16;
            buildWall(offset, offset, bSz, bSz); buildWall(-offset, offset, bSz, bSz);
            buildWall(offset, -offset, bSz, bSz); buildWall(-offset, -offset, bSz, bSz);

            const pGeo = new THREE.PlaneGeometry(60, 60);
            const floor = new THREE.Mesh(pGeo, floorMat);
            floor.rotation.x = -Math.PI/2;
            scene.add(floor);

            // THE STALKER
            const stalkerGeo = new THREE.CapsuleGeometry(0.4, 1.8, 4, 8);
            const stalkerMat = new THREE.MeshBasicMaterial({ color: 0x050505 });
            stalker = new THREE.Mesh(stalkerGeo, stalkerMat);
            stalker.position.set(18, 1.3, 0);
            scene.add(stalker);

            camera.position.set(0, EYE_LEVEL, 18);
            loop();
        }

        function checkCollision(newPos) {
            const playerBox = new THREE.Box3().setFromCenterAndSize(newPos, new THREE.Vector3(PLAYER_RADIUS, 1, PLAYER_RADIUS));
            for(let wall of walls) if(playerBox.intersectsBox(wall)) return true;
            return false;
        }

        function loop() {
            if(isDead) return;
            requestAnimationFrame(loop);
            if(!active) return;

            camera.rotation.set(rot.y, rot.x, 0, 'YXZ');
            
            // Player Movement
            if(mv.active) {
                const dir = new THREE.Vector3(0,0,-1).applyQuaternion(camera.quaternion);
                dir.y = 0; dir.normalize();
                const side = new THREE.Vector3(1,0,0).applyQuaternion(camera.quaternion);
                side.y = 0; side.normalize();
                const nextPos = camera.position.clone().addScaledVector(dir, -mv.f * 0.06).addScaledVector(side, mv.s * 0.06);
                if(!checkCollision(nextPos)) {
                    camera.position.copy(nextPos);
                    walkCycle += 0.08;
                    camera.position.y = EYE_LEVEL + Math.sin(walkCycle) * 0.02;
                }
            }

            // STALKER AI
            const dist = camera.position.distanceTo(stalker.position);
            const toPlayer = new THREE.Vector3().subVectors(camera.position, stalker.position).normalize();
            
            // Check if player is looking at stalker
            const camDir = new THREE.Vector3(0,0,-1).applyQuaternion(camera.quaternion);
            const angle = camDir.angleTo(toPlayer.clone().negate());
            const isLooking = angle < 0.4; // Field of view check

            if(stalkerState === 'WANDER') {
                document.getElementById('blink').style.opacity = 0;
                // Move towards a random point or just drift
                stalker.position.x += Math.sin(Date.now()*0.001) * 0.02;
                if(dist < 10) stalkerState = 'HUNT';
            } 
            else if(stalkerState === 'HUNT') {
                huntTimer += 0.016; 
                // Fast Blinking effect
                document.getElementById('blink').style.opacity = (Math.sin(Date.now()*0.02) > 0) ? 0.8 : 0;
                
                stalker.position.addScaledVector(toPlayer, 0.03); // Follows you slowly

                if(isLooking) {
                    stalkerState = 'WANDER';
                    huntTimer = 0;
                }

                if(huntTimer >= HUNT_DURATION) {
                    isDead = true;
                    document.getElementById('msg').style.display = 'block';
                    stalker.position.copy(camera.position).addScaledVector(camDir, 0.5);
                }
            }

            flashlight.position.copy(camera.position);
            flashlight.target.position.copy(camera.position).add(new THREE.Vector3(0,0,-1).applyQuaternion(camera.quaternion));
            renderer.render(scene, camera);
        }

        // Standard inputs
        window.addEventListener('touchstart', (e) => {
            for(let t of e.changedTouches) {
                if(t.clientX < window.innerWidth/2) { mv.active = true; mv.id = t.identifier; mv.ox = t.clientX; mv.oy = t.clientY; }
                else { rot.id = t.identifier; rot.lx = t.clientX; rot.ly = t.clientY; }
            }
        });
        window.addEventListener('touchmove', (e) => {
            e.preventDefault();
            for(let t of e.changedTouches) {
                if(t.identifier === mv.id) { mv.s = (t.clientX - mv.ox)/60; mv.f = (t.clientY - mv.oy)/60; }
                else if(t.identifier === rot.id) { rot.x -= (t.clientX - rot.lx)*0.005; rot.y -= (t.clientY - rot.ly)*0.005; rot.y = Math.max(-1.3,1.3,rot.y); rot.lx = t.clientX; rot.ly = t.clientY; }
            }
        }, {passive: false});
        window.addEventListener('touchend', (e) => {
            for(let t of e.changedTouches) { if(t.identifier === mv.id){mv.active=false;mv.f=0;mv.s=0;} if(t.identifier === rot.id)rot.id=null; }
        });

        setTimeout(() => { document.getElementById('btn').style.display = "block"; init(); }, 500);
        document.getElementById('btn').onclick = () => { active = true; document.getElementById('boot').style.display = 'none'; };
    </script>
</body>
</html>
