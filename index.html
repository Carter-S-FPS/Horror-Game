<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>BLACKWOOD: THE TRI-LEVEL ABOMINATION</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/0.160.0/three.min.js"></script>
    <style>
        :root { 
            --terminal-cyan: #00f2ff;
            --warning-red: #ff3300;
            --interface-bg: rgba(0, 5, 10, 0.9);
        }
        * { margin: 0; padding: 0; box-sizing: border-box; touch-action: none; user-select: none; }
        body, html { width: 100%; height: 100%; background: #000; overflow: hidden; font-family: 'Courier New', monospace; }

        /* --- PRE-FLIGHT INTERFACE --- */
        #boot-seq {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle, #050505 0%, #000 100%);
            display: flex; justify-content: center; align-items: center;
            z-index: 10000; transition: opacity 1.5s;
        }
        .console-box { 
            width: 90%; max-width: 500px; border: 1px solid #111; 
            background: #020202; padding: 30px; box-shadow: 0 0 50px rgba(0,0,0,1);
        }
        .header { color: var(--terminal-cyan); font-size: 1rem; font-weight: 900; letter-spacing: 5px; margin-bottom: 25px; }
        #load-bar-rail { width: 100%; height: 2px; background: #111; margin-bottom: 15px; position: relative; }
        #load-bar-fill { width: 0%; height: 100%; background: var(--terminal-cyan); box-shadow: 0 0 15px var(--terminal-cyan); }
        #log-stream { height: 100px; overflow: hidden; font-size: 0.6rem; color: #444; line-height: 1.5; text-align: left; }

        /* --- PRIMARY HUD --- */
        #hud { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; display: none; z-index: 100; }
        #vignette { position: absolute; width: 100%; height: 100%; background: radial-gradient(circle, transparent 25%, rgba(0,0,0,1) 100%); }
        #reticle { position: absolute; top: 50%; left: 50%; width: 20px; height: 20px; border: 1px solid rgba(0,242,255,0.2); transform: translate(-50%, -50%); border-radius: 50%; }

        #left-control { position: absolute; left: 0; top: 0; width: 50%; height: 100%; pointer-events: auto; }
        #right-control { position: absolute; right: 0; top: 0; width: 50%; height: 100%; pointer-events: auto; }

        #joy-base { position: absolute; bottom: 70px; left: 70px; width: 130px; height: 130px; border: 1px solid rgba(255,255,255,0.05); border-radius: 50%; }
        #joy-stick { position: absolute; top: 40px; left: 40px; width: 50px; height: 50px; background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.5); border-radius: 50%; }

        #status-panel { position: absolute; top: 30px; left: 30px; color: var(--terminal-cyan); font-size: 0.65rem; line-height: 1.8; }
        #floor-tag { position: absolute; bottom: 30px; right: 30px; color: #fff; font-size: 1.2rem; letter-spacing: 5px; opacity: 0.4; }
        
        #scanline { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: linear-gradient(to bottom, transparent 50%, rgba(0,0,0,0.1) 50%); background-size: 100% 4px; pointer-events: none; z-index: 60; }
    </style>
</head>
<body>

    <div id="scanline"></div>
    <div id="boot-seq">
        <div class="console-box">
            <div class="header">SYSTEM_RECOVERY_MODE</div>
            <div id="load-bar-rail"><div id="load-bar-fill"></div></div>
            <div id="log-stream"></div>
        </div>
    </div>

    <div id="hud">
        <div id="vignette"></div>
        <div id="reticle"></div>
        <div id="status-panel">
            UNIT_ID: GA-109<br>
            PULSE: <span id="pulse-val">72</span> BPM<br>
            THREAT: <span id="threat-lvl" style="color:var(--terminal-cyan)">NONE</span><br>
            FLOOR_LVL: <span id="floor-val">01</span><br>
            STAIRS_FOUND: <span id="stair-val">FALSE</span>
        </div>
        <div id="floor-tag">WARD_01</div>
        <div id="left-control"><div id="joy-base"><div id="joy-stick"></div></div></div>
        <div id="right-control"></div>
    </div>

    <audio id="amb" loop><source src="mixkit-horror-ambience-2482.wav" type="audio/wav"></audio>
    <audio id="step" loop><source src="mixkit-footsteps-in-a-tunnel-loop-543.wav" type="audio/wav"></audio>
    <audio id="breath" loop><source src="mixkit-creepy-demon-heavy-breathing-2240.wav" type="audio/wav"></audio>

    <script>
        /**
         * BLACKWOOD CORE ENGINE v16.0
         * Target: 750+ Lines of High-Fidelity Procedural Maze Logic
         */

        const APP = {
            ready: false, playing: false,
            floor: 1, size: 14, dim: 16,
            height: 1.7, speed: 0.09, rot: 0.0035,
            ents: [], obstacles: [],
            input: { mv: new THREE.Vector2(), yaw: 0, pitch: 0, active: false }
        };

        let scene, camera, renderer, clock, torch, ambLight, sky;
        let audio = {};

        // --- 1. BOOT PIPELINE (Explicit Logging) ---
        function initiateBoot() {
            const bar = document.getElementById('load-bar-fill');
            const log = document.getElementById('log-stream');
            const tasks = [
                "Allocating physical buffer for 40x40x40 entities...",
                "Initializing Recursive Backtracker for Level 1...",
                "Mapping navigation nodes for Level 2...",
                "Synthesizing block-based limb geometry...",
                "Injecting 'Surgeon' chase algorithms...",
                "Enabling high-visibility optics (+70%)...",
                "Establishing neural link with GA-109...",
                "Initialization Successful."
            ];

            let p = 0;
            const step = () => {
                p += Math.random() * 1.5;
                if (p >= 100) {
                    p = 100;
                    APP.ready = true;
                    log.innerHTML = "<span style='color:#fff; font-weight:bold'>[SYSTEM] PRESS TO ENGAGE</span><br>" + log.innerHTML;
                    constructWorld();
                } else {
                    bar.style.width = p + "%";
                    if (Math.floor(p) % 12 === 0) {
                        const msg = tasks[Math.floor(p/12)];
                        log.innerHTML = `> ${msg}<br>${log.innerHTML}`;
                    }
                    requestAnimationFrame(step);
                }
            };
            step();
        }

        const start = () => {
            if (!APP.ready || APP.playing) return;
            APP.playing = true;
            document.getElementById('boot-seq').style.opacity = '0';
            setTimeout(() => document.getElementById('boot-seq').style.display = 'none', 1500);
            document.getElementById('hud').style.display = 'block';

            audio.amb = document.getElementById('amb');
            audio.step = document.getElementById('step');
            audio.breath = document.getElementById('breath');
            audio.amb.volume = 0.3; audio.step.volume = 0; audio.breath.volume = 0;
            [audio.amb, audio.step, audio.breath].forEach(s => s.play().catch(()=>{}));
        };

        window.addEventListener('mousedown', start);
        window.addEventListener('touchstart', start);
        window.onload = initiateBoot;

        // --- 2. THE CHUNKY ENTITY FACTORY (40x40x40 Geometry) ---
        function createBlockEntity(color, isSurgeon) {
            const ent = new THREE.Group();
            const mat = new THREE.MeshLambertMaterial({ color: color });
            const s = 4.0; // Scaled to represent the massive 40-unit block aesthetic

            // Torso (Composed of sub-blocks for detail)
            const torso = new THREE.Mesh(new THREE.BoxGeometry(s, s, s), mat);
            torso.position.y = s;
            ent.add(torso);

            // Head (Chunky Block)
            const head = new THREE.Mesh(new THREE.BoxGeometry(s * 0.9, s * 0.9, s * 0.9), mat);
            head.position.y = s * 2;
            ent.add(head);

            // Left Arm
            const lArm = new THREE.Mesh(new THREE.BoxGeometry(s * 0.8, s * 0.8, s * 0.8), mat);
            lArm.position.set(-s, s, 0);
            ent.add(lArm);

            // Right Arm
            const rArm = new THREE.Mesh(new THREE.BoxGeometry(s * 0.8, s * 0.8, s * 0.8), mat);
            rArm.position.set(s, s, 0);
            ent.add(rArm);

            // Left Leg
            const lLeg = new THREE.Mesh(new THREE.BoxGeometry(s * 0.7, s * 0.7, s * 0.7), mat);
            lLeg.position.set(-s/2, 0, 0);
            ent.add(lLeg);

            // Right Leg
            const rLeg = new THREE.Mesh(new THREE.BoxGeometry(s * 0.7, s * 0.7, s * 0.7), mat);
            rLeg.position.set(s/2, 0, 0);
            ent.add(rLeg);

            // Surgeon specific detail: Glowing Red eyes
            if (isSurgeon) {
                const eyeMat = new THREE.MeshBasicMaterial({ color: 0xff0000 });
                const eyeL = new THREE.Mesh(new THREE.BoxGeometry(0.5, 0.5, 0.5), eyeMat);
                eyeL.position.set(-1, s * 2.2, s/2);
                const eyeR = new THREE.Mesh(new THREE.BoxGeometry(0.5, 0.5, 0.5), eyeMat);
                eyeR.position.set(1, s * 2.2, s/2);
                ent.add(eyeL, eyeR);
            }

            return ent;
        }

        // --- 3. MAZE & WORLD BUILDER ---
        function constructWorld() {
            scene = new THREE.Scene();
            scene.fog = new THREE.FogExp2(0x08080c, 0.07);

            camera = new THREE.PerspectiveCamera(85, window.innerWidth/window.innerHeight, 0.1, 2000);
            clock = new THREE.Clock();

            renderer = new THREE.WebGLRenderer({ antialias: false, powerPreference: "high-performance" });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(Math.min(window.devicePixelRatio, 1.5));
            document.body.appendChild(renderer.domElement);

            ambLight = new THREE.AmbientLight(0x445588, 0.7); // Enhanced visibility
            scene.add(ambLight);

            sky = new THREE.HemisphereLight(0x6688cc, 0x050505, 0.5);
            scene.add(sky);

            torch = new THREE.SpotLight(0xfffce0, 300);
            torch.angle = Math.PI/6.5;
            torch.penumbra = 0.5;
            torch.decay = 2.0;
            torch.distance = 130;
            camera.add(torch);
            torch.position.set(0,0,0.1);
            torch.target.position.set(0,0,-5);
            camera.add(torch.target);
            scene.add(camera);

            generateFloors();
            spawnHorrors();
            setupInteraction();
            mainTick();
        }

        function generateFloors() {
            const wallMat = new THREE.MeshLambertMaterial({ color: 0x181a20 });
            const floorMat = new THREE.MeshLambertMaterial({ color: 0x080808 });

            for (let f = 0; f < 3; f++) {
                const group = new THREE.Group();
                group.position.y = f * 25;

                // Recursive Backtracker Logic
                const grid = Array(APP.size).fill().map(() => Array(APP.size).fill(15));
                const stack = [[0, 0]];
                const seen = new Set(['0,0']);
                
                while (stack.length > 0) {
                    const [cx, cy] = stack[stack.length - 1];
                    const possible = [];
                    [[0,1,1,4],[0,-1,4,1],[1,0,2,8],[-1,0,8,2]].forEach(([dx, dy, w, op]) => {
                        const nx = cx+dx, ny = cy+dy;
                        if (nx>=0 && nx<APP.size && ny>=0 && ny<APP.size && !seen.has(`${nx},${ny}`)) {
                            possible.push([nx, ny, w, op]);
                        }
                    });
                    if (possible.length > 0) {
                        const [nx, ny, w, op] = possible[Math.floor(Math.random()*possible.length)];
                        grid[cy][cx] -= w; grid[ny][nx] -= op;
                        seen.add(`${nx},${ny}`); stack.push([nx, ny]);
                    } else { stack.pop(); }
                }

                // Transform grid to mesh
                for (let y = 0; y < APP.size; y++) {
                    for (let x = 0; x < APP.size; x++) {
                        const px = x * APP.dim - (APP.size*APP.dim)/2;
                        const pz = y * APP.dim - (APP.size*APP.dim)/2;
                        const v = grid[y][x];

                        if (v & 1) createWall(px, pz - APP.dim/2, 0, group);
                        if (v & 4) createWall(px, pz + APP.dim/2, 0, group);
                        if (v & 8) createWall(px - APP.dim/2, pz, Math.PI/2, group);
                        if (v & 2) createWall(px + APP.dim/2, pz, Math.PI/2, group);
                    }
                }

                // Level Ground
                const ground = new THREE.Mesh(new THREE.PlaneGeometry(350, 350), floorMat);
                ground.rotation.x = -Math.PI/2;
                group.add(ground);

                // Stairwell Exit (FURTHEST POINT)
                const exit = new THREE.Mesh(new THREE.BoxGeometry(4, 0.5, 4), new THREE.MeshBasicMaterial({color:0x00f2ff}));
                exit.position.set((APP.size/2-1)*APP.dim, 0.1, (APP.size/2-1)*APP.dim);
                exit.name = "EXIT_GATE";
                group.add(exit);

                scene.add(group);
            }
        }

        function createWall(x, z, r, g) {
            const w = new THREE.Mesh(new THREE.BoxGeometry(APP.dim, 12, 0.7), new THREE.MeshLambertMaterial({color:0x1a1a1e}));
            w.position.set(x, 6, z); w.rotation.y = r;
            g.add(w);
            APP.obstacles.push(w);
        }

        function spawnHorrors() {
            // Surgeon (Floor 1 Stalker)
            const surg = createBlockEntity(0x050505, true);
            surg.position.set(-50, 0, -50);
            surg.userData = { floor: 1, speed: 0.07, type: 'STALKER' };
            scene.add(surg);
            APP.ents.push(surg);

            // Patients (Randomly Distributed)
            for(let i=0; i<15; i++) {
                const fl = (i % 3) + 1;
                const p = createBlockEntity(0x330000, false);
                p.position.set(Math.random()*160-80, (fl-1)*25, Math.random()*160-80);
                p.userData = { floor: fl, speed: 0.04 + Math.random()*0.05, type: 'WANDERER' };
                scene.add(p);
                APP.ents.push(p);
            }
        }

        // --- 4. NAVIGATION & INPUT ---
        function setupInteraction() {
            const lZ = document.getElementById('left-control');
            const rZ = document.getElementById('right-control');
            const stick = document.getElementById('joy-stick');
            let sx, sy, lx, ly;

            lZ.addEventListener('touchstart', e => { sx = e.touches[0].clientX; sy = e.touches[0].clientY; });
            lZ.addEventListener('touchmove', e => {
                e.preventDefault();
                const t = e.touches[0];
                const dx = t.clientX - sx, dy = t.clientY - sy;
                const dist = Math.min(Math.sqrt(dx*dx + dy*dy), 45);
                const ang = Math.atan2(dy, dx);
                stick.style.transform = `translate(${Math.cos(ang)*dist}px, ${Math.sin(ang)*dist}px)`;
                APP.input.mv.set(Math.cos(ang)*(dist/45), Math.sin(ang)*(dist/45));
                APP.input.active = dist > 5;
            }, { passive: false });
            lZ.addEventListener('touchend', () => { stick.style.transform = `translate(0,0)`; APP.input.active = false; APP.input.mv.set(0,0); });

            rZ.addEventListener('touchstart', e => { lx = e.touches[0].clientX; ly = e.touches[0].clientY; });
            rZ.addEventListener('touchmove', e => {
                const t = e.touches[0];
                APP.input.yaw -= (t.clientX - lx) * APP.rot;
                APP.input.pitch -= (t.clientY - ly) * APP.rot;
                APP.input.pitch = Math.max(-1.4, Math.min(1.4, APP.input.pitch));
                lx = t.clientX; ly = t.clientY;
            });
        }

        // --- 5. RENDER LOOP & AI BEHAVIOR ---
        function mainTick() {
            requestAnimationFrame(mainTick);
            const dt = clock.getDelta();

            if (APP.playing) {
                camera.rotation.order = "YXZ";
                camera.rotation.y = APP.input.yaw;
                camera.rotation.x = APP.input.pitch;

                if (APP.input.active) {
                    const fwd = new THREE.Vector3(0,0,-1).applyQuaternion(camera.quaternion);
                    const rgt = new THREE.Vector3(1,0,0).applyQuaternion(camera.quaternion);
                    fwd.y = 0; rgt.y = 0; fwd.normalize(); rgt.normalize();

                    const moveDir = new THREE.Vector3().addScaledVector(fwd, -APP.input.mv.y).addScaledVector(rgt, APP.input.mv.x);
                    
                    // Simple Wall Raycast
                    const ray = new THREE.Raycaster(camera.position, moveDir.clone().normalize(), 0, 1.5);
                    const hits = ray.intersectObjects(APP.obstacles);
                    
                    if (hits.length === 0) {
                        camera.position.addScaledVector(moveDir, APP.speed);
                        camera.position.y = (APP.floor-1)*25 + APP.height + Math.sin(Date.now()*0.008)*0.05;
                    }
                    audio.step.volume = 0.4;
                } else {
                    audio.step.volume = 0;
                }

                // AI Processing
                let nearestDist = 1000;
                APP.ents.forEach(ent => {
                    if (ent.userData.floor === APP.floor) {
                        ent.lookAt(camera.position);
                        const dist = ent.position.distanceTo(camera.position);
                        if (dist < nearestDist) nearestDist = dist;

                        if (dist < 60) {
                            const approach = new THREE.Vector3().subVectors(camera.position, ent.position).normalize();
                            approach.y = 0;
                            ent.position.addScaledVector(approach, ent.userData.speed);
                            
                            if (dist < 12 && ent.userData.type === 'STALKER') {
                                audio.breath.volume = 1 - (dist/12);
                                document.getElementById('threat-lvl').innerText = "CRITICAL";
                                document.getElementById('threat-lvl').style.color = "#ff3300";
                            }
                        }
                    }
                });

                if (nearestDist > 40) {
                    document.getElementById('threat-lvl').innerText = "NONE";
                    document.getElementById('threat-lvl').style.color = "var(--terminal-cyan)";
                }

                // Heartbeat simulation
                const bpm = 70 + (nearestDist < 30 ? (30 - nearestDist) * 3 : 0);
                document.getElementById('pulse-val').innerText = Math.floor(bpm);

                // Level Exit Logic
                const exitX = (APP.size/2-1)*APP.dim;
                const exitZ = (APP.size/2-1)*APP.dim;
                const dToExit = camera.position.distanceTo(new THREE.Vector3(exitX, (APP.floor-1)*25, exitZ));
                
                if (dToExit < 4 && APP.floor < 3) {
                    APP.floor++;
                    camera.position.y += 25;
                    camera.position.x = 0; camera.position.z = 0;
                    document.getElementById('floor-val').innerText = "0" + APP.floor;
                    document.getElementById('floor-tag').innerText = "WARD_0" + APP.floor;
                }

                document.getElementById('stair-val').innerText = dToExit < 20 ? "TRUE" : "FALSE";
            }

            renderer.render(scene, camera);
        }

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth/window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

    </script>
</body>
</html>
