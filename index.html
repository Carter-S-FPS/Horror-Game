<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>TITAN_V40_FINAL_INTEGRITY</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/0.160.0/three.min.js"></script>
    <style>
        :root { --p: #00ff41; --r: #ff3131; --w: #ffffff; }
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background: #222; }
        canvas { display: block; width: 100vw; height: 100vh; }
        
        #boot { 
            position: fixed; inset: 0; background: #000; z-index: 999; 
            display: flex; flex-direction: column; justify-content: center; align-items: center; 
            font-family: 'Courier New', monospace; color: var(--p);
        }
        
        .progress-container { width: 300px; height: 10px; border: 1px solid var(--p); margin-top: 20px; padding: 2px; }
        #bar { width: 0%; height: 100%; background: var(--p); }
        
        #hud { 
            position: absolute; top: 20px; left: 20px; color: var(--p); 
            font-family: monospace; font-size: 12px; pointer-events: none; display: none;
            background: rgba(0,0,0,0.5); padding: 10px; border: 1px solid var(--p);
        }

        #death { 
            position: fixed; inset: 0; background: rgba(100,0,0,0.9); z-index: 1000; 
            display: none; color: #fff; font-family: monospace; 
            justify-content: center; align-items: center; font-size: 30px; 
        }

        #joy { 
            position: absolute; bottom: 50px; left: 50px; width: 80px; height: 80px; 
            border: 2px solid var(--p); border-radius: 50%; display: none; opacity: 0.5;
        }
    </style>
</head>
<body>
    <div id="death">CRITICAL_FAILURE: SUBJECT_TERMINATED</div>
    
    <div id="boot">
        <div id="msg">INITIALIZING_BRIGHTNESS_OVERRIDE_V40...</div>
        <div class="progress-container"><div id="bar"></div></div>
        <div id="cta" style="margin-top:20px; display:none; cursor:pointer;">[ EXECUTE_BYPASS ]</div>
    </div>

    <div id="hud">
        COORD: <span id="c_pos">0,0,0</span><br>
        FLUX: <span id="c_flux">1.0</span><br>
        WARP: <span id="c_warp">OFF</span>
    </div>

    <div id="joy"></div>

    <script>
        /**
         * TITAN V40 - EMERGENCY VISIBILITY BUILD
         * EVERYTHING IS UNLIT. COLORS ARE BRIGHT.
         */

        const CFG = {
            SENS: 0.005,
            SPD: 0.15,
            FOV: 90,
            WALL: 0x00ff41, // Neon Green Walls
            FLOOR: 0x333333,
            PLAYER_H: 1.7
        };

        let scene, camera, renderer, clock;
        let active = false, dead = false;
        let mv = { f: 0, s: 0, active: false };
        let look = { x: 0, y: 0, startX: 0, startY: 0, id: null };
        let walls = [], phantoms = [];

        function init() {
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x111111); // Dark grey instead of black

            camera = new THREE.PerspectiveCamera(CFG.FOV, window.innerWidth / window.innerHeight, 0.1, 2000);
            
            renderer = new THREE.WebGLRenderer({ antialias: false });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.toneMapping = THREE.LinearToneMapping;
            renderer.toneMappingExposure = 2.5; // Double brightness
            document.body.appendChild(renderer.domElement);

            clock = new THREE.Clock();

            // Geometry - Using MeshBasicMaterial so LIGHTING DOES NOT MATTER
            const wallMat = new THREE.MeshBasicMaterial({ color: CFG.WALL, wireframe: true });
            const floorMat = new THREE.MeshBasicMaterial({ color: 0x444444 });

            // Floor
            const floor = new THREE.Mesh(new THREE.PlaneGeometry(100, 100), floorMat);
            floor.rotation.x = -Math.PI / 2;
            scene.add(floor);

            // Walls
            const createWall = (w, h, d, x, z) => {
                const mesh = new THREE.Mesh(new THREE.BoxGeometry(w, h, d), wallMat);
                mesh.position.set(x, h/2, z);
                scene.add(mesh);
                walls.push(new THREE.Box3().setFromObject(mesh));
            };

            // Perimeter
            createWall(100, 10, 1, 0, 50);
            createWall(100, 10, 1, 0, -50);
            createWall(1, 10, 100, 50, 0);
            createWall(1, 10, 100, -50, 0);

            // Objects
            for(let i=0; i<10; i++) {
                createWall(4, 8, 4, Math.random()*80-40, Math.random()*80-40);
            }

            // Enemies
            for(let i=0; i<5; i++) {
                const g = new THREE.Group();
                const b = new THREE.Mesh(new THREE.BoxGeometry(2, 5, 2), new THREE.MeshBasicMaterial({color: 0xff0000}));
                g.add(b);
                g.position.set(Math.random()*40-20, 0, Math.random()*40-20);
                scene.add(g);
                phantoms.push({ mesh: g, life: 10 });
            }

            // Start High to avoid ground-clipping
            camera.position.set(0, 10, 0);
            
            window.addEventListener('touchstart', onTouchStart, {passive: false});
            window.addEventListener('touchmove', onTouchMove, {passive: false});
            window.addEventListener('touchend', onTouchEnd);
            
            loop();
        }

        function onTouchStart(e) {
            for(let t of e.changedTouches) {
                if(t.clientX < window.innerWidth/2) {
                    mv.active = true;
                    mv.id = t.identifier;
                    mv.ox = t.clientX; mv.oy = t.clientY;
                } else {
                    look.id = t.identifier;
                    look.startX = t.clientX; look.startY = t.clientY;
                }
            }
        }

        function onTouchMove(e) {
            e.preventDefault();
            for(let t of e.changedTouches) {
                if(t.identifier === mv.id) {
                    mv.s = (t.clientX - mv.ox) / 50;
                    mv.f = (t.clientY - mv.oy) / 50;
                } else if(t.identifier === look.id) {
                    look.x -= (t.clientX - look.startX) * CFG.SENS;
                    look.y -= (t.clientY - look.startY) * CFG.SENS;
                    look.y = Math.max(-1.5, Math.min(1.5, look.y));
                    look.startX = t.clientX; look.startY = t.clientY;
                }
            }
        }

        function onTouchEnd(e) {
            for(let t of e.changedTouches) {
                if(t.identifier === mv.id) { mv.active = false; mv.f = 0; mv.s = 0; }
                if(t.identifier === look.id) look.id = null;
            }
        }

        function loop() {
            if(dead) return;
            requestAnimationFrame(loop);
            
            if(!active) {
                // Initial render so user sees something during boot
                renderer.render(scene, camera);
                return;
            }

            const dt = clock.getDelta();

            // Gravity/Height Correction
            if(camera.position.y > CFG.PLAYER_H) camera.position.y -= 0.1;

            camera.rotation.set(look.y, look.x, 0, 'YXZ');

            if(mv.active) {
                const dir = new THREE.Vector3(0,0,-1).applyQuaternion(camera.quaternion);
                dir.y = 0; dir.normalize();
                const side = new THREE.Vector3(1,0,0).applyQuaternion(camera.quaternion);
                side.y = 0; side.normalize();

                camera.position.addScaledVector(dir, -mv.f * CFG.SPD);
                camera.position.addScaledVector(side, mv.s * CFG.SPD);
            }

            // AI and HUD
            phantoms.forEach(p => {
                p.mesh.lookAt(camera.position.x, 0, camera.position.z);
                let d = p.mesh.position.distanceTo(camera.position);
                if(d < 30) p.mesh.translateZ(0.08);
                if(d < 2) { dead = true; document.getElementById('death').style.display='flex'; }
            });

            document.getElementById('c_pos').innerText = `${Math.floor(camera.position.x)},${Math.floor(camera.position.z)}`;
            renderer.render(scene, camera);
        }

        // Loader
        let p = 0;
        const iv = setInterval(() => {
            p += 4;
            document.getElementById('bar').style.width = p+'%';
            if(p >= 100) {
                clearInterval(iv);
                document.getElementById('cta').style.display='block';
                document.getElementById('msg').innerText = "CALIBRATION_SUCCESSFUL";
                init();
            }
        }, 50);

        const start = () => {
            active = true;
            document.getElementById('boot').style.display='none';
            document.getElementById('hud').style.display='block';
        };
        document.getElementById('cta').onclick = start;
        window.ontouchstart = () => { if(p>=100) start(); };
