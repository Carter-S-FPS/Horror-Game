<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ASYLUM_NO_HIDING_V56</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/0.160.0/three.min.js"></script>
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background: #000; }
        #blink { position: fixed; inset: 0; background: #000; z-index: 50; opacity: 0; pointer-events: none; }
        #boot { 
            position: fixed; inset: 0; z-index: 100; background: #0a0a0a; 
            display: flex; flex-direction: column; justify-content: center; align-items: center; 
            color: #dbd2ae; font-family: serif;
        }
        .btn { border: 1px solid #444; padding: 15px 40px; cursor: pointer; display: none; color: #dbd2ae; margin-top: 20px; }
        #ui { position: fixed; top: 20px; left: 20px; color: #555; font-family: monospace; z-index: 10; font-size: 11px; }
        #msg { position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); color: #900; font-family: serif; font-size: 32px; display: none; z-index: 200; text-align: center; }
    </style>
</head>
<body>
    <div id="blink"></div>
    <div id="ui">HIDING_DISABLED</div>
    <div id="msg">TOO LATE.<br><span style="font-size:14px; color:#333;">Refresh to try again</span></div>
    <div id="boot">
        <div id="status">INIT_PERSISTENT_HUNT...</div>
        <div id="btn" class="btn">AWAKEN</div>
    </div>

    <script>
        let scene, camera, renderer, active = false, flashlight, raycaster;
        let mv = { f: 0, s: 0, active: false, id: null };
        let rot = { x: 0, y: 0, lx: 0, ly: 0, id: null };
        let walkCycle = 0, isDead = false, gameStartTime = 0;
        
        let stalker, stalkerState = 'WANDER', huntTimer = 0;
        const GRACE_PERIOD = 20; 
        const HUNT_LIMIT = 10; 

        const wallObjects = []; 
        const PLAYER_RADIUS = 0.5;

        function init() {
            scene = new THREE.Scene();
            scene.fog = new THREE.Fog(0x000000, 0, 13);
            camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 100);
            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            document.body.appendChild(renderer.domElement);
            
            raycaster = new THREE.Raycaster();

            flashlight = new THREE.SpotLight(0xfff5d4, 60, 25, Math.PI/7, 0.5, 2);
            scene.add(flashlight);
            scene.add(flashlight.target);

            const wallMat = new THREE.MeshStandardMaterial({ color: 0xdbd2ae });
            const buildWall = (x, z, w, d) => {
                const m = new THREE.Mesh(new THREE.BoxGeometry(w, 3.2, d), wallMat);
                m.position.set(x, 1.6, z);
                scene.add(m);
                wallObjects.push(m);
            };
            
            // Map Geometry
            buildWall(0, 22, 44.5, 0.5); buildWall(0, -22, 44.5, 0.5);
            buildWall(22, 0, 0.5, 44.5); buildWall(-22, 0, 0.5, 44.5);
            const bSz = 16; buildWall(10, 10, bSz, bSz); buildWall(-10, 10, bSz, bSz);
            buildWall(10, -10, bSz, bSz); buildWall(-10, -10, bSz, bSz);

            const floor = new THREE.Mesh(new THREE.PlaneGeometry(60, 60), new THREE.MeshStandardMaterial({ color: 0x111111 }));
            floor.rotation.x = -Math.PI/2;
            scene.add(floor);

            stalker = new THREE.Mesh(new THREE.CapsuleGeometry(0.4, 2, 4, 8), new THREE.MeshBasicMaterial({ color: 0x010101 }));
            stalker.position.set(15, 1.3, 0);
            scene.add(stalker);

            camera.position.set(0, 1.6, 18);
            loop();
        }

        function checkInitialSight() {
            const direction = new THREE.Vector3().subVectors(camera.position, stalker.position).normalize();
            raycaster.set(stalker.position, direction);
            const intersects = raycaster.intersectObjects(wallObjects);
            const distanceToPlayer = stalker.position.distanceTo(camera.position);
            return !(intersects.length > 0 && intersects[0].distance < distanceToPlayer);
        }

        function checkCollision(pos) {
            const pBox = new THREE.Box3().setFromCenterAndSize(pos, new THREE.Vector3(PLAYER_RADIUS, 1, PLAYER_RADIUS));
            for(let w of wallObjects) {
                const wBox = new THREE.Box3().setFromObject(w);
                if(pBox.intersectsBox(wBox)) return true;
            }
            return false;
        }

        function loop() {
            if(isDead) return;
            requestAnimationFrame(loop);
            if(!active) return;

            const now = Date.now() / 1000;
            const elapsed = now - gameStartTime;
            const inGrace = elapsed < GRACE_PERIOD;

            camera.rotation.set(rot.y, rot.x, 0, 'YXZ');
            
            if(mv.active) {
                const dir = new THREE.Vector3(0,0,-1).applyQuaternion(camera.quaternion);
                dir.y = 0; dir.normalize();
                const side = new THREE.Vector3(1,0,0).applyQuaternion(camera.quaternion);
                side.y = 0; side.normalize();
                const next = camera.position.clone().addScaledVector(dir, -mv.f * 0.06).addScaledVector(side, mv.s * 0.06);
                if(!checkCollision(next)) {
                    camera.position.copy(next);
                    walkCycle += 0.08;
                    camera.position.y = 1.6 + Math.sin(walkCycle) * 0.02;
                }
            }

            // Stalker Logic
            const dist = camera.position.distanceTo(stalker.position);
            const toStalker = new THREE.Vector3().subVectors(stalker.position, camera.position).normalize();
            const camDir = new THREE.Vector3(0,0,-1).applyQuaternion(camera.quaternion);
            const isLookingAtStalker = camDir.angleTo(toStalker) < 0.5;

            if (inGrace) {
                document.getElementById('ui').innerText = `BOOTING: ${Math.ceil(GRACE_PERIOD - elapsed)}s`;
                stalker.position.x += Math.sin(now) * 0.01; 
            } else {
                if (stalkerState === 'WANDER') {
                    document.getElementById('blink').style.opacity = 0;
                    document.getElementById('ui').innerText = "STATUS: SCANNING";
                    
                    stalker.position.addScaledVector(toStalker, -0.01); 

                    // Initial trigger requires LoS
                    if(dist < 15 && checkInitialSight()) {
                        stalkerState = 'HUNT';
                    }
                } else if (stalkerState === 'HUNT') {
                    document.getElementById('ui').innerText = `HUNT_ACTIVE: ${Math.ceil(HUNT_LIMIT - huntTimer)}s | LOOK TO RESET`;
                    document.getElementById('blink').style.opacity = (Math.sin(Date.now() * 0.03) > 0) ? 0.85 : 0;
                    
                    stalker.position.addScaledVector(toStalker, -0.03); 

                    // ONLY looking at it will reset it. Walls don't matter now.
                    if (isLookingAtStalker) {
                        stalkerState = 'WANDER';
                        huntTimer = 0;
                    } else {
                        huntTimer += 0.016; 
                    }

                    if(huntTimer >= HUNT_LIMIT) {
                        isDead = true;
                        document.getElementById('blink').style.opacity = 1;
                        document.getElementById('msg').style.display = 'block';
                    }
                }
            }

            flashlight.position.copy(camera.position);
            flashlight.target.position.copy(camera.position).add(camDir);
            renderer.render(scene, camera);
        }

        window.addEventListener('touchstart', (e) => {
            for(let t of e.changedTouches) {
                if(t.clientX < window.innerWidth/2) { mv.active = true; mv.id = t.identifier; mv.ox = t.clientX; mv.oy = t.clientY; }
                else { rot.id = t.identifier; rot.lx = t.clientX; rot.ly = t.clientY; }
            }
        });
        window.addEventListener('touchmove', (e) => {
            e.preventDefault();
            for(let t of e.changedTouches) {
                if(t.identifier === mv.id) { mv.s = (t.clientX - mv.ox)/60; mv.f = (t.clientY - mv.oy)/60; }
                else if(t.identifier === rot.id) { rot.x -= (t.clientX - rot.lx)*0.005; rot.y -= (t.clientY - rot.ly)*0.005; rot.y = Math.max(-1.3,1.3,rot.y); rot.lx = t.clientX; rot.ly = t.clientY; }
            }
        }, {passive: false});
        window.addEventListener('touchend', (e) => {
            for(let t of e.changedTouches) { if(t.identifier === mv.id){mv.active=false;mv.f=0;mv.s=0;} if(t.identifier === rot.id)rot.id=null; }
        });

        setTimeout(() => { document.getElementById('btn').style.display = "block"; init(); }, 500);
        document.getElementById('btn').onclick = () => { 
            active = true; 
            gameStartTime = Date.now() / 1000;
            document.getElementById('boot').style.display = 'none'; 
        };
    </script>
</body>
</html>
