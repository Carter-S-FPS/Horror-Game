<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ASYLUM_CLEAN_BUILD_V48</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/0.160.0/three.min.js"></script>
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background: #000; }
        #boot { 
            position: fixed; inset: 0; z-index: 100; background: #050505; 
            display: flex; flex-direction: column; justify-content: center; align-items: center; 
            color: #dbd2ae; font-family: serif;
        }
        .btn { border: 1px solid #444; padding: 15px 40px; cursor: pointer; display: none; color: #dbd2ae; margin-top: 20px; text-transform: uppercase; letter-spacing: 2px; }
    </style>
</head>
<body>
    <div id="boot">
        <div id="status">ALIGNED_WALL_SEGMENTS...</div>
        <div id="btn" class="btn">Enter Ward</div>
    </div>

    <script>
        let scene, camera, renderer, active = false, flashlight;
        let mv = { f: 0, s: 0, active: false, id: null };
        let rot = { x: 0, y: 0, lx: 0, ly: 0, id: null };
        
        const walls = []; 
        const PLAYER_RADIUS = 0.5;

        function init() {
            scene = new THREE.Scene();
            scene.fog = new THREE.Fog(0x000000, 0, 15);

            camera = new THREE.PerspectiveCamera(70, window.innerWidth/window.innerHeight, 0.1, 100);
            
            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            document.body.appendChild(renderer.domElement);

            // VOLUMETRIC LIGHT
            flashlight = new THREE.SpotLight(0xfff5d4, 60, 20, Math.PI/7, 0.6, 2);
            scene.add(flashlight);
            scene.add(flashlight.target);

            const wallMat = new THREE.MeshStandardMaterial({ color: 0xdbd2ae, roughness: 1 });
            const floorMat = new THREE.MeshStandardMaterial({ color: 0x1a1a1a, roughness: 0.2, metalness: 0.1 }); 
            const ceilMat = new THREE.MeshStandardMaterial({ color: 0x888888, roughness: 1 });

            const h = 3.2; 
            const hallWidth = 4;
            const fullSize = 40; 
            const innerBound = (fullSize/2) - hallWidth;

            // Modular Wall Function (No intersections)
            const buildWall = (x1, z1, x2, z2) => {
                const dx = Math.abs(x2 - x1) || 0.4;
                const dz = Math.abs(z2 - z1) || 0.4;
                const mesh = new THREE.Mesh(new THREE.BoxGeometry(dx, h, dz), wallMat);
                mesh.position.set((x1 + x2)/2, h/2, (z1 + z2)/2);
                scene.add(mesh);
                walls.push(new THREE.Box3().setFromObject(mesh));
            };

            // 1. OUTER PERIMETER (The absolute boundary)
            buildWall(-20, 20, 20, 20); // North
            buildWall(-20, -20, 20, -20); // South
            buildWall(20, -20, 20, 20); // East
            buildWall(-20, -20, -20, 20); // West

            // 2. THE INNER "SQUARE" (Creates the circular hallway)
            // North-East Block
            buildWall(2, 2, innerBound, innerBound);
            // North-West Block
            buildWall(-2, 2, -innerBound, innerBound);
            // South-East Block
            buildWall(2, -2, innerBound, -innerBound);
            // South-West Block
            buildWall(-2, -2, -innerBound, -innerBound);

            // 3. CROSS CONNECTORS (Creating the 4 corridors connecting hub to perimeter)
            // These are exact lengths so they don't block the perimeter hall
            buildWall(2, 16, 2, 2); buildWall(-2, 16, -2, 2); // North Wing
            buildWall(2, -16, 2, -2); buildWall(-2, -16, -2, -2); // South Wing
            buildWall(2, 2, 16, 2); buildWall(2, -2, 16, -2); // East Wing
            buildWall(-2, 2, -16, 2); buildWall(-2, -2, -16, -2); // West Wing

            // Floor & Ceiling
            const planeGeo = new THREE.PlaneGeometry(50, 50);
            const floor = new THREE.Mesh(planeGeo, floorMat);
            floor.rotation.x = -Math.PI/2;
            scene.add(floor);

            const ceiling = new THREE.Mesh(planeGeo, ceilMat);
            ceiling.rotation.x = Math.PI/2;
            ceiling.position.y = h;
            scene.add(ceiling);

            // Spawn in the Center Hub
            camera.position.set(0, 1.7, 0);

            // Input
            window.addEventListener('touchstart', (e) => {
                for(let t of e.changedTouches) {
                    if(t.clientX < window.innerWidth/2) {
                        mv.active = true; mv.id = t.identifier;
                        mv.ox = t.clientX; mv.oy = t.clientY;
                    } else {
                        rot.id = t.identifier;
                        rot.lx = t.clientX; rot.ly = t.clientY;
                    }
                }
            });

            window.addEventListener('touchmove', (e) => {
                e.preventDefault();
                for(let t of e.changedTouches) {
                    if(t.identifier === mv.id) {
                        mv.s = (t.clientX - mv.ox) / 60;
                        mv.f = (t.clientY - mv.oy) / 60;
                    } else if(t.identifier === rot.id) {
                        rot.x -= (t.clientX - rot.lx) * 0.006;
                        rot.y -= (t.clientY - rot.ly) * 0.006;
                        rot.y = Math.max(-1.2, Math.min(1.2, rot.y));
                        rot.lx = t.clientX; rot.ly = t.clientY;
                    }
                }
            }, {passive: false});

            window.addEventListener('touchend', (e) => {
                for(let t of e.changedTouches) {
                    if(t.identifier === mv.id) { mv.active = false; mv.f = 0; mv.s = 0; }
                    if(t.identifier === rot.id) rot.id = null;
                }
            });

            loop();
        }

        function checkCollision(newPos) {
            const playerBox = new THREE.Box3().setFromCenterAndSize(
                newPos, 
                new THREE.Vector3(PLAYER_RADIUS, 2, PLAYER_RADIUS)
            );
            for(let wall of walls) {
                if(playerBox.intersectsBox(wall)) return true;
            }
            return false;
        }

        function loop() {
            requestAnimationFrame(loop);
            if(!active) return;

            camera.rotation.set(rot.y, rot.x, 0, 'YXZ');
            
            // FLASHLIGHT LEAN/SWAY EFFECT
            flashlight.position.copy(camera.position);
            const targetPos = new THREE.Vector3(0, 0, -1).applyQuaternion(camera.quaternion).add(camera.position);
            // 0.1 Lerp creates the "heavy" flashlight feel
            flashlight.target.position.lerp(targetPos, 0.1);

            if(mv.active) {
                const dir = new THREE.Vector3(0,0,-1).applyQuaternion(camera.quaternion);
                dir.y = 0; dir.normalize();
                const side = new THREE.Vector3(1,0,0).applyQuaternion(camera.quaternion);
                side.y = 0; side.normalize();

                const nextPos = camera.position.clone();
                nextPos.addScaledVector(dir, -mv.f * 0.11);
                nextPos.addScaledVector(side, mv.s * 0.11);

                if(!checkCollision(nextPos)) {
                    camera.position.copy(nextPos);
                }
            }
            renderer.render(scene, camera);
        }

        setTimeout(() => {
            document.getElementById('btn').style.display = "block";
            init();
        }, 500);

        document.getElementById('btn').onclick = () => {
            active = true;
            document.getElementById('boot').style.display = 'none';
        };
    </script>
</body>
</html>
