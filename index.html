<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>TITAN_V37_STABLE</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/0.160.0/three.min.js"></script>
    <style>
        :root { --c: #e0e2d5; --r: #ff3333; }
        * { margin: 0; padding: 0; box-sizing: border-box; touch-action: none; user-select: none; }
        body { background: #000; overflow: hidden; font-family: 'Courier New', monospace; }
        #boot { position: fixed; inset: 0; background: #010101; z-index: 100; display: flex; flex-direction: column; justify-content: center; align-items: center; }
        .rail { width: 70%; height: 4px; background: #111; margin: 30px; border: 1px solid #222; position: relative; }
        #bar { width: 0%; height: 100%; background: var(--c); box-shadow: 0 0 20px var(--c); transition: width 0.1s; }
        #hud { position: absolute; top: 40px; left: 40px; z-index: 50; color: var(--c); font-size: 10px; line-height: 2.5; display: none; pointer-events: none; }
        #joy-base { position: absolute; width: 150px; height: 150px; border: 1px solid rgba(224,226,213,0.1); border-radius: 50%; display: none; transform: translate(-50%,-50%); z-index: 200; }
        #joy-knob { position: absolute; top: 50px; left: 50px; width: 50px; height: 50px; background: var(--c); border-radius: 50%; opacity: 0.2; }
        #death { position: fixed; inset: 0; background: #300; display: none; z-index: 1000; color: #000; align-items: center; justify-content: center; font-size: 30px; letter-spacing: 10px; font-weight: bold; }
    </style>
</head>
<body>
    <div id="death">TERMINATED</div>
    <div id="boot">
        <div id="load-msg" style="color:var(--c); letter-spacing:8px; font-size:12px;">SYSTEM_INTEGRITY_CHECK...</div>
        <div class="rail"><div id="bar"></div></div>
    </div>
    <div id="hud">STATUS: <span id="stat">OK</span><br>TIMER: <span id="timer">10.0</span><br>SIGNAL: ACTIVE</div>
    <div id="joy-base"><div id="joy-knob"></div></div>
    <script>
        const CFG = { H:4, E:1.8, S:0.12, SN:0.006, F:0x020202, WC:0xe0e2d5 };
        const ST = { ld:false, ac:false, dead:false, mv:{id:null,an:new THREE.Vector2(),vc:new THREE.Vector2(),on:false}, lk:{y:0,p:0,lx:0,ly:0,sy:0,sp:0}, g:[] };
        let sc, cm, rd, hm, sp, phs=[];

        function init() {
            sc = new THREE.Scene(); sc.background = new THREE.Color(CFG.F); sc.fog = new THREE.FogExp2(CFG.F, 0.12);
            cm = new THREE.PerspectiveCamera(90, window.innerWidth/window.innerHeight, 0.1, 2000);
            rd = new THREE.WebGLRenderer({antialias:false}); rd.setSize(window.innerWidth, window.innerHeight); document.body.appendChild(rd.domElement);
            sc.add(new THREE.AmbientLight(0xffffff, 0.3)); 
            hm = new THREE.PointLight(0xffffff, 0.8, 80); cm.add(hm);
            sp = new THREE.SpotLight(0xffffff, 10, 100, 0.5, 0.5); sp.target.position.z=-1; cm.add(sp); cm.add(sp.target);
            sc.add(cm);

            const wM = new THREE.MeshLambertMaterial({color:CFG.WC}), fM = new THREE.MeshLambertMaterial({color:0x030303});
            const wall = (w,h,d,x,z) => {
                const m = new THREE.Mesh(new THREE.BoxGeometry(w,h,d), wM); m.position.set(x,h/2,z); sc.add(m);
                ST.g.push({x1:x-w/2, x2:x+w/2, z1:z-d/2, z2:z+d/2});
            };
            const floor = (w,d,x,z) => {
                const f = new THREE.Mesh(new THREE.PlaneGeometry(w,d), fM); f.rotation.x=-Math.PI/2; f.position.set(x,0,z); sc.add(f);
                const c = new THREE.Mesh(new THREE.PlaneGeometry(w,d), wM); c.rotation.x=Math.PI/2; c.position.set(x,CFG.H,z); sc.add(c);
            };

            floor(10, 10, 0, 0); 
            wall(3.5, 4, 0.5, -3.25, 5); wall(3.5, 4, 0.5, 3.25, 5); wall(3.5, 4, 0.5, -3.25, -5); wall(3.5, 4, 0.5, 3.25, -5);
            wall(0.5, 4, 3.5, 5, 3.25); wall(0.5, 4, 3.5, 5, -3.25); wall(0.5, 4, 3.5, -5, 3.25); wall(0.5, 4, 3.5, -5, -3.25);
            floor(4.5, 35, 0, 22.5); floor(4.5, 35, 0, -22.5); floor(35, 4.5, 22.5, 0); floor(35, 4.5, -22.5, 0);
            wall(0.5, 4, 35, -2.25, 22.5); wall(0.5, 4, 35, 2.25, 22.5); wall(0.5, 4, 35, -2.25, -22.5); wall(0.5, 4, 35, 2.25, -22.5);
            wall(35, 4, 0.5, 22.5, 2.25); wall(35, 4, 0.5, 22.5, -2.25); wall(35, 4, 0.5, -22.5, 2.25); wall(35, 4, 0.5, -22.5, -2.25);
            floor(90, 4.5, 0, 42.25); floor(90, 4.5, 0, -42.25); floor(4.5, 90, 42.25, 0); floor(4.5, 90, -42.25, 0);
            wall(90.5, 4, 0.5, 0, 44.5); wall(90.5, 4, 0.5, 0,-44.5); wall(0.5, 4, 90.5, 44.5, 0); wall(0.5, 4, 90.5, -44.5, 0);

            for(let i=0; i<2; i++) {
                let p = new THREE.Group();
                p.add(new THREE.Mesh(new THREE.BoxGeometry(1.5, 4, 1.5), new THREE.MeshBasicMaterial({color:0x000000})));
                let e = new THREE.Mesh(new THREE.BoxGeometry(0.8, 0.1, 0.2), new THREE.MeshBasicMaterial({color:0xff0000}));
                e.position.set(0, 1.3, 0.7); p.add(e); p.position.set(i?40:-40, 0, 40);
                sc.add(p); phs.push({obj:p, timer:10, next:0});
            }
            cm.position.set(0, CFG.E, 0); setupControls(); loop();
        }

        function loop() {
            if(!ST.ac || ST.dead) return; requestAnimationFrame(loop);
            ST.lk.sy+=(ST.lk.y-ST.lk.sy)*0.15; ST.lk.sp+=(ST.lk.p-ST.lk.sp)*0.15;
            cm.rotation.set(ST.lk.sp, ST.lk.sy, 0, 'YXZ');
            if(ST.mv.on) {
                const f=new THREE.Vector3(0,0,-1).applyQuaternion(cm.quaternion); f.y=0; f.normalize();
                const r=new THREE.Vector3(1,0,0).applyQuaternion(cm.quaternion); r.y=0; r.normalize();
                cm.position.addScaledVector(f,-ST.mv.vc.y*CFG.S); cm.position.addScaledVector(r,ST.mv.vc.x*CFG.S);
                ST.g.forEach(w => {
                    let cx=Math.max(w.x1,Math.min(cm.position.x,w.x2)), cz=Math.max(w.z1,Math.min(cm.position.z,w.z2)), dx=cm.position.x-cx, dz=cm.position.z-cz;
                    if(dx*dx+dz*dz < 0.64){ let d=Math.sqrt(dx*dx+dz*dz); cm.position.x+=(dx/d)*(0.8-d); cm.position.z+=(dz/d)*(0.8-d); }
                });
            }
            let activeStalk = false, minT = 10;
            phs.forEach(p => {
                let d = p.obj.position.distanceTo(cm.position);
                let dot = new THREE.Vector3(0,0,-1).applyQuaternion(cm.quaternion).dot(p.obj.position.clone().sub(cm.position).normalize());
                if(d < 45 && dot < 0.1) {
                    p.timer -= 0.016; activeStalk = true; minT = Math.min(minT, p.timer);
                    p.obj.lookAt(cm.position.x, 0, cm.position.z); p.obj.translateZ(0.07);
                } else if (dot > 0.75 && d < 30) {
                    p.timer = 10; p.obj.position.set(Math.random()*60-30, 0, Math.random()*60-30);
                } else {
                    if(Date.now() > p.next) { p.next = Date.now()+3000; p.obj.rotation.y = Math.random()*Math.PI*2; }
                    p.obj.translateZ(0.04);
                }
                if(p.timer <= 0) { ST.dead=true; document.getElementById('death').style.display='flex'; }
            });
            document.getElementById('stat').innerText = activeStalk ? "STALKER_DETECTED" : "OK";
            document.getElementById('stat').style.color = activeStalk ? "var(--r)" : "var(--c)";
            document.getElementById('timer').innerText = activeStalk ? minT.toFixed(1) : "10.0";
            hm.intensity = 0.6 + Math.random()*0.4; rd.render(sc, cm);
        }

        function setupControls() {
            const b=document.getElementById('joy-base'), k=document.getElementById('joy-knob');
            window.addEventListener('touchstart', e => {
                for(let t of e.changedTouches) {
                    if(t.clientX < window.innerWidth/2) {
                        ST.mv.id=t.identifier; ST.mv.an.set(t.clientX, t.clientY);
                        b.style.display='block'; b.style.left=t.clientX+'px'; b.style.top=t.clientY+'px';
                    } else { ST.lk.id=t.identifier; ST.lk.lx=t.clientX; ST.lk.ly=t.clientY; }
                }
            });
            window.addEventListener('touchmove', e => {
                for(let t of e.changedTouches) {
                    if(t.identifier===ST.mv.id) {
                        let dx=t.clientX-ST.mv.an.x, dy=t.clientY-ST.mv.an.y, d=Math.min(Math.sqrt(dx*dx+dy*dy), 70);
                        k.style.transform=`translate(${dx/Math.max(d,1)*d}px,${dy/Math.max(d,1)*d}px)`;
                        ST.mv.vc.set(dx/70, dy/70); ST.mv.on=true;
                    } else if(t.identifier===ST.lk.id) {
                        ST.lk.y-=(t.clientX-ST.lk.lx)*CFG.SN; ST.lk.p-=(t.clientY-ST.lk.ly)*CFG.SN;
                        ST.lk.p=Math.max(-1.4,Math.min(1.4,ST.lk.p)); ST.lk.lx=t.clientX; ST.lk.ly=t.clientY;
                    }
                }
            });
            window.addEventListener('touchend', e => { for(let t of e.changedTouches) if(t.identifier===ST.mv.id){ST.mv.on=false; b.style.display='none';} });
        }

        let pVal=0; const bInt = setInterval(() => {
            pVal+=2; document.getElementById('bar').style.width=pVal+'%';
            if(pVal>=100){ 
                clearInterval(bInt); ST.ld=true; 
                document.getElementById('load-msg').innerText = "TAP_TO_ENTER_V37.2";
                init();
            }
        }, 20);

        window.addEventListener('click', () => { 
            if(ST.ld && !ST.ac) { 
                ST.ac=true; 
                document.getElementById('boot').style.display='none'; 
                document.getElementById('hud').style.display='block';
            } 
        });
