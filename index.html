<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SANITY_FRACTURE_TITAN_V500</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/0.160.0/three.min.js"></script>
    <style>
        :root {
            --neon-blue: #00f2ff;
            --interface-black: #020204;
            --blood: #990000;
            --font-main: 'Courier New', Courier, monospace;
        }

        * { 
            margin: 0; padding: 0; box-sizing: border-box; 
            touch-action: none; user-select: none; 
            outline: none; -webkit-tap-highlight-color: transparent;
        }

        body, html { 
            width: 100%; height: 100%; background: #000; 
            overflow: hidden; font-family: var(--font-main);
        }

        /* --- ATMOSPHERIC POST-STACK --- */
        #grain-layer {
            position: fixed; inset: 0; pointer-events: none; z-index: 9000;
            background: url('https://upload.wikimedia.org/wikipedia/commons/5/5a/Can_not_be_displayed.png');
            opacity: 0.02; mix-blend-mode: overlay;
        }

        #vignette-layer {
            position: fixed; inset: 0; pointer-events: none; z-index: 9001;
            background: radial-gradient(circle, transparent 40%, #000 160%);
        }

        /* --- BOOT SEQUENCE INTERFACE --- */
        #boot-screen {
            position: fixed; inset: 0; background: #000; z-index: 10000;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            transition: opacity 2s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .terminal-container {
            width: 85%; max-width: 1000px; padding: 50px;
            border: 1px solid #111; background: #030305;
            box-shadow: inset 0 0 50px #000;
        }

        .terminal-header {
            color: var(--neon-blue); font-size: 1rem; letter-spacing: 12px;
            margin-bottom: 30px; border-bottom: 1px solid #111; padding-bottom: 15px;
        }

        #load-progress-bg { width: 100%; height: 2px; background: #0a0a0c; margin-bottom: 25px; }
        #load-progress-fill { width: 0%; height: 100%; background: var(--neon-blue); box-shadow: 0 0 15px var(--neon-blue); }

        #boot-log {
            font-size: 0.7rem; color: #2a2a2c; height: 180px; overflow: hidden;
            display: flex; flex-direction: column-reverse; line-height: 2.2;
        }

        /* --- HUD --- */
        #game-hud {
            position: absolute; inset: 0; pointer-events: none;
            display: none; z-index: 1000;
        }

        .hud-readout {
            position: absolute; top: 50px; left: 50px;
            font-size: 0.7rem; color: var(--neon-blue);
            line-height: 3; letter-spacing: 5px;
            text-shadow: 0 0 8px rgba(0, 242, 255, 0.3);
        }

        #crosshair {
            position: absolute; top: 50%; left: 50%; width: 2px; height: 2px;
            background: rgba(255,255,255,0.3); transform: translate(-50%, -50%);
        }

        /* --- CONTROLS --- */
        #move-zone { position: absolute; left: 0; bottom: 0; width: 50%; height: 100%; pointer-events: auto; }
        #look-zone { position: absolute; right: 0; bottom: 0; width: 50%; height: 100%; pointer-events: auto; }
        
        #joystick-base {
            position: absolute; width: 160px; height: 160px; border-radius: 50%;
            background: rgba(0, 242, 255, 0.02); border: 1px solid rgba(0, 242, 255, 0.1);
            display: none; transform: translate(-50%, -50%);
        }

        #joystick-nub {
            position: absolute; top: 55px; left: 55px; width: 50px; height: 50px;
            background: var(--neon-blue); border-radius: 50%; opacity: 0.3;
        }

        #death-screen {
            position: fixed; inset: 0; z-index: 100000; background: #000;
            display: none; justify-content: center; align-items: center;
        }

        #death-image { width: 140%; height: 140%; object-fit: cover; filter: grayscale(1) contrast(5); }
    </style>
</head>
<body>

    <div id="grain-layer"></div>
    <div id="vignette-layer"></div>

    <div id="death-screen"><img id="death-image" src="https://i.imgur.com/8N8H1yV.png"></div>

    <div id="boot-screen">
        <div class="terminal-container">
            <div class="terminal-header">SANITY_FRACTURE_TITAN_V5.0</div>
            <div id="load-progress-bg"><div id="load-progress-fill"></div></div>
            <div id="boot-log"></div>
        </div>
    </div>

    <div id="game-hud">
        <div class="hud-readout">
            FLOOR_TYPE: EPOXY_CLEARCOAT<br>
            OPTIC_STATE: WIDE_BEAM_FLOOD<br>
            SIGHT_LOCK: RAYCAST_ACTIVE<br>
            SPAWN_DIST: 800_STUDS<br>
            THREAT: <span id="threat-val">SECURE</span>
        </div>
        <div id="crosshair"></div>
        <div id="move-zone"><div id="joystick-base"><div id="joystick-nub"></div></div></div>
        <div id="look-zone"></div>
    </div>

    <script>
        /**
         * SANITY'S FRACTURE: TITAN ENGINE (500+ LINE VERBOSE BUILD)
         * ---------------------------------------------------------
         * This script executes a complex liminal office environment
         * using Three.js with specific human-scale voxel anatomy.
         */

        const CONFIG = {
            MAP_SIZE: 4000,
            HALL_WIDTH: 20,
            HALL_HEIGHT: 16,
            EYE_LEVEL: 1.7,
            HUMAN_SCALE: 0.038,
            WALK_SPEED: 0.38,
            LOOK_SENSITIVITY: 0.007,
            SURGEON_SPAWN: 800,
            SCOUT_SPAWN: 600,
            FOG_DENSITY: 0.13
        };

        const WORLD_STATE = {
            ready: false,
            active: false,
            input: {
                vec: new THREE.Vector2(),
                isMoving: false,
                yaw: 0,
                pitch: 0,
                anchor: new THREE.Vector2()
            },
            registry: {
                entities: [],
                hitboxes: [],
                walls: []
            }
        };

        let scene, camera, renderer, raycaster, flashlight;

        // --- MODULE: BOOT LOADER ---
        function runBootSequence() {
            const fill = document.getElementById('load-progress-fill');
            const log = document.getElementById('boot-log');
            
            const messages = [
                "ALLOCATING_GEOMETRY_BUFFERS...",
                "POLISHING_EPOXY_REFLECTIONS...",
                "EXPANDING_SPOTLIGHT_PENUMBRA...",
                "WIDENING_LENS_APERTURE...",
                "REMOVING_SCOPE_MESH_RESTRAINTS...",
                "MOUNTING_ACOUSTIC_CEILING_TILES...",
                "CALIBRATING_800_STUD_SURGEON...",
                "MAPPING_RAYCAST_SIGHT_LINES...",
                "SYNCING_NEURAL_LINK...",
                "TITAN_KERNEL_LOADED_SUCCESSFULLY."
            ];

            let p = 0;
            const step = () => {
                p += 0.7;
                fill.style.width = p + "%";
                
                if (Math.floor(p) % 10 === 0) {
                    const msg = messages[Math.floor(p / 10)];
                    if (msg) log.innerHTML = `> ${msg}<br>${log.innerHTML}`;
                }

                if (p >= 100) {
                    WORLD_STATE.ready = true;
                    log.innerHTML = "<span style='color:#fff'>[READY] TOUCH SCREEN TO START</span><br>" + log.innerHTML;
                    initializeUniverse();
                } else {
                    requestAnimationFrame(step);
                }
            };
            step();
        }

        // --- MODULE: VOXEL ANATOMY SYSTEM ---
        class FractureEntity {
            constructor(type, spawnDistance) {
                this.root = new THREE.Group();
                this.type = type;
                this.spawnDistance = spawnDistance;
                this.isLookedAt = false;
                this.generateAnatomy();
                this.setPosition();
            }

            generateAnatomy() {
                const colorSet = this.type === 'surgeon' ? [0x440000, 0x1a0000] : [0x080808, 0x010101];

                const createSegment = (w, h, d, x, y, z) => {
                    const group = new THREE.Group();
                    for (let i = 0; i < 30; i++) {
                        const voxel = new THREE.Mesh(
                            new THREE.BoxGeometry(w, h, d),
                            new THREE.MeshLambertMaterial({ 
                                color: colorSet[Math.floor(Math.random() * colorSet.length)] 
                            })
                        );
                        voxel.position.set(
                            (Math.random() - 0.5) * w,
                            (Math.random() - 0.5) * h,
                            (Math.random() - 0.5) * d
                        );
                        group.add(voxel);
                    }
                    group.position.set(x, y, z);
                    this.root.add(group);
                };

                // Build Human Scale Body
                createSegment(18, 28, 12, 0, 45, 0);   // Torso
                createSegment(12, 12, 12, 0, 72, 0);   // Head
                createSegment(6, 48, 6, -12, 38, 0);   // L Arm
                createSegment(6, 48, 6, 12, 38, 0);    // R Arm
                createSegment(8, 50, 8, -6, 0, 0);     // L Leg
                createSegment(8, 50, 8, 6, 0, 0);      // R Leg

                this.root.scale.set(CONFIG.HUMAN_SCALE, CONFIG.HUMAN_SCALE, CONFIG.HUMAN_SCALE);

                // Invisible Raycast Hitbox
                const hb = new THREE.Mesh(
                    new THREE.BoxGeometry(25, 90, 25),
                    new THREE.MeshBasicMaterial({ visible: false })
                );
                hb.position.y = 40;
                this.root.add(hb);
                WORLD_STATE.registry.hitboxes.push(hb);
            }

            setPosition() {
                const angle = Math.random() * Math.PI * 2;
                this.root.position.set(
                    Math.cos(angle) * this.spawnDistance,
                    0.1,
                    Math.sin(angle) * this.spawnDistance
                );
            }

            update(playerPos, currentHits) {
                // Check if direct sight raycast hits this entity
                this.isLookedAt = false;
                if (currentHits.length > 0) {
                    currentHits.forEach(hit => {
                        if (this.root.getObjectById(hit.object.id)) this.isLookedAt = true;
                    });
                }

                const dist = this.root.position.distanceTo(playerPos);
                
                // Behavior Logic
                if (dist < 300) {
                    this.root.lookAt(playerPos.x, 0.1, playerPos.z);
                    const direction = new THREE.Vector3().subVectors(playerPos, this.root.position).normalize();
                    
                    const speed = this.type === 'surgeon' 
                        ? 0.28 
                        : (this.isLookedAt ? 1.4 : 0.05);

                    this.root.position.addScaledVector(direction, speed);
                }
                return dist;
            }
        }

        // --- MODULE: WORLD INITIALIZATION ---
        function initializeUniverse() {
            scene = new THREE.Scene();
            scene.fog = new THREE.FogExp2(0x010102, CONFIG.FOG_DENSITY);

            camera = new THREE.PerspectiveCamera(80, window.innerWidth / window.innerHeight, 0.1, 3000);
            raycaster = new THREE.Raycaster();

            renderer = new THREE.WebGLRenderer({ antialias: false, powerPreference: "high-performance" });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(Math.min(window.devicePixelRatio, 1.2));
            document.body.appendChild(renderer.domElement);

            // WORLD LIGHTING: WIDE FLOOD BEAM
            scene.add(new THREE.AmbientLight(0x0a0a0c, 1.6));
            
            flashlight = new THREE.SpotLight(0xfffce0, 1800, 250, 0.8, 0.5);
            flashlight.target.position.z = -10;
            camera.add(flashlight);
            camera.add(flashlight.target);
            scene.add(camera);

            // MATERIAL DEFINITIONS
            const epoxyFloorMat = new THREE.MeshPhysicalMaterial({
                color: 0x070707,
                roughness: 0.04,
                metalness: 0.5,
                clearcoat: 1.0,
                clearcoatRoughness: 0.03
            });

            const ceilingMat = new THREE.MeshLambertMaterial({ color: 0x1a1a1a });
            const wallMat = new THREE.MeshLambertMaterial({ color: 0x050505 });

            // WORLD GENERATION (EXPLICIT LOOP)
            for (let i = 0; i < 60; i++) {
                const hall = new THREE.Group();

                // Floor Plate
                const floor = new THREE.Mesh(new THREE.PlaneGeometry(1200, CONFIG.HALL_WIDTH), epoxyFloorMat);
                floor.rotation.x = -Math.PI / 2;

                // Ceiling Plate
                const ceil = new THREE.Mesh(new THREE.PlaneGeometry(1200, CONFIG.HALL_WIDTH), ceilingMat);
                ceil.rotation.x = Math.PI / 2;
                ceil.position.y = CONFIG.HALL_HEIGHT;

                // Acoustic Grid Lines
                const grid = new THREE.GridHelper(1200, 40, 0x000000, 0x0d0d0d);
                grid.position.y = CONFIG.HALL_HEIGHT - 0.01;

                // Wall Segments
                const wallL = new THREE.Mesh(new THREE.BoxGeometry(1200, CONFIG.HALL_HEIGHT, 1), wallMat);
                wallL.position.set(0, CONFIG.HALL_HEIGHT / 2, -CONFIG.HALL_WIDTH / 2);
                
                const wallR = new THREE.Mesh(new THREE.BoxGeometry(1200, CONFIG.HALL_HEIGHT, 1), wallMat);
                wallR.position.set(0, CONFIG.HALL_HEIGHT / 2, CONFIG.HALL_WIDTH / 2);

                hall.add(floor, ceil, grid, wallL, wallR);
                
                // Alternate Orientation
                hall.rotation.y = (i % 2 === 0) ? 0 : Math.PI / 2;
                hall.position.set(
                    (i % 2 === 0 ? 0 : i * 22 - 600),
                    0,
                    (i % 2 === 0 ? i * 22 - 600 : 0)
                );

                scene.add(hall);
            }

            // SPAWN ENTITIES
            const surgeon = new FractureEntity('surgeon', CONFIG.SURGEON_SPAWN);
            scene.add(surgeon.root);
            WORLD_STATE.registry.entities.push(surgeon);

            for (let i = 0; i < 3; i++) {
                const scout = new FractureEntity('scout', CONFIG.SCOUT_SPAWN + (i * 50));
                scene.add(scout.root);
                WORLD_STATE.registry.entities.push(scout);
            }

            setupControls();
            mainLoop();
        }

        // --- MODULE: CORE ENGINE LOOP ---
        function mainLoop() {
            requestAnimationFrame(mainLoop);
            if (!WORLD_STATE.active) return;

            // Camera Rotation Logic
            camera.rotation.order = "YXZ";
            camera.rotation.y = WORLD_STATE.input.yaw;
            camera.rotation.x = WORLD_STATE.input.pitch;

            // Movement Logic
            if (WORLD_STATE.input.isMoving) {
                const forward = new THREE.Vector3(0, 0, -1).applyQuaternion(camera.quaternion);
                forward.y = 0; forward.normalize();
                
                const side = new THREE.Vector3(1, 0, 0).applyQuaternion(camera.quaternion);
                side.y = 0; side.normalize();

                const moveDir = new THREE.Vector3().addScaledVector(forward, -WORLD_STATE.input.vec.y).addScaledVector(side, WORLD_STATE.input.vec.x);
                camera.position.addScaledVector(moveDir, CONFIG.WALK_SPEED);
                
                // Head Bob
                camera.position.y = CONFIG.EYE_LEVEL + Math.sin(Date.now() * 0.015) * 0.05;
            }

            // Raycast Direct-Sight Processing
            raycaster.setFromCamera(new THREE.Vector2(0, 0), camera);
            const sights = raycaster.intersectObjects(WORLD_STATE.registry.hitboxes);

            let alert = false;
            WORLD_STATE.registry.entities.forEach(ent => {
                const distance = ent.update(camera.position, sights);
                
                if (ent.isLookedAt) alert = true;

                // Kill Trigger
                if (distance < 4.8) {
                    document.getElementById('death-screen').style.display = 'flex';
                    setTimeout(() => location.reload(), 1500);
                }
            });

            // HUD Updates
            document.getElementById('threat-val').innerText = alert ? "CONTACT" : "SECURE";
            document.getElementById('threat-val').style.color = alert ? "var(--blood)" : "var(--neon-blue)";

            renderer.render(scene, camera);
        }

        // --- MODULE: INPUT HANDLING ---
        function setupControls() {
            const mZone = document.getElementById('move-zone');
            const lZone = document.getElementById('look-zone');
            const base = document.getElementById('joystick-base');
            const nub = document.getElementById('joystick-nub');
            
            let lastX, lastY;

            mZone.addEventListener('touchstart', e => {
                const t = e.touches[0];
                WORLD_STATE.input.anchor.set(t.clientX, t.clientY);
                base.style.display = 'block'; 
                base.style.left = t.clientX + 'px'; 
                base.style.top = t.clientY + 'px';
            });

            mZone.addEventListener('touchmove', e => {
                e.preventDefault();
                const t = e.touches[0];
                const dx = t.clientX - WORLD_STATE.input.anchor.x;
                const dy = t.clientY - WORLD_STATE.input.anchor.y;
                const dist = Math.min(Math.sqrt(dx * dx + dy * dy), 75);
                const angle = Math.atan2(dy, dx);
                
                nub.style.transform = `translate(${Math.cos(angle) * dist}px, ${Math.sin(angle) * dist}px)`;
                WORLD_STATE.input.vec.set(Math.cos(angle) * (dist / 75), Math.sin(angle) * (dist / 75));
                WORLD_STATE.input.isMoving = dist > 10;
            }, { passive: false });

            mZone.addEventListener('touchend', () => {
                base.style.display = 'none';
                WORLD_STATE.input.isMoving = false;
            });

            lZone.addEventListener('touchstart', e => {
                lastX = e.touches[0].clientX;
                lastY = e.touches[0].clientY;
            });

            lZone.addEventListener('touchmove', e => {
                const t = e.touches[0];
                WORLD_STATE.input.yaw -= (t.clientX - lastX) * CONFIG.LOOK_SENSITIVITY;
                WORLD_STATE.input.pitch -= (t.clientY - lastY) * CONFIG.LOOK_SENSITIVITY;
                WORLD_STATE.input.pitch = Math.max(-1.4, Math.min(1.4, WORLD_STATE.input.pitch));
                lastX = t.clientX;
                lastY = t.clientY;
            });
        }

        window.ontouchstart = () => {
            if (WORLD_STATE.ready && !WORLD_STATE.active) {
                WORLD_STATE.active = true;
                document.getElementById('boot-screen').style.opacity = '0';
                setTimeout(() => {
                    document.getElementById('boot-screen').style.display = 'none';
                    document.getElementById('game-hud').style.display = 'block';
                }, 2000);
            }
        };

        window.onload = runBootSequence;
    </script>
</body>
</html>
