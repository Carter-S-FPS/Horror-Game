<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>TITAN_V37_GOLIATH</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/0.160.0/three.min.js"></script>
    <style>
        :root { --c: #e0e2d5; --v: #020202; --g: #5b6351; --r: #ff3333; }
        * { margin: 0; padding: 0; box-sizing: border-box; touch-action: none; user-select: none; }
        body { background: #000; overflow: hidden; font-family: 'Courier New', monospace; }
        #grit { position: fixed; inset: 0; pointer-events: none; z-index: 9; background: url('https://upload.wikimedia.org/wikipedia/commons/5/5a/Can_not_be_displayed.png'); opacity: 0.08; mix-blend-mode: overlay; }
        #vig { position: fixed; inset: 0; pointer-events: none; z-index: 10; background: radial-gradient(circle, transparent 30%, #000 160%); }
        #boot { position: fixed; inset: 0; background: #010101; z-index: 100; display: flex; flex-direction: column; justify-content: center; align-items: center; transition: opacity 2s; }
        .rail { width: 80%; height: 2px; background: #111; margin: 40px 0; border: 1px solid #1a1a1a; }
        #bar { width: 0%; height: 100%; background: var(--c); box-shadow: 0 0 30px var(--c); }
        #hud { position: absolute; top: 40px; left: 40px; z-index: 50; color: var(--c); font-size: 10px; line-height: 2.5; letter-spacing: 2px; display: none; }
        #joy-base { position: absolute; width: 180px; height: 180px; border: 1px solid rgba(224,226,213,0.1); border-radius: 50%; display: none; transform: translate(-50%,-50%); z-index: 200; }
        #joy-knob { position: absolute; top: 65px; left: 65px; width: 50px; height: 50px; background: var(--c); border-radius: 50%; opacity: 0.2; }
        #death { position: fixed; inset: 0; background: #400; display: none; z-index: 1000; color: #000; align-items: center; justify-content: center; font-weight: bold; font-size: 32px; letter-spacing: 15px; }
    </style>
</head>
<body>
    <div id="grit"></div><div id="vig"></div>
    <div id="death">CONNECTION_LOST</div>
    <div id="boot"><div style="color:var(--c); letter-spacing:10px;">INITIALIZING_TITAN_V37_GOLIATH</div><div class="rail"><div id="bar"></div></div></div>
    <div id="hud">STATUS: <span id="stat">STABLE</span><br>PROXIMITY: <span id="prox">--</span><br>TIMER: <span id="timer">10.0</span><br>LUMENS: 0.94</div>
    <div id="joy-base"><div id="joy-knob"></div></div>
    <script>
        const CFG = { H:4, E:1.8, S:0.12, SN:0.006, F:0x020202, WC:0xe0e2d5 };
        const ST = { ld:false, ac:false, dead:false, mv:{id:null,an:new THREE.Vector2(),vc:new THREE.Vector2(),on:false}, lk:{y:0,p:0,lx:0,ly:0,sy:0,sp:0}, g:[] };
        let sc, cm, rd, ry, hm, sp, phs=[];

        function init() {
            sc = new THREE.Scene(); sc.background = new THREE.Color(CFG.F); sc.fog = new THREE.FogExp2(CFG.F, 0.12);
            cm = new THREE.PerspectiveCamera(90, window.innerWidth/window.innerHeight, 0.1, 2000);
            rd = new THREE.WebGLRenderer({antialias:false}); rd.setSize(window.innerWidth, window.innerHeight); document.body.appendChild(rd.domElement);
            sc.add(new THREE.AmbientLight(0xffffff, 0.3)); 
            hm = new THREE.PointLight(0xffffff, 0.8, 80); cm.add(hm);
            sp = new THREE.SpotLight(0xffffff, 10, 100, 0.5, 0.5); sp.target.position.z=-1; cm.add(sp); cm.add(sp.target);
            sc.add(cm); ry = new THREE.Raycaster();

            const wM = new THREE.MeshLambertMaterial({color:CFG.WC}), fM = new THREE.MeshLambertMaterial({color:0x030303});
            const wall = (w,h,d,x,z) => {
                const m = new THREE.Mesh(new THREE.BoxGeometry(w,h,d), wM); m.position.set(x,h/2,z); sc.add(m);
                ST.g.push({x1:x-w/2, x2:x+w/2, z1:z-d/2, z2:z+d/2});
            };
            const floor = (w,d,x,z) => {
                const f = new THREE.Mesh(new THREE.PlaneGeometry(w,d), fM); f.rotation.x=-Math.PI/2; f.position.set(x,0,z); sc.add(f);
                const c = new THREE.Mesh(new THREE.PlaneGeometry(w,d), wM); c.rotation.x=Math.PI/2; c.position.set(x,CFG.H,z); sc.add(c);
            };

            // GEOMETRY ENGINE
            floor(10, 10, 0, 0); 
            wall(3.5, 4, 0.5, -3.25, 5); wall(3.5, 4, 0.5, 3.25, 5);
            wall(3.5, 4, 0.5, -3.25, -5); wall(3.5, 4, 0.5, 3.25, -5);
            wall(0.5, 4, 3.5, 5, 3.25); wall(0.5, 4, 3.5, 5, -3.25);
            wall(0.5, 4, 3.5, -5, 3.25); wall(0.5, 4, 3.5, -5, -3.25);

            floor(4.5, 35, 0, 22.5); floor(4.5, 35, 0, -22.5); 
            floor(35, 4.5, 22.5, 0); floor(35, 4.5, -22.5, 0);
            wall(0.5, 4, 35, -2.25, 22.5); wall(0.5, 4, 35, 2.25, 22.5);
            wall(0.5, 4, 35, -2.25, -22.5); wall(0.5, 4, 35, 2.25, -22.5);
            wall(35, 4, 0.5, 22.5, 2.25); wall(35, 4, 0.5, 22.5, -2.25);
            wall(35, 4, 0.5, -22.5, 2.25); wall(35, 4, 0.5, -22.5, -2.25);

            floor(90, 4.5, 0, 42.25); floor(90, 4.5, 0, -42.25);
            floor(4.5, 90, 42.25, 0); floor(4.5, 90, -42.25, 0);
            wall(90.5, 4, 0.5, 0, 44.5); wall(90.5, 4, 0.5, 0, -44.5);
            wall(0.5, 4, 90.5, 44.5, 0); wall(0.5, 4, 90.5, -44.5, 0);
            wall(37.5, 4, 0.5, 21.25, 40); wall(37.5, 4, 0.5, -21.25, 40);
            wall(37.5, 4, 0.5, 21.25, -40); wall(37.5, 4, 0.5, -21.25, -40);
            wall(0.5, 4, 37.5, 40, 21.25); wall(0.5, 4, 37.5, 40, -21.25);
            wall(0.5, 4, 37.5, -40, 21.25); wall(0.5, 4, 37.5, -40, -21.25);

            for(let i=0; i<2; i++) {
                let p = new THREE.Group();
                let b = new THREE.Mesh(new THREE.BoxGeometry(1.5, 4, 1.5), new THREE.MeshBasicMaterial({color:0x000000}));
                let e = new THREE.Mesh(new THREE.BoxGeometry(0.8, 0.1, 0.2), new THREE.MeshBasicMaterial({color:0xff0000}));
                e.position.set(0, 1.3, 0.7); p.add(b, e); p.position.set(i?42:-42, 0, 42);
                sc.add(p); phs.push({obj:p, timer:10, mode:'patrol', next:0});
            }
            cm.position.set(0, CFG.E, 0); setup(); loop();
        }

        function resolve(pos, r) {
            for(let i=0; i<4; i++) {
                ST.g.forEach(w => {
                    let cx=Math.max(w.x1,Math.min(pos.x,w.x2)), cz=Math.max(w.z1,Math.min(pos.z,w.z2)), dx=pos.x-cx, dz=pos.z-cz;
                    if(dx*dx+dz*dz < r*r){ let d=Math.sqrt(dx*dx+dz*dz); pos.x+=(dx/d)*(r-d); pos.z+=(dz/d)*(r-d); }
                });
            }
        }

        function loop() {
            if(!ST.ac || ST.dead) return; requestAnimationFrame(loop);
            ST.lk.sy+=(ST.lk.y-ST.lk.sy)*0.15; ST.lk.sp+=(ST.lk.p-ST.lk.sp)*0.15;
            cm.rotation.set(ST.lk.sp, ST.lk.sy, 0, 'YXZ');
            if(ST.mv.on) {
                const f=new THREE.Vector3(0,0,-1).applyQuaternion(cm.quaternion); f.y=0; f.normalize();
                const r=new THREE.Vector3(1,0,0).applyQuaternion(cm.quaternion); r.y=0; r.normalize();
                cm.position.addScaledVector(f,-ST.mv.vc.y*CFG.S); cm.position.addScaledVector(r,ST.mv.vc.x*CFG.S);
                resolve(cm.position, 0.8);
            }

            let activeStalk = false, minTimer = 10;
            phs.forEach(p => {
                let dist = p.obj.position.distanceTo(cm.position);
                let toPlayer = cm.position.clone().sub(p.obj.position).normalize();
                let lookDir = new THREE.Vector3(0,0,-1).applyQuaternion(cm.quaternion);
                let dot = lookDir.dot(p.obj.position.clone().sub(cm.position).normalize());

                if(dist < 50 && dot < 0.2) {
                    p.mode = 'stalk'; p.timer -= 0.016; activeStalk = true;
                    minTimer = Math.min(minTimer, p.timer);
                    p.obj.lookAt(cm.position.x, 0, cm.position.z); p.obj.translateZ(0.06);
                } else if (dot > 0.8) {
                    p.mode = 'flee'; p.timer = 10; p.obj.position.set(Math.random()*80-40, 0, Math.random()*80-40);
                } else {
                    if(Date.now() > p.next) { p.next = Date.now()+4000; p.obj.rotation.y = Math.random()*Math.PI*2; }
                    p.obj.translateZ(0.04); resolve(p.obj.position, 1.5);
                }
                if(p.timer <= 0) { ST.dead=true; document.getElementById('death').style.display='flex'; }
            });

            document.getElementById('stat').innerText = activeStalk ? "STALK_WARNING" : "STABLE";
            document.getElementById('stat').style.color = activeStalk ? "var(--r)" : "var(--c)";
            document.getElementById('timer').innerText = activeStalk ? minTimer.toFixed(2) : "10.00";
            document.getElementById('prox').innerText = Math.min(...phs.map(p=>p.obj.position.distanceTo(cm.position))).toFixed(1);
            hm.intensity = 0.7 + Math.random()*0.3; rd.render(sc, cm);
        }

        function setup() {
            const b=document.getElementById('joy-base'), k=document.getElementById('joy-knob');
            window.addEventListener('touchstart', e => {
                for(let t of e.changedTouches) {
                    if(t.clientX < window.innerWidth/2) {
                        ST.mv.id=t.identifier; ST.mv.an.set(t.clientX, t.clientY);
                        b.style.display='block'; b.style.left=t.clientX+'px'; b.style.top=t.clientY+'px';
                    } else { ST.lk.id=t.identifier; ST.lk.lx=t.clientX; ST.lk.ly=t.clientY; }
                }
            });
            window.addEventListener('touchmove', e => {
                for(let t of e.changedTouches) {
                    if(t.identifier===ST.mv.id) {
                        let dx=t.clientX-ST.mv.an.x, dy=t.clientY-ST.mv.an.y, d=Math.min(Math.sqrt(dx*dx+dy*dy), 80);
                        k.style.transform=`translate(${dx/Math.max(d,1)*d}px,${dy/Math.max(d,1)*d}px)`;
                        ST.mv.vc.set(dx/80, dy/80); ST.mv.on=true;
                    } else if(t.identifier===ST.lk.id) {
                        ST.lk.y-=(t.clientX-ST.lk.lx)*CFG.SN; ST.lk.p-=(t.clientY-ST.lk.ly)*CFG.SN;
                        ST.lk.p=Math.max(-1.4,Math.min(1.4,ST.lk.p)); ST.lk.lx=t.clientX; ST.lk.ly=t.clientY;
                    }
                }
            });
            window.addEventListener('touchend', e => { for(let t of e.changedTouches) if(t.identifier===ST.mv.id){ST.mv.on=false; b.style.display='none';} });
        }

        let prg=0; const bInt = setInterval(() => {
            prg+=1.5; document.getElementById('bar').style.width=prg+'%';
            if(prg>=100){ clearInterval(bInt); ST.ld=true; init(); }
        }, 25);
        window.onclick = () => { if(ST.ld && !ST.ac) { ST.ac=true; document.getElementById('boot').style.opacity='0'; setTimeout(()=>document.getElementById('hud').style.display='block',1500); } };
