<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Blackwood Asylum 3D</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="ui">
        <h1>BLACKWOOD ASYLUM</h1>
        <button id="play-btn">ENTER THE VOID</button>
    </div>

    <div id="mobile-controls">
        <div id="joystick-base">
            <div id="joystick-stick"></div>
        </div>
    </div>

    <audio id="bg-music" loop>
        <source src="mixkit-horror-ambience-2482.wav" type="audio/wav">
    </audio>
    <audio id="footstep-audio" loop>
        <source src="mixkit-footsteps-in-a-tunnel-loop-543.wav" type="audio/wav">
    </audio>

    <script type="importmap">
        { "imports": { "three": "https://unpkg.com/three@0.160.0/build/three.module.js" } }
    </script>
    <script type="module" src="game.js"></script>
</body>
</html>
