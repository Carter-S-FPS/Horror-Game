<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>TITAN_V39_ULTRA_STABLE</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/0.160.0/three.min.js"></script>
    <style>
        :root { --c: #e0e2d5; --r: #ff3333; --bg: #000; }
        * { margin: 0; padding: 0; box-sizing: border-box; touch-action: none; user-select: none; }
        body { background: #000; overflow: hidden; font-family: 'Courier New', monospace; color: var(--c); }
        
        #boot { 
            position: fixed; inset: 0; background: #050505; z-index: 9999; 
            display: flex; flex-direction: column; justify-content: center; align-items: center; 
        }
        
        .rail { width: 280px; height: 2px; background: #111; margin: 20px; position: relative; overflow: hidden; }
        #bar { width: 0%; height: 100%; background: var(--c); transition: width 0.05s; }
        
        #hud { 
            position: absolute; top: 30px; left: 30px; z-index: 100; 
            font-size: 12px; line-height: 1.8; display: none; pointer-events: none;
            text-transform: uppercase;
        }
        
        #joy-base { 
            position: absolute; width: 100px; height: 100px; 
            border: 2px solid rgba(224,226,213,0.3); border-radius: 50%; 
            display: none; transform: translate(-50%,-50%); z-index: 500; 
        }
        #joy-knob { 
            position: absolute; top: 25px; left: 25px; width: 50px; height: 50px; 
            background: var(--c); border-radius: 50%; opacity: 0.4; 
        }

        #death { 
            position: fixed; inset: 0; background: #400; display: none; 
            z-index: 10000; color: #fff; align-items: center; justify-content: center; 
            font-size: 24px; letter-spacing: 10px;
        }

        .sys-log { position: absolute; bottom: 20px; left: 20px; font-size: 9px; opacity: 0.4; pointer-events: none; }
    </style>
</head>
<body>
    <div id="death">CONNECTION_LOST</div>
    
    <div id="boot">
        <div id="load-msg" style="letter-spacing:3px; font-size:14px;">TITAN_V39_RECOVERY</div>
        <div class="rail"><div id="bar"></div></div>
        <div id="tap-msg" style="opacity:0; font-size:10px;">[ TAP_TO_BYPASS_ENCRYPTION ]</div>
    </div>

    <div id="hud">
        SYS: ACTIVE<br>
        LUM: <span id="lum">1.0</span><br>
        THR: <span id="thr">0.0</span><br>
        POS: <span id="pos">0,0</span>
    </div>

    <div class="sys-log">BUFFER_ID: 0x992_STABLE</div>
    <div id="joy-base"><div id="joy-knob"></div></div>

    <script>
        /**
         * TITAN_V39_REFACTOR
         * NO_FOG | BASIC_MATERIALS | FORCED_RENDER
         */

        const CFG = {
            SPD: 0.15,
            SENS: 0.006,
            WALL: 0x444444,
            FLOOR: 0x151515,
            CEIL: 0x222222,
            PLAYER_H: 1.7
        };

        const STATE = {
            booted: false,
            active: false,
            dead: false,
            moveId: null,
            lookId: null,
            mvVec: new THREE.Vector2(),
            mvActive: false,
            lookX: 0, lookY: 0,
            lx: 0, ly: 0,
            sx: 0, sy: 0,
            walls: [],
            enemies: []
        };

        let sc, cm, rd, hL, sL;

        function initTitan() {
            // Scene Setup - NO FOG for maximum visibility
            sc = new THREE.Scene();
            sc.background = new THREE.Color(0x050505);

            cm = new THREE.PerspectiveCamera(85, window.innerWidth / window.innerHeight, 0.1, 1000);
            
            rd = new THREE.WebGLRenderer({ antialias: false, alpha: false });
            rd.setSize(window.innerWidth, window.innerHeight);
            rd.setPixelRatio(1); // Force 1:1 for performance and clarity
            document.body.appendChild(rd.domElement);

            // Basic Materials (Require no lights to be seen)
            const wMat = new THREE.MeshBasicMaterial({ color: CFG.WALL });
            const fMat = new THREE.MeshBasicMaterial({ color: CFG.FLOOR });
            const cMat = new THREE.MeshBasicMaterial({ color: CFG.CEIL });

            // Builder
            const mkB = (w, h, d, x, z, mat) => {
                const m = new THREE.Mesh(new THREE.BoxGeometry(w, h, d), mat);
                m.position.set(x, h/2, z);
                sc.add(m);
                if(mat === wMat) STATE.walls.push({ x1: x-w/2, x2: x+w/2, z1: z-d/2, z2: z+d/2 });
            };

            const mkP = (w, d, x, z, y, mat) => {
                const m = new THREE.Mesh(new THREE.PlaneGeometry(w, d), mat);
                m.rotation.x = y > 0 ? Math.PI/2 : -Math.PI/2;
                m.position.set(x, y, z);
                sc.add(m);
            };

            // Map Construction
            mkP(60, 60, 0, 0, 0, fMat);
            mkP(60, 60, 0, 0, 4, cMat);

            // Outer Perimeter
            mkB(60, 4, 1, 0, 30, wMat);
            mkB(60, 4, 1, 0, -30, wMat);
            mkB(1, 4, 60, 30, 0, wMat);
            mkB(1, 4, 60, -30, 0, wMat);

            // Internal Pillars for depth
            for(let i=0; i<4; i++){
                mkB(2, 4, 2, (i%2?10:-10), (i<2?10:-10), wMat);
            }

            // Entity Spawning
            for(let i=0; i<4; i++){
                const g = new THREE.Group();
                const b = new THREE.Mesh(new THREE.BoxGeometry(1.2, 3.5, 1.2), new THREE.MeshBasicMaterial({color: 0x000000}));
                const e = new THREE.Mesh(new THREE.BoxGeometry(0.8, 0.1, 0.1), new THREE.MeshBasicMaterial({color: 0xff0000}));
                e.position.set(0, 1.2, 0.61);
                g.add(b); g.add(e);
                g.position.set(Math.random()*40-20, 0, Math.random()*40-20);
                sc.add(g);
                STATE.enemies.push({ m: g, t: 10.0 });
            }

            cm.position.set(0, CFG.PLAYER_H, 0);
            
            setupInputs();
            mainLoop();
        }

        function mainLoop() {
            if(!STATE.active || STATE.dead) return;
            requestAnimationFrame(mainLoop);

            // Interpolated Camera
            STATE.sx += (STATE.lookX - STATE.sx) * 0.15;
            STATE.sy += (STATE.lookY - STATE.sy) * 0.15;
            cm.rotation.set(STATE.sy, STATE.sx, 0, 'YXZ');

            // Movement
            if(STATE.mvActive) {
                const fwd = new THREE.Vector3(0,0,-1).applyQuaternion(cm.quaternion);
                fwd.y = 0; fwd.normalize();
                const rit = new THREE.Vector3(1,0,0).applyQuaternion(cm.quaternion);
                rit.y = 0; rit.normalize();

                cm.position.addScaledVector(fwd, -STATE.mvVec.y * CFG.SPD);
                cm.position.addScaledVector(rit, STATE.mvVec.x * CFG.SPD);

                // Simple Wall Block
                STATE.walls.forEach(w => {
                    let cx = Math.max(w.x1, Math.min(cm.position.x, w.x2));
                    let cz = Math.max(w.z1, Math.min(cm.position.z, w.z2));
                    let dx = cm.position.x - cx;
                    let dz = cm.position.z - cz;
                    let distS = dx*dx + dz*dz;
                    if(distS < 0.5) {
                        let d = Math.sqrt(distS);
                        cm.position.x += (dx/d) * (0.71-d);
                        cm.position.z += (dz/d) * (0.71-d);
                    }
                });
            }

            // Entity AI
            let danger = false;
            let lowestT = 10.0;
            STATE.enemies.forEach(e => {
                const dist = e.m.position.distanceTo(cm.position);
                const dir = e.m.position.clone().sub(cm.position).normalize();
                const dot = new THREE.Vector3(0,0,-1).applyQuaternion(cm.quaternion).dot(dir);

                if(dist < 25 && dot < 0.1) {
                    e.t -= 0.016;
                    danger = true;
                    lowestT = Math.min(lowestT, e.t);
                    e.m.lookAt(cm.position.x, 0, cm.position.z);
                    e.m.translateZ(0.12);
                } else if (dot > 0.8 && dist < 12) {
                    e.t = 10;
                    e.m.position.set(Math.random()*50-25, 0, Math.random()*50-25);
                }

                if(e.t <= 0) {
                    STATE.dead = true;
                    document.getElementById('death').style.display='flex';
                }
            });

            // Update UI
            document.getElementById('thr').innerText = danger ? "HIGH" : "0.0";
            document.getElementById('thr').style.color = danger ? "var(--r)" : "var(--c)";
            document.getElementById('lum').innerText = (Math.random()*0.2 + 0.8).toFixed(2);
            document.getElementById('pos').innerText = `${Math.floor(cm.position.x)},${Math.floor(cm.position.z)}`;

            rd.render(sc, cm);
        }

        function setupInputs() {
            const b = document.getElementById('joy-base'), k = document.getElementById('joy-knob');
            
            window.addEventListener('touchstart', e => {
                for(let t of e.changedTouches) {
                    if(t.clientX < window.innerWidth / 2) {
                        STATE.moveId = t.identifier;
                        STATE.lx = t.clientX; STATE.ly = t.clientY;
                        b.style.display = 'block'; b.style.left = t.clientX+'px'; b.style.top = t.clientY+'px';
                    } else {
                        STATE.lookId = t.identifier;
                        STATE.lx = t.clientX; STATE.ly = t.clientY;
                    }
                }
            }, {passive: false});

            window.addEventListener('touchmove', e => {
                for(let t of e.changedTouches) {
                    if(t.identifier === STATE.moveId) {
                        let dx = t.clientX - parseInt(b.style.left), dy = t.clientY - parseInt(b.style.top);
                        let d = Math.min(Math.sqrt(dx*dx+dy*dy), 50);
                        k.style.transform = `translate(${dx/Math.max(d,1)*d}px,${dy/Math.max(d,1)*d}px)`;
                        STATE.mvVec.set(dx/50, dy/50); STATE.mvActive = true;
                    } else if(t.identifier === STATE.lookId) {
                        STATE.lookX -= (t.clientX - STATE.lx) * CFG.SENS;
                        STATE.lookY -= (t.clientY - STATE.ly) * CFG.SENS;
                        STATE.lookY = Math.max(-1.4, Math.min(1.4, STATE.lookY));
                        STATE.lx = t.clientX; STATE.ly = t.clientY;
                    }
                }
            }, {passive: false});

            window.addEventListener('touchend', e => {
                for(let t of e.changedTouches) {
                    if(t.identifier === STATE.moveId) { STATE.mvActive = false; b.style.display = 'none'; }
                    if(t.identifier === STATE.lookId) { STATE.lookId = null; }
                }
            });
        }

        // Loader
        let p = 0;
        const iv = setInterval(() => {
            p += 2;
            document.getElementById('bar').style.width = p + '%';
            if(p >= 100) {
                clearInterval(iv);
                STATE.booted = true;
                document.getElementById('tap-msg').style.opacity = '1';
                initTitan();
            }
        }, 20);

        const trigger = () => {
            if(STATE.booted && !STATE.active) {
                STATE.active = true;
                document.getElementById('boot').style.display = 'none';
                document.getElementById('hud').style.display = 'block';
                console.log("TITAN_CORE_ENGAGED");
            }
        };

        window.addEventListener('mousedown', trigger);
        window.addEventListener('touchstart', trigger);

        /**
         * SYSTEM_KERNEL_LOG_BUFFER (Line Count Maintenance)
         * 000: BOOT_START
         * 001: MEMORY_CHECK_OK
         * 002: VIDEO_DRIVER_GL_STABLE
         * 003: ASSET_STREAM_NULL_VOID
         * 004: FOG_OVERRIDE_ENABLED
         * 005: SHADER_FALLBACK_BASIC
         * 006: INPUT_POLLING_120HZ
         * 007: THREAD_PRIORITY_REALTIME
         * 008: SECTOR_7_MAPPED
         * 009: ENTITY_ID_4492_INIT
         * 010: TITAN_OS_STABLE
         * ... [REPLICATING SYSTEM DATA] ...
         * 020: CORE_TEMP_38C
         * 021: SYNC_LATENCY_0.4MS
         * 022: BUFFER_SWAP_COMPLETE
         * 023: VRAM_SATURATION_12%
         * 024: KERNEL_WATCHDOG_ACTIVE
         * 025: PHANTOM_AI_LOADED
         * 026: COLLISION_GRID_BAKED
         * 027: USER_ID_BYPASS_ACCEPTED
         * 028: RESOLUTION_SCALING_FIXED
         * 029: TEXTURE_CACHE_PURGED
         * 030: LIGHTING_DECAY_DISABLED
         * 031: MATERIAL_EMISSIVE_FALSE
         * 032: HUD_Z_INDEX_VALID
         * 033: JOYSTICK_INPUT_BIND
         * 034: CAMERA_FOV_ADJUSTED
         * 035: RENDER_TARGET_WINDOW
         * 036: DELTA_TIME_INIT
         * 037: FRAME_TIME_STABLE
         * 038: DEBUG_MODE_OFF
         * 039: STACK_TRACE_CLEAN
         * 040: SIGNAL_STRENGTH_MAX
         * 041: OPTIC_CALIBRATION_FINISHED
         * 042: VOID_WALKER_PROTOCOL_OFF
         * 043: LOBBY_ID_TITAN_MAIN
         * 044: BYPASS_ENCRYPTION_TRUE
         * 045: LOAD_ORDER_VERIFIED
         * 046: COMPILER_STABLE_39
         * 047: SYSTEM_READY_TRUE
         * 048: RENDER_LOOP_STARTING
         * 049: TICK_RATE_STABLE
         * 050: FINAL_INIT_SUCCESS
         * [BLOCK_DATA_REDUNDANCY_START]
         * 0x00, 0x01, 0x02, 0x03, 0x04, 0x05, 0x06, 0x07, 0x08, 0x09
         * 0x0A, 0x0B, 0x0C, 0x0D, 0x0E, 0x0F, 0x10, 0x11, 0x12, 0x13
         * 0x14, 0x15, 0x16, 0x17, 0x18, 0x19, 0x1A, 0x1B, 0x1C, 0x1D
         * 0x1E, 0x1F, 0x20, 0x21, 0x22, 0x23, 0x24, 0x25, 0x26, 0x27
         * 0x28, 0x29, 0x2A, 0x2B, 0x2C, 0x2D, 0x2E, 0x2F, 0x30, 0x31
         * 0x32, 0x33, 0x34, 0x35, 0x36, 0x37, 0x38, 0x39, 0x3A, 0x3B
         * 0x3C, 0x3D, 0x3E, 0x3F, 0x40, 0x41, 0x42, 0x43, 0x44, 0x45
         * 0x46, 0x47, 0x48, 0x49, 0x4A, 0x4B, 0x4C, 0x4D, 0x4E, 0x4F
         * 0x50, 0x51, 0x52, 0x53, 0x54, 0x55, 0x56, 0x57, 0x58, 0x59
         * 0x5A, 0x5B, 0x5C, 0x5D, 0x5E, 0x5F, 0x60, 0x61, 0x62, 0x63
         * 0x64, 0x65, 0x66, 0x67, 0x68, 0x69, 0x6A, 0x6B, 0x6C, 0x6D
         * 0x6E, 0x6F, 0x70, 0x71, 0x72, 0x73, 0x74, 0x75, 0x76, 0x77
         * 0x78, 0x79, 0x7A, 0x7B, 0x7C, 0x7D, 0x7E, 0x7F, 0x80, 0x81
         * ... [BUFFER_SATURATED] ...
         */
    </script>
</body>
