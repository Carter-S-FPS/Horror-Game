<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>BLACKWOOD: VOXEL ABOMINATION ENGINE V5 - FULL SOURCE</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/0.160.0/three.min.js"></script>
    <style>
        :root {
            --neon-blue: #00f2ff;
            --deep-red: #ff0044;
            --medical-teal: #336666;
            --interface-bg: #010101;
            --terminal-gray: #444;
        }

        * { 
            margin: 0; 
            padding: 0; 
            box-sizing: border-box; 
            touch-action: none; 
            user-select: none; 
        }

        body, html { 
            width: 100%; 
            height: 100%; 
            background: #000; 
            overflow: hidden; 
            font-family: 'Courier New', Courier, monospace; 
        }

        /* --- BOOT SEQUENCE STYLING --- */
        #boot-overlay {
            position: fixed; 
            inset: 0; 
            background: #000; 
            z-index: 10000;
            display: flex; 
            flex-direction: column; 
            justify-content: center; 
            align-items: center;
            transition: opacity 2s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .terminal-container {
            width: 85%; 
            max-width: 700px; 
            padding: 40px;
            border: 1px solid #1a1a1a; 
            background: #020202;
            box-shadow: 0 0 80px rgba(0, 0, 0, 1);
        }

        .terminal-header {
            color: var(--neon-blue); 
            font-size: 1.1rem; 
            font-weight: bold;
            letter-spacing: 4px; 
            margin-bottom: 25px; 
            border-bottom: 1px solid #111;
            padding-bottom: 12px; 
            text-transform: uppercase;
        }

        #loading-rail { 
            width: 100%; 
            height: 3px; 
            background: #0a0a0a; 
            margin-bottom: 25px; 
            position: relative; 
        }

        #loading-fill { 
            width: 0%; 
            height: 100%; 
            background: var(--neon-blue); 
            box-shadow: 0 0 15px var(--neon-blue); 
        }

        #terminal-output {
            height: 200px; 
            overflow: hidden; 
            font-size: 0.75rem; 
            color: var(--terminal-gray);
            line-height: 1.8; 
            text-align: left; 
            white-space: pre-wrap;
        }

        /* --- MAIN GAME INTERFACE --- */
        #hud-layer {
            position: absolute; 
            inset: 0; 
            pointer-events: none;
            display: none; 
            z-index: 100;
        }

        #vignette-fx {
            position: absolute; 
            inset: 0;
            background: radial-gradient(circle, transparent 15%, rgba(0,0,0,0.98) 110%);
        }

        /* ERGONOMIC CONTROLS - OPTIMIZED HEIGHT */
        #input-move-zone { 
            position: absolute; 
            left: 0; 
            bottom: 0; 
            width: 50%; 
            height: 85%; 
            pointer-events: auto; 
        }
        
        #input-look-zone { 
            position: absolute; 
            right: 0; 
            bottom: 0; 
            width: 50%; 
            height: 100%; 
            pointer-events: auto; 
        }

        #joystick-housing {
            position: absolute; 
            bottom: 220px; /* High Ergonomic Placement */
            left: 100px;
            width: 160px; 
            height: 160px; 
            border-radius: 50%;
            background: rgba(0, 242, 255, 0.01); 
            border: 1px solid rgba(0, 242, 255, 0.08);
            backdrop-filter: blur(5px);
        }

        #joystick-handle {
            position: absolute; 
            top: 55px; 
            left: 55px; 
            width: 50px; 
            height: 50px;
            background: rgba(0, 242, 255, 0.1); 
            border: 2px solid var(--neon-blue);
            border-radius: 50%; 
            box-shadow: 0 0 25px rgba(0, 242, 255, 0.4);
        }

        /* DIAGNOSTIC UI */
        .diag-readout {
            position: absolute; 
            top: 45px; 
            left: 45px;
            color: var(--neon-blue); 
            font-size: 0.7rem; 
            line-height: 2.5;
            letter-spacing: 2px; 
            text-shadow: 1px 1px 4px #000;
        }

        #alert-announcer {
            position: absolute; 
            top: 42%; 
            width: 100%; 
            text-align: center;
            color: #fff; 
            font-size: 3.5rem; 
            font-weight: 900;
            letter-spacing: 30px; 
            opacity: 0; 
            transition: all 1.2s;
            transform: scale(0.85);
        }

        .reticle {
            position: absolute; 
            top: 50%; 
            left: 50%; 
            transform: translate(-50%, -50%);
            width: 30px; 
            height: 30px; 
            opacity: 0.4;
        }

        #crt-filter {
            position: fixed; 
            inset: 0;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.2) 50%), 
                        linear-gradient(90deg, rgba(255, 0, 0, 0.04), rgba(0, 255, 0, 0.02), rgba(0, 0, 255, 0.04));
            background-size: 100% 4px, 4px 100%;
            pointer-events: none; 
            z-index: 999;
        }
    </style>
</head>
<body>

    <div id="crt-filter"></div>

    <div id="boot-overlay">
        <div class="terminal-container">
            <div class="terminal-header">SYSTEM_INIT_VOXEL_ENGINE_V5</div>
            <div id="loading-rail"><div id="loading-fill"></div></div>
            <div id="terminal-output"></div>
        </div>
    </div>

    <div id="hud-layer">
        <div id="vignette-fx"></div>
        <div class="reticle">
            <div style="width:100%; height:1px; background:var(--neon-blue); position:absolute; top:50%;"></div>
            <div style="height:100%; width:1px; background:var(--neon-blue); position:absolute; left:50%;"></div>
        </div>
        
        <div class="diag-readout">
            VOXEL_DENSITY: 40x40x40<br>
            COMPRESSION: 0.085<br>
            THREAT_INDEX: <span id="val-threat">MINIMAL</span><br>
            BIO_SYNC: <span id="val-sync">99.8%</span><br>
            WARD_ID: <span id="val-ward">01</span>
        </div>

        <div id="alert-announcer">WARD 01</div>

        <div id="input-move-zone">
            <div id="joystick-housing"><div id="joystick-handle"></div></div>
        </div>
        <div id="input-look-zone"></div>
    </div>

    <script>
        /**
         * BLACKWOOD ABOMINATION ENGINE V5
         * 1,000+ LINE VERBOSE ARCHITECTURE
         * FEATURE: SHRINK-COMPRESSED 40x40x40 ENTITIES
         */

        // --- GLOBAL ENGINE STATE DEFINITION ---
        const CORE = {
            isInitialized: false,
            isPlaying: false,
            floor: 1,
            mazeDim: 15,
            gridScale: 26,
            playerHeight: 1.85,
            movementSpeed: 0.15,
            rotationSpeed: 0.0048,
            collisionPadding: 1.4,
            entities: [],
            geometryBuffer: [],
            input: {
                mv: new THREE.Vector2(0, 0),
                isInputActive: false,
                yaw: 0,
                pitch: 0
            },
            audio: {
                ambience: null,
                footsteps: null,
                breathing: null
            }
        };

        let scene, camera, renderer, clock, spotLight, uiTimer;

        // --- 1. THE TERMINAL BOOT SEQUENCE ---
        function initiateBootProcess() {
            const fill = document.getElementById('loading-fill');
            const output = document.getElementById('terminal-output');
            
            const systemTasks = [
                "Establishing WebGL2 Rendering Context...",
                "Mapping 40x40x40 Internal Voxel Arrays...",
                "Generating Procedural Limb Buffers...",
                "Injecting 'Surgeon' Behavioral Matrix...",
                "Compressing Geometry (Scalar 0.085)...",
                "Building Ward 1: Diagnostic Center...",
                "Building Ward 2: The Theatre...",
                "Building Ward 3: Isolation...",
                "Adjusting Joystick Ergonomics (Y-Offset: 220)...",
                "Applying Medical Teal Color Jitter...",
                "Initializing Spatial Audio Pan-Pot...",
                "System Core Synchronized."
            ];

            let progress = 0;
            const sequence = setInterval(() => {
                progress += Math.random() * 1.5;
                
                if (progress >= 100) {
                    progress = 100;
                    clearInterval(sequence);
                    CORE.isInitialized = true;
                    output.innerHTML = "<span style='color:#fff'>[CRITICAL] TAP SCREEN TO LINK</span><br>" + output.innerHTML;
                    setup3DWorld();
                }

                fill.style.width = progress + "%";
                
                if (Math.floor(progress) % 8 === 0) {
                    const taskIndex = Math.floor(progress / 8);
                    if (systemTasks[taskIndex]) {
                        output.innerHTML = `> ${systemTasks[taskIndex]}<br>${output.innerHTML}`;
                    }
                }
            }, 30);
        }

        const handleUserActivation = () => {
            if (!CORE.isInitialized || CORE.isPlaying) return;
            CORE.isPlaying = true;
            
            document.getElementById('boot-overlay').style.opacity = '0';
            setTimeout(() => {
                document.getElementById('boot-overlay').style.display = 'none';
                document.getElementById('hud-layer').style.display = 'block';
                triggerFloorAlert();
            }, 1600);

            // Audio Asset Binding
            CORE.audio.ambience = document.getElementById('snd-amb');
            CORE.audio.footsteps = document.getElementById('snd-step');
            CORE.audio.breathing = document.getElementById('snd-breath');
            
            CORE.audio.ambience.volume = 0.4;
            CORE.audio.footsteps.volume = 0;
            CORE.audio.breathing.volume = 0;

            [CORE.audio.ambience, CORE.audio.footsteps, CORE.audio.breathing].forEach(audio => {
                audio.play().catch(() => console.warn("Audio Context Wait"));
            });
        };

        window.addEventListener('touchstart', handleUserActivation);
        window.addEventListener('mousedown', handleUserActivation);
        window.onload = initiateBootProcess;

        // --- 2. THE ABOMINATION FACTORY (40x40x40 Logic) ---
        class AbominationComponent {
            constructor(isBoss, floor) {
                this.container = new THREE.Group();
                this.isBoss = isBoss;
                this.floor = floor;
                this.moveVelocity = isBoss ? 0.088 : 0.045 + (Math.random() * 0.04);
                
                // Palette Definition
                this.colors = isBoss 
                    ? [0x000000, 0x0a0a0a, 0x121212, 0x1a1a1a] 
                    : [0x336666, 0x447777, 0x2d4d4d, 0x5a8a8a, 0xeeeeee];
                
                this.buildCompressedVoxelBody();
            }

            /**
             * Internal Build Process: 
             * Constructs parts at 40x40x40 volume and then compresses
             */
            buildCompressedVoxelBody() {
                const internalVoxelDim = 40; 

                // We define limb factories that place voxels in a 40x40x40 space
                this.generateLimb(internalVoxelDim, internalVoxelDim, internalVoxelDim, 0, internalVoxelDim, 0); // TORSO
                this.generateLimb(30, 30, 30, 0, 85, 0); // HEAD
                this.generateLimb(15, 60, 15, -35, 45, 0); // LEFT ARM
                this.generateLimb(15, 60, 15, 35, 45, 0); // RIGHT ARM
                this.generateLimb(20, 60, 20, -20, -15, 0); // LEFT LEG
                this.generateLimb(20, 60, 20, 20, -15, 0); // RIGHT LEG

                // APPLY COMPRESSION SCALAR
                // This turns the massive 40-unit parts into terrifyingly dense small objects
                this.container.scale.set(0.085, 0.085, 0.085);

                if (this.isBoss) {
                    const glowingVisor = new THREE.Mesh(
                        new THREE.BoxGeometry(45, 5, 5),
                        new THREE.MeshBasicMaterial({ color: 0xff0000 })
                    );
                    glowingVisor.position.set(0, 90, 18);
                    this.container.add(glowingVisor);
                }
            }

            generateLimb(w, h, d, x, y, z) {
                const limbGroup = new THREE.Group();
                const density = 40; // Every limb is composed of 40 individual jittered blocks

                for (let i = 0; i < density; i++) {
                    const colorIndex = Math.floor(Math.random() * this.colors.length);
                    const mesh = new THREE.Mesh(
                        new THREE.BoxGeometry(
                            w * (0.8 + Math.random() * 0.4),
                            h * (0.8 + Math.random() * 0.4),
                            d * (0.8 + Math.random() * 0.4)
                        ),
                        new THREE.MeshLambertMaterial({ color: this.colors[colorIndex] })
                    );
                    
                    // Jitter placement within the allocated volume
                    mesh.position.set(
                        (Math.random() - 0.5) * (w * 0.4),
                        (Math.random() - 0.5) * (h * 0.4),
                        (Math.random() - 0.5) * (d * 0.4)
                    );
                    limbGroup.add(mesh);
                }
                
                limbGroup.position.set(x, y, z);
                this.container.add(limbGroup);
            }

            updateBehavior(playerPos) {
                if (this.floor !== CORE.floor) return 1000;

                const distanceToTarget = this.container.position.distanceTo(playerPos);
                
                // Behavioral Trigger Zone
                if (distanceToTarget < 75) {
                    this.container.lookAt(playerPos.x, this.container.position.y, playerPos.z);
                    const moveVector = new THREE.Vector3().subVectors(playerPos, this.container.position).normalize();
                    moveVector.y = 0;
                    this.container.position.addScaledVector(moveVector, this.moveVelocity);
                }
                
                return distanceToTarget;
            }
        }

        // --- 3. THE 3D ENGINE CORE ---
        function setup3DWorld() {
            scene = new THREE.Scene();
            scene.fog = new THREE.FogExp2(0x050608, 0.065);

            camera = new THREE.PerspectiveCamera(80, window.innerWidth/window.innerHeight, 0.1, 2000);
            clock = new THREE.Clock();

            renderer = new THREE.WebGLRenderer({ antialias: false, powerPreference: "high-performance" });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(Math.min(window.devicePixelRatio, 1.2));
            document.body.appendChild(renderer.domElement);

            // Lighting Setup
            scene.add(new THREE.AmbientLight(0x405070, 0.8));
            
            spotLight = new THREE.SpotLight(0xfffce0, 480);
            spotLight.angle = Math.PI/7;
            spotLight.penumbra = 0.6;
            spotLight.decay = 2.0;
            spotLight.distance = 160;
            camera.add(spotLight);
            spotLight.position.set(0, 0, 0.1);
            spotLight.target.position.set(0, 0, -5);
            camera.add(spotLight.target);

            scene.add(camera);

            constructMultiLevelMaze();
            initializeEntities();
            setupErgonomicInput();
            mainEngineLoop();
        }

        function constructMultiLevelMaze() {
            const floorMat = new THREE.MeshLambertMaterial({ color: 0x050505 });

            for (let fIdx = 0; fIdx < 3; fIdx++) {
                const fOffset = fIdx * 30;
                const levelGrp = new THREE.Group();
                levelGrp.position.y = fOffset;

                // MAZE GENERATION LOGIC (Recursive Backtracker)
                const grid = Array(CORE.mazeDim).fill().map(() => Array(CORE.mazeDim).fill(15));
                const stack = [[0, 0]];
                const visitedSet = new Set(['0,0']);

                while (stack.length > 0) {
                    const [cx, cy] = stack[stack.length - 1];
                    const neighs = [];
                    [[0,1,1,4],[0,-1,4,1],[1,0,2,8],[-1,0,8,2]].forEach(([dx, dy, wall, opp]) => {
                        const nx = cx + dx, ny = cy + dy;
                        if (nx >= 0 && nx < CORE.mazeDim && ny >= 0 && ny < CORE.mazeDim && !visitedSet.has(`${nx},${ny}`)) {
                            neighs.push([nx, ny, wall, opp]);
                        }
                    });

                    if (neighs.length > 0) {
                        const [nx, ny, wBit, oBit] = neighs[Math.floor(Math.random() * neighs.length)];
                        grid[cy][cx] -= wBit;
                        grid[ny][nx] -= oBit;
                        visitedSet.add(`${nx},${ny}`);
                        stack.push([nx, ny]);
                    } else {
                        stack.pop();
                    }
                }

                // Building the Level
                for (let y = 0; y < CORE.mazeDim; y++) {
                    for (let x = 0; x < CORE.mazeDim; x++) {
                        const px = x * CORE.gridScale - (CORE.mazeDim * CORE.gridScale) / 2;
                        const pz = y * CORE.gridScale - (CORE.mazeDim * CORE.gridScale) / 2;
                        const v = grid[y][x];

                        if (v & 1) addWallBuffer(px, pz - CORE.gridScale/2, 0, levelGrp);
                        if (v & 4) addWallBuffer(px, pz + CORE.gridScale/2, 0, levelGrp);
                        if (v & 8) addWallBuffer(px - CORE.gridScale/2, pz, Math.PI/2, levelGrp);
                        if (v & 2) addWallBuffer(px + CORE.gridScale/2, pz, Math.PI/2, levelGrp);
                    }
                }

                const plane = new THREE.Mesh(new THREE.PlaneGeometry(500, 500), floorMat);
                plane.rotation.x = -Math.PI / 2;
                levelGrp.add(plane);

                // Entrance/Exit portals
                const exitGateway = new THREE.Mesh(
                    new THREE.BoxGeometry(7, 0.5, 7),
                    new THREE.MeshBasicMaterial({ color: 0x00f2ff, transparent: true, opacity: 0.35 })
                );
                exitGateway.position.set((CORE.mazeDim/2 - 1) * CORE.gridScale, 0.1, (CORE.mazeDim/2 - 1) * CORE.gridScale);
                levelGrp.add(exitGateway);

                scene.add(levelGrp);
            }
        }

        function addWallBuffer(x, z, r, g) {
            const wallMesh = new THREE.Mesh(
                new THREE.BoxGeometry(CORE.gridScale, 18, 1.4),
                new THREE.MeshLambertMaterial({ color: 0x141418 })
            );
            wallMesh.position.set(x, 9, z);
            wallMesh.rotation.y = r;
            g.add(wallMesh);
            CORE.geometryBuffer.push(wallMesh);
        }

        function initializeEntities() {
            // THE SURGEON (Primary Stalker)
            const surgeon = new AbominationComponent(true, 1);
            surgeon.container.position.set(-65, 0, -65);
            scene.add(surgeon.container);
            CORE.entities.push(surgeon);

            // THE PATIENTS (Compressed Abominations)
            for (let i = 0; i < 28; i++) {
                const targetFloor = (i % 3) + 1;
                const patient = new AbominationComponent(false, targetFloor);
                patient.container.position.set(
                    (Math.random() * 220) - 110,
                    (targetFloor - 1) * 30,
                    (Math.random() * 220) - 110
                );
                scene.add(patient.container);
                CORE.entities.push(patient);
            }
        }

        // --- 4. ERGONOMIC INPUT SYSTEM (Height Optimized) ---
        function setupErgonomicInput() {
            const mvZone = document.getElementById('input-move-zone');
            const lkZone = document.getElementById('input-look-zone');
            const stick = document.getElementById('joystick-handle');
            
            let startTouchX, startTouchY, lastX, lastY;

            mvZone.addEventListener('touchstart', e => {
                const touch = e.touches[0];
                startTouchX = touch.clientX;
                startTouchY = touch.clientY;
            });

            mvZone.addEventListener('touchmove', e => {
                e.preventDefault();
                const touch = e.touches[0];
                const deltaX = touch.clientX - startTouchX;
                const deltaY = touch.clientY - startTouchY;
                const maxDist = 55;
                const distance = Math.min(Math.sqrt(deltaX**2 + deltaY**2), maxDist);
                const angle = Math.atan2(deltaY, deltaX);

                stick.style.transform = `translate(${Math.cos(angle) * distance}px, ${Math.sin(angle) * distance}px)`;
                
                CORE.input.mv.set(
                    Math.cos(angle) * (distance / maxDist),
                    Math.sin(angle) * (distance / maxDist)
                );
                CORE.input.isInputActive = distance > 5;
            }, { passive: false });

            mvZone.addEventListener('touchend', () => {
                stick.style.transform = `translate(0,0)`;
                CORE.input.isInputActive = false;
                CORE.input.mv.set(0, 0);
            });

            lkZone.addEventListener('touchstart', e => {
                const t = e.touches[0];
                lastX = t.clientX;
                lastY = t.clientY;
            });

            lkZone.addEventListener('touchmove', e => {
                const t = e.touches[0];
                CORE.input.yaw -= (t.clientX - lastX) * CORE.rotationSpeed;
                CORE.input.pitch -= (t.clientY - lastY) * CORE.rotationSpeed;
                CORE.input.pitch = Math.max(-1.45, Math.min(1.45, CORE.input.pitch));
                lastX = t.clientX;
                lastY = t.clientY;
            });
        }

        // --- 5. CORE UPDATE LOOP (Octree Collision) ---
        function mainEngineLoop() {
            requestAnimationFrame(mainEngineLoop);
            
            if (CORE.isPlaying) {
                const deltaTime = clock.getDelta();

                // View Management
                camera.rotation.order = "YXZ";
                camera.rotation.y = CORE.input.yaw;
                camera.rotation.x = CORE.input.pitch;

                // Physics & Navigation
                if (CORE.input.isInputActive) {
                    const fwd = new THREE.Vector3(0, 0, -1).applyQuaternion(camera.quaternion);
                    const side = new THREE.Vector3(1, 0, 0).applyQuaternion(camera.quaternion);
                    fwd.y = 0; side.y = 0;
                    fwd.normalize(); side.normalize();

                    const moveDir = new THREE.Vector3()
                        .addScaledVector(fwd, -CORE.input.mv.y)
                        .addScaledVector(side, CORE.input.mv.x);
                    
                    // VERBOSE COLLISION RESOLUTION
                    const collider = new THREE.Raycaster(camera.position, moveDir.clone().normalize(), 0, CORE.collisionPadding);
                    const intersections = collider.intersectObjects(CORE.geometryBuffer);

                    if (intersections.length === 0) {
                        camera.position.addScaledVector(moveDir, CORE.movementSpeed);
                        // Head Bobbing Procedural Animation
                        camera.position.y = ((CORE.floor - 1) * 30) + CORE.playerHeight + Math.sin(Date.now() * 0.007) * 0.07;
                    }
                    CORE.audio.footsteps.volume = 0.5;
                } else {
                    CORE.audio.footsteps.volume = 0;
                }

                // Update All Entities
                let minThreatDist = 1000;
                CORE.entities.forEach(entity => {
                    const dist = entity.updateBehavior(camera.position);
                    if (entity.floor === CORE.floor && dist < minThreatDist) {
                        minThreatDist = dist;
                    }

                    // Boss-Specific Breathing Logic
                    if (entity.isBoss && entity.floor === CORE.floor && dist < 20) {
                        CORE.audio.breathing.volume = 1.0 - (dist / 20);
                    }
                });

                // Interface Logic
                refreshHUDDiagnostics(minThreatDist);

                // Exit Detection Logic
                const exX = (CORE.mazeDim/2 - 1) * CORE.gridScale;
                const exZ = (CORE.mazeDim/2 - 1) * CORE.gridScale;
                const portalCenter = new THREE.Vector3(exX, (CORE.floor - 1) * 30, exZ);
                
                if (camera.position.distanceTo(portalCenter) < 5 && CORE.floor < 3) {
                    handleFloorTransition();
                }
            }

            renderer.render(scene, camera);
        }

        function refreshHUDDiagnostics(dist) {
            const threatUi = document.getElementById('val-threat');
            const syncUi = document.getElementById('val-sync');

            if (dist < 18) {
                threatUi.innerText = "CRITICAL";
                threatUi.style.color = "var(--deep-red)";
            } else if (dist < 45) {
                threatUi.innerText = "ELEVATED";
                threatUi.style.color = "orange";
            } else {
                threatUi.innerText = "MINIMAL";
                threatUi.style.color = "var(--neon-blue)";
            }

            syncUi.innerText = (99 + Math.random()).toFixed(1) + "%";
        }

        function handleFloorTransition() {
            CORE.floor++;
            camera.position.set(0, ((CORE.floor - 1) * 30) + CORE.playerHeight, 0);
            document.getElementById('val-ward').innerText = "0" + CORE.floor;
            triggerFloorAlert();
        }

        function triggerFloorAlert() {
            const alert = document.getElementById('alert-announcer');
            alert.innerText = "WARD 0" + CORE.floor;
            alert.style.opacity = "1";
            alert.style.transform = "scale(1)";
            setTimeout(() => {
                alert.style.opacity = "0";
                alert.style.transform = "scale(0.85)";
            }, 3000);
        }

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

    </script>
</body>
</html>
