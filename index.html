<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>BLACKWOOD: THE ABOMINATION ENGINE V4</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/0.160.0/three.min.js"></script>
    <style>
        :root {
            --terminal-cyan: #00f2ff;
            --terminal-dim: #004444;
            --alert-red: #ff3300;
            --hospital-teal: #336666;
            --bg-black: #020205;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; touch-action: none; user-select: none; }
        
        body, html { 
            width: 100%; height: 100%; background: var(--bg-black); 
            overflow: hidden; font-family: 'Courier New', Courier, monospace; 
        }

        /* --- SYSTEM BOOT INTERFACE --- */
        #boot-layer {
            position: fixed; inset: 0; background: #000; z-index: 10000;
            display: flex; justify-content: center; align-items: center;
            transition: opacity 2s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .terminal-shell {
            width: 90%; max-width: 650px; padding: 40px;
            border: 1px solid #111; background: #010101;
            box-shadow: 0 0 100px rgba(0, 0, 0, 1);
        }

        .term-header {
            color: var(--terminal-cyan); font-size: 1.2rem; font-weight: 900;
            letter-spacing: 6px; margin-bottom: 30px; border-bottom: 1px solid #222;
            padding-bottom: 10px; text-transform: uppercase;
        }

        #load-progress-container { width: 100%; height: 2px; background: #111; margin-bottom: 20px; position: relative; }
        #load-progress-fill { width: 0%; height: 100%; background: var(--terminal-cyan); box-shadow: 0 0 15px var(--terminal-cyan); }

        #boot-log-stream {
            height: 180px; overflow: hidden; font-size: 0.7rem; color: #444;
            line-height: 1.8; text-align: left; white-space: pre-wrap;
        }

        /* --- HUD LAYER --- */
        #hud-container {
            position: absolute; inset: 0; pointer-events: none;
            display: none; z-index: 100;
        }

        #vignette {
            position: absolute; inset: 0;
            background: radial-gradient(circle, transparent 20%, rgba(0,0,0,0.95) 100%);
            mix-blend-mode: multiply;
        }

        /* ERGONOMIC CONTROLS */
        #move-input-region { position: absolute; left: 0; bottom: 0; width: 50%; height: 85%; pointer-events: auto; }
        #look-input-region { position: absolute; right: 0; bottom: 0; width: 50%; height: 100%; pointer-events: auto; }

        #joystick-base {
            position: absolute; bottom: 200px; left: 100px; /* HIGHER & CENTERED FOR THUMBS */
            width: 150px; height: 150px; border-radius: 50%;
            background: rgba(0, 242, 255, 0.02); border: 1px solid rgba(0, 242, 255, 0.1);
            backdrop-filter: blur(4px);
        }

        #joystick-knob {
            position: absolute; top: 50px; left: 50px; width: 50px; height: 50px;
            background: rgba(0, 242, 255, 0.15); border: 2px solid var(--terminal-cyan);
            border-radius: 50%; box-shadow: 0 0 20px rgba(0, 242, 255, 0.3);
        }

        /* UI ELEMENTS */
        .status-readout {
            position: absolute; top: 40px; left: 40px;
            color: var(--terminal-cyan); font-size: 0.7rem; line-height: 2.2;
            letter-spacing: 2px; text-shadow: 2px 2px #000;
        }

        #floor-announcer {
            position: absolute; top: 40%; width: 100%; text-align: center;
            color: #fff; font-size: 3rem; font-weight: 900;
            letter-spacing: 25px; opacity: 0; transition: opacity 1s, transform 1s;
            transform: scale(0.9);
        }

        .crosshair-system {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            width: 40px; height: 40px; pointer-events: none;
        }
        .ch-line { position: absolute; background: rgba(0, 242, 255, 0.3); }
        .ch-h { width: 100%; height: 1px; top: 50%; }
        .ch-v { height: 100%; width: 1px; left: 50%; }

        #scanlines-overlay {
            position: fixed; inset: 0;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.15) 50%), 
                        linear-gradient(90deg, rgba(255, 0, 0, 0.03), rgba(0, 255, 0, 0.01), rgba(0, 0, 255, 0.03));
            background-size: 100% 4px, 3px 100%;
            pointer-events: none; z-index: 500;
        }
    </style>
</head>
<body>

    <div id="scanlines-overlay"></div>

    <div id="boot-layer">
        <div class="terminal-shell">
            <div class="term-header">Neural_Link_v4.0.1</div>
            <div id="load-progress-container"><div id="load-progress-fill"></div></div>
            <div id="boot-log-stream"></div>
        </div>
    </div>

    <div id="hud-container">
        <div id="vignette"></div>
        <div class="crosshair-system">
            <div class="ch-line ch-h"></div>
            <div class="ch-line ch-v"></div>
        </div>
        
        <div class="status-readout">
            LINK_STABILITY: <span id="sync-val">98.2</span>%<br>
            HEART_RATE: <span id="bpm-val">72</span> BPM<br>
            THREAT_LEVEL: <span id="threat-val">MINIMAL</span><br>
            CURRENT_WARD: <span id="ward-val">01</span><br>
            STAIR_ACCESS: <span id="stair-val">LOCKED</span>
        </div>

        <div id="floor-announcer">WARD 01</div>

        <div id="move-input-region">
            <div id="joystick-base"><div id="joystick-knob"></div></div>
        </div>
        <div id="look-input-region"></div>
    </div>

    <audio id="audio-amb" loop><source src="mixkit-horror-ambience-2482.wav" type="audio/wav"></audio>
    <audio id="audio-step" loop><source src="mixkit-footsteps-in-a-tunnel-loop-543.wav" type="audio/wav"></audio>
    <audio id="audio-breath" loop><source src="mixkit-creepy-demon-heavy-breathing-2240.wav" type="audio/wav"></audio>

    <script>
        /**
         * BLACKWOOD: THE ABOMINATION ENGINE
         * CORE ARCHITECTURE v4.0.0
         * EXPANDED VERBOSE EDITION
         */

        // --- GLOBAL ENGINE STATE ---
        const ENGINE = {
            isReady: false,
            isActive: false,
            currentFloor: 1,
            mazeSize: 15,
            gridUnit: 24,
            playerHeight: 1.8,
            moveSpeed: 0.14,
            lookInertia: 0.0042,
            wallCollisionBuffer: 1.2,
            objects: {
                walls: [],
                entities: [],
                pickups: []
            },
            input: {
                moveVector: new THREE.Vector2(0, 0),
                isMoving: false,
                yaw: 0,
                pitch: 0
            },
            settings: {
                fov: 80,
                far: 2500,
                fogDensity: 0.065
            }
        };

        let scene, camera, renderer, clock, flashlight, ambient, hemisphere;
        let sfxAmb, sfxStep, sfxBreath;

        // --- 1. THE INITIALIZATION PIPELINE ---
        function runSystemBoot() {
            const progressFill = document.getElementById('load-progress-fill');
            const logElement = document.getElementById('boot-log-stream');
            
            const bootTasks = [
                "Initializing Three.js WebGL2 Context...",
                "Generating Recursive Backtracker Maze Arrays...",
                "Allocating Vertex Buffer for 40x40x40 Abominations...",
                "Synthesizing Procedural Stitched Textures...",
                "Injecting 'Surgeon' Pathfinding Logic...",
                "Optimizing Ergonomic Joystick (Y-Offset: 200px)...",
                "Mapping Hospital Teal Palette for Patient Class...",
                "Applying Multi-Color Jitter to Mesh Vertices...",
                "Configuring Spatial Audio Attenuation...",
                "Neural Uplink Established. Ready for Injection."
            ];

            let progressValue = 0;
            const bootSequence = setInterval(() => {
                progressValue += Math.random() * 1.8;
                
                if (progressValue >= 100) {
                    progressValue = 100;
                    clearInterval(bootSequence);
                    ENGINE.isReady = true;
                    logElement.innerHTML = "<span style='color:#fff; font-weight:bold'>[CRITICAL] TAP TO COMMENCE LINK</span><br>" + logElement.innerHTML;
                    initThreeScene();
                }

                progressFill.style.width = progressValue + "%";
                
                if (Math.floor(progressValue) % 10 === 0) {
                    const taskIndex = Math.floor(progressValue / 10);
                    if (bootTasks[taskIndex]) {
                        logElement.innerHTML = `> ${bootTasks[taskIndex]}<br>${logElement.innerHTML}`;
                    }
                }
            }, 35);
        }

        const handleUserActivation = () => {
            if (!ENGINE.isReady || ENGINE.isActive) return;
            ENGINE.isActive = true;
            
            document.getElementById('boot-layer').style.opacity = '0';
            setTimeout(() => {
                document.getElementById('boot-layer').style.display = 'none';
                document.getElementById('hud-container').style.display = 'block';
                showFloorAnnouncement();
            }, 1500);

            // Audio Initialization
            sfxAmb = document.getElementById('audio-amb');
            sfxStep = document.getElementById('audio-step');
            sfxBreath = document.getElementById('audio-breath');
            
            sfxAmb.volume = 0.35;
            sfxStep.volume = 0;
            sfxBreath.volume = 0;

            [sfxAmb, sfxStep, sfxBreath].forEach(clip => {
                clip.play().catch(e => console.warn("Audio Context Blocked"));
            });
        };

        window.addEventListener('touchstart', handleUserActivation);
        window.addEventListener('mousedown', handleUserActivation);
        window.onload = runSystemBoot;

        // --- 2. ADVANCED ENTITY FACTORY (40x40x40 MULTI-COLOR) ---
        class AbominationEntity {
            constructor(isBoss, floorLevel) {
                this.meshGroup = new THREE.Group();
                this.isBoss = isBoss;
                this.floor = floorLevel;
                this.baseSpeed = isBoss ? 0.085 : 0.04 + (Math.random() * 0.04);
                
                // Color Management
                this.colors = isBoss 
                    ? [0x000000, 0x111111, 0x080808, 0x1a1a1a] 
                    : [0x336666, 0x447777, 0x2d5252, 0x669999, 0xdcdcdc];
                
                this.constructTexturedBody();
            }

            constructTexturedBody() {
                const partScale = 4.5; // Roughly 40px in world units

                // We build each major limb out of "Stitched" sub-blocks to create a multi-color textured look
                this.addStitchedPart(partScale, partScale, partScale, 0, partScale, 0);       // Torso
                this.addStitchedPart(partScale*0.8, partScale*0.8, partScale*0.8, 0, partScale*2.1, 0); // Head
                this.addStitchedPart(partScale*0.4, partScale*1.3, partScale*0.4, -partScale*0.8, partScale, 0); // L-Arm
                this.addStitchedPart(partScale*0.4, partScale*1.3, partScale*0.4, partScale*0.8, partScale, 0);  // R-Arm
                this.addStitchedPart(partScale*0.5, partScale*1.4, partScale*0.5, -partScale*0.4, 0, 0); // L-Leg
                this.addStitchedPart(partScale*0.5, partScale*1.4, partScale*0.5, partScale*0.4, 0, 0);  // R-Leg

                if (this.isBoss) {
                    const glowingVisor = new THREE.Mesh(
                        new THREE.BoxGeometry(partScale*0.8, 0.25, 0.15),
                        new THREE.MeshBasicMaterial({ color: 0xff0000 })
                    );
                    glowingVisor.position.set(0, partScale*2.2, partScale*0.35);
                    this.meshGroup.add(glowingVisor);
                }
            }

            addStitchedPart(w, h, d, x, y, z) {
                const limbGroup = new THREE.Group();
                const subDivisions = 6;

                for (let i = 0; i < subDivisions; i++) {
                    const color = this.colors[Math.floor(Math.random() * this.colors.length)];
                    const subMesh = new THREE.Mesh(
                        new THREE.BoxGeometry(
                            w * (0.8 + Math.random() * 0.4),
                            h * (0.8 + Math.random() * 0.4),
                            d * (0.8 + Math.random() * 0.4)
                        ),
                        new THREE.MeshLambertMaterial({ color: color })
                    );
                    
                    subMesh.position.set(
                        (Math.random() - 0.5) * (w * 0.2),
                        (Math.random() - 0.5) * (h * 0.2),
                        (Math.random() - 0.5) * (d * 0.2)
                    );
                    limbGroup.add(subMesh);
                }
                
                limbGroup.position.set(x, y, z);
                this.meshGroup.add(limbGroup);
            }

            tick(playerPos) {
                if (this.floor !== ENGINE.currentFloor) return 500;

                const distance = this.meshGroup.position.distanceTo(playerPos);
                
                if (distance < 70) {
                    this.meshGroup.lookAt(playerPos.x, this.meshGroup.position.y, playerPos.z);
                    const moveDir = new THREE.Vector3().subVectors(playerPos, this.meshGroup.position).normalize();
                    moveDir.y = 0;
                    this.meshGroup.position.addScaledVector(moveDir, this.baseSpeed);
                }
                
                return distance;
            }
        }

        // --- 3. 3D SCENE ARCHITECTURE ---
        function initThreeScene() {
            scene = new THREE.Scene();
            scene.fog = new THREE.FogExp2(0x050608, ENGINE.settings.fogDensity);

            camera = new THREE.PerspectiveCamera(ENGINE.settings.fov, window.innerWidth/window.innerHeight, 0.1, ENGINE.settings.far);
            clock = new THREE.Clock();

            renderer = new THREE.WebGLRenderer({ antialias: false, powerPreference: "high-performance" });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(Math.min(window.devicePixelRatio, 1.2));
            document.body.appendChild(renderer.domElement);

            // Lighting Setup
            ambient = new THREE.AmbientLight(0x405070, 0.75);
            scene.add(ambient);

            hemisphere = new THREE.HemisphereLight(0x6080ff, 0x050505, 0.4);
            scene.add(hemisphere);

            flashlight = new THREE.SpotLight(0xfffce0, 450);
            flashlight.angle = Math.PI/7.5;
            flashlight.penumbra = 0.5;
            flashlight.decay = 2.0;
            flashlight.distance = 180;
            camera.add(flashlight);
            flashlight.position.set(0, 0, 0.1);
            flashlight.target.position.set(0, 0, -5);
            camera.add(flashlight.target);

            scene.add(camera);

            buildMazeComplexity();
            spawnAbominations();
            initErgonomicControls();
            mainRenderLoop();
        }

        function buildMazeComplexity() {
            const wallMaterial = new THREE.MeshLambertMaterial({ color: 0x121215 });
            const floorMaterial = new THREE.MeshLambertMaterial({ color: 0x050505 });

            for (let floorIdx = 0; floorIdx < 3; floorIdx++) {
                const floorOffset = floorIdx * 30;
                const levelGroup = new THREE.Group();
                levelGroup.position.y = floorOffset;

                // Procedural Generation Algorithm
                const grid = Array(ENGINE.mazeSize).fill().map(() => Array(ENGINE.mazeSize).fill(15));
                const stack = [[0, 0]];
                const visited = new Set(['0,0']);

                while (stack.length > 0) {
                    const [cx, cy] = stack[stack.length - 1];
                    const neighbors = [];
                    [[0,1,1,4],[0,-1,4,1],[1,0,2,8],[-1,0,8,2]].forEach(([dx, dy, wallBit, oppositeBit]) => {
                        const nx = cx + dx, ny = cy + dy;
                        if (nx >= 0 && nx < ENGINE.mazeSize && ny >= 0 && ny < ENGINE.mazeSize && !visited.has(`${nx},${ny}`)) {
                            neighbors.push([nx, ny, wallBit, oppositeBit]);
                        }
                    });

                    if (neighbors.length > 0) {
                        const [nx, ny, wallBit, oppositeBit] = neighbors[Math.floor(Math.random() * neighbors.length)];
                        grid[cy][cx] -= wallBit;
                        grid[ny][nx] -= oppositeBit;
                        visited.add(`${nx},${ny}`);
                        stack.push([nx, ny]);
                    } else {
                        stack.pop();
                    }
                }

                // Mesh Instantiation
                for (let y = 0; y < ENGINE.mazeSize; y++) {
                    for (let x = 0; x < ENGINE.mazeSize; x++) {
                        const posX = x * ENGINE.gridUnit - (ENGINE.mazeSize * ENGINE.gridUnit) / 2;
                        const posZ = y * ENGINE.gridUnit - (ENGINE.mazeSize * ENGINE.gridUnit) / 2;
                        const cellVal = grid[y][x];

                        if (cellVal & 1) createWallMesh(posX, posZ - ENGINE.gridUnit/2, 0, levelGroup);
                        if (cellVal & 4) createWallMesh(posX, posZ + ENGINE.gridUnit/2, 0, levelGroup);
                        if (cellVal & 8) createWallMesh(posX - ENGINE.gridUnit/2, posZ, Math.PI/2, levelGroup);
                        if (cellVal & 2) createWallMesh(posX + ENGINE.gridUnit/2, posZ, Math.PI/2, levelGroup);
                    }
                }

                const floorPlane = new THREE.Mesh(new THREE.PlaneGeometry(500, 500), floorMaterial);
                floorPlane.rotation.x = -Math.PI / 2;
                levelGroup.add(floorPlane);

                // Exit Gateway
                const gateway = new THREE.Mesh(
                    new THREE.BoxGeometry(6, 0.5, 6),
                    new THREE.MeshBasicMaterial({ color: 0x00f2ff, transparent: true, opacity: 0.4 })
                );
                gateway.position.set((ENGINE.mazeSize/2 - 1) * ENGINE.gridUnit, 0.1, (ENGINE.mazeSize/2 - 1) * ENGINE.gridUnit);
                gateway.name = "EXIT_PORTAL";
                levelGroup.add(gateway);

                scene.add(levelGroup);
            }
        }

        function createWallMesh(x, z, rot, group) {
            const wall = new THREE.Mesh(
                new THREE.BoxGeometry(ENGINE.gridUnit, 18, 1.2),
                new THREE.MeshLambertMaterial({ color: 0x15151a })
            );
            wall.position.set(x, 9, z);
            wall.rotation.y = rot;
            group.add(wall);
            ENGINE.objects.walls.push(wall);
        }

        function spawnAbominations() {
            // The Surgeon (Floor 1 Stalker)
            const surgeon = new AbominationEntity(true, 1);
            surgeon.meshGroup.position.set(-60, 0, -60);
            scene.add(surgeon.meshGroup);
            ENGINE.objects.entities.push(surgeon);

            // Patient Classes
            for (let i = 0; i < 24; i++) {
                const targetFloor = (i % 3) + 1;
                const patient = new AbominationEntity(false, targetFloor);
                patient.meshGroup.position.set(
                    (Math.random() * 200) - 100,
                    (targetFloor - 1) * 30,
                    (Math.random() * 200) - 100
                );
                scene.add(patient.meshGroup);
                ENGINE.objects.entities.push(patient);
            }
        }

        // --- 4. ERGONOMIC CONTROL SYSTEM ---
        function initErgonomicControls() {
            const moveZone = document.getElementById('move-input-region');
            const lookZone = document.getElementById('look-input-region');
            const knob = document.getElementById('joystick-knob');
            
            let startX, startY, lastTouchX, lastTouchY;

            moveZone.addEventListener('touchstart', e => {
                const touch = e.touches[0];
                startX = touch.clientX;
                startY = touch.clientY;
            });

            moveZone.addEventListener('touchmove', e => {
                e.preventDefault();
                const touch = e.touches[0];
                const deltaX = touch.clientX - startX;
                const deltaY = touch.clientY - startY;
                const distance = Math.min(Math.sqrt(deltaX**2 + deltaY**2), 50);
                const angle = Math.atan2(deltaY, deltaX);

                knob.style.transform = `translate(${Math.cos(angle) * distance}px, ${Math.sin(angle) * distance}px)`;
                
                ENGINE.input.moveVector.set(
                    Math.cos(angle) * (distance / 50),
                    Math.sin(angle) * (distance / 50)
                );
                ENGINE.input.isMoving = distance > 5;
            }, { passive: false });

            moveZone.addEventListener('touchend', () => {
                knob.style.transform = `translate(0,0)`;
                ENGINE.input.isMoving = false;
                ENGINE.input.moveVector.set(0, 0);
            });

            lookZone.addEventListener('touchstart', e => {
                const touch = e.touches[0];
                lastTouchX = touch.clientX;
                lastTouchY = touch.clientY;
            });

            lookZone.addEventListener('touchmove', e => {
                const touch = e.touches[0];
                ENGINE.input.yaw -= (touch.clientX - lastTouchX) * ENGINE.lookInertia;
                ENGINE.input.pitch -= (touch.clientY - lastTouchY) * ENGINE.lookInertia;
                ENGINE.input.pitch = Math.max(-1.4, Math.min(1.4, ENGINE.input.pitch));
                lastTouchX = touch.clientX;
                lastTouchY = touch.clientY;
            });
        }

        // --- 5. CORE UPDATE LOOP ---
        function mainRenderLoop() {
            requestAnimationFrame(mainRenderLoop);
            
            if (ENGINE.isActive) {
                const dt = clock.getDelta();

                // Player Rotation
                camera.rotation.order = "YXZ";
                camera.rotation.y = ENGINE.input.yaw;
                camera.rotation.x = ENGINE.input.pitch;

                // Player Movement & Physics
                if (ENGINE.input.isMoving) {
                    const forward = new THREE.Vector3(0, 0, -1).applyQuaternion(camera.quaternion);
                    const right = new THREE.Vector3(1, 0, 0).applyQuaternion(camera.quaternion);
                    forward.y = 0; right.y = 0;
                    forward.normalize(); right.normalize();

                    const direction = new THREE.Vector3()
                        .addScaledVector(forward, -ENGINE.input.moveVector.y)
                        .addScaledVector(right, ENGINE.input.moveVector.x);
                    
                    // Simple Box Collision Raycast
                    const ray = new THREE.Raycaster(camera.position, direction.clone().normalize(), 0, ENGINE.wallCollisionBuffer);
                    const wallHits = ray.intersectObjects(ENGINE.objects.walls);

                    if (wallHits.length === 0) {
                        camera.position.addScaledVector(direction, ENGINE.moveSpeed);
                        // Head Bobbing Logic
                        camera.position.y = ((ENGINE.currentFloor - 1) * 30) + ENGINE.playerHeight + Math.sin(Date.now() * 0.008) * 0.06;
                    }
                    sfxStep.volume = 0.45;
                } else {
                    sfxStep.volume = 0;
                }

                // Entity Intelligence
                let minDistance = 1000;
                ENGINE.objects.entities.forEach(ent => {
                    const dist = ent.tick(camera.position);
                    if (ent.floor === ENGINE.currentFloor && dist < minDistance) {
                        minDistance = dist;
                    }

                    // Specialized Audio for Surgeon
                    if (ent.isBoss && ent.floor === ENGINE.currentFloor && dist < 18) {
                        sfxBreath.volume = 1.0 - (dist / 18);
                    }
                });

                // UI Diagnostic Updates
                updateDiagnosticInterface(minDistance);

                // Goal Detection (Stairs)
                const exitX = (ENGINE.mazeSize/2 - 1) * ENGINE.gridUnit;
                const exitZ = (ENGINE.mazeSize/2 - 1) * ENGINE.gridUnit;
                const distToExit = camera.position.distanceTo(new THREE.Vector3(exitX, (ENGINE.currentFloor - 1) * 30, exitZ));
                
                if (distToExit < 5 && ENGINE.currentFloor < 3) {
                    transitionToNextFloor();
                }
                
                document.getElementById('stair-val').innerText = distToExit < 20 ? "IN_RANGE" : "LOCKED";
            }

            renderer.render(scene, camera);
        }

        function updateDiagnosticInterface(dist) {
            const threatEl = document.getElementById('threat-val');
            const bpmEl = document.getElementById('bpm-val');
            const syncEl = document.getElementById('sync-val');

            if (dist < 20) {
                threatEl.innerText = "CRITICAL";
                threatEl.style.color = "var(--alert-red)";
                bpmEl.innerText = Math.floor(110 + Math.random() * 20);
            } else if (dist < 45) {
                threatEl.innerText = "ELEVATED";
                threatEl.style.color = "orange";
                bpmEl.innerText = Math.floor(85 + Math.random() * 10);
            } else {
                threatEl.innerText = "MINIMAL";
                threatEl.style.color = "var(--terminal-cyan)";
                bpmEl.innerText = Math.floor(70 + Math.random() * 5);
            }

            syncEl.innerText = (98 + Math.random()).toFixed(1);
        }

        function transitionToNextFloor() {
            ENGINE.currentFloor++;
            camera.position.set(0, ((ENGINE.currentFloor - 1) * 30) + ENGINE.playerHeight, 0);
            document.getElementById('ward-val').innerText = "0" + ENGINE.currentFloor;
            showFloorAnnouncement();
        }

        function showFloorAnnouncement() {
            const el = document.getElementById('floor-announcer');
            el.innerText = "WARD 0" + ENGINE.currentFloor;
            el.style.opacity = "1";
            el.style.transform = "scale(1)";
            setTimeout(() => {
                el.style.opacity = "0";
                el.style.transform = "scale(0.9)";
            }, 3000);
        }

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

    </script>
</body>
