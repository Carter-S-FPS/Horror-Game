<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>BLACKWOOD: THE SURGEON'S REACH - MASTER BRANCH v7.0</title>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/0.160.0/three.min.js"></script>

    <style>
        :root { 
            --horror-red: #bb0000; 
            --ui-gold: #c5a059;
            --terminal-font: 'Courier New', Courier, monospace;
        }
        
        * { 
            margin: 0; padding: 0; box-sizing: border-box; 
            touch-action: none; -webkit-tap-highlight-color: transparent; 
            user-select: none; outline: none;
        }

        body, html { 
            width: 100%; height: 100%; background: #000; 
            overflow: hidden; font-family: var(--terminal-font); 
        }

        /* --- LOADING INTERFACE --- */
        #overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(to bottom, #050505, #000);
            display: flex; justify-content: center; align-items: center;
            z-index: 10000; transition: opacity 2.5s cubic-bezier(0.4, 0, 0.2, 1);
        }

        #load-container { width: 300px; text-align: left; position: relative; }

        h1 { 
            color: var(--horror-red); font-size: 0.9rem; 
            letter-spacing: 5px; margin-bottom: 10px; 
            text-transform: uppercase; font-weight: 100;
        }

        #progress-frame { 
            width: 100%; height: 2px; background: #1a1a1a; 
            position: relative; margin-bottom: 15px; 
        }

        #progress-bar { 
            width: 0%; height: 100%; background: var(--horror-red); 
            box-shadow: 0 0 15px #ff0000; transition: width 0.3s; 
        }

        .meta-text { color: #444; font-size: 0.6rem; letter-spacing: 2px; margin-top: 5px; }

        /* --- HUD & INTERFACE --- */
        #game-ui { 
            position: absolute; top: 0; left: 0; width: 100%; height: 100%; 
            pointer-events: none; display: none; z-index: 100;
        }

        #vignette-heavy { 
            position: absolute; width: 100%; height: 100%; 
            background: radial-gradient(circle, transparent 20%, rgba(0,0,0,0.8) 70%, #000 100%);
        }

        #scanner-hud {
            position: absolute; top: 30px; left: 30px;
            border-left: 2px solid var(--horror-red);
            padding-left: 15px; color: var(--horror-red);
            font-size: 0.7rem; opacity: 0.6;
        }

        /* --- JOYSTICK SYSTEM --- */
        #joy-wrapper {
            position: absolute; bottom: 60px; left: 60px;
            width: 160px; height: 160px; pointer-events: auto;
        }

        #joy-outer { 
            width: 100%; height: 100%; border-radius: 50%;
            border: 1px solid rgba(255,255,255,0.05);
            background: radial-gradient(circle, rgba(255,255,255,0.02) 0%, transparent 70%);
        }

        #joy-inner { 
            position: absolute; top: 55px; left: 55px; 
            width: 50px; height: 50px; border-radius: 50%;
            background: rgba(187, 0, 0, 0.1); 
            border: 1px solid rgba(255, 0, 0, 0.2);
            box-shadow: 0 0 20px rgba(0,0,0,0.8);
        }

        #grain-canvas {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none; z-index: 50; opacity: 0.06;
        }

        @keyframes glitch {
            0% { transform: translate(0); }
            20% { transform: translate(-2px, 2px); }
            40% { transform: translate(-2px, -2px); }
            60% { transform: translate(2px, 2px); }
            80% { transform: translate(2px, -2px); }
            100% { transform: translate(0); }
        }
        .glitch-anim { animation: glitch 0.2s infinite; }
    </style>
</head>
<body>

    <div id="overlay">
        <div id="load-container">
            <h1 id="title-text">Establishing Connection</h1>
            <div id="progress-frame"><div id="progress-bar"></div></div>
            <p class="meta-text" id="status-sub">Allocating Memory...</p>
        </div>
    </div>

    <div id="game-ui">
        <div id="vignette-heavy"></div>
        <div id="scanner-hud">
            <p>SENSORS: ONLINE</p>
            <p id="dist-ui">PROXIMITY: NO_SIGNAL</p>
            <p id="sanity-ui">SANITY: 100%</p>
        </div>
        <div id="joy-wrapper">
            <div id="joy-outer"><div id="joy-inner"></div></div>
        </div>
    </div>

    <canvas id="grain-canvas"></canvas>

    <audio id="aud-ambience" loop><source src="mixkit-horror-ambience-2482.wav" type="audio/wav"></audio>
    <audio id="aud-steps" loop><source src="mixkit-footsteps-in-a-tunnel-loop-543.wav" type="audio/wav"></audio>
    <audio id="aud-breath" loop><source src="mixkit-creepy-demon-heavy-breathing-2240.wav" type="audio/wav"></audio>

    <script>
        /**
         * BLACKWOOD HORROR ENGINE v7.5
         * Deep Immersion Branch
         */

        const CONFIG = {
            viewDist: 120,
            segLength: 12,
            segCount: 400,
            flashlightPower: 180,
            baseSanity: 100,
            surgeonSpeedNormal: 0.04,
            surgeonSpeedStalk: 9.5
        };

        const WORLD = {
            scene: null, camera: null, renderer: null, clock: null,
            surgeon: null, flashlight: null, ambient: null,
            segments: [], items: [], particles: [],
            state: { loaded: false, started: false, moving: false, sanity: 100, moveVec: new THREE.Vector3() }
        };

        const SFX = { amb: null, steps: null, breath: null };

        // --- 1. BOOT SEQUENCE ---
        function initializeEngine() {
            const bar = document.getElementById('progress-bar');
            const status = document.getElementById('status-sub');
            const title = document.getElementById('title-text');
            let p = 0;

            const bootLoop = () => {
                p += Math.random() * 0.8;
                if (p >= 100) {
                    p = 100;
                    WORLD.state.loaded = true;
                    title.innerText = "LINK ESTABLISHED";
                    status.innerText = "TOUCH SCREEN TO INITIALIZE";
                    status.style.color = "#fff";
                    setup3D();
                } else {
                    bar.style.width = p + "%";
                    if(p > 20) status.innerText = "Parsing Geometry Buffers...";
                    if(p > 50) status.innerText = "Synthesizing Vocal Echoes...";
                    if(p > 80) status.innerText = "Calculating The Surgeon's Reach...";
                    requestAnimationFrame(bootLoop);
                }
            };
            bootLoop();
        }

        const triggerAwake = () => {
            if (!WORLD.state.loaded || WORLD.state.started) return;
            WORLD.state.started = true;
            
            document.getElementById('overlay').style.opacity = '0';
            setTimeout(() => document.getElementById('overlay').style.display = 'none', 2500);
            document.getElementById('game-ui').style.display = 'block';

            SFX.amb = document.getElementById('aud-ambience');
            SFX.steps = document.getElementById('aud-steps');
            SFX.breath = document.getElementById('aud-breath');
            
            SFX.amb.volume = 0.35;
            SFX.steps.volume = 0;
            SFX.breath.volume = 0;
            
            [SFX.amb, SFX.steps, SFX.breath].forEach(a => a.play().catch(()=>{}));
        };

        window.addEventListener('mousedown', triggerAwake);
        window.addEventListener('touchstart', triggerAwake);
        window.onload = initializeEngine;

        // --- 2. ARCHITECTURAL ASSEMBLY ---
        function setup3D() {
            WORLD.scene = new THREE.Scene();
            WORLD.scene.fog = new THREE.FogExp2(0x050505, 0.07);

            WORLD.camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 2000);
            WORLD.clock = new THREE.Clock();

            WORLD.renderer = new THREE.WebGLRenderer({ antialias: false, powerPreference: "high-performance" });
            WORLD.renderer.setSize(window.innerWidth, window.innerHeight);
            WORLD.renderer.setPixelRatio(Math.min(window.devicePixelRatio, 1.5));
            document.body.appendChild(WORLD.renderer.domElement);

            // Lighting Logic
            WORLD.ambient = new THREE.AmbientLight(0x222222, 0.3);
            WORLD.scene.add(WORLD.ambient);

            WORLD.flashlight = new THREE.SpotLight(0xfff9e0, CONFIG.flashlightPower);
            WORLD.flashlight.angle = Math.PI / 6.5;
            WORLD.flashlight.penumbra = 0.5;
            WORLD.flashlight.decay = 2;
            WORLD.flashlight.distance = 90;
            
            WORLD.camera.add(WORLD.flashlight);
            WORLD.flashlight.position.set(0, 0, 0.1);
            WORLD.flashlight.target.position.set(0, 0, -5);
            WORLD.camera.add(WORLD.flashlight.target);
            WORLD.scene.add(WORLD.camera);

            createAsylumMesh();
            createSurgeonMesh();
            bindControls();
            renderLoop();
        }

        function createAsylumMesh() {
            const wallMat = new THREE.MeshLambertMaterial({ color: 0x181818 });
            const floorMat = new THREE.MeshLambertMaterial({ color: 0x0a0a0a });
            const detailMat = new THREE.MeshLambertMaterial({ color: 0x333333 });

            for (let i = 0; i < CONFIG.segCount; i++) {
                const seg = new THREE.Group();
                const z = -i * CONFIG.segLength;

                // Main Hallway
                const floor = new THREE.Mesh(new THREE.PlaneGeometry(12, 12), floorMat);
                floor.rotation.x = -Math.PI / 2;
                seg.add(floor);

                const ceil = new THREE.Mesh(new THREE.PlaneGeometry(12, 12), wallMat);
                ceil.rotation.x = Math.PI / 2; ceil.position.y = 8;
                seg.add(ceil);

                const lWall = new THREE.Mesh(new THREE.BoxGeometry(0.5, 8, 12), wallMat);
                lWall.position.set(-6, 4, 0);
                seg.add(lWall);

                const rWall = new THREE.Mesh(new THREE.BoxGeometry(0.5, 8, 12), wallMat);
                rWall.position.set(6, 4, 0);
                seg.add(rWall);

                // Procedural Side Rooms
                if (i > 5 && Math.random() > 0.85) {
                    const side = Math.random() > 0.5 ? 1 : -1;
                    const room = new THREE.Mesh(new THREE.BoxGeometry(8, 6, 8), wallMat);
                    room.position.set(10 * side, 3, 0);
                    seg.add(room);
                    
                    // Interior Clutter
                    const table = new THREE.Mesh(new THREE.BoxGeometry(3, 1, 3), detailMat);
                    table.position.set(10 * side, 0.5, 0);
                    seg.add(table);
                }

                // Electrical Fixtures (Visibility Aid)
                if (i % 12 === 0) {
                    const lightBox = new THREE.Mesh(new THREE.BoxGeometry(1.5, 0.1, 0.4), new THREE.MeshBasicMaterial({color: 0x222222}));
                    lightBox.position.set(0, 7.9, 0);
                    seg.add(lightBox);

                    const pLight = new THREE.PointLight(0xaa0000, 1.5, 15);
                    pLight.position.set(0, 7.5, 0);
                    seg.add(pLight);
                }

                seg.position.z = z;
                WORLD.scene.add(seg);
                WORLD.segments.push(seg);
            }
        }

        function createSurgeonMesh() {
            WORLD.surgeon = new THREE.Group();
            const skin = new THREE.MeshLambertMaterial({ color: 0x050505 });
            const cloth = new THREE.MeshLambertMaterial({ color: 0x1a1a1a });

            const body = new THREE.Mesh(new THREE.BoxGeometry(0.6, 1.5, 0.4), cloth);
            body.position.y = 0.75;

            const head = new THREE.Mesh(new THREE.BoxGeometry(0.35, 0.45, 0.35), skin);
            head.position.y = 1.75;

            const lArm = new THREE.Mesh(new THREE.BoxGeometry(0.18, 1.3, 0.18), cloth);
            lArm.position.set(-0.45, 1.0, 0);

            const rArm = new THREE.Mesh(new THREE.BoxGeometry(0.18, 1.3, 0.18), cloth);
            rArm.position.set(0.45, 1.0, 0);

            WORLD.surgeon.add(body, head, lArm, rArm);
            WORLD.surgeon.position.set(0, 0, -40);
            WORLD.scene.add(WORLD.surgeon);
        }

        // --- 3. INPUT & DYNAMICS ---
        function bindControls() {
            const zone = document.getElementById('joy-wrapper');
            const stick = document.getElementById('joy-inner');
            let cx, cy;

            zone.addEventListener('touchstart', (e) => {
                const r = zone.getBoundingClientRect();
                cx = r.left + r.width/2; cy = r.top + r.height/2;
            });

            zone.addEventListener('touchmove', (e) => {
                e.preventDefault();
                const t = e.touches[0];
                const dx = t.clientX - cx, dy = t.clientY - cy;
                const d = Math.min(Math.sqrt(dx*dx + dy*dy), 55);
                const a = Math.atan2(dy, dx);

                stick.style.transform = `translate(${Math.cos(a)*d}px, ${Math.sin(a)*d}px)`;
                WORLD.state.moveVec.z = Math.sin(a) * (d/55) * 0.35;
                WORLD.state.moveVec.x = -Math.cos(a) * (d/55) * 0.35;
                WORLD.state.moving = d > 10;
            }, { passive: false });

            window.addEventListener('touchend', () => {
                stick.style.transform = `translate(0,0)`;
                WORLD.state.moving = false;
                WORLD.state.moveVec.set(0, 0, 0);
            });
        }

        function updateAudioSpatial() {
            if (!WORLD.state.started) return;
            const dist = WORLD.camera.position.distanceTo(WORLD.surgeon.position);
            
            // Proximity HUD update
            document.getElementById('dist-ui').innerText = dist < 25 ? `PROXIMITY: CRITICAL` : `PROXIMITY: ${Math.floor(dist)}m`;
            
            // Breath Scaling
            let bVol = 1.0 - (dist / 50);
            bVol = Math.max(0, Math.min(bVol, 1));
            SFX.breath.volume = Math.pow(bVol, 1.6) * 0.95;

            // Step Scaling
            if (WORLD.state.moving) {
                SFX.steps.volume = Math.min(SFX.steps.volume + 0.05, 0.45);
            } else {
                SFX.steps.volume = Math.max(SFX.steps.volume - 0.05, 0);
            }
        }

        function updateSurgeonAI(delta) {
            const cam = WORLD.camera;
            const surg = WORLD.surgeon;
            
            // Frustum check for "Object Impermanence" logic
            const proj = new THREE.Matrix4().multiplyMatrices(cam.projectionMatrix, cam.matrixWorldInverse);
            const frustum = new THREE.Frustum().setFromProjectionMatrix(proj);
            const isVisible = frustum.containsPoint(surg.position);

            if (!isVisible) {
                // He hunts when you aren't looking
                surg.position.z += delta * CONFIG.surgeonSpeedStalk;
                surg.lookAt(cam.position.x, 0, cam.position.z);
            } else {
                // He creeps when seen
                surg.position.z += delta * 0.6;
                WORLD.state.sanity -= 0.005; // Looking at him drains sanity
            }

            // Bound him within range
            const d = cam.position.distanceTo(surg.position);
            if (d > 80) surg.position.z = cam.position.z - 45;

            // Limb Animation
            const t = Date.now() * 0.007;
            surg.children[2].rotation.x = Math.sin(t) * 0.5;
            surg.children[3].rotation.x = -Math.sin(t) * 0.5;
        }

        // --- 4. ENGINE CORE ---
        function renderLoop() {
            requestAnimationFrame(renderLoop);
            const delta = WORLD.clock.getDelta();

            if (WORLD.state.moving) {
                WORLD.camera.position.z += WORLD.state.moveVec.z;
                WORLD.camera.position.x += WORLD.state.moveVec.x;
                
                // Detailed Head Bobbing
                WORLD.camera.position.y = 1.6 + Math.sin(Date.now() * 0.008) * 0.08;
                WORLD.camera.rotation.z = Math.sin(Date.now() * 0.004) * 0.02;
            }

            // Sanity Degradation Visuals
            const sanPercent = Math.floor(WORLD.state.sanity);
            document.getElementById('sanity-ui').innerText = `SANITY: ${sanPercent}%`;
            if (sanPercent < 50) {
                WORLD.ambient.color.setHex(0x330000);
            }

            // Flashlight Instability
            if (Math.random() > 0.985) {
                WORLD.flashlight.intensity = 40 + Math.random() * 160;
                if (Math.random() > 0.99) WORLD.flashlight.intensity = 0; // Temporary blackout
            }

            // Dynamic Segment Culling
            WORLD.segments.forEach(seg => {
                const zDiff = WORLD.camera.position.z - seg.position.z;
                seg.visible = (zDiff > -CONFIG.viewDist && zDiff < 20);
            });

            updateSurgeonAI(delta);
            updateAudioSpatial();

            WORLD.renderer.render(WORLD.scene, WORLD.camera);
        }

        // Window Handlers
        window.addEventListener('resize', () => {
            WORLD.camera.aspect = window.innerWidth / window.innerHeight;
            WORLD.camera.updateProjectionMatrix();
            WORLD.renderer.setSize(window.innerWidth, window.innerHeight);
        });

        // Prevent Context Menu
        window.oncontextmenu = (e) => e.preventDefault();

    </script>
</body>
</html>
