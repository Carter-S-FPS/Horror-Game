<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>BLACKWOOD: THE 3-STORY MAZE</title>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/0.160.0/three.min.js"></script>

    <style>
        :root { 
            --nv-blue: #e0ebff;
            --alert: #ff3300;
            --floor-text: #00ffcc;
        }
        
        * { margin: 0; padding: 0; box-sizing: border-box; touch-action: none; user-select: none; }
        body, html { width: 100%; height: 100%; background: #020205; overflow: hidden; font-family: 'Courier New', monospace; }

        #boot {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #000; display: flex; justify-content: center; align-items: center;
            z-index: 10000; transition: opacity 1s;
        }

        #boot-content { width: 300px; text-align: center; color: var(--nv-blue); }
        #bar-container { width: 100%; height: 2px; background: #111; margin: 20px 0; }
        #bar { width: 0%; height: 100%; background: var(--nv-blue); box-shadow: 0 0 15px var(--nv-blue); }

        #ui { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; display: none; z-index: 100; }
        #move-pad { position: absolute; left: 0; top: 0; width: 50%; height: 100%; pointer-events: auto; }
        #look-pad { position: absolute; right: 0; top: 0; width: 50%; height: 100%; pointer-events: auto; }

        #joy-base {
            position: absolute; bottom: 60px; left: 60px; width: 100px; height: 100px;
            border: 1px solid rgba(255,255,255,0.2); border-radius: 50%;
        }
        #joy-knob {
            position: absolute; top: 30px; left: 30px; width: 40px; height: 40px;
            background: rgba(255,255,255,0.1); border: 1px solid white; border-radius: 50%;
        }

        #stats { position: absolute; top: 20px; left: 20px; color: var(--floor-text); font-size: 0.7rem; letter-spacing: 2px; }
        #floor-announcer { 
            position: absolute; top: 40%; width: 100%; text-align: center; 
            color: white; font-size: 2rem; opacity: 0; transition: opacity 1s; 
        }

        #vignette { 
            position: absolute; width: 100%; height: 100%; 
            background: radial-gradient(circle, transparent 20%, rgba(0,0,0,0.9) 100%); 
        }
    </style>
</head>
<body>

    <div id="boot">
        <div id="boot-content">
            <h2 style="letter-spacing: 8px;">GENERATING MAZE</h2>
            <div id="bar-container"><div id="bar"></div></div>
            <p id="boot-status" style="font-size: 0.6rem; opacity: 0.6;">CONSTRUCTING FLOORS...</p>
        </div>
    </div>

    <div id="ui">
        <div id="vignette"></div>
        <div id="stats">
            FLOOR: <span id="floor-val">1</span>/3<br>
            THREAT_LEVEL: <span id="threat">LOW</span>
        </div>
        <div id="floor-announcer">FLOOR 1</div>
        <div id="move-pad"><div id="joy-base"><div id="joy-knob"></div></div></div>
        <div id="look-pad"></div>
    </div>

    <audio id="amb" loop><source src="mixkit-horror-ambience-2482.wav" type="audio/wav"></audio>
    <audio id="step" loop><source src="mixkit-footsteps-in-a-tunnel-loop-543.wav" type="audio/wav"></audio>
    <audio id="breath" loop><source src="mixkit-creepy-demon-heavy-breathing-2240.wav" type="audio/wav"></audio>

    <script>
        /**
         * BLACKWOOD: TRIPLE-STORY MAZE ENGINE
         * Logic: Recursive Backtracker Maze + 40-unit Block Entities
         */

        const CORE = {
            ready: false, playing: false,
            currentFloor: 1,
            mazeSize: 10,
            cellSize: 15, // Distance between maze walls
            speed: 0.1,
            lookSense: 0.004,
            entities: [],
            mazeData: [],
            input: { mVec: new THREE.Vector2(), yaw: 0, pitch: 0, active: false }
        };

        let scene, camera, renderer, clock, flashlight, ambient;
        let sfx = {};

        // --- 1. MAZE GENERATION ALGORITHM ---
        function generateMazeData() {
            const maze = [];
            for (let f = 0; f < 3; f++) {
                const grid = Array(CORE.mazeSize).fill().map(() => Array(CORE.mazeSize).fill(15)); // 15 is binary for 4 walls
                const stack = [[0, 0]];
                const visited = new Set(['0,0']);
                
                while (stack.length > 0) {
                    const [x, y] = stack[stack.length - 1];
                    const neighbors = [];
                    [[0, 1, 1, 4], [0, -1, 4, 1], [1, 0, 2, 8], [-1, 0, 8, 2]].forEach(([dx, dy, wall, opp]) => {
                        const nx = x + dx, ny = y + dy;
                        if (nx >= 0 && nx < CORE.mazeSize && ny >= 0 && ny < CORE.mazeSize && !visited.has(`${nx},${ny}`)) {
                            neighbors.push([nx, ny, wall, opp]);
                        }
                    });

                    if (neighbors.length > 0) {
                        const [nx, ny, wall, opp] = neighbors[Math.floor(Math.random() * neighbors.length)];
                        grid[y][x] -= wall;
                        grid[ny][nx] -= opp;
                        visited.add(`${nx},${ny}`);
                        stack.push([nx, ny]);
                    } else {
                        stack.pop();
                    }
                }
                maze.push(grid);
            }
            return maze;
        }

        // --- 2. 3D BUILDING ---
        function setup3D() {
            scene = new THREE.Scene();
            scene.fog = new THREE.FogExp2(0x050508, 0.08);
            camera = new THREE.PerspectiveCamera(80, window.innerWidth/window.innerHeight, 0.1, 2000);
            clock = new THREE.Clock();
            renderer = new THREE.WebGLRenderer({ antialias: false });
            renderer.setSize(window.innerWidth, window.innerHeight);
            document.body.appendChild(renderer.domElement);

            ambient = new THREE.AmbientLight(0x445588, 0.5);
            scene.add(ambient);

            flashlight = new THREE.SpotLight(0xfff5d0, 250, 150, Math.PI/6, 0.5, 2);
            camera.add(flashlight);
            flashlight.position.set(0,0,0.1);
            flashlight.target.position.set(0,0,-5);
            camera.add(flashlight.target);
            scene.add(camera);

            buildMaze();
            spawnEntities();
            initInput();
            animate();
        }

        function buildMaze() {
            const wallGeo = new THREE.BoxGeometry(CORE.cellSize, 10, 1);
            const wallMat = new THREE.MeshLambertMaterial({ color: 0x1a1a20 });
            const floorMat = new THREE.MeshLambertMaterial({ color: 0x0a0a0a });

            CORE.mazeData.forEach((floorGrid, fIdx) => {
                const floorGroup = new THREE.Group();
                floorGroup.position.y = fIdx * 20; // 20 units per story

                // Floor Plane
                const ground = new THREE.Mesh(new THREE.PlaneGeometry(200, 200), floorMat);
                ground.rotation.x = -Math.PI/2;
                floorGroup.add(ground);

                // Build Walls based on Grid bits
                for (let y = 0; y < CORE.mazeSize; y++) {
                    for (let x = 0; x < CORE.mazeSize; x++) {
                        const val = floorGrid[y][x];
                        const px = x * CORE.cellSize - (CORE.mazeSize * CORE.cellSize)/2;
                        const pz = y * CORE.cellSize - (CORE.mazeSize * CORE.cellSize)/2;

                        if (val & 1) { // North
                            const w = new THREE.Mesh(wallGeo, wallMat);
                            w.position.set(px, 5, pz - CORE.cellSize/2);
                            floorGroup.add(w);
                        }
                        if (val & 4) { // South
                            const w = new THREE.Mesh(wallGeo, wallMat);
                            w.position.set(px, 5, pz + CORE.cellSize/2);
                            floorGroup.add(w);
                        }
                        if (val & 8) { // West
                            const w = new THREE.Mesh(wallGeo, wallMat);
                            w.rotation.y = Math.PI/2;
                            w.position.set(px - CORE.cellSize/2, 5, pz);
                            floorGroup.add(w);
                        }
                        if (val & 2) { // East
                            const w = new THREE.Mesh(wallGeo, wallMat);
                            w.rotation.y = Math.PI/2;
                            w.position.set(px + CORE.cellSize/2, 5, pz);
                            floorGroup.add(w);
                        }
                    }
                }

                // Add Stairwell (Exit to next floor)
                const stair = new THREE.Mesh(new THREE.BoxGeometry(4, 0.5, 4), new THREE.MeshBasicMaterial({color: 0x00ffcc}));
                stair.position.set(40, 0.1, 40);
                stair.name = "STAIRS_" + (fIdx + 1);
                floorGroup.add(stair);

                scene.add(floorGroup);
            });
        }

        // --- 3. 40x40x40 ENTITY LOGIC ---
        function spawnEntities() {
            const createHugeEntity = (color) => {
                const group = new THREE.Group();
                const mat = new THREE.MeshLambertMaterial({ color: color });
                const size = 0.4; // Scaled visual so they aren't literal mountains, but relative to player they are 40 "game units" blocky
                
                // Torso
                const torso = new THREE.Mesh(new THREE.BoxGeometry(size, size, size), mat);
                torso.position.y = size;
                // Head
                const head = new THREE.Mesh(new THREE.BoxGeometry(size, size, size), mat);
                head.position.y = size * 2.1;
                // Arms
                const lArm = new THREE.Mesh(new THREE.BoxGeometry(size, size, size), mat);
                lArm.position.set(-size, size, 0);
                const rArm = new THREE.Mesh(new THREE.BoxGeometry(size, size, size), mat);
                rArm.position.set(size, size, 0);
                // Legs
                const lLeg = new THREE.Mesh(new THREE.BoxGeometry(size, size, size), mat);
                lLeg.position.set(-size/2, 0, 0);
                const rLeg = new THREE.Mesh(new THREE.BoxGeometry(size, size, size), mat);
                rLeg.position.set(size/2, 0, 0);

                group.add(torso, head, lArm, rArm, lLeg, rLeg);
                group.scale.set(4, 4, 4); // The "40x40x40" feel
                return group;
            };

            // Spawn Surgeon
            const surgeon = createHugeEntity(0x111111);
            surgeon.position.set(-30, 0, -30);
            surgeon.userData = { type: 'surgeon', floor: 1 };
            scene.add(surgeon);
            CORE.entities.push(surgeon);

            // Spawn Patients
            for(let i=0; i<6; i++) {
                const patient = createHugeEntity(0x440000);
                patient.position.set(Math.random()*100-50, (i%3)*20, Math.random()*100-50);
                patient.userData = { type: 'patient', floor: (i % 3) + 1, speed: 0.03 + Math.random()*0.02 };
                scene.add(patient);
                CORE.entities.push(patient);
            }
        }

        // --- 4. INPUT & CONTROLS ---
        function initInput() {
            const mPad = document.getElementById('move-pad');
            const lPad = document.getElementById('look-pad');
            const knob = document.getElementById('joy-knob');
            let cx, cy, lx, ly;

            mPad.addEventListener('touchstart', e => {
                const t = e.touches[0]; cx = t.clientX; cy = t.clientY;
            });
            mPad.addEventListener('touchmove', e => {
                e.preventDefault();
                const t = e.touches[0];
                const dx = t.clientX - cx, dy = t.clientY - cy;
                const d = Math.min(Math.sqrt(dx*dx + dy*dy), 40);
                const a = Math.atan2(dy, dx);
                knob.style.transform = `translate(${Math.cos(a)*d}px, ${Math.sin(a)*d}px)`;
                CORE.input.mVec.set(Math.cos(a)*(d/40), Math.sin(a)*(d/40));
                CORE.input.active = d > 5;
            });
            mPad.addEventListener('touchend', () => {
                knob.style.transform = `translate(0,0)`;
                CORE.input.active = false;
                CORE.input.mVec.set(0,0);
            });

            lPad.addEventListener('touchstart', e => {
                const t = e.touches[0]; lx = t.clientX; ly = t.clientY;
            });
            lPad.addEventListener('touchmove', e => {
                const t = e.touches[0];
                CORE.input.yaw -= (t.clientX - lx) * CORE.lookSense;
                CORE.input.pitch -= (t.clientY - ly) * CORE.lookSense;
                CORE.input.pitch = Math.max(-1.4, Math.min(1.4, CORE.input.pitch));
                lx = t.clientX; ly = t.clientY;
            });
        }

        // --- 5. GAME LOOP & AI ---
        function animate() {
            requestAnimationFrame(animate);
            const delta = clock.getDelta();

            if (CORE.playing) {
                // Camera Transform
                camera.rotation.order = "YXZ";
                camera.rotation.y = CORE.input.yaw;
                camera.rotation.x = CORE.input.pitch;

                if (CORE.input.active) {
                    const fwd = new THREE.Vector3(0,0,-1).applyQuaternion(camera.quaternion);
                    const sid = new THREE.Vector3(1,0,0).applyQuaternion(camera.quaternion);
                    fwd.y = 0; sid.y = 0; fwd.normalize(); sid.normalize();
                    camera.position.addScaledVector(fwd, -CORE.input.mVec.y * CORE.speed);
                    camera.position.addScaledVector(sid, CORE.input.mVec.x * CORE.speed);
                    
                    // Head bob
                    camera.position.y = (CORE.currentFloor-1)*20 + 1.6 + Math.sin(Date.now()*0.008)*0.05;
                }

                // AI Logic
                CORE.entities.forEach(ent => {
                    if (ent.userData.floor === CORE.currentFloor) {
                        ent.lookAt(camera.position);
                        const dist = ent.position.distanceTo(camera.position);
                        
                        // Simple hunt
                        if (dist < 40) {
                            const dir = new THREE.Vector3().subVectors(camera.position, ent.position).normalize();
                            dir.y = 0;
                            ent.position.addScaledVector(dir, ent.userData.type === 'surgeon' ? 0.05 : ent.userData.speed);
                        }

                        // Breathing Intensity
                        if (ent.userData.type === 'surgeon' && dist < 15) {
                            sfx.breath.volume = Math.max(0, 1 - (dist/15));
                        }
                    }
                });

                // Floor Check (Stair logic)
                const distToStair = camera.position.distanceTo(new THREE.Vector3(40, (CORE.currentFloor-1)*20, 40));
                if (distToStair < 3 && CORE.currentFloor < 3) {
                    CORE.currentFloor++;
                    camera.position.y += 20;
                    camera.position.x = 0; camera.position.z = 0;
                    announceFloor();
                }

                document.getElementById('floor-val').innerText = CORE.currentFloor;
            }

            renderer.render(scene, camera);
        }

        function announceFloor() {
            const el = document.getElementById('floor-announcer');
            el.innerText = "FLOOR " + CORE.currentFloor;
            el.style.opacity = "1";
            setTimeout(() => el.style.opacity = "0", 2000);
        }

        // Boot Pipeline
        let p = 0;
        const loader = setInterval(() => {
            p += 2;
            document.getElementById('bar').style.width = p + "%";
            if (p >= 100) {
                clearInterval(loader);
                CORE.mazeData = generateMazeData();
                setup3D();
                CORE.ready = true;
                document.getElementById('boot-status').innerText = "LINK ESTABLISHED. TAP SCREEN.";
            }
        }, 30);

        window.addEventListener('mousedown', () => {
            if(CORE.ready && !CORE.playing) {
                CORE.playing = true;
                document.getElementById('boot').style.opacity = "0";
                setTimeout(() => document.getElementById('boot').style.display = "none", 1000);
                document.getElementById('ui').style.display = "block";
                sfx.amb = document.getElementById('amb');
                sfx.step = document.getElementById('step');
                sfx.breath = document.getElementById('breath');
                [sfx.amb, sfx.step, sfx.breath].forEach(s => { s.volume = 0.2; s.play().catch(()=>{}); });
                sfx.step.volume = 0; sfx.breath.volume = 0;
            }
        });

    </script>
</body>
</html>
