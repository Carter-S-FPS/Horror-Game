<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>TITAN_V8.7_THRESHOLD_LONG_BUILD</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/0.160.0/three.min.js"></script>
    <style>
        :root {
            --backroom-yellow: #d1cc8a;
            --trim: #2a2b18;
            --void: #0d0e08;
            --mono: 'Courier New', Courier, monospace;
        }

        * { 
            margin: 0; padding: 0; box-sizing: border-box; 
            touch-action: none; user-select: none; 
            outline: none; -webkit-tap-highlight-color: transparent;
        }

        body, html { 
            width: 100%; height: 100%; background: #000; 
            overflow: hidden; font-family: var(--mono);
        }

        /* POST-PROCESSING LAYERS */
        #grain-overlay {
            position: fixed; inset: 0; pointer-events: none; z-index: 9000;
            background: url('https://upload.wikimedia.org/wikipedia/commons/5/5a/Can_not_be_displayed.png');
            opacity: 0.04; mix-blend-mode: overlay;
        }

        #vignette-layer {
            position: fixed; inset: 0; pointer-events: none; z-index: 9001;
            background: radial-gradient(circle, transparent 15%, #000 160%);
        }

        #ui-boot {
            position: fixed; inset: 0; background: #0d0e08; z-index: 10000;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            transition: opacity 2s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .terminal-wrap {
            width: 90%; max-width: 850px; height: 60vh;
            border: 1px solid #1a1c0e; background: #050503;
            padding: 40px; display: flex; flex-direction: column;
            box-shadow: 0 0 40px rgba(0,0,0,0.5);
        }

        .term-header {
            color: var(--backroom-yellow); font-size: 0.75rem; letter-spacing: 10px;
            margin-bottom: 30px; border-bottom: 1px solid #1a1c0e; padding-bottom: 15px;
            text-transform: uppercase;
        }

        .prog-bg { width: 100%; height: 2px; background: #11120a; margin-bottom: 25px; }
        .prog-fill { width: 0%; height: 100%; background: var(--backroom-yellow); box-shadow: 0 0 15px var(--backroom-yellow); }

        #term-log {
            flex-grow: 1; overflow: hidden; font-size: 0.65rem;
            color: #4a4b2f; line-height: 2.4; display: flex; flex-direction: column-reverse;
        }

        #hud {
            position: absolute; inset: 0; pointer-events: none;
            display: none; z-index: 1000;
        }

        .hud-vitals {
            position: absolute; top: 40px; left: 40px;
            font-size: 0.6rem; color: var(--backroom-yellow);
            line-height: 3.5; letter-spacing: 5px; opacity: 0.5;
        }

        /* FLOATING INPUT UI */
        #joy-outer {
            position: absolute; width: 130px; height: 130px; border-radius: 50%;
            background: rgba(209, 204, 138, 0.01); border: 1px solid rgba(209, 204, 138, 0.08);
            display: none; transform: translate(-50%, -50%); pointer-events: none;
        }

        #joy-inner { 
            position: absolute; top: 40px; left: 40px; width: 50px; height: 50px; 
            background: var(--backroom-yellow); border-radius: 50%; opacity: 0.15; 
        }

        #death-card {
            position: fixed; inset: 0; z-index: 100000; background: #000;
            display: none; justify-content: center; align-items: center;
        }
        #death-card img { width: 120%; height: 120%; object-fit: cover; filter: sepia(1) contrast(1.5) brightness(0.4); }
    </style>
</head>
<body>

    <div id="grain-overlay"></div>
    <div id="vignette-layer"></div>
    <div id="death-card"><img src="https://i.imgur.com/8N8H1yV.png"></div>

    <div id="ui-boot">
        <div class="terminal-wrap">
            <div class="term-header">TITAN_V8.7_STABLE_BUILD</div>
            <div class="prog-bg"><div id="load-bar" class="prog-fill"></div></div>
            <div id="term-log"></div>
        </div>
    </div>

    <div id="hud">
        <div class="hud-vitals">
            LUM_MODEL: THRESHOLD_BACKROOMS<br>
            CEILING_CAP: 6.0_UNITS_STRICT<br>
            PHYSICS: AABB_SOLVER_V9<br>
            IO_STATE: DYNAMIC_FLOATING<br>
            THREAT: <span id="threat-id">NULL</span>
        </div>
        <div id="joy-outer"><div id="joy-inner"></div></div>
    </div>

    <script>
        /**
         * SANITY'S FRACTURE: TITAN ENGINE V8.7
         * ---------------------------------------------------------
         * Comprehensive Physics & Lighting Kernel.
         * Explicitly Expanded for Logic Density.
         */

        const GLOBAL_CFG = {
            VERSION: "8.7.0",
            MAZE_DIM: 18,
            CELL_W: 16,
            CEILING_H: 6.0,  // CRITICAL: 6.0 HEIGHT
            PLAYER_EYE: 1.55,
            MOVE_SPD: 0.32,
            SENSITIVITY: 0.007,
            FOG_COLOR: 0x1a1c0e,
            WALL_COLOR: 0xd1cc8a,
            CARPET_COLOR: 0x5a5b3a,
            AMBIENT_INT: 1.1,
            COLLISION_RADIUS: 1.25,
            STALKER_DIST: 850
        };

        const CORE_SYS = {
            ready: false,
            active: false,
            input: {
                move: { vec: new THREE.Vector2(), active: false, anchor: new THREE.Vector2(), id: null },
                look: { yaw: 0, pitch: 0, lastX: 0, lastY: 0, id: null }
            },
            registry: {
                entities: [],
                targets: [],
                geometry: [],
                walls: [] // Physics bounding boxes
            }
        };

        let scene, camera, renderer, raycaster, humLight, spot;

        // --- MODULE: MAZE GENERATOR (DFS) ---
        function generateMaze(dim) {
            const grid = [];
            for (let y = 0; y < dim; y++) {
                grid[y] = [];
                for (let x = 0; x < dim; x++) {
                    grid[y][x] = { x, y, visited: false, walls: [true, true, true, true] };
                }
            }

            const stack = [];
            let current = grid[0][0];
            current.visited = true;

            const checkNeighbors = (c) => {
                const neighbors = [];
                const { x, y } = c;
                if (y > 0 && !grid[y - 1][x].visited) neighbors.push({ cell: grid[y - 1][x], dir: 0 });
                if (x < dim - 1 && !grid[y][x + 1].visited) neighbors.push({ cell: grid[y][x + 1], dir: 1 });
                if (y < dim - 1 && !grid[y + 1][x].visited) neighbors.push({ cell: grid[y + 1][x], dir: 2 });
                if (x > 0 && !grid[y][x - 1].visited) neighbors.push({ cell: grid[y][x - 1], dir: 3 });
                return neighbors;
            };

            while (true) {
                const available = checkNeighbors(current);
                if (available.length > 0) {
                    const next = available[Math.floor(Math.random() * available.length)];
                    stack.push(current);
                    current.walls[next.dir] = false;
                    next.cell.walls[(next.dir + 2) % 4] = false;
                    current = next.cell;
                    current.visited = true;
                } else if (stack.length > 0) {
                    current = stack.pop();
                } else break;
            }
            return grid;
        }

        // --- MODULE: BOOT LOADER ---
        function runBootSequence() {
            const bar = document.getElementById('load-bar');
            const log = document.getElementById('term-log');
            const logData = [
                "RECALIBRATING_LUM_CHANNELS...",
                "THRESHOLDING_WALL_SATURATION_D1CC8A...",
                "LOADING_AABB_V9_COLLISION_KERNEL...",
                "INJECTING_FLUORESCENT_VIBRATION_LOGIC...",
                "MAPPING_18x18_DFS_NON_EUCLIDEAN_GRID...",
                "GATING_VERTICAL_LIMITS_6.0_STRICT...",
                "CALIBRATING_DYNAMIC_FLOATING_JOYSTICK...",
                "VOXELIZING_STALKER_AI_CORE...",
                "SYNC_THRESHOLD_REACHED.",
                "CLICK_TO_INITIALIZE_KERNEL."
            ];

            let progress = 0;
            const bootLoop = () => {
                progress += 0.85;
                bar.style.width = progress + "%";
                
                if (Math.floor(progress) % 10 === 0) {
                    const line = logData[Math.floor(progress / 10)];
                    if (line) log.innerHTML = `> [SYSTEM] ${line}<br>${log.innerHTML}`;
                }

                if (progress >= 100) {
                    CORE_SYS.ready = true;
                    initEngine();
                } else {
                    requestAnimationFrame(bootLoop);
                }
            };
            bootLoop();
        }

        // --- MODULE: ENTITY ARCHITECTURE ---
        class VoxelStalker {
            constructor(type, initialDist) {
                this.group = new THREE.Group();
                this.type = type;
                this.distance = initialDist;
                this.visibleToPlayer = false;
                this.construct();
                this.randomSpawn();
            }

            construct() {
                const colors = [0x000000, 0x0a0a0a, 0x111111];
                const addPart = (w, h, d, x, y, z) => {
                    const pGroup = new THREE.Group();
                    for (let i = 0; i < 25; i++) {
                        const m = new THREE.Mesh(
                            new THREE.BoxGeometry(w, h, d),
                            new THREE.MeshLambertMaterial({ color: colors[Math.floor(Math.random() * colors.length)] })
                        );
                        m.position.set((Math.random() - 0.5) * w, (Math.random() - 0.5) * h, (Math.random() - 0.5) * d);
                        pGroup.add(m);
                    }
                    pGroup.position.set(x, y, z);
                    this.group.add(pGroup);
                };

                // Torso and Limbs unrolled
                addPart(1.2, 2.5, 0.8, 0, 1.5, 0); // Core
                addPart(0.4, 3.5, 0.4, -0.8, 1.2, 0); // Left arm
                addPart(0.4, 3.5, 0.4, 0.8, 1.2, 0);  // Right arm
                addPart(0.5, 3.0, 0.5, -0.4, 0, 0);   // Left leg
                addPart(0.5, 3.0, 0.5, 0.4, 0, 0);    // Right leg

                const hitbox = new THREE.Mesh(new THREE.BoxGeometry(2, 5, 2), new THREE.MeshBasicMaterial({ visible: false }));
                hitbox.position.y = 1.5;
                this.group.add(hitbox);
                CORE_SYS.registry.targets.push(hitbox);
            }

            randomSpawn() {
                const angle = Math.random() * Math.PI * 2;
                this.group.position.set(Math.cos(angle) * this.distance, 0, Math.sin(angle) * this.distance);
            }

            tick(playerPos, cameraHits) {
                this.visibleToPlayer = false;
                if (cameraHits.length > 0) {
                    cameraHits.forEach(h => {
                        if (this.group.getObjectById(h.object.id)) this.visibleToPlayer = true;
                    });
                }

                const d = this.group.position.distanceTo(playerPos);
                if (d < 600) {
                    this.group.lookAt(playerPos.x, 0, playerPos.z);
                    const dir = new THREE.Vector3().subVectors(playerPos, this.group.position).normalize();
                    const spd = this.visibleToPlayer ? 0.95 : 0.08;
                    this.group.position.addScaledVector(dir, spd);
                }
                return d;
            }
        }

        // --- MODULE: CORE ENGINE ---
        function initEngine() {
            scene = new THREE.Scene();
            scene.background = new THREE.Color(GLOBAL_CFG.FOG_COLOR);
            scene.fog = new THREE.FogExp2(GLOBAL_CFG.FOG_COLOR, 0.16);

            camera = new THREE.PerspectiveCamera(80, window.innerWidth / window.innerHeight, 0.1, 2000);
            raycaster = new THREE.Raycaster();
            renderer = new THREE.WebGLRenderer({ antialias: false, powerPreference: "high-performance" });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
            document.body.appendChild(renderer.domElement);

            // Backrooms Lighting Rig
            scene.add(new THREE.AmbientLight(GLOBAL_CFG.WALL_COLOR, 0.4));
            
            humLight = new THREE.PointLight(GLOBAL_CFG.WALL_COLOR, 0.8, 120);
            camera.add(humLight);

            spot = new THREE.SpotLight(0xfffce0, 1.2, 100, 0.65, 0.4);
            spot.position.set(0, 0, 0);
            spot.target.position.z = -1;
            camera.add(spot);
            camera.add(spot.target);
            scene.add(camera);

            // Materials
            const floorMat = new THREE.MeshLambertMaterial({ color: GLOBAL_CFG.CARPET_COLOR });
            const wallMat = new THREE.MeshLambertMaterial({ color: GLOBAL_CFG.WALL_COLOR });

            // World Gen
            const grid = generateMaze(GLOBAL_CFG.MAZE_DIM);
            const offset = (GLOBAL_CFG.MAZE_DIM * GLOBAL_CFG.CELL_W) / 2;

            for (let y = 0; y < GLOBAL_CFG.MAZE_DIM; y++) {
                for (let x = 0; x < GLOBAL_CFG.MAZE_DIM; x++) {
                    const cell = grid[y][x];
                    const px = x * GLOBAL_CFG.CELL_W - offset;
                    const pz = y * GLOBAL_CFG.CELL_W - offset;

                    // Floor/Ceiling
                    const f = new THREE.Mesh(new THREE.PlaneGeometry(GLOBAL_CFG.CELL_W, GLOBAL_CFG.CELL_W), floorMat);
                    f.rotation.x = -Math.PI / 2; f.position.set(px, 0, pz); scene.add(f);
                    
                    const c = new THREE.Mesh(new THREE.PlaneGeometry(GLOBAL_CFG.CELL_W, GLOBAL_CFG.CELL_W), wallMat);
                    c.rotation.x = Math.PI / 2; c.position.set(px, GLOBAL_CFG.CEILING_H, pz); scene.add(c);

                    // Physics & Visual Wall Builder
                    const constructWall = (w, h, d, xx, zz) => {
                        const m = new THREE.Mesh(new THREE.BoxGeometry(w, h, d), wallMat);
                        m.position.set(xx, h / 2, zz);
                        scene.add(m);
                        // Register for Physics
                        CORE_SYS.registry.walls.push({
                            minX: xx - w / 2, maxX: xx + w / 2,
                            minZ: zz - d / 2, maxZ: zz + d / 2
                        });
                    };

                    const thk = 1.0;
                    if (cell.walls[0]) constructWall(GLOBAL_CFG.CELL_W, GLOBAL_CFG.CEILING_H, thk, px, pz - GLOBAL_CFG.CELL_W / 2);
                    if (cell.walls[1]) constructWall(thk, GLOBAL_CFG.CEILING_H, GLOBAL_CFG.CELL_W, px + GLOBAL_CFG.CELL_W / 2, pz);
                    if (cell.walls[2]) constructWall(GLOBAL_CFG.CELL_W, GLOBAL_CFG.CEILING_H, thk, px, pz + GLOBAL_CFG.CELL_W / 2);
                    if (cell.walls[3]) constructWall(thk, GLOBAL_CFG.CEILING_H, GLOBAL_CFG.CELL_W, px - GLOBAL_CFG.CELL_W / 2, pz);
                }
            }

            // Spawn Entities
            const primaryStalker = new VoxelStalker('primary', GLOBAL_CFG.STALKER_DIST);
            scene.add(primaryStalker.group);
            CORE_SYS.registry.entities.push(primaryStalker);

            for (let i = 0; i < 4; i++) {
                const sc = new VoxelStalker('echo', 400 + i * 150);
                scene.add(sc.group);
                CORE_SYS.registry.entities.push(sc);
            }

            setupDynamicIO();
            gameLoop();
        }

        // --- MODULE: DYNAMIC INPUT ---
        function setupDynamicIO() {
            const outer = document.getElementById('joy-outer');
            const inner = document.getElementById('joy-inner');

            window.addEventListener('touchstart', e => {
                for (let i = 0; i < e.changedTouches.length; i++) {
                    const t = e.changedTouches[i];
                    if (t.clientX < window.innerWidth / 2) {
                        CORE_SYS.input.move.id = t.identifier;
                        CORE_SYS.input.move.anchor.set(t.clientX, t.clientY);
                        outer.style.display = 'block';
                        outer.style.left = t.clientX + 'px';
                        outer.style.top = t.clientY + 'px';
                    } else {
                        CORE_SYS.input.look.id = t.identifier;
                        CORE_SYS.input.look.lastX = t.clientX;
                        CORE_SYS.input.look.lastY = t.clientY;
                    }
                }
            });

            window.addEventListener('touchmove', e => {
                for (let i = 0; i < e.changedTouches.length; i++) {
                    const t = e.changedTouches[i];
                    if (t.identifier === CORE_SYS.input.move.id) {
                        const dx = t.clientX - CORE_SYS.input.move.anchor.x;
                        const dy = t.clientY - CORE_SYS.input.move.anchor.y;
                        const dist = Math.min(Math.sqrt(dx * dx + dy * dy), 65);
                        const angle = Math.atan2(dy, dx);
                        inner.style.transform = `translate(${Math.cos(angle) * dist}px, ${Math.sin(angle) * dist}px)`;
                        CORE_SYS.input.move.vec.set(Math.cos(angle) * (dist / 65), Math.sin(angle) * (dist / 65));
                        CORE_SYS.input.move.active = dist > 8;
                    } else if (t.identifier === CORE_SYS.input.look.id) {
                        CORE_SYS.input.look.yaw -= (t.clientX - CORE_SYS.input.look.lastX) * GLOBAL_CFG.SENSITIVITY;
                        CORE_SYS.input.look.pitch -= (t.clientY - CORE_SYS.input.look.lastY) * GLOBAL_CFG.SENSITIVITY;
                        CORE_SYS.input.look.pitch = Math.max(-1.45, Math.min(1.45, CORE_SYS.input.look.pitch));
                        CORE_SYS.input.look.lastX = t.clientX;
                        CORE_SYS.input.look.lastY = t.clientY;
                    }
                }
            });

            window.addEventListener('touchend', e => {
                for (let i = 0; i < e.changedTouches.length; i++) {
                    const t = e.changedTouches[i];
                    if (t.identifier === CORE_SYS.input.move.id) {
                        CORE_SYS.input.move.active = false;
                        outer.style.display = 'none';
                    }
                }
            });
        }

        // --- MODULE: PHYSICS RESOLVER (AABB V9) ---
        function resolveWorldCollisions(position, radius) {
            for (let i = 0; i < CORE_SYS.registry.walls.length; i++) {
                const wall = CORE_SYS.registry.walls[i];
                
                // Closest point on wall AABB
                let cx = Math.max(wall.minX, Math.min(position.x, wall.maxX));
                let cz = Math.max(wall.minZ, Math.min(position.z, wall.maxZ));
                
                let dx = position.x - cx;
                let dz = position.z - cz;
                let dSq = dx * dx + dz * dz;

                if (dSq < radius * radius) {
                    let d = Math.sqrt(dSq);
                    // Push player away from wall
                    position.x += (dx / d) * (radius - d);
                    position.z += (dz / d) * (radius - d);
                }
            }
        }

        // --- MODULE: MAIN LOOP ---
        function gameLoop() {
            requestAnimationFrame(gameLoop);
            if (!CORE_SYS.active) return;

            // Update Gimbal
            camera.rotation.order = "YXZ";
            camera.rotation.y = CORE_SYS.input.look.yaw;
            camera.rotation.x = CORE_SYS.input.look.pitch;

            // Move & Resolve
            if (CORE_SYS.input.move.active) {
                const fwd = new THREE.Vector3(0, 0, -1).applyQuaternion(camera.quaternion);
                fwd.y = 0; fwd.normalize();
                const side = new THREE.Vector3(1, 0, 0).applyQuaternion(camera.quaternion);
                side.y = 0; side.normalize();

                const vel = new THREE.Vector3()
                    .addScaledVector(fwd, -CORE_SYS.input.move.vec.y)
                    .addScaledVector(side, CORE_SYS.input.move.vec.x);

                camera.position.addScaledVector(vel, GLOBAL_CFG.MOVE_SPD);
                resolveWorldCollisions(camera.position, GLOBAL_CFG.COLLISION_RADIUS);
                
                // Head Bob
                camera.position.y = GLOBAL_CFG.PLAYER_EYE + Math.sin(Date.now() * 0.01) * 0.04;
            }

            // Sync Fluorescent Flicker
            humLight.intensity = 0.8 + Math.sin(Date.now() * 0.05) * 0.15;

            // Update Entities
            raycaster.setFromCamera(new THREE.Vector2(0, 0), camera);
            const hits = raycaster.intersectObjects(CORE_SYS.registry.targets);
            let inDanger = false;

            CORE_SYS.registry.entities.forEach(ent => {
                const dist = ent.tick(camera.position, hits);
                if (ent.visibleToPlayer) inDanger = true;
                
                if (dist < 4.5) {
                    document.getElementById('death-card').style.display = 'flex';
                    setTimeout(() => location.reload(), 2000);
                }
            });

            document.getElementById('threat-id').innerText = inDanger ? "CONTACT" : "NULL";
            document.getElementById('threat-id').style.color = inDanger ? "#ff0000" : "var(--backroom-yellow)";

            renderer.render(scene, camera);
        }
