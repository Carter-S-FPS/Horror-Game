<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ASYLUM_STABLE_V59</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/0.160.0/three.min.js"></script>
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background: #000; }
        #blink { position: fixed; inset: 0; background: #000; z-index: 50; opacity: 0; pointer-events: none; }
        #boot { 
            position: fixed; inset: 0; z-index: 100; background: #111; 
            display: flex; flex-direction: column; justify-content: center; align-items: center; 
            color: #dbd2ae; font-family: monospace;
        }
        .btn { border: 1px solid #444; padding: 15px 40px; cursor: pointer; display: none; color: #dbd2ae; margin-top: 20px; }
        #ui { position: fixed; top: 20px; left: 20px; color: #444; font-family: monospace; z-index: 10; font-size: 10px; }
        #msg { position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); color: #f00; font-family: serif; font-size: 24px; display: none; z-index: 200; text-align: center; }
    </style>
</head>
<body>
    <div id="blink"></div>
    <div id="ui">FIX_V59: COLLISION_SLIDE_ENABLED</div>
    <div id="msg">CONNECTION LOST.<br><span style="font-size:12px; color:#444;">Tap to retry</span></div>
    <div id="boot">
        <div id="status">LOADING_CORE_ASYLUM...</div>
        <div id="btn" class="btn">BEGIN</div>
    </div>

    <script>
        let scene, camera, renderer, active = false, flashlight, raycaster;
        let mv = { f: 0, s: 0, active: false, id: null };
        let rot = { x: 0, y: 0, lx: 0, ly: 0, id: null };
        let walkCycle = 0, isDead = false, gameStartTime = 0;
        
        let stalker, stalkerState = 'WANDER', huntTimer = 0, detectionMeter = 0;
        const GRACE_PERIOD = 20; 
        const HUNT_LIMIT = 10; 
        const PLAYER_RADIUS = 0.25; 

        const wallBoxes = [];

        function init() {
            scene = new THREE.Scene();
            scene.fog = new THREE.Fog(0x000000, 0, 15);
            camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 100);
            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            document.body.appendChild(renderer.domElement);
            raycaster = new THREE.Raycaster();

            flashlight = new THREE.SpotLight(0xfff5d4, 80, 25, Math.PI/7, 0.5, 2);
            scene.add(flashlight);
            scene.add(flashlight.target);

            const wallMat = new THREE.MeshStandardMaterial({ color: 0xdbd2ae });
            const buildWall = (x, z, w, d) => {
                const m = new THREE.Mesh(new THREE.BoxGeometry(w, 3.2, d), wallMat);
                m.position.set(x, 1.6, z);
                scene.add(m);
                const b = new THREE.Box3().setFromObject(m);
                wallBoxes.push(b);
            };
            
            buildWall(0, 22, 44.5, 0.5); buildWall(0, -22, 44.5, 0.5);
            buildWall(22, 0, 0.5, 44.5); buildWall(-22, 0, 0.5, 44.5);
            const bSz = 16; buildWall(10, 10, bSz, bSz); buildWall(-10, 10, bSz, bSz);
            buildWall(10, -10, bSz, bSz); buildWall(-10, -10, bSz, bSz);

            scene.add(new THREE.Mesh(new THREE.PlaneGeometry(60, 60), new THREE.MeshStandardMaterial({ color: 0x111111 })));

            const corners = [{x: 18, z: 18}, {x: -18, z: 18}, {x: 18, z: -18}, {x: -18, z: -18}];
            const spawn = corners[Math.floor(Math.random() * corners.length)];
            stalker = new THREE.Mesh(new THREE.CapsuleGeometry(0.4, 2, 4, 8), new THREE.MeshBasicMaterial({ color: 0x000000 }));
            stalker.position.set(spawn.x, 1.3, spawn.z);
            scene.add(stalker);

            camera.position.set(0, 1.6, 0); 
            loop();
        }

        function hasLoS() {
            const start = stalker.position.clone().add(new THREE.Vector3(0, 1, 0));
            const target = camera.position.clone();
            const dir = new THREE.Vector3().subVectors(target, start).normalize();
            raycaster.set(start, dir);
            
            // Check only against bounding boxes for speed
            for (let box of wallBoxes) {
                const hit = raycaster.ray.intersectBox(box, new THREE.Vector3());
                if (hit && start.distanceTo(hit) < start.distanceTo(target)) return false;
            }
            return true;
        }

        function loop() {
            if(isDead) return;
            requestAnimationFrame(loop);
            if(!active) return;

            const elapsed = (Date.now() / 1000) - gameStartTime;
            camera.rotation.set(rot.y, rot.x, 0, 'YXZ');
            
            if(mv.active) {
                const dir = new THREE.Vector3(0,0,-1).applyQuaternion(camera.quaternion);
                dir.y = 0; dir.normalize();
                const side = new THREE.Vector3(1,0,0).applyQuaternion(camera.quaternion);
                side.y = 0; side.normalize();
                
                const moveX = (dir.x * -mv.f * 0.07) + (side.x * mv.s * 0.07);
                const moveZ = (dir.z * -mv.f * 0.07) + (side.z * mv.s * 0.07);

                // Axis-independent collision (Sliding)
                const nextX = camera.position.x + moveX;
                const nextZ = camera.position.z + moveZ;

                let canMoveX = true, canMoveZ = true;
                const pBoxX = new THREE.Box3().setFromCenterAndSize(new THREE.Vector3(nextX, 1.6, camera.position.z), new THREE.Vector3(PLAYER_RADIUS*2, 1, PLAYER_RADIUS*2));
                const pBoxZ = new THREE.Box3().setFromCenterAndSize(new THREE.Vector3(camera.position.x, 1.6, nextZ), new THREE.Vector3(PLAYER_RADIUS*2, 1, PLAYER_RADIUS*2));

                for(let b of wallBoxes) {
                    if(pBoxX.intersectsBox(b)) canMoveX = false;
                    if(pBoxZ.intersectsBox(b)) canMoveZ = false;
                }

                if(canMoveX) camera.position.x = nextX;
                if(canMoveZ) camera.position.z = nextZ;

                if(canMoveX || canMoveZ) {
                    walkCycle += 0.08;
                    camera.position.y = 1.6 + Math.sin(walkCycle) * 0.015;
                }
            }

            const toS = new THREE.Vector3().subVectors(stalker.position, camera.position).normalize();
            const isLooking = new THREE.Vector3(0,0,-1).applyQuaternion(camera.quaternion).angleTo(toS) < 0.6;

            if (elapsed < GRACE_PERIOD) {
                document.getElementById('ui').innerText = `SAFE: ${Math.ceil(GRACE_PERIOD - elapsed)}s`;
            } else {
                if (stalkerState === 'WANDER') {
                    document.getElementById('ui').innerText = "STATUS: SEARCHING";
                    document.getElementById('blink').style.opacity = 0;
                    stalker.position.addScaledVector(toS, -0.01); 

                    if(camera.position.distanceTo(stalker.position) < 18 && hasLoS()) {
                        detectionMeter += 0.016; 
                        if(detectionMeter > 1.0) stalkerState = 'HUNT'; // Full 1 second of LoS to trigger
                    } else {
                        detectionMeter = Math.max(0, detectionMeter - 0.005);
                    }
                } else {
                    document.getElementById('ui').innerText = `DANGER: ${Math.ceil(HUNT_LIMIT - huntTimer)}s | LOOK AT IT`;
                    document.getElementById('blink').style.opacity = (Math.sin(Date.now() * 0.03) > 0) ? 0.7 : 0;
                    stalker.position.addScaledVector(toS, -0.035); 

                    if (isLooking) {
                        stalkerState = 'WANDER';
                        huntTimer = 0; detectionMeter = 0;
                    } else {
                        huntTimer += 0.016; 
                    }

                    if(huntTimer >= HUNT_LIMIT) {
                        isDead = true;
                        document.getElementById('blink').style.opacity = 1;
                        document.getElementById('msg').style.display = 'block';
                    }
                }
            }

            flashlight.position.copy(camera.position);
            flashlight.target.position.copy(camera.position).add(new THREE.Vector3(0,0,-1).applyQuaternion(camera.quaternion));
            renderer.render(scene, camera);
        }

        window.addEventListener('touchstart', (e) => {
            for(let t of e.changedTouches) {
                if(t.clientX < window.innerWidth/2) { mv.active = true; mv.id = t.identifier; mv.ox = t.clientX; mv.oy = t.clientY; }
                else { rot.id = t.identifier; rot.lx = t.clientX; rot.ly = t.clientY; }
            }
        });
        window.addEventListener('touchmove', (e) => {
            e.preventDefault();
            for(let t of e.changedTouches) {
                if(t.identifier === mv.id) { mv.s = (t.clientX - mv.ox)/60; mv.f = (t.clientY - mv.oy)/60; }
                else if(t.identifier === rot.id) { rot.x -= (t.clientX - rot.lx)*0.005; rot.y -= (t.clientY - rot.ly)*0.005; rot.y = Math.max(-1.3,1.3,rot.y); rot.lx = t.clientX; rot.ly = t.clientY; }
            }
        }, {passive: false});
        window.addEventListener('touchend', (e) => {
            for(let t of e.changedTouches) { if(t.identifier === mv.id){mv.active=false;mv.f=0;mv.s=0;} if(t.identifier === rot.id)rot.id=null; }
        });

        document.getElementById('msg').onclick = () => location.reload();
        setTimeout(() => { document.getElementById('btn').style.display = "block"; init(); }, 500);
        document.getElementById('btn').onclick = () => { 
            active = true; gameStartTime = Date.now() / 1000;
            document.getElementById('boot').style.display = 'none'; 
        };
    </script>
</body>
</html>
