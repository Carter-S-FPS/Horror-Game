<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Blackwood Asylum 3D</title>
    <style>
        body { margin: 0; overflow: hidden; background: #000; touch-action: none; }
        
        /* UI Layer - Must have high z-index */
        #ui { 
            position: absolute; 
            top: 0; left: 0; 
            width: 100vw; height: 100vh;
            display: flex; flex-direction: column;
            justify-content: center; align-items: center;
            background: rgba(0,0,0,0.8);
            z-index: 100; 
            color: #800; font-family: monospace;
        }

        #play-btn {
            padding: 20px 40px;
            background: transparent;
            color: #800;
            border: 2px solid #800;
            font-size: 1.5rem;
            cursor: pointer;
            pointer-events: auto; /* Ensures it is clickable */
        }

        /* Mobile Controls */
        #mobile-controls {
            position: absolute;
            bottom: 40px;
            left: 40px;
            width: 120px;
            height: 120px;
            z-index: 50;
            display: none; /* Hidden until game starts */
        }

        #joystick-base {
            width: 100%; height: 100%;
            background: rgba(255, 255, 255, 0.1);
            border: 2px solid rgba(255, 255, 255, 0.3);
            border-radius: 50%;
            touch-action: none;
        }

        #joystick-stick {
            width: 50px; height: 50px;
            background: rgba(136, 0, 0, 0.6);
            border-radius: 50%;
            position: absolute;
            top: 35px; left: 35px;
            pointer-events: none;
        }
    </style>
</head>
<body>

    <div id="ui">
        <h1>BLACKWOOD ASYLUM</h1>
        <button id="play-btn">ENTER THE VOID</button>
    </div>

    <div id="mobile-controls">
        <div id="joystick-base">
            <div id="joystick-stick"></div>
        </div>
    </div>

    <audio id="bg-music" loop><source src="mixkit-horror-ambience-2482.wav" type="audio/wav"></audio>
    <audio id="footstep-audio" loop><source src="mixkit-footsteps-in-a-tunnel-loop-543.wav" type="audio/wav"></audio>

    <script type="importmap">
        { "imports": { "three": "https://unpkg.com/three@0.160.0/build/three.module.js" } }
    </script>
    <script type="module" src="game.js"></script>
</body>
</html>
