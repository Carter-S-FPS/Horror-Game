<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>TITAN_V41_HIGH_VIS</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/0.160.0/three.min.js"></script>
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background: #fff; }
        canvas { position: fixed; top: 0; left: 0; z-index: 99999 !important; display: block; }
        
        #ui-layer { 
            position: fixed; inset: 0; z-index: 100000; pointer-events: none;
            font-family: 'Courier New', monospace; color: #000;
        }
        
        #boot-screen { 
            position: fixed; inset: 0; background: #fff; z-index: 200000; 
            display: flex; flex-direction: column; justify-content: center; align-items: center; 
        }

        .bar-wrap { width: 250px; height: 4px; background: #eee; margin: 20px; border: 1px solid #000; }
        #bar-fill { width: 0%; height: 100%; background: #f00; }
        
        #hud-data { position: absolute; top: 20px; left: 20px; background: #fff; border: 2px solid #000; padding: 10px; display: none; }
    </style>
</head>
<body>
    <div id="boot-screen">
        <div style="font-weight: bold; letter-spacing: 5px;">RECOVERING_PIXELS...</div>
        <div class="bar-wrap"><div id="bar-fill"></div></div>
        <div id="click-prompt" style="display:none; color:red;">[ TAP_SCREEN_TO_DRAW ]</div>
    </div>

    <div id="ui-layer">
        <div id="hud-data">
            X_POS: <span id="val-x">0</span><br>
            Z_POS: <span id="val-z">0</span><br>
            STAT: OK
        </div>
    </div>

    <script>
        /**
         * TITAN_V41_EMERGENCY_DRAW
         * Everything is RED on WHITE. No darkness possible.
         */

        let scene, camera, renderer, active = false;
        let mv = { f: 0, s: 0, active: false, id: null };
        let rot = { x: 0, y: 0, lx: 0, ly: 0, id: null };

        function setupEngine() {
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0xffffff); // WHITE BACKGROUND

            camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 1000);
            
            try {
                renderer = new THREE.WebGLRenderer({ antialias: false, alpha: false });
                renderer.setSize(window.innerWidth, window.innerHeight);
                document.body.appendChild(renderer.domElement);
            } catch(e) {
                alert("WEBGL_NOT_SUPPORTED");
                return;
            }

            // NEON RED WIREFRAME WALLS (VISIBLE WITHOUT LIGHT)
            const wallMat = new THREE.MeshBasicMaterial({ color: 0xff0000, wireframe: true });
            const floorMat = new THREE.MeshBasicMaterial({ color: 0xeeeeee });

            // Floor
            const f = new THREE.Mesh(new THREE.PlaneGeometry(100, 100), floorMat);
            f.rotation.x = -Math.PI / 2;
            scene.add(f);

            // Large Central Pillars
            for(let i=0; i<15; i++) {
                const p = new THREE.Mesh(new THREE.BoxGeometry(4, 10, 4), wallMat);
                p.position.set(Math.random()*60-30, 5, Math.random()*60-30);
                scene.add(p);
            }

            // Outer Walls
            const w1 = new THREE.Mesh(new THREE.BoxGeometry(100, 10, 1), wallMat);
            w1.position.set(0, 5, 50); scene.add(w1);
            const w2 = new THREE.Mesh(new THREE.BoxGeometry(100, 10, 1), wallMat);
            w2.position.set(0, 5, -50); scene.add(w2);

            camera.position.set(0, 1.7, 0);

            // Event Listeners
            window.addEventListener('touchstart', onTouchStart, {passive: false});
            window.addEventListener('touchmove', onTouchMove, {passive: false});
            window.addEventListener('touchend', onTouchEnd);

            renderLoop();
        }

        function onTouchStart(e) {
            for(let t of e.changedTouches) {
                if(t.clientX < window.innerWidth/2) {
                    mv.active = true; mv.id = t.identifier;
                    mv.ox = t.clientX; mv.oy = t.clientY;
                } else {
                    rot.id = t.identifier;
                    rot.lx = t.clientX; rot.ly = t.clientY;
                }
            }
        }

        function onTouchMove(e) {
            e.preventDefault();
            for(let t of e.changedTouches) {
                if(t.identifier === mv.id) {
                    mv.s = (t.clientX - mv.ox) / 40;
                    mv.f = (t.clientY - mv.oy) / 40;
                } else if(t.identifier === rot.id) {
                    rot.x -= (t.clientX - rot.lx) * 0.006;
                    rot.y -= (t.clientY - rot.ly) * 0.006;
                    rot.y = Math.max(-1.4, Math.min(1.4, rot.y));
                    rot.lx = t.clientX; rot.ly = t.clientY;
                }
            }
        }

        function onTouchEnd(e) {
            for(let t of e.changedTouches) {
                if(t.identifier === mv.id) { mv.active = false; mv.f = 0; mv.s = 0; }
                if(t.identifier === rot.id) rot.id = null;
            }
        }

        function renderLoop() {
            requestAnimationFrame(renderLoop);
            if(!active) return;

            camera.rotation.set(rot.y, rot.x, 0, 'YXZ');

            if(mv.active) {
                const dir = new THREE.Vector3(0,0,-1).applyQuaternion(camera.quaternion);
                dir.y = 0; dir.normalize();
                const side = new THREE.Vector3(1,0,0).applyQuaternion(camera.quaternion);
                side.y = 0; side.normalize();

                camera.position.addScaledVector(dir, -mv.f * 0.15);
                camera.position.addScaledVector(side, mv.s * 0.15);
            }

            document.getElementById('val-x').innerText = Math.round(camera.position.x);
            document.getElementById('val-z').innerText = Math.round(camera.position.z);

            renderer.render(scene, camera);
        }

        // Boot Management
        let pct = 0;
        const loader = setInterval(() => {
            pct += 5;
            document.getElementById('bar-fill').style.width = pct+'%';
            if(pct >= 100) {
                clearInterval(loader);
                document.getElementById('click-prompt').style.display='block';
                setupEngine();
            }
        }, 30);

        const engage = () => {
            if(pct >= 100) {
                active = true;
                document.getElementById('boot-screen').style.display='none';
                document.getElementById('hud-data').style.display='block';
            }
        };
        window.addEventListener('mousedown', engage);
        window.addEventListener('touchstart', engage);
