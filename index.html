<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>TITAN_V42_CROSS_MAP</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/0.160.0/three.min.js"></script>
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background: #000; }
        canvas { position: fixed; top: 0; left: 0; z-index: 1; display: block; }
        #hud { 
            position: fixed; top: 20px; left: 20px; z-index: 10; 
            color: #0f0; font-family: monospace; pointer-events: none;
            background: rgba(0,0,0,0.7); padding: 10px; border: 1px solid #0f0;
        }
        #boot { 
            position: fixed; inset: 0; z-index: 100; background: #000; 
            display: flex; flex-direction: column; justify-content: center; align-items: center; 
            color: #0f0; font-family: monospace;
        }
    </style>
</head>
<body>
    <div id="boot">
        <div id="status">GENERATING_CORRIDORS...</div>
        <div id="btn" style="margin-top:20px; border:1px solid #0f0; padding:10px; cursor:pointer; display:none;">INITIALIZE_SYSTEM</div>
    </div>

    <div id="hud">
        SECTOR: <span id="sec">HUB</span><br>
        COORD: <span id="pos">0,0</span>
    </div>

    <script>
        /**
         * TITAN V42: THE CROSS (⊞) ARCHITECTURE
         * - Central Hub (10x10)
         * - 4 Branching Corridors (5x20)
         * - Full Roof Enclosure
         */

        let scene, camera, renderer, active = false;
        let mv = { f: 0, s: 0, active: false, id: null };
        let rot = { x: 0, y: 0, lx: 0, ly: 0, id: null };

        function init() {
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x050505);

            camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 500);
            
            renderer = new THREE.WebGLRenderer({ antialias: false });
            renderer.setSize(window.innerWidth, window.innerHeight);
            document.body.appendChild(renderer.domElement);

            // Materials
            const wallMat = new THREE.MeshBasicMaterial({ color: 0xff3333, wireframe: true });
            const floorMat = new THREE.MeshBasicMaterial({ color: 0x111111 });
            const roofMat = new THREE.MeshBasicMaterial({ color: 0x222222, wireframe: true });

            const createBox = (w, h, d, x, z, mat) => {
                const m = new THREE.Mesh(new THREE.BoxGeometry(w, h, d), mat);
                m.position.set(x, h/2, z);
                scene.add(m);
            };

            const createPlane = (w, d, x, z, y, mat, rx = -Math.PI/2) => {
                const m = new THREE.Mesh(new THREE.PlaneGeometry(w, d), mat);
                m.rotation.x = rx;
                m.position.set(x, y, z);
                scene.add(m);
            };

            // 1. FLOOR & ROOF (The ⊞ Shape)
            // Center
            createPlane(10, 10, 0, 0, 0, floorMat);
            createPlane(10, 10, 0, 0, 4, roofMat, Math.PI/2);
            
            // North/South Corridors
            createPlane(6, 40, 0, 0, 0, floorMat);
            createPlane(6, 40, 0, 0, 4, roofMat, Math.PI/2);
            
            // East/West Corridors
            createPlane(40, 6, 0, 0, 0, floorMat);
            createPlane(40, 6, 0, 0, 4, roofMat, Math.PI/2);

            // 2. WALLS (Outer Perimeter of the Cross)
            const h = 4;
            // North Arm
            createBox(0.2, h, 20, 3, 10, wallMat);   // Right
            createBox(0.2, h, 20, -3, 10, wallMat);  // Left
            createBox(6, h, 0.2, 0, 20, wallMat);    // Cap
            
            // South Arm
            createBox(0.2, h, 20, 3, -10, wallMat);  // Right
            createBox(0.2, h, 20, -3, -10, wallMat); // Left
            createBox(6, h, 0.2, 0, -20, wallMat);   // Cap

            // East Arm
            createBox(20, h, 0.2, 10, 3, wallMat);   // Top
            createBox(20, h, 0.2, 10, -3, wallMat);  // Bottom
            createBox(0.2, h, 6, 20, 0, wallMat);    // Cap

            // West Arm
            createBox(20, h, 0.2, -10, 3, wallMat);  // Top
            createBox(20, h, 0.2, -10, -3, wallMat); // Bottom
            createBox(0.2, h, 6, -20, 0, wallMat);   // Cap

            camera.position.set(0, 1.7, 0);

            window.addEventListener('touchstart', touchS, {passive: false});
            window.addEventListener('touchmove', touchM, {passive: false});
            window.addEventListener('touchend', touchE);

            loop();
        }

        function touchS(e) {
            for(let t of e.changedTouches) {
                if(t.clientX < window.innerWidth/2) {
                    mv.active = true; mv.id = t.identifier;
                    mv.ox = t.clientX; mv.oy = t.clientY;
                } else {
                    rot.id = t.identifier;
                    rot.lx = t.clientX; rot.ly = t.clientY;
                }
            }
        }

        function touchM(e) {
            e.preventDefault();
            for(let t of e.changedTouches) {
                if(t.identifier === mv.id) {
                    mv.s = (t.clientX - mv.ox) / 40;
                    mv.f = (t.clientY - mv.oy) / 40;
                } else if(t.identifier === rot.id) {
                    rot.x -= (t.clientX - rot.lx) * 0.007;
                    rot.y -= (t.clientY - rot.ly) * 0.007;
                    rot.y = Math.max(-1.4, Math.min(1.4, rot.y));
                    rot.lx = t.clientX; rot.ly = t.clientY;
                }
            }
        }

        function touchE(e) {
            for(let t of e.changedTouches) {
                if(t.identifier === mv.id) { mv.active = false; mv.f = 0; mv.s = 0; }
                if(t.identifier === rot.id) rot.id = null;
            }
        }

        function loop() {
            requestAnimationFrame(loop);
            if(!active) return;

            camera.rotation.set(rot.y, rot.x, 0, 'YXZ');

            if(mv.active) {
                const dir = new THREE.Vector3(0,0,-1).applyQuaternion(camera.quaternion);
                dir.y = 0; dir.normalize();
                const side = new THREE.Vector3(1,0,0).applyQuaternion(camera.quaternion);
                side.y = 0; side.normalize();

                camera.position.addScaledVector(dir, -mv.f * 0.15);
                camera.position.addScaledVector(side, mv.s * 0.15);
            }

            document.getElementById('pos').innerText = `${Math.round(camera.position.x)},${Math.round(camera.position.z)}`;
            renderer.render(scene, camera);
        }

        let p = 0;
        const load = setInterval(() => {
            p += 5;
            if(p >= 100) {
                clearInterval(load);
                document.getElementById('status').innerText = "CROSS_MAP_SYNCED";
                document.getElementById('btn').style.display = "block";
                init();
            }
        }, 20);

        document.getElementById('btn').onclick = () => {
            active = true;
            document.getElementById('boot').style.display = 'none';
        };
