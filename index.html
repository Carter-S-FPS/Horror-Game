<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>BLACKWOOD: THE SURGEON'S REACH - V10.0</title>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/0.160.0/three.min.js"></script>

    <style>
        :root { 
            --lunar: #b0c4de;
            --blood: #800000;
            --void: #020202;
        }
        
        * { 
            margin: 0; padding: 0; box-sizing: border-box; 
            touch-action: none; -webkit-tap-highlight-color: transparent; 
            user-select: none; 
        }

        body, html { 
            width: 100%; height: 100%; background: #000; 
            overflow: hidden; font-family: 'Courier New', Courier, monospace; 
        }

        /* --- PRE-FLIGHT INTERFACE --- */
        #boot-screen {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: var(--void); display: flex; justify-content: center; align-items: center;
            z-index: 10000; transition: opacity 3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        #boot-content { width: 80%; max-width: 500px; text-align: center; }

        .title-card { 
            color: var(--blood); letter-spacing: 12px; 
            font-size: 1rem; margin-bottom: 50px; 
            text-transform: uppercase; animation: pulse 4s infinite;
        }

        #load-bar-container { width: 100%; height: 1px; background: #111; margin-bottom: 20px; }
        #load-bar-progress { width: 0%; height: 100%; background: var(--lunar); box-shadow: 0 0 10px var(--lunar); }

        .sub-text { color: #333; font-size: 0.6rem; text-transform: uppercase; letter-spacing: 5px; }

        /* --- INPUT TOPOGRAPHY --- */
        #ui-overlay { 
            position: absolute; top: 0; left: 0; 
            width: 100%; height: 100%; pointer-events: none; 
            display: none; z-index: 50;
        }

        #vignette-effect { 
            position: absolute; width: 100%; height: 100%; 
            background: radial-gradient(circle, transparent 10%, rgba(0,0,0,0.95) 100%);
        }

        /* Movement Side (Left) */
        #move-zone {
            position: absolute; top: 0; left: 0; width: 50%; height: 100%;
            pointer-events: auto;
        }

        /* Camera Side (Right) */
        #look-zone {
            position: absolute; top: 0; right: 0; width: 50%; height: 100%;
            pointer-events: auto;
        }

        #joystick-container {
            position: absolute; bottom: 60px; left: 60px;
            width: 120px; height: 120px;
            border: 1px solid rgba(255,255,255,0.05); border-radius: 50%;
        }

        #joystick-knob {
            position: absolute; top: 40px; left: 40px; width: 40px; height: 40px;
            background: rgba(176, 196, 222, 0.1); border: 1px solid var(--lunar);
            border-radius: 50%;
        }

        #noise-layer {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: url('https://media.giphy.com/media/oEI9uWUicT3K8/giphy.gif');
            opacity: 0.04; pointer-events: none; z-index: 5;
        }

        @keyframes pulse { 0%, 100% { opacity: 0.1; } 50% { opacity: 1; } }
    </style>
</head>
<body>

    <div id="noise-layer"></div>

    <div id="boot-screen">
        <div id="boot-content">
            <h1 class="title-card">Neural Link Established</h1>
            <div id="load-bar-container"><div id="load-bar-progress"></div></div>
            <p class="sub-text" id="load-status">Calibrating Vestibular Sense...</p>
        </div>
    </div>

    <div id="ui-overlay">
        <div id="vignette-effect"></div>
        <div id="move-zone">
            <div id="joystick-container">
                <div id="joystick-knob"></div>
            </div>
        </div>
        <div id="look-zone"></div>
    </div>

    <audio id="track-amb" loop><source src="mixkit-horror-ambience-2482.wav" type="audio/wav"></audio>
    <audio id="track-step" loop><source src="mixkit-footsteps-in-a-tunnel-loop-543.wav" type="audio/wav"></audio>
    <audio id="track-breath" loop><source src="mixkit-creepy-demon-heavy-breathing-2240.wav" type="audio/wav"></audio>

    <script>
        /**
         * BLACKWOOD CORE ENGINE V10.0
         * "Weight & Vision" Update
         */

        const SYSTEM = {
            isReady: false,
            isActive: false,
            moveSpeed: 0.08, // Significantly slowed down from Flash speeds
            rotateSpeed: 0.004,
            sanity: 1.0,
            controls: {
                moveVec: new THREE.Vector2(0, 0),
                lookYaw: 0,
                lookPitch: 0,
                isMoving: false
            },
            world: {
                segments: [],
                surgeon: null,
                clock: new THREE.Clock()
            }
        };

        let scene, camera, renderer, flashlight, moonAmbience, pointFill;
        let sfx = {};

        // --- 1. BOOT SEQUENCE ---
        function runBootPipeline() {
            const bar = document.getElementById('load-bar-progress');
            const status = document.getElementById('load-status');
            const log = [
                "Damping motor functions...",
                "Mapping peripheral rods...",
                "Isolating auditory triggers...",
                "Engaging dual-hemisphere controls...",
                "Manifestation complete."
            ];

            let p = 0;
            const step = () => {
                p += Math.random() * 1.2;
                if (p >= 100) {
                    p = 100;
                    SYSTEM.isReady = true;
                    status.innerText = "LINK READY. TOUCH TO AWAKEN.";
                    status.style.color = "#fff";
                    initScene();
                } else {
                    bar.style.width = p + "%";
                    if (Math.floor(p) % 20 === 0) status.innerText = log[Math.floor(p/20)];
                    requestAnimationFrame(step);
                }
            };
            step();
        }

        const wakeup = () => {
            if (!SYSTEM.isReady || SYSTEM.isActive) return;
            SYSTEM.isActive = true;
            document.getElementById('boot-screen').style.opacity = '0';
            setTimeout(() => document.getElementById('boot-screen').style.display = 'none', 3000);
            document.getElementById('ui-overlay').style.display = 'block';

            sfx.amb = document.getElementById('track-amb');
            sfx.step = document.getElementById('track-step');
            sfx.breath = document.getElementById('track-breath');
            
            sfx.amb.volume = 0.25;
            sfx.step.volume = 0;
            sfx.breath.volume = 0;
            
            [sfx.amb, sfx.step, sfx.breath].forEach(a => a.play().catch(()=>{}));
        };

        window.addEventListener('mousedown', wakeup);
        window.addEventListener('touchstart', wakeup);
        window.onload = runBootPipeline;

        // --- 2. ENVIRONMENT CONSTRUCT ---
        function initScene() {
            scene = new THREE.Scene();
            scene.fog = new THREE.FogExp2(0x020205, 0.07);

            camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 1200);
            
            renderer = new THREE.WebGLRenderer({ antialias: false, powerPreference: "high-performance" });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(Math.min(window.devicePixelRatio, 1.5));
            document.body.appendChild(renderer.domElement);

            // Peripheral Visibility Logic:
            // Moonlight Baseline - Ensures the world isn't pitch black outside the beam
            moonAmbience = new THREE.AmbientLight(0x1a2333, 0.2); 
            scene.add(moonAmbience);

            const sky = new THREE.HemisphereLight(0x223344, 0x000000, 0.25);
            scene.add(sky);

            // Primary Flashlight Driver
            flashlight = new THREE.SpotLight(0xfff9e0, 180);
            flashlight.angle = Math.PI / 7.5;
            flashlight.penumbra = 0.4;
            flashlight.decay = 2.0;
            flashlight.distance = 85;
            camera.add(flashlight);
            flashlight.position.set(0, 0, 0.1);
            flashlight.target.position.set(0, 0, -5);
            camera.add(flashlight.target);

            // Local Bounce (Soft light at player feet)
            pointFill = new THREE.PointLight(0x334466, 0.15, 8);
            camera.add(pointFill);

            scene.add(camera);

            generateInfiniteWard();
            spawnSurgeon();
            initInputSystems();
            mainLoop();
        }

        function generateInfiniteWard() {
            const wallMat = new THREE.MeshLambertMaterial({ color: 0x121212 });
            const floorMat = new THREE.MeshLambertMaterial({ color: 0x080808 });
            const ceilMat = new THREE.MeshLambertMaterial({ color: 0x020202 });

            for (let i = 0; i < 400; i++) {
                const seg = new THREE.Group();
                const z = -i * 12;

                const floor = new THREE.Mesh(new THREE.PlaneGeometry(12, 12), floorMat);
                floor.rotation.x = -Math.PI / 2;
                seg.add(floor);

                const ceil = new THREE.Mesh(new THREE.PlaneGeometry(12, 12), ceilMat);
                ceil.rotation.x = Math.PI / 2;
                ceil.position.y = 6.5;
                seg.add(ceil);

                const lWall = new THREE.Mesh(new THREE.BoxGeometry(0.5, 6.5, 12), wallMat);
                lWall.position.set(-6, 3.25, 0);
                seg.add(lWall);

                const rWall = new THREE.Mesh(new THREE.BoxGeometry(0.5, 6.5, 12), wallMat);
                rWall.position.set(6, 3.25, 0);
                seg.add(rWall);

                // Occasional High Windows for Moonbeams
                if (i % 8 === 0) {
                    const moonBeam = new THREE.PointLight(0x1a2a44, 4, 15);
                    moonBeam.position.set(Math.random() > 0.5 ? -5 : 5, 5.5, 0);
                    seg.add(moonBeam);
                }

                seg.position.z = z;
                scene.add(seg);
                SYSTEM.world.segments.push(seg);
            }
        }

        function spawnSurgeon() {
            SYSTEM.world.surgeon = new THREE.Group();
            const dark = new THREE.MeshLambertMaterial({ color: 0x0a0a0a });
            
            const body = new THREE.Mesh(new THREE.BoxGeometry(0.7, 1.8, 0.45), dark);
            body.position.y = 0.9;
            
            const head = new THREE.Mesh(new THREE.BoxGeometry(0.4, 0.5, 0.4), new THREE.MeshLambertMaterial({color: 0x000}));
            head.position.y = 2.1;

            SYSTEM.world.surgeon.add(body, head);
            SYSTEM.world.surgeon.position.set(0, 0, -45);
            scene.add(SYSTEM.world.surgeon);
        }

        // --- 3. DUAL-SCREEN CONTROL SYSTEM ---
        function initInputSystems() {
            const mZone = document.getElementById('move-zone');
            const lZone = document.getElementById('look-zone');
            const knob = document.getElementById('joystick-knob');
            
            let mCX, mCY;
            let lastLookX = 0, lastLookY = 0;

            // MOVE HANDLER (Left Side)
            mZone.addEventListener('touchstart', (e) => {
                const r = mZone.getBoundingClientRect();
                mCX = r.left + 60 + 60; // Offset for joystick container
                mCY = r.top + (window.innerHeight - 120); 
                const t = e.touches[0];
                mCX = t.clientX; mCY = t.clientY;
            });

            mZone.addEventListener('touchmove', (e) => {
                e.preventDefault();
                const t = e.touches[0];
                const dx = t.clientX - mCX, dy = t.clientY - mCY;
                const d = Math.min(Math.sqrt(dx*dx + dy*dy), 50);
                const a = Math.atan2(dy, dx);

                knob.style.transform = `translate(${Math.cos(a)*d}px, ${Math.sin(a)*d}px)`;
                SYSTEM.controls.moveVec.set(Math.cos(a) * (d/50), Math.sin(a) * (d/50));
                SYSTEM.controls.isMoving = d > 5;
            }, { passive: false });

            mZone.addEventListener('touchend', () => {
                knob.style.transform = `translate(0,0)`;
                SYSTEM.controls.isMoving = false;
                SYSTEM.controls.moveVec.set(0, 0);
            });

            // LOOK HANDLER (Right Side)
            lZone.addEventListener('touchstart', (e) => {
                const t = e.touches[0];
                lastLookX = t.clientX; lastLookY = t.clientY;
            });

            lZone.addEventListener('touchmove', (e) => {
                const t = e.touches[0];
                const dx = t.clientX - lastLookX;
                const dy = t.clientY - lastLookY;

                SYSTEM.controls.lookYaw -= dx * SYSTEM.rotateSpeed;
                SYSTEM.controls.lookPitch -= dy * SYSTEM.rotateSpeed;
                SYSTEM.controls.lookPitch = Math.max(-Math.PI/3, Math.min(Math.PI/3, SYSTEM.controls.lookPitch));

                lastLookX = t.clientX; lastLookY = t.clientY;
            });
        }

        // --- 4. PROCESSING & AUDIO ---
        function updateSpatialLogic(delta) {
            if (!SYSTEM.isActive) return;

            const sPos = SYSTEM.world.surgeon.position;
            const dist = camera.position.distanceTo(sPos);

            // BREATHING INTENSITY: Exponential ramp
            let breathAmt = 1.0 - (dist / 45);
            breathAmt = Math.max(0, Math.min(breathAmt, 1));
            sfx.breath.volume = Math.pow(breathAmt, 2.0) * 0.98;

            // FOOTSTEP SYNC
            if (SYSTEM.controls.isMoving) {
                sfx.step.volume = Math.min(sfx.step.volume + 0.05, 0.35);
            } else {
                sfx.step.volume = Math.max(sfx.step.volume - 0.05, 0);
            }

            // SURGEON BEHAVIOR
            const frustum = new THREE.Frustum();
            frustum.setFromProjectionMatrix(new THREE.Matrix4().multiplyMatrices(camera.projectionMatrix, camera.matrixWorldInverse));
            const seen = frustum.containsPoint(sPos);

            if (!seen) {
                sPos.z += delta * 11.5; // Stalks faster when not viewed
                sPos.x = Math.sin(Date.now() * 0.001) * 3; 
            } else {
                sPos.z += delta * 0.45; // Frozen/Creeping
                // Head Twitch
                SYSTEM.world.surgeon.children[1].rotation.z = Math.sin(Date.now() * 0.05) * 0.05;
            }

            // Persistence Loop
            if (camera.position.z - sPos.z > 10) sPos.z = camera.position.z - 50;
        }

        // --- 5. CORE RENDER LOOP ---
        function mainLoop() {
            requestAnimationFrame(mainLoop);
            const delta = SYSTEM.world.clock.getDelta();

            if (SYSTEM.isActive) {
                // Rotation
                camera.rotation.order = "YXZ";
                camera.rotation.y = SYSTEM.controls.lookYaw;
                camera.rotation.x = SYSTEM.controls.lookPitch;

                // Movement (Relative to Camera)
                if (SYSTEM.controls.isMoving) {
                    const forward = new THREE.Vector3(0, 0, -1).applyQuaternion(camera.quaternion);
                    const right = new THREE.Vector3(1, 0, 0).applyQuaternion(camera.quaternion);
                    forward.y = 0; right.y = 0; forward.normalize(); right.normalize();

                    camera.position.addScaledVector(forward, -SYSTEM.controls.moveVec.y * SYSTEM.moveSpeed);
                    camera.position.addScaledVector(right, SYSTEM.controls.moveVec.x * SYSTEM.moveSpeed);
                    
                    // Heavy Head Bob
                    camera.position.y = 1.6 + Math.sin(Date.now() * 0.006) * 0.04;
                }

                // Eye Adaptation Simulation
                const distToSurg = camera.position.distanceTo(SYSTEM.world.surgeon.position);
                moonAmbience.intensity = 0.15 + (Math.sin(Date.now() * 0.0001) * 0.05);

                // Flicker
                if (Math.random() > 0.99) flashlight.intensity = 30 + Math.random()*150;

                updateSpatialLogic(delta);
            }

            renderer.render(scene, camera);
        }

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>
</html>
