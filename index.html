<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>TITAN_V43_ASYLUM_WARD</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/0.160.0/three.min.js"></script>
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background: #000; }
        canvas { position: fixed; top: 0; left: 0; z-index: 1; display: block; }
        #hud { 
            position: fixed; top: 20px; left: 20px; z-index: 10; 
            color: #f00; font-family: 'Courier New', monospace; pointer-events: none;
            background: rgba(0,0,0,0.8); padding: 10px; border: 1px solid #f00; font-size: 12px;
        }
        #boot { 
            position: fixed; inset: 0; z-index: 100; background: #000; 
            display: flex; flex-direction: column; justify-content: center; align-items: center; 
            color: #f00; font-family: monospace;
        }
        .btn { margin-top: 20px; border: 1px solid #f00; padding: 15px 30px; cursor: pointer; display: none; letter-spacing: 2px; }
    </style>
</head>
<body>
    <div id="boot">
        <div id="status">CONSTRUCTING_ASYLUM_BLOCK...</div>
        <div id="btn" class="btn">ENTER_WARD_01</div>
    </div>

    <div id="hud">
        STATUS: CONFINED<br>
        LOCATION: <span id="sec">ASYLUM_PERIMETER</span><br>
        COORD: <span id="pos">0,0</span>
    </div>

    <script>
        /**
         * TITAN V43: ASYLUM ARCHITECTURE
         * Layout: A Square (Outer Ward) with a Cross (Corridors) inside.
         * Enclosure: Full Floor and Roof.
         */

        let scene, camera, renderer, active = false;
        let mv = { f: 0, s: 0, active: false, id: null };
        let rot = { x: 0, y: 0, lx: 0, ly: 0, id: null };

        function init() {
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x0a0000);

            camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 1000);
            
            renderer = new THREE.WebGLRenderer({ antialias: false });
            renderer.setSize(window.innerWidth, window.innerHeight);
            document.body.appendChild(renderer.domElement);

            // Materials - High Visibility Wireframes
            const wallMat = new THREE.MeshBasicMaterial({ color: 0xff0000, wireframe: true });
            const floorMat = new THREE.MeshBasicMaterial({ color: 0x110000 });
            const roofMat = new THREE.MeshBasicMaterial({ color: 0x330000, wireframe: true });

            const wallH = 4.5;
            const size = 50; // Total size of the square

            const addWall = (w, d, x, z) => {
                const g = new THREE.BoxGeometry(w, wallH, d);
                const m = new THREE.Mesh(g, wallMat);
                m.position.set(x, wallH/2, z);
                scene.add(m);
            };

            // 1. FLOOR AND ROOF (Massive Square)
            const fGeo = new THREE.PlaneGeometry(size, size);
            const floor = new THREE.Mesh(fGeo, floorMat);
            floor.rotation.x = -Math.PI/2;
            scene.add(floor);

            const roof = new THREE.Mesh(fGeo, roofMat);
            roof.rotation.x = Math.PI/2;
            roof.position.y = wallH;
            scene.add(roof);

            // 2. OUTER PERIMETER SQUARE
            addWall(size, 0.5, 0, size/2);  // North
            addWall(size, 0.5, 0, -size/2); // South
            addWall(0.5, size, size/2, 0);  // East
            addWall(0.5, size, -size/2, 0); // West

            // 3. THE INNER CROSS (⊞)
            // Vertical Corridor Walls (N to S)
            addWall(0.2, size, 4, 0); 
            addWall(0.2, size, -4, 0);

            // Horizontal Corridor Walls (E to W)
            addWall(size, 0.2, 0, 4);
            addWall(size, 0.2, 0, -4);

            camera.position.set(0, 1.7, 0);

            window.addEventListener('touchstart', (e) => {
                for(let t of e.changedTouches) {
                    if(t.clientX < window.innerWidth/2) {
                        mv.active = true; mv.id = t.identifier;
                        mv.ox = t.clientX; mv.oy = t.clientY;
                    } else {
                        rot.id = t.identifier;
                        rot.lx = t.clientX; rot.ly = t.clientY;
                    }
                }
            }, {passive: false});

            window.addEventListener('touchmove', (e) => {
                e.preventDefault();
                for(let t of e.changedTouches) {
                    if(t.identifier === mv.id) {
                        mv.s = (t.clientX - mv.ox) / 40;
                        mv.f = (t.clientY - mv.oy) / 40;
                    } else if(t.identifier === rot.id) {
                        rot.x -= (t.clientX - rot.lx) * 0.007;
                        rot.y -= (t.clientY - rot.ly) * 0.007;
                        rot.y = Math.max(-1.4, Math.min(1.4, rot.y));
                        rot.lx = t.clientX; rot.ly = t.clientY;
                    }
                }
            }, {passive: false});

            window.addEventListener('touchend', (e) => {
                for(let t of e.changedTouches) {
                    if(t.identifier === mv.id) { mv.active = false; mv.f = 0; mv.s = 0; }
                    if(t.identifier === rot.id) rot.id = null;
                }
            });

            loop();
        }

        function loop() {
            requestAnimationFrame(loop);
            if(!active) return;

            camera.rotation.set(rot.y, rot.x, 0, 'YXZ');

            if(mv.active) {
                const dir = new THREE.Vector3(0,0,-1).applyQuaternion(camera.quaternion);
                dir.y = 0; dir.normalize();
                const side = new THREE.Vector3(1,0,0).applyQuaternion(camera.quaternion);
                side.y = 0; side.normalize();

                camera.position.addScaledVector(dir, -mv.f * 0.18);
                camera.position.addScaledVector(side, mv.s * 0.18);
            }

            document.getElementById('pos').innerText = `${Math.round(camera.position.x)},${Math.round(camera.position.z)}`;
            renderer.render(scene, camera);
        }

        // Boot system
        let p = 0;
        const load = setInterval(() => {
            p += 4;
            if(p >= 100) {
                clearInterval(load);
                document.getElementById('status').innerText = "ASYLUM_GEOMETRY_LOCKED";
                document.getElementById('btn').style.display = "block";
                init();
            }
        }, 25);

        document.getElementById('btn').onclick = () => {
            active = true;
            document.getElementById('boot').style.display = 'none';
        };
