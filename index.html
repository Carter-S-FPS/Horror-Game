<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>BLACKWOOD: LUNAR REACH v8.0</title>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/0.160.0/three.min.js"></script>

    <style>
        :root { 
            --lunar-blue: #aaccff;
            --horror-red: #bb0000; 
            --ui-font: 'Courier New', monospace;
        }
        
        * { 
            margin: 0; padding: 0; box-sizing: border-box; 
            touch-action: none; -webkit-tap-highlight-color: transparent; 
            user-select: none; 
        }

        body, html { 
            width: 100%; height: 100%; background: #000; 
            overflow: hidden; font-family: var(--ui-font); 
        }

        /* --- LOADING INTERFACE --- */
        #overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #000; display: flex; justify-content: center; align-items: center;
            z-index: 10000; transition: opacity 3s ease;
        }

        #load-wrap { width: 80%; max-width: 500px; text-align: center; }

        .glitch-text { 
            color: var(--lunar-blue); letter-spacing: 10px; 
            font-size: 1.2rem; margin-bottom: 30px; 
            text-shadow: 2px 0 #f00, -2px 0 #00f;
            animation: glitch 2s infinite;
        }

        #bar-bg { width: 100%; height: 1px; background: #222; margin-bottom: 15px; }
        #bar-fill { width: 0%; height: 100%; background: var(--lunar-blue); box-shadow: 0 0 15px var(--lunar-blue); }

        #status-txt { color: #555; font-size: 0.7rem; text-transform: uppercase; letter-spacing: 3px; }

        /* --- HUD & VISUALS --- */
        #ui-layer { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; display: none; }
        #vignette { position: absolute; width: 100%; height: 100%; background: radial-gradient(circle, transparent 20%, rgba(0,0,0,0.85) 100%); z-index: 2; }
        
        #hud-top {
            position: absolute; top: 20px; width: 100%; text-align: center;
            color: var(--lunar-blue); font-size: 0.6rem; opacity: 0.4; letter-spacing: 5px;
        }

        /* --- CONTROLS --- */
        #joystick-zone {
            position: absolute; bottom: 50px; left: 50px;
            width: 140px; height: 140px; pointer-events: auto; z-index: 10;
        }
        #joy-base { width: 100%; height: 100%; border: 1px solid rgba(170, 204, 255, 0.1); border-radius: 50%; }
        #joy-stick { position: absolute; top: 45px; left: 45px; width: 50px; height: 50px; background: rgba(170, 204, 255, 0.05); border-radius: 50%; border: 1px solid var(--lunar-blue); }

        #noise-floor {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: url('https://media.giphy.com/media/oEI9uWUicT3K8/giphy.gif');
            opacity: 0.03; pointer-events: none; z-index: 5;
        }

        @keyframes glitch {
            0% { transform: translate(0); }
            20% { transform: translate(-2px, 2px); }
            40% { transform: translate(-2px, -2px); }
            60% { transform: translate(2px, 2px); }
            80% { transform: translate(2px, -2px); }
            100% { transform: translate(0); }
        }
    </style>
</head>
<body>

    <div id="noise-floor"></div>

    <div id="overlay">
        <div id="load-wrap">
            <h1 class="glitch-text">LUNAR PROTOCOL</h1>
            <div id="bar-bg"><div id="bar-fill"></div></div>
            <p id="status-txt">Calibrating Night Vision...</p>
        </div>
    </div>

    <div id="ui-layer">
        <div id="vignette"></div>
        <div id="hud-top">MOONLIGHT_SYNC // SECTOR_8</div>
        <div id="joystick-zone">
            <div id="joy-base"><div id="joy-stick"></div></div>
        </div>
    </div>

    <audio id="amb" loop><source src="mixkit-horror-ambience-2482.wav" type="audio/wav"></audio>
    <audio id="step" loop><source src="mixkit-footsteps-in-a-tunnel-loop-543.wav" type="audio/wav"></audio>
    <audio id="breath" loop><source src="mixkit-creepy-demon-heavy-breathing-2240.wav" type="audio/wav"></audio>

    <script>
        /**
         * BLACKWOOD ENGINE v8.0 - MOONLIGHT & SPATIAL AUDIO
         * Optimized for High Visibility and Extreme Proximity Scaling
         */

        const CORE = {
            loaded: false,
            active: false,
            camHeight: 1.6,
            depth: 0,
            sanity: 1.0,
            exposure: 1.0,
            move: { x: 0, z: 0, active: false },
            objs: { segments: [], moonbeams: [], lights: [] }
        };

        let scene, camera, renderer, clock, surgeon, flashlight, moonLight, bounceLight;
        let sfxAmb, sfxStep, sfxBreath;

        // --- 1. BOOT LOGIC ---
        function runLoader() {
            const bar = document.getElementById('bar-fill');
            const txt = document.getElementById('status-txt');
            const phases = ["Gathering starlight...", "Piercing the void...", "Mapping the Surgeon's path...", "Finalizing exposure..."];
            let p = 0;
            const t = setInterval(() => {
                p += Math.random() * 1.5;
                if (p >= 100) {
                    p = 100;
                    clearInterval(t);
                    CORE.loaded = true;
                    txt.innerText = "SENSORS READY. TAP TO AWAKEN.";
                    txt.style.color = "#fff";
                    initEngine();
                }
                bar.style.width = p + "%";
                txt.innerText = phases[Math.floor(p/25)];
            }, 40);
        }

        const start = () => {
            if (!CORE.loaded || CORE.active) return;
            CORE.active = true;
            document.getElementById('overlay').style.opacity = '0';
            setTimeout(() => document.getElementById('overlay').style.display = 'none', 3000);
            document.getElementById('ui-layer').style.display = 'block';

            sfxAmb = document.getElementById('amb');
            sfxStep = document.getElementById('step');
            sfxBreath = document.getElementById('breath');
            
            sfxAmb.volume = 0.3;
            sfxStep.volume = 0;
            sfxBreath.volume = 0;
            
            [sfxAmb, sfxStep, sfxBreath].forEach(a => a.play().catch(()=>{}));
        };

        window.addEventListener('mousedown', start);
        window.addEventListener('touchstart', start);
        window.onload = runLoader;

        // --- 2. THE MOONLIGHT SYSTEM ---
        function initEngine() {
            scene = new THREE.Scene();
            scene.fog = new THREE.FogExp2(0x020408, 0.07);

            camera = new THREE.PerspectiveCamera(70, window.innerWidth/window.innerHeight, 0.1, 1500);
            clock = new THREE.Clock();

            renderer = new THREE.WebGLRenderer({ antialias: false, powerPreference: "high-performance" });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(Math.min(window.devicePixelRatio, 1.8));
            document.body.appendChild(renderer.domElement);

            // GLOBAL AMBIENCE (The "Moonlight" baseline)
            moonLight = new THREE.DirectionalLight(0xaaccff, 0.4);
            moonLight.position.set(5, 10, 5);
            scene.add(moonLight);

            const sky = new THREE.HemisphereLight(0x112244, 0x000000, 0.3);
            scene.add(sky);

            // FLASHLIGHT (Player Light)
            flashlight = new THREE.SpotLight(0xfff5e1, 140);
            flashlight.angle = Math.PI / 8;
            flashlight.penumbra = 0.6;
            flashlight.decay = 2.0;
            flashlight.distance = 70;
            camera.add(flashlight);
            flashlight.position.set(0, 0, 0.1);
            flashlight.target.position.set(0, 0, -5);
            camera.add(flashlight.target);

            // BOUNCE LIGHT (Clears the pitch blackness around feet)
            bounceLight = new THREE.PointLight(0xaaccff, 0.1, 10);
            camera.add(bounceLight);
            
            scene.add(camera);

            generateWorld();
            spawnSurgeon();
            initControls();
            animate();
        }

        function generateWorld() {
            const wallMat = new THREE.MeshLambertMaterial({ color: 0x111111 });
            const floorMat = new THREE.MeshLambertMaterial({ color: 0x050505 });
            const windowMat = new THREE.MeshBasicMaterial({ color: 0x224466 });

            for (let i = 0; i < 450; i++) {
                const group = new THREE.Group();
                const z = -i * 12;

                // Floor & Ceiling
                const floor = new THREE.Mesh(new THREE.PlaneGeometry(10, 12), floorMat);
                floor.rotation.x = -Math.PI / 2;
                group.add(floor);

                const ceil = new THREE.Mesh(new THREE.PlaneGeometry(10, 12), new THREE.MeshLambertMaterial({color: 0x020202}));
                ceil.rotation.x = Math.PI / 2;
                ceil.position.y = 6;
                group.add(ceil);

                // Walls
                const lWall = new THREE.Mesh(new THREE.BoxGeometry(0.5, 6, 12), wallMat);
                lWall.position.set(-5, 3, 0);
                group.add(lWall);

                const rWall = new THREE.Mesh(new THREE.BoxGeometry(0.5, 6, 12), wallMat);
                rWall.position.set(5, 3, 0);
                group.add(rWall);

                // HIGH MOONLIGHT WINDOWS (The source of visibility)
                if (i % 6 === 0) {
                    const win = new THREE.Mesh(new THREE.PlaneGeometry(2, 1), windowMat);
                    win.position.set(-4.74, 5, 0);
                    win.rotation.y = Math.PI / 2;
                    group.add(win);

                    // Cast a blue beam on the floor
                    const beam = new THREE.Mesh(
                        new THREE.PlaneGeometry(4, 8),
                        new THREE.MeshBasicMaterial({ color: 0x112233, transparent: true, opacity: 0.15 })
                    );
                    beam.rotation.x = -Math.PI / 2;
                    beam.position.set(0, 0.01, 0);
                    group.add(beam);

                    const winGlow = new THREE.PointLight(0x446688, 5, 12);
                    winGlow.position.set(-4, 5, 0);
                    group.add(winGlow);
                }

                group.position.z = z;
                scene.add(group);
                CORE.objs.segments.push(group);
            }
        }

        function spawnSurgeon() {
            surgeon = new THREE.Group();
            const dark = new THREE.MeshLambertMaterial({ color: 0x080808 });
            
            const body = new THREE.Mesh(new THREE.BoxGeometry(0.6, 1.7, 0.4), dark);
            body.position.y = 0.85;
            
            const head = new THREE.Mesh(new THREE.BoxGeometry(0.35, 0.45, 0.35), new THREE.MeshLambertMaterial({color:0x000}));
            head.position.y = 1.95;

            surgeon.add(body, head);
            surgeon.position.set(0, 0, -45);
            scene.add(surgeon);
        }

        // --- 3. MOVEMENT & INTERACTION ---
        function initControls() {
            const zone = document.getElementById('joystick-zone');
            const stick = document.getElementById('joy-stick');
            let cx, cy;

            const move = (e) => {
                const t = e.touches ? e.touches[0] : e;
                const dx = t.clientX - cx, dy = t.clientY - cy;
                const d = Math.min(Math.sqrt(dx*dx + dy*dy), 50);
                const a = Math.atan2(dy, dx);

                stick.style.transform = `translate(${Math.cos(a)*d}px, ${Math.sin(a)*d}px)`;
                CORE.move.z = Math.sin(a) * (d/50) * 0.35;
                CORE.move.x = -Math.cos(a) * (d/50) * 0.35;
                CORE.move.active = d > 5;
            };

            zone.addEventListener('touchstart', (e) => {
                const r = zone.getBoundingClientRect();
                cx = r.left + r.width/2; cy = r.top + r.height/2;
            });
            zone.addEventListener('touchmove', (e) => { e.preventDefault(); move(e); }, { passive: false });
            window.addEventListener('touchend', () => {
                stick.style.transform = `translate(0,0)`;
                CORE.move.active = false;
                CORE.move.z = 0; CORE.move.x = 0;
            });
        }

        function handleSpatialAudio() {
            if (!CORE.active) return;
            const dist = camera.position.distanceTo(surgeon.position);
            
            // BREATHING: Loudness increases exponentially as Surgeon gets closer
            let breathAmt = 1.0 - (dist / 45); 
            breathAmt = Math.max(0, Math.min(breathAmt, 1));
            sfxBreath.volume = Math.pow(breathAmt, 1.8) * 0.95;

            // FOOTSTEPS: Sync with motion
            if (CORE.move.active) {
                sfxStep.volume = Math.min(sfxStep.volume + 0.05, 0.4);
            } else {
                sfxStep.volume = Math.max(sfxStep.volume - 0.05, 0);
            }

            // AUTO-EXPOSURE: If it's too dark, the "pupils" dilate
            if (dist > 30) {
                moonLight.intensity = Math.min(moonLight.intensity + 0.001, 0.6);
            } else {
                // If Surgeon is close, vision "tightens" with fear
                moonLight.intensity = Math.max(moonLight.intensity - 0.01, 0.2);
            }
        }

        function updateSurgeon(delta) {
            const camZ = camera.position.z;
            const surgZ = surgeon.position.z;
            
            // Look Check
            const frustum = new THREE.Frustum();
            frustum.setFromProjectionMatrix(new THREE.Matrix4().multiplyMatrices(camera.projectionMatrix, camera.matrixWorldInverse));
            const seen = frustum.containsPoint(surgeon.position);

            if (!seen) {
                // He moves extremely fast when not watched
                surgeon.position.z += delta * 12.0; 
                surgeon.position.x = Math.sin(Date.now() * 0.001) * 2; // Swerve in shadows
            } else {
                // He freezes or creeps when seen
                surgeon.position.z += delta * 0.4;
                // Head jitter
                surgeon.children[1].position.x = Math.sin(Date.now() * 0.08) * 0.02;
            }

            // Persistence Loop
            if (camZ - surgZ > 15) {
                surgeon.position.z = camZ - 55; // Teleport ahead
            }
        }

        // --- 4. RENDER LOOP ---
        function animate() {
            requestAnimationFrame(animate);
            const delta = clock.getDelta();

            if (CORE.move.active) {
                camera.position.z += CORE.move.z;
                camera.position.x += CORE.move.x;
                // Bobbing
                camera.position.y = CORE.camHeight + Math.sin(Date.now() * 0.01) * 0.06;
            }

            // Flashlight Flicker
            if (Math.random() > 0.985) {
                flashlight.intensity = 40 + Math.random() * 120;
            }

            // Geometry Culling (Keep performance high)
            CORE.objs.segments.forEach(s => {
                const d = camera.position.z - s.position.z;
                s.visible = (d > -120 && d < 20);
            });

            updateSurgeon(delta);
            handleSpatialAudio();

            renderer.render(scene, camera);
        }

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>
</html>
