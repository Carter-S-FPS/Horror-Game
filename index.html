<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SANITY_FRACTURE_V8.1_SUB_SIX</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/0.160.0/three.min.js"></script>
    <style>
        :root {
            --cyan: #00f2ff;
            --red: #ff1100;
            --font: 'Courier New', Courier, monospace;
        }

        * { 
            margin: 0; padding: 0; box-sizing: border-box; 
            touch-action: none; user-select: none; 
            outline: none; -webkit-tap-highlight-color: transparent;
        }

        body, html { 
            width: 100%; height: 100%; background: #000; 
            overflow: hidden; font-family: var(--font);
        }

        #noise {
            position: fixed; inset: 0; pointer-events: none; z-index: 9000;
            background: url('https://upload.wikimedia.org/wikipedia/commons/5/5a/Can_not_be_displayed.png');
            opacity: 0.015; mix-blend-mode: overlay;
        }

        #vignette {
            position: fixed; inset: 0; pointer-events: none; z-index: 9001;
            background: radial-gradient(circle, transparent 25%, #000 140%);
        }

        #boot-ui {
            position: fixed; inset: 0; background: #000; z-index: 10000;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            transition: opacity 1.2s ease-in-out;
        }

        .terminal-box {
            width: 80%; max-width: 900px; height: 60vh;
            border: 1px solid #111; background: #010102;
            padding: 30px; display: flex; flex-direction: column;
        }

        .term-header {
            color: var(--cyan); font-size: 0.75rem; letter-spacing: 12px;
            margin-bottom: 25px; border-bottom: 1px solid #0a0a0c; padding-bottom: 10px;
        }

        #p-bar-bg { width: 100%; height: 1px; background: #050507; margin-bottom: 20px; }
        #p-bar-fill { width: 0%; height: 100%; background: var(--cyan); box-shadow: 0 0 10px var(--cyan); }

        #term-log {
            flex-grow: 1; overflow: hidden; font-size: 0.6rem;
            color: #222; line-height: 2; display: flex; flex-direction: column-reverse;
        }

        #game-hud {
            position: absolute; inset: 0; pointer-events: none;
            display: none; z-index: 1000;
        }

        .stats {
            position: absolute; top: 30px; left: 30px;
            font-size: 0.6rem; color: var(--cyan);
            line-height: 3; letter-spacing: 5px;
        }

        #mv-pad { position: absolute; left: 0; bottom: 0; width: 50%; height: 100%; pointer-events: auto; }
        #lk-pad { position: absolute; right: 0; bottom: 0; width: 50%; height: 100%; pointer-events: auto; }
        
        #j-outer {
            position: absolute; width: 120px; height: 120px; border-radius: 50%;
            background: rgba(0, 242, 255, 0.01); border: 1px solid rgba(0, 242, 255, 0.05);
            display: none; transform: translate(-50%, -50%);
        }

        #j-inner { position: absolute; top: 35px; left: 35px; width: 50px; height: 50px; background: var(--cyan); border-radius: 50%; opacity: 0.15; }

        #death-card { position: fixed; inset: 0; z-index: 100000; background: #000; display: none; justify-content: center; align-items: center; }
        #death-card img { width: 150%; height: 150%; object-fit: cover; filter: grayscale(1) contrast(4); }
    </style>
</head>
<body>

    <div id="noise"></div>
    <div id="vignette"></div>
    <div id="death-card"><img src="https://i.imgur.com/8N8H1yV.png"></div>

    <div id="boot-ui">
        <div class="terminal-box">
            <div class="term-header">TITAN_V8.1_SUB_SIX_PHYSICS</div>
            <div id="p-bar-bg"><div id="p-bar-fill"></div></div>
            <div id="term-log"></div>
        </div>
    </div>

    <div id="game-hud">
        <div class="stats">
            CEILING_CAP: 6.0_UNITS<br>
            PLAYER_BUFFER: 1.2_STUDS<br>
            CELL_DENSITY: 16x16_DFS<br>
            THREAT: <span id="threat-stat">STABLE</span>
        </div>
        <div id="mv-pad"><div id="j-outer"><div id="j-inner"></div></div></div>
        <div id="lk-pad"></div>
    </div>

    <script>
        /**
         * SANITY'S FRACTURE: TITAN ENGINE V8.1
         * ---------------------------------------------------------
         * Ultra-Low Ceiling Physics Kernel.
         */

        const CFG = {
            VERSION: "8.1.2-SIX",
            MAZE_DIM: 16,
            CELL_W: 14,  // Tighter corridors
            H: 6.0,      // REQUESTED HEIGHT
            EYE: 1.45,   // Adjusted for low ceiling
            SCALE: 0.038,
            SPD: 0.32,
            SENS: 0.007,
            FOG: 0.16,
            AMBIENT: 1.85,
            P_RAD: 1.2
        };

        const SYS = {
            booted: false,
            active: false,
            input: {
                v: new THREE.Vector2(),
                moving: false,
                yaw: 0,
                pitch: 0,
                anc: new THREE.Vector2()
            },
            ents: [],
            targets: [],
            physics: [] 
        };

        let scene, camera, renderer, ray, light;

        // --- MAZE ENGINE ---
        function generateMazeGrid(dim) {
            let grid = [];
            for (let y = 0; y < dim; y++) {
                grid[y] = [];
                for (let x = 0; x < dim; x++) {
                    grid[y][x] = { x, y, vis: false, walls: [true, true, true, true] };
                }
            }
            let stack = [];
            let curr = grid[0][0];
            curr.vis = true;
            const getN = (c) => {
                let n = [];
                let { x, y } = c;
                if (y > 0 && !grid[y - 1][x].vis) n.push({ c: grid[y - 1][x], d: 0 });
                if (x < dim - 1 && !grid[y][x + 1].vis) n.push({ c: grid[y][x + 1], d: 1 });
                if (y < dim - 1 && !grid[y + 1][x].vis) n.push({ c: grid[y + 1][x], d: 2 });
                if (x > 0 && !grid[y][x - 1].vis) n.push({ c: grid[y][x - 1], d: 3 });
                return n;
            };
            while (true) {
                let n = getN(curr);
                if (n.length > 0) {
                    let next = n[Math.floor(Math.random() * n.length)];
                    stack.push(curr);
                    curr.walls[next.d] = false;
                    next.c.walls[(next.d + 2) % 4] = false;
                    curr = next.c; curr.vis = true;
                } else if (stack.length > 0) {
                    curr = stack.pop();
                } else break;
            }
            return grid;
        }

        // --- BOOT PROCESS ---
        function startBoot() {
            const bar = document.getElementById('p-bar-fill');
            const log = document.getElementById('term-log');
            const sequences = [
                "CRUSHING_CEILING_GATING_TO_6.0...",
                "CALIBRATING_EYE_ALTITUDE_1.45...",
                "THREADING_AABB_PHYSICS_GRID...",
                "VOXELIZING_SURGEON_MODEL...",
                "MAPPING_DFS_MAZE_16x16...",
                "INJECTING_DYNAMIC_FLICKER...",
                "FLUSHING_TITAN_GEOMETRY...",
                "STABILIZING_KERNEL_8.1...",
                "BOOT_READY."
            ];
            let p = 0;
            const bootLoop = () => {
                p += 1.4; bar.style.width = p + "%";
                if (Math.floor(p) % 11 === 0) {
                    const t = sequences[Math.floor(p / 11)];
                    if (t) log.innerHTML = `> [SYSTEM] ${t}<br>${log.innerHTML}`;
                }
                if (p >= 100) {
                    SYS.booted = true;
                    log.innerHTML = "<span style='color:#fff'>[SYNC_OK] TOUCH TO WAKE</span><br>" + log.innerHTML;
                    init();
                } else requestAnimationFrame(bootLoop);
            };
            bootLoop();
        }

        // --- ENTITY SYSTEM ---
        class Stalker {
            constructor(type, dist) {
                this.node = new THREE.Group();
                this.type = type;
                this.dist = dist;
                this.seen = false;
                this.build();
                this.spawn();
            }
            build() {
                const c = this.type === 'surgeon' ? [0x220000, 0x0a0000] : [0x050505, 0x010101];
                const addSeg = (w, h, d, x, y, z) => {
                    const g = new THREE.Group();
                    for (let i = 0; i < 35; i++) {
                        const m = new THREE.Mesh(new THREE.BoxGeometry(w, h, d), new THREE.MeshLambertMaterial({ color: c[Math.floor(Math.random() * c.length)] }));
                        m.position.set((Math.random() - 0.5) * w, (Math.random() - 0.5) * h, (Math.random() - 0.5) * d);
                        g.add(m);
                    }
                    g.position.set(x, y, z); this.node.add(g);
                };
                addSeg(18, 28, 12, 0, 45, 0); addSeg(12, 12, 12, 0, 72, 0);
                addSeg(6, 48, 6, -12, 38, 0); addSeg(6, 48, 6, 12, 38, 0);
                addSeg(8, 50, 8, -6, 0, 0); addSeg(8, 50, 8, 6, 0, 0);
                this.node.scale.set(CFG.SCALE, CFG.SCALE, CFG.SCALE);
                const hb = new THREE.Mesh(new THREE.BoxGeometry(25, 95, 25), new THREE.MeshBasicMaterial({ visible: false }));
                hb.position.y = 45; this.node.add(hb); SYS.targets.push(hb);
            }
            spawn() {
                const a = Math.random() * Math.PI * 2;
                this.node.position.set(Math.cos(a) * this.dist, 0.1, Math.sin(a) * this.dist);
            }
            tick(pPos, hits) {
                this.seen = false;
                if (hits.length > 0) hits.forEach(h => { if (this.node.getObjectById(h.object.id)) this.seen = true; });
                const d = this.node.position.distanceTo(pPos);
                if (d < 450) {
                    this.node.lookAt(pPos.x, 0.1, pPos.z);
                    const v = new THREE.Vector3().subVectors(pPos, this.node.position).normalize();
                    const s = this.type === 'surgeon' ? 0.31 : (this.seen ? 1.4 : 0.05);
                    this.node.position.addScaledVector(v, s);
                }
                return d;
            }
        }

        // --- WORLD & PHYSICS ---
        function init() {
            scene = new THREE.Scene();
            scene.fog = new THREE.FogExp2(0x010103, CFG.FOG);
            camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 4000);
            ray = new THREE.Raycaster();
            renderer = new THREE.WebGLRenderer({ antialias: false });
            renderer.setSize(window.innerWidth, window.innerHeight);
            document.body.appendChild(renderer.domElement);

            scene.add(new THREE.AmbientLight(0x1a1a24, CFG.AMBIENT));
            light = new THREE.SpotLight(0xfffce0, 1500, 220, 0.9, 0.5);
            light.target.position.z = -10; camera.add(light); camera.add(light.target); scene.add(camera);

            const floorM = new THREE.MeshPhysicalMaterial({ color: 0x050505, roughness: 0.08, metalness: 0.4, clearcoat: 1 });
            const ceilM = new THREE.MeshLambertMaterial({ color: 0x0a0a0c });
            const wallM = new THREE.MeshLambertMaterial({ color: 0x050506 });

            const grid = generateMazeGrid(CFG.MAZE_DIM);
            const offset = (CFG.MAZE_DIM * CFG.CELL_W) / 2;

            for (let y = 0; y < CFG.MAZE_DIM; y++) {
                for (let x = 0; x < CFG.MAZE_DIM; x++) {
                    const cell = grid[y][x];
                    const px = x * CFG.CELL_W - offset;
                    const pz = y * CFG.CELL_W - offset;

                    const f = new THREE.Mesh(new THREE.PlaneGeometry(CFG.CELL_W, CFG.CELL_W), floorM);
                    f.rotation.x = -Math.PI / 2; f.position.set(px, 0, pz); scene.add(f);
                    const c = new THREE.Mesh(new THREE.PlaneGeometry(CFG.CELL_W, CFG.CELL_W), ceilM);
                    c.rotation.x = Math.PI / 2; c.position.set(px, CFG.H, pz); scene.add(c);

                    const buildW = (w, h, d, xx, zz) => {
                        const m = new THREE.Mesh(new THREE.BoxGeometry(w, h, d), wallM);
                        m.position.set(xx, h / 2, zz); scene.add(m);
                        SYS.physics.push({ minX: xx - w / 2, maxX: xx + w / 2, minZ: zz - d / 2, maxZ: zz + d / 2 });
                    };

                    if (cell.walls[0]) buildW(CFG.CELL_W, CFG.H, 0.8, px, pz - CFG.CELL_W / 2);
                    if (cell.walls[1]) buildW(0.8, CFG.H, CFG.CELL_W, px + CFG.CELL_W / 2, pz);
                    if (cell.walls[2]) buildW(CFG.CELL_W, CFG.H, 0.8, px, pz + CFG.CELL_W / 2);
                    if (cell.walls[3]) buildW(0.8, CFG.H, CFG.CELL_W, px - CFG.CELL_W / 2, pz);
                }
            }

            const surgeon = new Stalker('surgeon', 700);
            scene.add(surgeon.node); SYS.ents.push(surgeon);
            for (let i = 0; i < 4; i++) {
                const sc = new Stalker('scout', 350 + i * 100);
                scene.add(sc.node); SYS.ents.push(sc);
            }

            setupIO();
            engineLoop();
        }

        function resolve(pos, rad) {
            for (let p of SYS.physics) {
                let cx = Math.max(p.minX, Math.min(pos.x, p.maxX));
                let cz = Math.max(p.minZ, Math.min(pos.z, p.maxZ));
                let dx = pos.x - cx, dz = pos.z - cz;
                let dSq = dx * dx + dz * dz;
                if (dSq < rad * rad) {
                    let d = Math.sqrt(dSq);
                    let ov = rad - d;
                    pos.x += (dx / d) * ov;
                    pos.z += (dz / d) * ov;
                }
            }
        }

        function engineLoop() {
            requestAnimationFrame(engineLoop);
            if (!SYS.active) return;
            camera.rotation.order = "YXZ";
            camera.rotation.y = SYS.input.yaw; camera.rotation.x = SYS.input.pitch;

            // Flicker Engine
            light.intensity = 1500 + (Math.random() > 0.98 ? -800 : 0);

            if (SYS.input.moving) {
                const f = new THREE.Vector3(0, 0, -1).applyQuaternion(camera.quaternion);
                f.y = 0; f.normalize();
                const s = new THREE.Vector3(1, 0, 0).applyQuaternion(camera.quaternion);
                s.y = 0; s.normalize();
                const v = new THREE.Vector3().addScaledVector(f, -SYS.input.v.y).addScaledVector(s, SYS.input.v.x);
                camera.position.addScaledVector(v, CFG.SPD);
                resolve(camera.position, CFG.P_RAD);
                camera.position.y = CFG.EYE + Math.sin(Date.now() * 0.015) * 0.025;
            }

            ray.setFromCamera(new THREE.Vector2(0, 0), camera);
            const hits = ray.intersectObjects(SYS.targets);
            let danger = false;
            SYS.ents.forEach(e => {
                const d = e.tick(camera.position, hits);
                if (e.seen) danger = true;
                if (d < 3.5) { document.getElementById('death-card').style.display = 'flex'; setTimeout(() => location.reload(), 1500); }
            });
            document.getElementById('threat-stat').innerText = danger ? "CONTACT" : "STABLE";
            document.getElementById('threat-stat').style.color = danger ? "var(--red)" : "var(--cyan)";
            renderer.render(scene, camera);
        }

        function setupIO() {
            const mv = document.getElementById('mv-pad'), lk = document.getElementById('lk-pad');
            const outer = document.getElementById('j-outer'), inner = document.getElementById('j-inner');
            let lx, ly;
            mv.addEventListener('touchstart', e => {
                const t = e.touches[0]; SYS.input.anc.set(t.clientX, t.clientY);
                outer.style.display = 'block'; outer.style.left = t.clientX + 'px'; outer.style.top = t.clientY + 'px';
            });
            mv.addEventListener('touchmove', e => {
                e.preventDefault(); const t = e.touches[0];
                const dx = t.clientX - SYS.input.anc.x, dy = t.clientY - SYS.input.anc.y;
                const d = Math.min(Math.sqrt(dx * dx + dy * dy), 60);
                const a = Math.atan2(dy, dx);
                inner.style.transform = `translate(${Math.cos(a) * d}px, ${Math.sin(a) * d}px)`;
                SYS.input.v.set(Math.cos(a) * (d / 60), Math.sin(a) * (d / 60));
                SYS.input.moving = d > 8;
            }, { passive: false });
            mv.addEventListener('touchend', () => { outer.style.display = 'none'; SYS.input.moving = false; });
            lk.addEventListener('touchstart', e => { lx = e.touches[0].clientX; ly = e.touches[0].clientY; });
            lk.addEventListener('touchmove', e => {
                const t = e.touches[0];
                SYS.input.yaw -= (t.clientX - lx) * CFG.SENS;
                SYS.input.pitch -= (t.clientY - ly) * CFG.SENS;
                SYS.input.pitch = Math.max(-1.3, Math.min(1.3, SYS.input.pitch));
                lx = t.clientX; ly = t.clientY;
            });
        }

        window.ontouchstart = () => { if (SYS.booted && !SYS.active) { SYS.active = true; document.getElementById('boot-ui').style.opacity = '0'; setTimeout(() => { document.getElementById('boot-ui').style.display = 'none'; document.getElementById('game-hud').style.display = 'block'; }, 1200); } };
        window.onload = startBoot;
    </script>
</body>
</html>
