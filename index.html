<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SANITY_FRACTURE_TITAN_DEEP_BUILD_V5.8</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/0.160.0/three.min.js"></script>
    <style>
        :root {
            --neon-cyan: #00f2ff;
            --alert-red: #ff0044;
            --interface-bg: #010103;
            --terminal-text: #2a2a2e;
            --font-mono: 'Courier New', Courier, monospace;
        }

        * { 
            margin: 0; padding: 0; box-sizing: border-box; 
            touch-action: none; user-select: none; 
            outline: none; -webkit-tap-highlight-color: transparent;
        }

        body, html { 
            width: 100%; height: 100%; background: #000; 
            overflow: hidden; font-family: var(--font-mono);
        }

        /* --- ATMOSPHERIC POST-PROCESSING --- */
        #static-noise {
            position: fixed; inset: 0; pointer-events: none; z-index: 9000;
            background: url('https://upload.wikimedia.org/wikipedia/commons/5/5a/Can_not_be_displayed.png');
            opacity: 0.012; mix-blend-mode: overlay;
        }

        #vignette-overlay {
            position: fixed; inset: 0; pointer-events: none; z-index: 9001;
            background: radial-gradient(circle, transparent 55%, #000 190%);
        }

        /* --- BOOT SEQUENCE TERMINAL --- */
        #boot-interface {
            position: fixed; inset: 0; background: #000; z-index: 10000;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            transition: opacity 2.5s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .terminal-shell {
            width: 85%; max-width: 1100px; height: 75vh;
            border: 1px solid #0d0d0f; background: #020204;
            padding: 50px; display: flex; flex-direction: column;
            box-shadow: 0 0 100px rgba(0,0,0,1);
        }

        .shell-header {
            color: var(--neon-cyan); font-size: 1rem; letter-spacing: 12px;
            margin-bottom: 40px; text-transform: uppercase;
            border-bottom: 1px solid #0d0d0f; padding-bottom: 20px;
        }

        #load-rail {
            width: 100%; height: 2px; background: #08080a; margin-bottom: 30px;
        }

        #load-fill {
            width: 0%; height: 100%; background: var(--neon-cyan);
            box-shadow: 0 0 25px var(--neon-cyan);
        }

        #shell-output {
            flex-grow: 1; overflow: hidden; font-size: 0.7rem;
            color: var(--terminal-text); line-height: 2.8; white-space: pre-wrap;
            display: flex; flex-direction: column-reverse;
        }

        /* --- HUD ELEMENTS --- */
        #game-hud {
            position: absolute; inset: 0; pointer-events: none;
            display: none; z-index: 1000;
        }

        .hud-readout {
            position: absolute; top: 60px; left: 60px;
            font-size: 0.7rem; color: var(--neon-cyan);
            line-height: 3.5; letter-spacing: 6px;
            text-shadow: 0 0 10px rgba(0, 242, 255, 0.4);
        }

        #ray-reticle {
            position: absolute; top: 50%; left: 50%; width: 2px; height: 2px;
            background: rgba(255,255,255,0.15); transform: translate(-50%, -50%);
        }

        /* --- INTERACTIVE INPUT ZONES --- */
        #touch-move { position: absolute; left: 0; bottom: 0; width: 50%; height: 100%; pointer-events: auto; }
        #touch-look { position: absolute; right: 0; bottom: 0; width: 50%; height: 100%; pointer-events: auto; }
        
        #joy-base-ui {
            position: absolute; width: 150px; height: 150px; border-radius: 50%;
            background: rgba(0, 242, 255, 0.01); border: 1px solid rgba(0, 242, 255, 0.08);
            display: none; transform: translate(-50%, -50%);
        }

        #joy-nub-ui {
            position: absolute; top: 50px; left: 50px; width: 50px; height: 50px;
            background: var(--neon-cyan); border-radius: 50%; opacity: 0.25;
        }

        #death-state {
            position: fixed; inset: 0; z-index: 100000; background: #000;
            display: none; justify-content: center; align-items: center;
        }

        #death-state img { 
            width: 140%; height: 140%; object-fit: cover; 
            filter: grayscale(1) contrast(8) brightness(0.8); 
        }
    </style>
</head>
<body>

    <div id="static-noise"></div>
    <div id="vignette-overlay"></div>

    <div id="death-state"><img src="https://i.imgur.com/8N8H1yV.png"></div>

    <div id="boot-interface">
        <div class="terminal-shell">
            <div class="shell-header">TITAN_V5.8_STABLE_KERNEL</div>
            <div id="load-rail"><div id="load-fill"></div></div>
            <div id="shell-output"></div>
        </div>
    </div>

    <div id="game-hud">
        <div class="hud-readout">
            ILLUMINATION: AMBIENT_WALL_GLOW<br>
            BEAM_SPREAD: 0.85_RAD<br>
            ENTITY_SPAWN: 800_STUDS<br>
            THREAT: <span id="threat-stat">SECURE</span>
        </div>
        <div id="ray-reticle"></div>
        <div id="touch-move"><div id="joy-base-ui"><div id="joy-nub-ui"></div></div></div>
        <div id="touch-look"></div>
    </div>

    <script>
        /**
         * SANITY'S FRACTURE: TITAN ENGINE V5.8
         * ---------------------------------------------------------
         * This script is intentionally expanded to provide granular
         * control over every mesh and light interaction.
         */

        const PARAMS = {
            VERSION: "5.8.0 Deep Build",
            MAP_LIMIT: 5000,
            HALL_W: 18,
            HALL_H: 15,
            PLAYER_H: 1.75,
            VOXEL_UNIT: 0.038,
            WALK_SPD: 0.39,
            LOOK_SENS: 0.0075,
            SURGEON_OFFSET: 800,
            SCOUT_OFFSET: 600,
            FOG_STRENGTH: 0.12,
            AMBIENT_INTENSITY: 1.9,
            FLASHLIGHT_INTENSITY: 2200
        };

        const WORLD = {
            ready: false,
            active: false,
            input: {
                vec: new THREE.Vector2(),
                moving: false,
                yaw: 0,
                pitch: 0,
                anchor: new THREE.Vector2()
            },
            registry: {
                enemies: [],
                hitboxes: [],
                corridors: []
            }
        };

        let scene, camera, renderer, raycaster, flashlight;

        // --- MODULE: VERBOSE BOOT LOADER ---
        function initiateBootSequence() {
            const bar = document.getElementById('load-fill');
            const log = document.getElementById('shell-output');
            
            const routines = [
                "INITIALIZING_THREE_JS_CORE_MODULES...",
                "ALLOCATING_VERTEX_BUFFER_ARRAY_64BIT...",
                "INJECTING_AMBIENT_LUMINESCENCE_ENGINE...",
                "POLISHING_HIGH_GLOSS_EPOXY_MATERIALS...",
                "MAPPING_1500_UNIT_CORRIDOR_SEGMENTS...",
                "CALIBRATING_WIDER_BEAM_PENUMBRA...",
                "GENERATING_SURGEON_VOXEL_ANATOMY...",
                "LOCALIZING_800_STUD_STALKER_START...",
                "CALIBRATING_RAYCAST_SIGHT_SYSTEM...",
                "REMOVING_SCOPE_MESH_LIMITATIONS...",
                "DECODING_LIMINAL_OFFICE_ASSETS...",
                "TITAN_STABLE_KERNEL_LOADED."
            ];

            let p = 0;
            const bootLoop = () => {
                p += 0.8;
                bar.style.width = p + "%";
                
                if (Math.floor(p) % 8 === 0) {
                    const task = routines[Math.floor(p / 8)];
                    if (task) log.innerHTML = `> [EXEC] ${task}<br>${log.innerHTML}`;
                }

                if (p >= 100) {
                    WORLD.ready = true;
                    log.innerHTML = "<span style='color:#fff'>[SYNC_SUCCESS] INTERACT TO WAKE</span><br>" + log.innerHTML;
                    constructUniverse();
                } else {
                    requestAnimationFrame(bootLoop);
                }
            };
            bootLoop();
        }

        // --- MODULE: EXPLICIT VOXEL ANATOMY ---
        class StalkerEntity {
            constructor(role, spawnDistance) {
                this.node = new THREE.Group();
                this.role = role;
                this.spawnDistance = spawnDistance;
                this.isDirectlyWatched = false;
                this.anatomyConstruct();
                this.placeInWorld();
            }

            // Manually building anatomy for code density and control
            anatomyConstruct() {
                const colors = this.role === 'surgeon' ? [0x330000, 0x110000] : [0x080808, 0x010101];

                const createVoxelBlock = (w, h, d, x, y, z) => {
                    const blockGroup = new THREE.Group();
                    for (let i = 0; i < 35; i++) {
                        const voxel = new THREE.Mesh(
                            new THREE.BoxGeometry(w, h, d),
                            new THREE.MeshLambertMaterial({ 
                                color: colors[Math.floor(Math.random() * colors.length)] 
                            })
                        );
                        voxel.position.set(
                            (Math.random() - 0.5) * w,
                            (Math.random() - 0.5) * h,
                            (Math.random() - 0.5) * d
                        );
                        blockGroup.add(voxel);
                    }
                    blockGroup.position.set(x, y, z);
                    this.node.add(blockGroup);
                };

                // Manually mapping the human-scale anatomy
                createVoxelBlock(18, 28, 12, 0, 45, 0);   // Upper Torso
                createVoxelBlock(12, 12, 12, 0, 72, 0);   // Cranial Unit
                createVoxelBlock(6, 48, 6, -12, 38, 0);   // Left Armature
                createVoxelBlock(6, 48, 6, 12, 38, 0);    // Right Armature
                createVoxelBlock(8, 50, 8, -6, 0, 0);     // Left Leg
                createVoxelBlock(8, 50, 8, 6, 0, 0);      // Right Leg

                this.node.scale.set(PARAMS.VOXEL_UNIT, PARAMS.VOXEL_UNIT, PARAMS.VOXEL_UNIT);

                // EXPLICIT SIGHT HITBOX
                this.hitbox = new THREE.Mesh(
                    new THREE.BoxGeometry(25, 95, 25),
                    new THREE.MeshBasicMaterial({ visible: false })
                );
                this.hitbox.position.y = 45;
                this.node.add(this.hitbox);
                WORLD.registry.hitboxes.push(this.hitbox);
            }

            placeInWorld() {
                const a = Math.random() * Math.PI * 2;
                this.node.position.set(
                    Math.cos(a) * this.spawnDistance,
                    0.1,
                    Math.sin(a) * this.spawnDistance
                );
            }

            process(pPos, rayHits) {
                this.isDirectlyWatched = false;
                if (rayHits.length > 0) {
                    rayHits.forEach(h => {
                        if (this.node.getObjectById(h.object.id)) this.isDirectlyWatched = true;
                    });
                }

                const dist = this.node.position.distanceTo(pPos);
                
                // Behavior State Machine
                if (dist < 400) {
                    this.node.lookAt(pPos.x, 0.1, pPos.z);
                    const vectorToPlayer = new THREE.Vector3().subVectors(pPos, this.node.position).normalize();
                    
                    const calculatedSpeed = this.role === 'surgeon' 
                        ? 0.31 
                        : (this.isDirectlyWatched ? 1.55 : 0.05);

                    this.node.position.addScaledVector(vectorToPlayer, calculatedSpeed);
                }
                return dist;
            }
        }

        // --- MODULE: WORLD CONTRUCTION ---
        function constructUniverse() {
            scene = new THREE.Scene();
            scene.fog = new THREE.FogExp2(0x010103, PARAMS.FOG_STRENGTH);

            camera = new THREE.PerspectiveCamera(80, window.innerWidth / window.innerHeight, 0.1, 4000);
            raycaster = new THREE.Raycaster();

            renderer = new THREE.WebGLRenderer({ antialias: false, powerPreference: "high-performance" });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(Math.min(window.devicePixelRatio, 1.2));
            document.body.appendChild(renderer.domElement);

            // GLOBAL ILLUMINATION (ENHANCED WALL VISIBILITY)
            // Using a specific tone to allow the walls to be visible even in darkness
            const ambientGlow = new THREE.AmbientLight(0x1a1a24, PARAMS.AMBIENT_INTENSITY);
            scene.add(ambientGlow);
            
            // WIDE FLOOD BEAM
            flashlight = new THREE.SpotLight(0xfffce0, PARAMS.FLASHLIGHT_INTENSITY, 280, 0.85, 0.5);
            flashlight.target.position.z = -10;
            camera.add(flashlight);
            camera.add(flashlight.target);
            scene.add(camera);

            // DETAILED MATERIALS
            const epoxyFloorMat = new THREE.MeshPhysicalMaterial({
                color: 0x080808,
                roughness: 0.05,
                metalness: 0.6,
                clearcoat: 1.0,
                clearcoatRoughness: 0.04
            });

            const wallMat = new THREE.MeshLambertMaterial({ color: 0x0c0c0e });
            const ceilingMat = new THREE.MeshLambertMaterial({ color: 0x1d1d1f });

            // MANUAL CORRIDOR UNROLLING
            // We create 75 segments to ensure a massive corridor grid
            for (let i = 0; i < 75; i++) {
                const seg = new THREE.Group();

                // Floor Mesh
                const f = new THREE.Mesh(new THREE.PlaneGeometry(1500, PARAMS.HALL_W), epoxyFloorMat);
                f.rotation.x = -Math.PI / 2;
                seg.add(f);

                // Ceiling Mesh
                const c = new THREE.Mesh(new THREE.PlaneGeometry(1500, PARAMS.HALL_W), ceilingMat);
                c.rotation.x = Math.PI / 2;
                c.position.y = PARAMS.HALL_H;
                seg.add(c);

                // Ceiling Grid
                const g = new THREE.GridHelper(1500, 45, 0x000000, 0x121212);
                g.position.y = PARAMS.HALL_H - 0.02;
                seg.add(g);

                // Left Wall
                const w1 = new THREE.Mesh(new THREE.BoxGeometry(1500, PARAMS.HALL_H, 1), wallMat);
                w1.position.set(0, PARAMS.HALL_H / 2, -PARAMS.HALL_W / 2);
                seg.add(w1);
                
                // Right Wall
                const w2 = new THREE.Mesh(new THREE.BoxGeometry(1500, PARAMS.HALL_H, 1), wallMat);
                w2.position.set(0, PARAMS.HALL_H / 2, PARAMS.HALL_W / 2);
                seg.add(w2);

                // Alternating Grid Logic
                seg.rotation.y = (i % 2 === 0) ? 0 : Math.PI / 2;
                seg.position.set(
                    (i % 2 === 0 ? 0 : i * 25 - 800),
                    0,
                    (i % 2 === 0 ? i * 25 - 800 : 0)
                );

                scene.add(seg);
                WORLD.registry.corridors.push(seg);
            }

            // SPAWN THREATS
            const surgeon = new StalkerEntity('surgeon', PARAMS.SURGEON_OFFSET);
            scene.add(surgeon.node);
            WORLD.registry.enemies.push(surgeon);

            for (let i = 0; i < 5; i++) {
                const scout = new StalkerEntity('scout', PARAMS.SCOUT_OFFSET + (i * 60));
                scene.add(scout.node);
                WORLD.registry.enemies.push(scout);
            }

            initializeInputHandlers();
            engineMainLoop();
        }

        // --- MODULE: CORE ENGINE LOOP ---
        function engineMainLoop() {
            requestAnimationFrame(engineMainLoop);
            if (!WORLD.active) return;

            // Update Look Rotations
            camera.rotation.order = "YXZ";
            camera.rotation.y = WORLD.input.yaw;
            camera.rotation.x = WORLD.input.pitch;

            // Locomotion Processing
            if (WORLD.input.moving) {
                const fwd = new THREE.Vector3(0, 0, -1).applyQuaternion(camera.quaternion);
                fwd.y = 0; fwd.normalize();
                
                const rgt = new THREE.Vector3(1, 0, 0).applyQuaternion(camera.quaternion);
                rgt.y = 0; rgt.normalize();

                const mVec = new THREE.Vector3().addScaledVector(fwd, -WORLD.input.vec.y).addScaledVector(rgt, WORLD.input.vec.x);
                camera.position.addScaledVector(mVec, PARAMS.WALK_SPD);
                
                // Dynamic Head Bobbing
                camera.position.y = PARAMS.PLAYER_H + Math.sin(Date.now() * 0.012) * 0.06;
            }

            // Sight Gating (Raycasting)
            raycaster.setFromCamera(new THREE.Vector2(0, 0), camera);
            const currentHits = raycaster.intersectObjects(WORLD.registry.hitboxes);

            let threatActive = false;
            WORLD.registry.enemies.forEach(ent => {
                const distToCam = ent.process(camera.position, currentHits);
                
                if (ent.isDirectlyWatched) threatActive = true;

                // Kill Condition
                if (distToCam < 4.8) {
                    document.getElementById('death-state').style.display = 'flex';
                    setTimeout(() => location.reload(), 2000);
                }
            });

            // HUD Refresh
            document.getElementById('threat-stat').innerText = threatActive ? "CONTACT" : "SECURE";
            document.getElementById('threat-stat').style.color = threatActive ? "var(--alert-red)" : "var(--neon-cyan)";

            renderer.render(scene, camera);
        }

        // --- MODULE: INPUT PROCESSING ---
        function initializeInputHandlers() {
            const mvZone = document.getElementById('touch-move');
            const lkZone = document.getElementById('touch-look');
            const base = document.getElementById('joy-base-ui');
            const nub = document.getElementById('joy-nub-ui');
            
            let lx, ly;

            mvZone.addEventListener('touchstart', e => {
                const t = e.touches[0];
                WORLD.input.anchor.set(t.clientX, t.clientY);
                base.style.display = 'block'; 
                base.style.left = t.clientX + 'px'; 
                base.style.top = t.clientY + 'px';
            });

            mvZone.addEventListener('touchmove', e => {
                e.preventDefault();
                const t = e.touches[0];
                const dx = t.clientX - WORLD.input.anchor.x;
                const dy = t.clientY - WORLD.input.anchor.y;
                const radius = Math.min(Math.sqrt(dx * dx + dy * dy), 75);
                const angle = Math.atan2(dy, dx);
                
                nub.style.transform = `translate(${Math.cos(angle) * radius}px, ${Math.sin(angle) * radius}px)`;
                WORLD.input.vec.set(Math.cos(angle) * (radius / 75), Math.sin(angle) * (radius / 75));
                WORLD.input.moving = radius > 10;
            }, { passive: false });

            mvZone.addEventListener('touchend', () => {
                base.style.display = 'none';
                WORLD.input.moving = false;
            });

            lkZone.addEventListener('touchstart', e => {
                lx = e.touches[0].clientX;
                ly = e.touches[0].clientY;
            });

            lkZone.addEventListener('touchmove', e => {
                const t = e.touches[0];
                WORLD.input.yaw -= (t.clientX - lx) * PARAMS.LOOK_SENS;
                WORLD.input.pitch -= (t.clientY - ly) * PARAMS.LOOK_SENS;
                WORLD.input.pitch = Math.max(-1.4, Math.min(1.4, WORLD.input.pitch));
                lx = t.clientX;
                ly = t.clientY;
            });
        }

        window.ontouchstart = () => {
            if (WORLD.ready && !WORLD.active) {
                WORLD.active = true;
                document.getElementById('boot-interface').style.opacity = '0';
                setTimeout(() => {
                    document.getElementById('boot-interface').style.display = 'none';
                    document.getElementById('game-hud').style.display = 'block';
                }, 2500);
            }
        };

        window.onload = initiateBootSequence;
    </script>
</body>
</html>
