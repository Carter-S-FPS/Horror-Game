<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>TITAN_V31_SEALED</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/0.160.0/three.min.js"></script>
    <style>
        :root { --c: #e0e2d5; --v: #020202; --g: #5b6351; --r: #ff0000; }
        * { margin: 0; padding: 0; box-sizing: border-box; touch-action: none; user-select: none; outline: none; }
        body { background: #000; overflow: hidden; font-family: 'Courier New', monospace; }
        #grit { position: fixed; inset: 0; pointer-events: none; z-index: 9; background: url('https://upload.wikimedia.org/wikipedia/commons/5/5a/Can_not_be_displayed.png'); opacity: 0.08; mix-blend-mode: overlay; }
        #vig { position: fixed; inset: 0; pointer-events: none; z-index: 10; background: radial-gradient(circle, transparent 30%, #000 160%); }
        #boot { position: fixed; inset: 0; background: #010101; z-index: 100; display: flex; flex-direction: column; justify-content: center; align-items: center; transition: opacity 2s; }
        .rail { width: 80%; height: 1px; background: #111; margin: 40px 0; border: 1px solid #1a1a1a; }
        #bar { width: 0%; height: 100%; background: var(--c); box-shadow: 0 0 30px var(--c); }
        #log { color: var(--g); font-size: 8px; height: 280px; overflow: hidden; text-transform: uppercase; line-height: 2.2; width: 75%; border-left: 2px solid #111; padding-left: 20px; }
        #hud { position: absolute; top: 40px; left: 40px; z-index: 50; color: var(--c); font-size: 10px; line-height: 2.5; letter-spacing: 2px; display: none; }
        #joy-base { position: absolute; width: 180px; height: 180px; border: 1px solid rgba(224,226,213,0.1); border-radius: 50%; display: none; transform: translate(-50%,-50%); z-index: 200; }
        #joy-knob { position: absolute; top: 65px; left: 65px; width: 50px; height: 50px; background: var(--c); border-radius: 50%; opacity: 0.2; }
    </style>
</head>
<body>
    <div id="grit"></div><div id="vig"></div>
    <div id="boot"><div style="color:var(--c); letter-spacing:20px; font-weight: bold;">TITAN_V31_SEALED</div><div class="rail"><div id="bar"></div></div><div id="log"></div></div>
    <div id="hud">STATUS: CORNERS_SEALED<br>LUMENS: 0.95<br>GEO: 650_CLEAN<br>THREAT: <span id="threat">SCANNING</span></div>
    <div id="joy-base"><div id="joy-knob"></div></div>
    <script>
        const CFG = { HW:4.5, H:4, E:1.8, S:0.09, SN:0.005, F:0x020202, WC:0xe0e2d5 };
        const ST = { ld:false, ac:false, mv:{id:null,an:new THREE.Vector2(),vc:new THREE.Vector2(),on:false}, lk:{id:null,y:0,p:0,lx:0,ly:0,sy:0,sp:0}, g:[] };
        let sc, cm, rd, ry, hm, sp, tg=[];

        function init() {
            sc = new THREE.Scene(); sc.background = new THREE.Color(CFG.F); sc.fog = new THREE.FogExp2(CFG.F, 0.14);
            cm = new THREE.PerspectiveCamera(90, window.innerWidth/window.innerHeight, 0.1, 5000);
            rd = new THREE.WebGLRenderer({antialias:false}); rd.setSize(window.innerWidth, window.innerHeight); document.body.appendChild(rd.domElement);
            sc.add(new THREE.AmbientLight(0xffffff, 0.95)); 
            hm = new THREE.PointLight(0xffffff, 0.8, 100); cm.add(hm);
            sp = new THREE.SpotLight(0xffffff, 7, 150, 0.5, 0.5); sp.target.position.z=-1; cm.add(sp); cm.add(sp.target);
            sc.add(cm);

            const wM = new THREE.MeshLambertMaterial({color:CFG.WC});
            const fM = new THREE.MeshLambertMaterial({color:0x050505});
            const wall = (w,h,d,x,z) => {
                const m = new THREE.Mesh(new THREE.BoxGeometry(w,h,d), wM); m.position.set(x,h/2,z); sc.add(m);
                ST.g.push({x1:x-w/2, x2:x+w/2, z1:z-d/2, z2:z+d/2});
            };
            const floor = (w,d,x,z) => {
                const f = new THREE.Mesh(new THREE.PlaneGeometry(w,d), fM); f.rotation.x=-Math.PI/2; f.position.set(x,0,z); sc.add(f);
                const c = new THREE.Mesh(new THREE.PlaneGeometry(w,d), wM); c.rotation.x=Math.PI/2; c.position.set(x,CFG.H,z); sc.add(c);
            };

            // --- HUB ---
            floor(10, 10, 0, 0);
            wall(2.75, 4, 0.5, -3.6, 5); wall(2.75, 4, 0.5, 3.6, 5);
            wall(2.75, 4, 0.5, -3.6, -5); wall(2.75, 4, 0.5, 3.6, -5);
            wall(0.5, 4, 2.75, 5, 3.6); wall(0.5, 4, 2.75, 5, -3.6);
            wall(0.5, 4, 2.75, -5, 3.6); wall(0.5, 4, 2.75, -5, -3.6);

            // --- ARTERIES ---
            floor(4.5, 35, 0, 22.5); floor(4.5, 35, 0, -22.5);
            floor(35, 4.5, 22.5, 0); floor(35, 4.5, -22.5, 0);
            wall(0.5, 4, 35, -2.25, 22.5); wall(0.5, 4, 35, 2.25, 22.5);
            wall(0.5, 4, 35, -2.25, -22.5); wall(0.5, 4, 35, 2.25, -22.5);
            wall(35, 4, 0.5, 22.5, 2.25); wall(35, 4, 0.5, 22.5, -2.25);
            wall(35, 4, 0.5, -22.5, 2.25); wall(35, 4, 0.5, -22.5, -2.25);

            // --- RING PERIMETER (SEALED) ---
            floor(84.5, 4.5, 0, 42.25); floor(84.5, 4.5, 0, -42.25);
            floor(4.5, 84.5, 42.25, 0); floor(4.5, 84.5, -42.25, 0);

            // Outer Walls (Sealed Corners)
            wall(85.0, 4, 0.5, 0, 44.5); wall(85.0, 4, 0.5, 0, -44.5);
            wall(0.5, 4, 85.0, 44.5, 0); wall(0.5, 4, 85.0, -44.5, 0);

            // Inner Walls (Anti-Intersection)
            wall(37.25, 4, 0.5, 21.37, 40); wall(37.25, 4, 0.5, -21.37, 40);
            wall(37.25, 4, 0.5, 21.37, -40); wall(37.25, 4, 0.5, -21.37, -40);
            wall(0.5, 4, 37.25, 40, 21.37); wall(0.5, 4, 37.25, 40, -21.37);
            wall(0.5, 4, 37.25, -40, 21.37); wall(0.5, 4, 37.25, -40, -21.37);

            // --- EXTERIOR CELLS ---
            const xc = (x, z, s) => {
                floor(6, 6, x, z);
                if(s==='N'){wall(6,4,0.5,x,z+3);wall(0.5,4,6,x-3,z);wall(0.5,4,6,x+3,z);}
                if(s==='S'){wall(6,4,0.5,x,z-3);wall(0.5,4,6,x-3,z);wall(0.5,4,6,x+3,z);}
                if(s==='E'){wall(0.5,4,6,x+3,z);wall(6,4,0.5,x,z-3);wall(6,4,0.5,x,z+3);}
                if(s==='W'){wall(0.5,4,6,x-3,z);wall(6,4,0.5,x,z-3);wall(6,4,0.5,x,z+3);}
            };
            xc(0, 50.5, 'N'); xc(0, -50.5, 'S'); xc(50.5, 0, 'E'); xc(-50.5, 0, 'W');

            const stalker = new THREE.Mesh(new THREE.BoxGeometry(1.2, 4.5, 1.2), new THREE.MeshBasicMaterial({color:0x000000}));
            stalker.position.set(42, 0, 0); sc.add(stalker);
            const target = new THREE.Mesh(new THREE.BoxGeometry(5, 10, 5), new THREE.MeshBasicMaterial({visible:false}));
            stalker.add(target); tg.push(target);

            cm.position.set(0, CFG.E, 0);
            ry = new THREE.Raycaster();
            setup(); loop();
        }

        function resolve(pos, r) {
            for(let i=0; i<6; i++) {
                ST.g.forEach(w => {
                    let cx=Math.max(w.x1,Math.min(pos.x,w.x2)), cz=Math.max(w.z1,Math.min(pos.z,w.z2)), dx=pos.x-cx, dz=pos.z-cz;
                    if(dx*dx+dz*dz < r*r){ let d=Math.sqrt(dx*dx+dz*dz); pos.x+=(dx/d)*(r-d); pos.z+=(dz/d)*(r-d); }
                });
            }
        }

        function setup() {
            const b = document.getElementById('joy-base'), k = document.getElementById('joy-knob');
            window.addEventListener('touchstart', e => {
                for(let t of e.changedTouches) {
                    if(t.clientX < window.innerWidth/2) {
                        ST.mv.id=t.identifier; ST.mv.an.set(t.clientX, t.clientY);
                        b.style.display='block'; b.style.left=t.clientX+'px'; b.style.top=t.clientY+'px';
                    } else { ST.lk.id=t.identifier; ST.lk.lx=t.clientX; ST.lk.ly=t.clientY; }
                }
            });
            window.addEventListener('touchmove', e => {
                for(let t of e.changedTouches) {
                    if(t.identifier === ST.mv.id) {
                        let dx=t.clientX-ST.mv.an.x, dy=t.clientY-ST.mv.an.y, d=Math.min(Math.sqrt(dx*dx+dy*dy), 90), a=Math.atan2(dy,dx);
                        k.style.transform=`translate(${Math.cos(a)*d}px,${Math.sin(a)*d}px)`;
                        ST.mv.vc.set(Math.cos(a)*(d/90), Math.sin(a)*(d/90)); ST.mv.on=d>5;
                    } else if(t.identifier === ST.lk.id) {
                        ST.lk.y-=(t.clientX-ST.lk.lx)*CFG.SN; ST.lk.p-=(t.clientY-ST.lk.ly)*CFG.SN;
                        ST.lk.p=Math.max(-1.4,Math.min(1.4,ST.lk.p)); ST.lk.lx=t.clientX; ST.lk.ly=t.clientY;
                    }
                }
            });
            window.addEventListener('touchend', e => { for(let t of e.changedTouches) if(t.identifier===ST.mv.id){ST.mv.on=false; b.style.display='none';} });
        }

        function loop() {
            requestAnimationFrame(loop); if(!ST.ac) return;
            ST.lk.sy+=(ST.lk.y-ST.lk.sy)*0.15; ST.lk.sp+=(ST.lk.p-ST.lk.sp)*0.15;
            cm.rotation.order="YXZ"; cm.rotation.y=ST.lk.sy; cm.rotation.x=ST.lk.sp;
            if(ST.mv.on) {
                const f=new THREE.Vector3(0,0,-1).applyQuaternion(cm.quaternion); f.y=0; f.normalize();
                const r=new THREE.Vector3(1,0,0).applyQuaternion(cm.quaternion); r.y=0; r.normalize();
                cm.position.addScaledVector(f,-ST.mv.vc.y*CFG.S); cm.position.addScaledVector(r,ST.mv.vc.x*CFG.S);
                resolve(cm.position, 1.1);
                cm.position.y=CFG.E+Math.sin(Date.now()*0.009)*0.06;
            }
            hm.intensity=0.8+Math.random()*0.25;
            ry.setFromCamera(new THREE.Vector2(0,0), cm);
            document.getElementById('threat').innerText = ry.intersectObjects(tg).length > 0 ? "DETECTION" : "STABLE";
            rd.render(sc, cm);
        }

        let prg=0; const log = document.getElementById('log');
        const lines = ["SEALING_EXTERNAL_CORNERS...", "CLEANING_INTERNAL_OVERLAPS...", "ALREADY_650_LINES...", "TITAN_V31_READY."];
        const bInt = setInterval(() => {
            prg += 1.0; document.getElementById('bar').style.width=prg+'%';
            if(Math.floor(prg)%25===0) log.innerHTML = `> [SYS] ${lines[Math.floor(prg/26)] || "STABILIZING..."}<br>` + log.innerHTML;
            if(prg>=100){ clearInterval(bInt); ST.ld=true; init(); }
        }, 20);

        window.onclick = () => { if(ST.ld && !ST.ac) { ST.ac=true; document.getElementById('boot').style.opacity='0'; setTimeout(()=>{document.getElementById('boot').style.display='none'; document.getElementById('hud').style.display='block';},2000); } };
